function refreshChoices(){
chSel.innerHTML='';
const tf=tfSel.value;const tx=(txIn.value||'').toLowerCase().trim();
const exc=opts.excludeIds||[];
/* Track filter reasons for diagnostic */
const reasons={archived:0,excluded:0,wrongType:0,inboxOnly:0,inboxFiltered:0,alreadySelected:0,textMissed:0,passed:0};
let list=state.data.entities.filter(e=>{
if(e.archived){reasons.archived++;return false}
if(exc.includes(e.id)){reasons.excluded++;return false}
if(opts.allowedTypes&&opts.allowedTypes.length&&e.typeId&&!opts.allowedTypes.includes(e.typeId)){reasons.wrongType++;return false}
if(tf==='__none__'){if(e.typeId){reasons.inboxFiltered++;return false}}
else if(tf){if(e.typeId!==tf){if(!e.typeId)reasons.inboxOnly++;else reasons.wrongType++;return false}}
if(opts.mode==='multi'&&sel.includes(e.id)){reasons.alreadySelected++;return false}
if(opts.mode==='single'&&sel&&e.id===sel){reasons.alreadySelected++;return false}
if(tx){const hay=(getTitle(e)+' '+getSnip(e)).toLowerCase();if(!hay.includes(tx)){reasons.textMissed++;return false}}
reasons.passed++;return true;
});
list.sort((a,b)=>getTitle(a).localeCompare(getTitle(b),state.language));
const MAX=100;const total=list.length;if(total>MAX)list=list.slice(0,MAX);
hint.innerHTML='';
if(!list.length){const o=document.createElement('option');o.disabled=true;o.textContent=t('noChoices');chSel.appendChild(o)}
else{list.forEach(c=>{const o=document.createElement('option');o.value=c.id;const ty=c.typeId?findType(c.typeId):null;o.textContent=getTitle(c)+(ty?' ['+ty.name+']':(c.inInbox?' [📥]':''));chSel.appendChild(o)})}
/* Debug log to on-page debug console */
dbg('Selector ['+lid+']: allowed='+JSON.stringify(opts.allowedTypes||null)+' locked='+(opts.lockedType||'-')+' tf='+(tf||'-')+' tx='+(tx||'-')+' exc='+exc.length+' → '+list.length+' results (rejected: archived='+reasons.archived+', excluded='+reasons.excluded+', wrongType='+reasons.wrongType+', inboxNoType='+reasons.inboxOnly+', filteredOutInbox='+reasons.inboxFiltered+', alreadySelected='+reasons.alreadySelected+', textMissed='+reasons.textMissed+')');
/* Detailed empty-list diagnostic */
let typeForCreate=null;
if(opts.lockedType)typeForCreate=findType(opts.lockedType);
else if(tf&&tf!=='__none__')typeForCreate=findType(tf);
else if(opts.allowedTypes&&opts.allowedTypes.length===1)typeForCreate=findType(opts.allowedTypes[0]);
if(!list.length){
const di=document.createElement('div');di.style.fontSize='.85rem';di.style.color='var(--mu)';di.style.marginTop='.3rem';di.style.lineHeight='1.4';
const lines=[];
if(typeForCreate){
const tn=typeForCreate.name;
const allOfType=state.data.entities.filter(x=>x.typeId===typeForCreate.id);
const activeOfType=allOfType.filter(x=>!x.archived);
const archOfType=allOfType.filter(x=>x.archived);
const inboxNoType=state.data.entities.filter(x=>!x.typeId&&!x.archived&&x.inInbox).length;
lines.push('<strong>'+t('selectorEmptyTitle',{type:tn})+'</strong>');
lines.push(t('selectorDiagOfType',{n:activeOfType.length,type:tn}));
if(reasons.excluded>0)lines.push('• '+t('selectorDiagExcluded',{n:reasons.excluded}));
if(reasons.alreadySelected>0)lines.push('• '+t('selectorDiagAlreadySelected',{n:reasons.alreadySelected}));
if(reasons.textMissed>0)lines.push('• '+t('selectorDiagTextMissed',{n:reasons.textMissed,q:tx}));
if(archOfType.length>0)lines.push('• '+t('selectorDiagArchived',{n:archOfType.length,type:tn}));
if(inboxNoType>0)lines.push('• '+t('selectorDiagInboxNoType',{n:inboxNoType,type:tn}));
if(activeOfType.length===0&&inboxNoType===0)lines.push('• '+t('selectorDiagNoEntities',{type:tn}));
}else{
lines.push(t('selectorDiagNoFilter',{n:state.data.entities.length}));
if(reasons.excluded>0)lines.push('• '+t('selectorDiagExcluded',{n:reasons.excluded}));
if(reasons.textMissed>0)lines.push('• '+t('selectorDiagTextMissed',{n:reasons.textMissed,q:tx}));
}
di.innerHTML=lines.join('<br>');hint.appendChild(di);
}
if(typeForCreate){
const tn=typeForCreate.name;
const cb=document.createElement('button');cb.type='button';cb.className='btn btn-sm';cb.style.marginTop='.4rem';cb.textContent='＋ '+t('selectorCreateNew',{type:tn});

toast(t('selectorCreatedNew'));txIn.value='';refreshCur();refreshChoices();

hint.appendChild(cb);

return wrap;

}
}
}

function duplicateEntity(src){

copy.archived=false;
copy.createdAt=now;
copy.updatedAt=now;
if(copy.name&&String(copy.name).trim())copy.name=copy.name+' '+t('copySuffix');

/* BULK ACTIONS */
function bulkSelectedEntities(){
const ids=Array.from(state.bulk.selected);
return ids.map(id=>findEntity(id)).filter(Boolean);
}

function runBulkAction(actionId){
const ents=bulkSelectedEntities();
if(!ents.length){toast(t('bulkNoSelection'));return}
switch(actionId){
case'changeType':bulkChangeType(ents);break;
case'addAspect':bulkAddAspect(ents);break;
case'removeAspect':bulkRemoveAspect(ents);break;
case'setAttr':bulkSetAttr(ents,false);break;
case'clearAttr':bulkSetAttr(ents,true);break;
case'addRelation':bulkAddRelation(ents);break;
case'exportPkg':bulkExportPackage(ents);break;
case'toInbox':bulkSimple(ents,e=>{e.inInbox=true});break;
case'fromInbox':bulkSimple(ents,e=>{e.inInbox=false});break;
case'archive':bulkArchive(ents);break;
case'restore':bulkSimple(ents,e=>{e.archived=false});break;
case'delete':bulkDelete(ents);break;
}
}

function bulkFinish(n,msgKey,extra){
state.bulk.selected.clear();state.bulk.actionId='';
setDirty(true);
toast(t(msgKey,Object.assign({n:n},extra||{})));
closeDialog();render();
}

function bulkSimple(ents,fn){
const now=new Date().toISOString();
ents.forEach(e=>{fn(e);e.updatedAt=now});
bulkFinish(ents.length,'bulkDone');
}

function expandSelection(ids,scope){
const set=new Set(ids);
if(scope==='selected')return set;
const all=state.data.entities;
const byId=new Map();all.forEach(e=>byId.set(e.id,e));
const addNeighbors=(id)=>{
const e=byId.get(id);if(!e)return;
(e.relations||[]).forEach(r=>{if(byId.has(r.targetId))set.add(r.targetId)});
all.forEach(other=>{if(other.id===id)return;(other.relations||[]).forEach(r=>{if(r.targetId===id)set.add(other.id)})});
};
if(scope==='neighbors'){Array.from(ids).forEach(addNeighbors);return set}
if(scope==='component'){
const q=Array.from(ids);
while(q.length){const id=q.shift();const before=set.size;addNeighbors(id);if(set.size>before){set.forEach(x=>{if(q.indexOf(x)<0&&ids.indexOf(x)<0)q.push(x)})}}
return set;
}
return set;
}

function buildPackageObj(idSet,description,emitWarnings){
const ids=Array.from(idSet);
const entitiesRaw=ids.map(id=>findEntity(id)).filter(Boolean);
/* Clone entities and filter relations to in-set targets */
let dropped=0;
const entities=entitiesRaw.map(e=>{
const c=JSON.parse(JSON.stringify(e));
const kept=(c.relations||[]).filter(r=>{if(idSet.has(r.targetId))return true;dropped++;return false});
c.relations=kept;
return c;
});
/* Used type ids, aspect ids, relation type ids, select list ids */
const usedTypes=new Set(),usedAspects=new Set(),usedRT=new Set(),usedSL=new Set();
entities.forEach(e=>{
if(e.typeId)usedTypes.add(e.typeId);
(e.aspects||[]).forEach(a=>usedAspects.add(a));
(e.relations||[]).forEach(r=>usedRT.add(r.relationTypeId));
});
/* Walk attribute defs of used types & aspects to find select lists used */
state.data.entityTypes.forEach(ty=>{if(!usedTypes.has(ty.id))return;ty.attributes.forEach(a=>{if(a.type==='select'&&a.selectListId)usedSL.add(a.selectListId)})});
state.data.aspects.forEach(asp=>{if(!usedAspects.has(asp.id))return;asp.attributes.forEach(a=>{if(a.type==='select'&&a.selectListId)usedSL.add(a.selectListId)})});
/* Also relation target type filters reference type ids — leave alone, only carry types we use */
const model={
entityTypes:state.data.entityTypes.filter(ty=>usedTypes.has(ty.id)).map(ty=>JSON.parse(JSON.stringify(ty))),
aspects:state.data.aspects.filter(a=>usedAspects.has(a.id)).map(a=>JSON.parse(JSON.stringify(a))),
relationTypes:state.data.relationTypes.filter(rt=>usedRT.has(rt.id)).map(rt=>JSON.parse(JSON.stringify(rt))),
selectLists:(state.data.selectLists||[]).filter(sl=>usedSL.has(sl.id)).map(sl=>JSON.parse(JSON.stringify(sl)))
};
const out={
format:'dkmpkg',
version:1,
exportedFrom:state.data.projectName||'',
exportedFromId:state.activeProjectId||'',
exportedAt:new Date().toISOString(),
description:description||'',
model:model,
entities:entities,
__droppedRelations:dropped
};
return out;
}

function downloadPackage(pkg){
const clean=Object.assign({},pkg);delete clean.__droppedRelations;
const json=JSON.stringify(clean,null,2);
const b=new Blob([json],{type:'application/json'});
const u=URL.createObjectURL(b);
const fname=(pkg.exportedFrom||'dkm-paket').replace(/[^\w\u00C0-\u017F-]+/g,'_').slice(0,40)+'-'+new Date().toISOString().slice(0,10)+'.dkmpkg';
const a=document.createElement('a');a.href=u;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
}

function parsePackage(text){
let obj;try{obj=JSON.parse(text)}catch(e){return{ok:false,error:'Invalid JSON: '+e.message}}
if(!obj||typeof obj!=='object')return{ok:false,error:'Not an object'};
if(obj.format!=='dkmpkg')return{ok:false,error:'Wrong format (expected dkmpkg)'};
if(!obj.model||!Array.isArray(obj.entities))return{ok:false,error:'Missing model or entities'};
obj.model.entityTypes=obj.model.entityTypes||[];
obj.model.aspects=obj.model.aspects||[];
obj.model.relationTypes=obj.model.relationTypes||[];
obj.model.selectLists=obj.model.selectLists||[];
return{ok:true,pkg:obj};
}

/* ----- Mapping core ----- */

function autoMapModel(pkg){
const m={
entityTypes:{},     /* srcId → {action:'reuse'|'create'|'skip', targetId?, attrMap?:{srcAttrId→tgtAttrId|__new__|__skip__}} */
aspects:{},
relationTypes:{},
selectLists:{},
};
pkg.model.entityTypes.forEach(srcTy=>{
const tgt=state.data.entityTypes.find(t=>(t.name||'').toLowerCase().trim()===(srcTy.name||'').toLowerCase().trim());
if(tgt){const attrMap={};srcTy.attributes.forEach(sa=>{const ta=tgt.attributes.find(x=>(x.name||'').toLowerCase().trim()===(sa.name||'').toLowerCase().trim()&&attrTypesCompatible(sa.type,x.type));attrMap[sa.id]=ta?ta.id:'__new__'});m.entityTypes[srcTy.id]={action:'reuse',targetId:tgt.id,attrMap:attrMap}}
else m.entityTypes[srcTy.id]={action:'create'};
});
pkg.model.aspects.forEach(srcAs=>{
const tgt=state.data.aspects.find(a=>(a.name||'').toLowerCase().trim()===(srcAs.name||'').toLowerCase().trim());
if(tgt){const attrMap={};srcAs.attributes.forEach(sa=>{const ta=tgt.attributes.find(x=>(x.name||'').toLowerCase().trim()===(sa.name||'').toLowerCase().trim()&&attrTypesCompatible(sa.type,x.type));attrMap[sa.id]=ta?ta.id:'__new__'});m.aspects[srcAs.id]={action:'reuse',targetId:tgt.id,attrMap:attrMap}}
else m.aspects[srcAs.id]={action:'create'};
});
pkg.model.relationTypes.forEach(srcRt=>{
const tgt=state.data.relationTypes.find(r=>(r.name||'').toLowerCase().trim()===(srcRt.name||'').toLowerCase().trim());
m.relationTypes[srcRt.id]=tgt?{action:'reuse',targetId:tgt.id}:{action:'create'};
});
(pkg.model.selectLists||[]).forEach(srcSl=>{
const tgt=(state.data.selectLists||[]).find(s=>(s.name||'').toLowerCase().trim()===(srcSl.name||'').toLowerCase().trim());
m.selectLists[srcSl.id]=tgt?{action:'merge',targetId:tgt.id}:{action:'create'};
});
return m;
}

function findEntityConflicts(pkg){
const cur=new Set(state.data.entities.map(e=>e.id));
const out=[];
pkg.entities.forEach(e=>{if(cur.has(e.id))out.push({srcId:e.id,name:getTitle(e),action:'newId'})});
return out;
}

function downloadBackupBeforeImport(){
const data=JSON.parse(JSON.stringify(state.data));
const json=JSON.stringify(data,null,2);

const u=URL.createObjectURL(b);
const fname=(state.data.projectName||'projekt').replace(/[^\w\u00C0-\u017F-]+/g,'_').slice(0,40)+'-zaloha-'+new Date().toISOString().slice(0,19).replace(/[:.]/g,'-')+'.dkmdata';

function simulateImport(pkg,mapping,conflicts){
const sim={newTypes:0,newAspects:0,newRT:0,newSL:0,newAttrs:0,reuseTypes:0,reuseAspects:0,entitiesNew:0,entitiesOverwrite:0,entitiesSkipped:0,relKept:0,relDropped:0,attrsDropped:0,warnings:[]};
Object.values(mapping.entityTypes).forEach(m=>{if(m.action==='create')sim.newTypes++;else if(m.action==='reuse')sim.reuseTypes++});
Object.values(mapping.aspects).forEach(m=>{if(m.action==='create')sim.newAspects++;else if(m.action==='reuse')sim.reuseAspects++});
Object.values(mapping.relationTypes).forEach(m=>{if(m.action==='create')sim.newRT++});
Object.values(mapping.selectLists).forEach(m=>{if(m.action==='create')sim.newSL++});
/* Attribute creation count */
pkg.model.entityTypes.forEach(srcTy=>{const m=mapping.entityTypes[srcTy.id];if(m.action==='reuse'){srcTy.attributes.forEach(a=>{if(m.attrMap[a.id]==='__new__')sim.newAttrs++})}});
pkg.model.aspects.forEach(srcAs=>{const m=mapping.aspects[srcAs.id];if(m.action==='reuse'){srcAs.attributes.forEach(a=>{if(m.attrMap[a.id]==='__new__')sim.newAttrs++})}});
const confMap={};conflicts.forEach(c=>confMap[c.srcId]=c.action);
pkg.entities.forEach(e=>{
const tyMap=e.typeId?mapping.entityTypes[e.typeId]:null;
if(tyMap&&tyMap.action==='skip'){sim.entitiesSkipped++;return}
const ca=confMap[e.id];
if(ca==='skip'){sim.entitiesSkipped++;return}
if(ca==='overwrite')sim.entitiesOverwrite++;else sim.entitiesNew++;
/* relations */
(e.relations||[]).forEach(r=>{
const rtMap=mapping.relationTypes[r.relationTypeId];
if(!rtMap||rtMap.action==='skip'){sim.relDropped++;return}
sim.relKept++;
});
/* attribute drops */
if(e.typeId&&tyMap&&tyMap.action==='reuse'){Object.keys(e.attributes||{}).forEach(aid=>{
/* aid might be a type attr or aspect attr */
let mapped=tyMap.attrMap&&tyMap.attrMap[aid];
if(!mapped){(e.aspects||[]).forEach(asid=>{const am=mapping.aspects[asid];if(am&&am.action==='reuse'&&am.attrMap&&am.attrMap[aid])mapped=am.attrMap[aid]});if(!mapped){(e.aspects||[]).forEach(asid=>{const am=mapping.aspects[asid];if(am&&am.action==='create')mapped='__keep__'})}}
if(mapped==='__skip__')sim.attrsDropped++;
})}
});
/* Sanity warnings */
pkg.model.relationTypes.forEach(srcRt=>{const m=mapping.relationTypes[srcRt.id];if(m.action==='reuse'){const tgt=findRT(m.targetId);if(tgt&&srcRt.scope&&tgt.scope&&srcRt.scope!==tgt.scope)sim.warnings.push(t('pkgWarnRTScope',{src:srcRt.name,a:srcRt.scope,b:tgt.scope}))}});
return sim;
}

/* ----- Apply ----- */

function applyImport(pkg,mapping,conflicts,opts){
const now=new Date().toISOString();
const log={added:0,overwritten:0,skipped:0,relKept:0,relDropped:0,attrsKept:0,attrsDropped:0,newTypes:0,newAspects:0,newRT:0,newSL:0,newAttrs:0};

/* 1) Select lists first (so attribute defs can reference them) */
const slIdMap={};
pkg.model.selectLists.forEach(srcSl=>{
const m=mapping.selectLists[srcSl.id];if(!m||m.action==='skip')return;
if(m.action==='create'){const ns={id:uid('sl'),name:srcSl.name,options:(srcSl.options||[]).slice()};state.data.selectLists=state.data.selectLists||[];state.data.selectLists.push(ns);slIdMap[srcSl.id]=ns.id;log.newSL++}
else if(m.action==='merge'){const tgt=(state.data.selectLists||[]).find(x=>x.id===m.targetId);if(tgt){const have=new Set(tgt.options||[]);(srcSl.options||[]).forEach(o=>{if(!have.has(o))tgt.options.push(o)});slIdMap[srcSl.id]=tgt.id}}
});

/* 2) Relation types */
const rtIdMap={};
pkg.model.relationTypes.forEach(srcRt=>{
const m=mapping.relationTypes[srcRt.id];if(!m||m.action==='skip')return;
if(m.action==='create'){const nrt={id:uid('rt'),name:srcRt.name,inverseName:srcRt.inverseName||srcRt.name,scope:srcRt.scope||'universal',fromTypes:[],toTypes:[]};state.data.relationTypes.push(nrt);rtIdMap[srcRt.id]=nrt.id;log.newRT++}
else if(m.action==='reuse')rtIdMap[srcRt.id]=m.targetId;
});

/* 3) Entity types */
const tyIdMap={};
const attrIdMapByTy={};
pkg.model.entityTypes.forEach(srcTy=>{
const m=mapping.entityTypes[srcTy.id];if(!m||m.action==='skip')return;
if(m.action==='create'){
const nty={id:uid('ty'),name:srcTy.name,icon:srcTy.icon||'',attributes:[]};
const attrMap={};
srcTy.attributes.forEach(sa=>{
const na={id:uid('a'),name:sa.name,type:sa.type};
if(sa.type==='select'&&sa.selectListId&&slIdMap[sa.selectListId])na.selectListId=slIdMap[sa.selectListId];
if(sa.type==='select'&&sa.options)na.options=sa.options.slice();
if(sa.type==='relation'){if(sa.multi)na.multi=sa.multi;if(sa.relTypes)na.relTypes=sa.relTypes.slice()}
nty.attributes.push(na);attrMap[sa.id]=na.id;
});
state.data.entityTypes.push(nty);tyIdMap[srcTy.id]=nty.id;attrIdMapByTy[srcTy.id]=attrMap;log.newTypes++;
}else if(m.action==='reuse'){
tyIdMap[srcTy.id]=m.targetId;
const tgt=findType(m.targetId);
const attrMap={};
srcTy.attributes.forEach(sa=>{
const mapped=m.attrMap[sa.id];
if(mapped==='__skip__')return;
if(mapped==='__new__'){const na={id:uid('a'),name:sa.name,type:sa.type};if(sa.type==='select'&&sa.selectListId&&slIdMap[sa.selectListId])na.selectListId=slIdMap[sa.selectListId];if(sa.type==='select'&&sa.options)na.options=sa.options.slice();tgt.attributes.push(na);attrMap[sa.id]=na.id;log.newAttrs++}
else attrMap[sa.id]=mapped;
});
attrIdMapByTy[srcTy.id]=attrMap;
}
});

/* 4) Aspects */
const aspIdMap={};
const attrIdMapByAsp={};
pkg.model.aspects.forEach(srcAs=>{
const m=mapping.aspects[srcAs.id];if(!m||m.action==='skip')return;
if(m.action==='create'){
const nas={id:uid('asp'),name:srcAs.name,attributes:[]};
const attrMap={};
srcAs.attributes.forEach(sa=>{const na={id:uid('a'),name:sa.name,type:sa.type};if(sa.type==='select'&&sa.selectListId&&slIdMap[sa.selectListId])na.selectListId=slIdMap[sa.selectListId];if(sa.type==='select'&&sa.options)na.options=sa.options.slice();nas.attributes.push(na);attrMap[sa.id]=na.id});
state.data.aspects.push(nas);aspIdMap[srcAs.id]=nas.id;attrIdMapByAsp[srcAs.id]=attrMap;log.newAspects++;
}else if(m.action==='reuse'){
aspIdMap[srcAs.id]=m.targetId;
const tgt=findAspect(m.targetId);
const attrMap={};
srcAs.attributes.forEach(sa=>{
const mapped=m.attrMap[sa.id];
if(mapped==='__skip__')return;
if(mapped==='__new__'){const na={id:uid('a'),name:sa.name,type:sa.type};if(sa.type==='select'&&sa.selectListId&&slIdMap[sa.selectListId])na.selectListId=slIdMap[sa.selectListId];if(sa.type==='select'&&sa.options)na.options=sa.options.slice();tgt.attributes.push(na);attrMap[sa.id]=na.id;log.newAttrs++}
else attrMap[sa.id]=mapped;
});
attrIdMapByAsp[srcAs.id]=attrMap;
}
});

/* 5) Entities - first pass (create entities with new IDs, basic fields) */
const confMap={};conflicts.forEach(c=>confMap[c.srcId]=c.action);
const entIdMap={};
const overwriteEnts=new Set();
pkg.entities.forEach(srcE=>{
const tyMap=srcE.typeId?mapping.entityTypes[srcE.typeId]:null;
if(tyMap&&tyMap.action==='skip'){log.skipped++;return}
const ca=confMap[srcE.id];
let target;
if(ca==='skip'){log.skipped++;return}
if(ca==='overwrite'){target=findEntity(srcE.id);if(!target){target={id:srcE.id,createdAt:now};state.data.entities.push(target)}entIdMap[srcE.id]=target.id;overwriteEnts.add(target.id);log.overwritten++}
else{const newId=ca==='newId'||findEntity(srcE.id)?uid('e'):srcE.id;target={id:newId,createdAt:srcE.createdAt||now};state.data.entities.push(target);entIdMap[srcE.id]=newId;log.added++}
target.name=srcE.name;
target.typeId=srcE.typeId?(tyIdMap[srcE.typeId]||null):null;
target.inInbox=!!srcE.inInbox;
target.archived=!!srcE.archived;
target.aspects=(srcE.aspects||[]).map(a=>aspIdMap[a]).filter(Boolean);
target.customAttributes=(srcE.customAttributes||[]).map(ca=>JSON.parse(JSON.stringify(ca)));
/* attributes */
const newAttrs={};
Object.keys(srcE.attributes||{}).forEach(aid=>{
let mapped=null;
if(srcE.typeId&&attrIdMapByTy[srcE.typeId]&&attrIdMapByTy[srcE.typeId][aid])mapped=attrIdMapByTy[srcE.typeId][aid];
if(!mapped){(srcE.aspects||[]).forEach(asid=>{if(attrIdMapByAsp[asid]&&attrIdMapByAsp[asid][aid])mapped=attrIdMapByAsp[asid][aid]})}
if(mapped){newAttrs[mapped]=srcE.attributes[aid];log.attrsKept++}else log.attrsDropped++;
});
target.attributes=newAttrs;
target.relations=[];/* fill in 2nd pass */
target.updatedAt=now;
});

/* 6) Second pass — relations + relation-typed attribute values (map entity refs) */
pkg.entities.forEach(srcE=>{
const newId=entIdMap[srcE.id];if(!newId)return;
const target=findEntity(newId);if(!target)return;
(srcE.relations||[]).forEach(r=>{
const newRTId=rtIdMap[r.relationTypeId];if(!newRTId){log.relDropped++;return}
const newTargetId=entIdMap[r.targetId];if(!newTargetId){log.relDropped++;return}
target.relations.push({id:uid('r'),relationTypeId:newRTId,targetId:newTargetId});
log.relKept++;
});
/* Remap relation-typed attribute values */
Object.keys(target.attributes||{}).forEach(aid=>{
const allAttrs=getAllAttrs(target);const def=allAttrs.find(x=>x.attr.id===aid);if(!def||def.attr.type!=='relation')return;
const v=target.attributes[aid];
if(Array.isArray(v))target.attributes[aid]=v.map(id=>entIdMap[id]||id).filter(id=>findEntity(id));
else if(v)target.attributes[aid]=entIdMap[v]||(findEntity(v)?v:'');
});
});

/* 7) Make new types/aspects visible as tabs if requested */
if(opts.showAsTabs){
state.data.settings=state.data.settings||{visibleTypeTabs:[],visibleAspectTabs:[]};
Object.values(tyIdMap).forEach(tid=>{const m=Object.values(mapping.entityTypes).find(mm=>mm.targetId===tid);/* only newly-created types via map */});
pkg.model.entityTypes.forEach(srcTy=>{const m=mapping.entityTypes[srcTy.id];if(m&&m.action==='create'){const nid=tyIdMap[srcTy.id];if(nid&&state.data.settings.visibleTypeTabs.indexOf(nid)<0)state.data.settings.visibleTypeTabs.push(nid)}});
pkg.model.aspects.forEach(srcAs=>{const m=mapping.aspects[srcAs.id];if(m&&m.action==='create'){const nid=aspIdMap[srcAs.id];if(nid&&state.data.settings.visibleAspectTabs.indexOf(nid)<0)state.data.settings.visibleAspectTabs.push(nid)}});
}

setDirty(true);
dbg('Package import done: '+JSON.stringify(log));
return log;
}

/* LINK */

function focusSearch(){
if(state.view.name!=='list'){navigateTo({name:'list',tab:state.view.tab||'all'});setTimeout(focusSearch,40);return}
const s=document.getElementById('sin');
if(s){s.focus();s.select()}else{navigateTo({name:'list',tab:'all'});setTimeout(()=>{const x=document.getElementById('sin');if(x){x.focus();x.select()}},40)}
}
function focusQuickAdd(){
if(state.view.name!=='list'||state.view.tab!=='inbox'){navigateTo({name:'list',tab:'inbox'});setTimeout(focusQuickAdd,40);return}
const q=document.getElementById('qa-n');if(q)q.focus();
}

/* INIT + EVENTS */
function init(){
if('serviceWorker' in navigator){
navigator.serviceWorker.getRegistrations().then(regs=>{
if(regs.length){
dbg('Cleaning up stale Service Worker(s)…');
return Promise.all(regs.map(r=>r.unregister())).then(()=>{
if('caches' in window){return caches.keys().then(ns=>Promise.all(ns.map(n=>caches.delete(n))))}
}).then(()=>{location.reload()});
}
bootstrap();
}).catch(bootstrap);
}else{bootstrap()}
}
function bootstrap(){
ensureProjects();
const params=new URLSearchParams(location.search);
const pParam=params.get('p');
if(pParam){
const projects=listProjects();
const found=projects.find(x=>x.id===pParam);
if(found){state.activeProjectId=pParam;setActiveProjectId(pParam);const d=readProjectData(pParam);if(d)state.data=d;}
else{loadLS()}
}else{loadLS()}
state.view=Object.assign({name:'list',tab:'inbox',entityId:null,settingsTab:'project',settingsItemId:null,edit:null,typeId:null},parseHash());
if(state.showDebug)document.getElementById('dbg').hidden=false;
setupEvents();
render();
ghAutoLoadFromUrl();
}
function setupEvents(){
document.getElementById('b-load').addEventListener('click',()=>{document.getElementById('fin').click()});
document.getElementById('b-clip-in').addEventListener('click',loadProjectFromClipboard);
document.getElementById('b-clip-out').addEventListener('click',copyProjectToClipboard);
document.getElementById('fin').addEventListener('change',ev=>{const f=ev.target.files&&ev.target.files[0];if(!f)return;loadFile(f);ev.target.value=''});
document.getElementById('b-save').addEventListener('click',smartSave);
document.getElementById('b-exp').addEventListener('click',exportXLSX);
document.getElementById('b-imp').addEventListener('click',openImportTSVDialog);
document.getElementById('b-set').addEventListener('click',()=>navigateTo({name:'settings',settingsTab:state.view.settingsTab||'project'}));
document.getElementById('b-lang').addEventListener('click',()=>{state.language=state.language==='cs'?'en':'cs';localStorage.setItem(SK_LANG,state.language);render()});
document.getElementById('dbg-x').addEventListener('click',()=>{state.showDebug=false;localStorage.setItem(SK_DBG,'false');document.getElementById('dbg').hidden=true});
document.getElementById('dbg-clr').addEventListener('click',()=>{document.getElementById('dbg-c').innerHTML=''});
document.addEventListener('keydown',ev=>{
const tg=ev.target;
const isInput=tg&&(tg.tagName==='INPUT'||tg.tagName==='TEXTAREA'||tg.tagName==='SELECT'||tg.isContentEditable);
const dlg=document.getElementById('dlg');
const dlgOpen=dlg&&(dlg.hasAttribute('open')||dlg.open);
/* Ctrl/Cmd shortcuts work everywhere */
if((ev.ctrlKey||ev.metaKey)&&ev.shiftKey&&!ev.altKey&&(ev.key==='O'||ev.key==='o')){ev.preventDefault();loadProjectFromClipboard();return}
if((ev.ctrlKey||ev.metaKey)&&ev.shiftKey&&!ev.altKey&&(ev.key==='S'||ev.key==='s')){ev.preventDefault();copyProjectToClipboard();return}
if((ev.ctrlKey||ev.metaKey)&&!ev.altKey&&!ev.shiftKey&&ev.key==='s'){ev.preventDefault();smartSave();return}
if((ev.ctrlKey||ev.metaKey)&&ev.shiftKey&&!ev.altKey&&(ev.key==='F'||ev.key==='f')){ev.preventDefault();if(state.view.name==='list'){state.filters.attrFilters=[];state.view.advFilterOpen=false;render()}return}
if((ev.ctrlKey||ev.metaKey)&&!ev.shiftKey&&!ev.altKey&&ev.key==='f'){ev.preventDefault();if(state.view.name!=='list')navigateTo({name:'list',tab:'all'});state.view.advFilterOpen=true;render();setTimeout(()=>{const sel=document.querySelectorAll('.advf-attr');if(!sel.length){state.filters.attrFilters=(state.filters.attrFilters||[]).concat([{scope:'system',scopeId:null,attrId:'name',op:'contains',value:''}]);render();setTimeout(()=>{const s2=document.querySelectorAll('.advf-attr');if(s2.length)s2[0].focus()},30);return}sel[0].focus()},50);return}
if((ev.ctrlKey||ev.metaKey)&&!ev.altKey&&ev.key==='k'){ev.preventDefault();focusSearch();return}
/* Escape works everywhere */
if(ev.key==='Escape'){if(dlgOpen){closeDialog();return}if(state.bulk.active&&state.view.name==='list'){state.bulk.active=false;state.bulk.selected.clear();state.bulk.actionId='';render();return}if(state.view.name==='detail'||state.view.name==='edit'||state.view.name==='new'||state.view.name==='settings'){if(history.length>1)history.back();else navigateTo({name:'list',tab:'inbox'})}return}
/* Letter shortcuts only when not typing and no dialog open */
if(isInput||dlgOpen)return;
if(ev.altKey||ev.ctrlKey||ev.metaKey)return;
const k=ev.key.toLowerCase();
switch(k){
case's':ev.preventDefault();smartSave();break;
case'i':ev.preventDefault();navigateTo({name:'list',tab:'inbox'});break;
case'q':ev.preventDefault();focusQuickAdd();break;
case'n':ev.preventDefault();
if(state.data.entityTypes.length===0)navigateTo({name:'new'});
else openNewChooser();
break;
case'a':ev.preventDefault();navigateTo({name:'list',tab:'all'});break;
case'e':if(state.view.name==='detail'&&state.view.entityId){ev.preventDefault();navigateTo({name:'edit',entityId:state.view.entityId})}break;
case'v':if(state.view.name==='list'){ev.preventDefault();state.bulk.active=!state.bulk.active;if(!state.bulk.active){state.bulk.selected.clear();state.bulk.actionId=''}render()}break;
case'r':if(state.view.name==='detail'&&state.view.entityId){const ent=findEntity(state.view.entityId);if(ent&&!ent.archived){ev.preventDefault();openAddRelDialog(ent,null)}}break;
case'u':if(state.view.name==='edit'){ev.preventDefault();commitEdit()}break;
case'f':ev.preventDefault();focusSearch();break;
case'/':ev.preventDefault();focusSearch();break;
}
});
window.addEventListener('beforeunload',ev=>{if(state.dirty&&!state.autosave){ev.preventDefault();ev.returnValue=''}});
}
init();


</script>
