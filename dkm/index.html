<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKM – Dynamický správce znalostí</title>
<style>
:root{--bg:#fafaf9;--sf:#fff;--sf2:#f4f4f3;--bd:#e3e3e1;--bds:#c6c6c3;--tx:#1a1a1a;--mu:#6b6b6b;--ac:#1d4ed8;--ach:#1e40af;--acb:#eff6ff;--dg:#b91c1c;--dgb:#fef2f2;--ok:#15803d;--wn:#a16207;--fc:#2563eb;--cma:#dcfce7;--cmat:#14532d;--cmd:#fee2e2;--cmdt:#7f1d1d;--cmm:#fef08a;--cmc:#fef3c7;--cmct:#713f12;--r:6px;--rs:4px;--rl:10px;--ss:0 1px 2px rgba(0,0,0,.04);--sm:0 4px 12px rgba(0,0,0,.06);--tr:150ms ease;--ff:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--fm:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--sf:#242424;--sf2:#2e2e2e;--bd:#3a3a3a;--bds:#525252;--tx:#f5f5f5;--mu:#a3a3a3;--ac:#60a5fa;--ach:#93c5fd;--acb:#1e3a8a40;--dg:#f87171;--dgb:#7f1d1d40;--ok:#4ade80;--wn:#fbbf24;--fc:#60a5fa;--cma:#14532d70;--cmat:#bbf7d0;--cmd:#7f1d1d70;--cmdt:#fecaca;--cmm:#713f1280;--cmc:#713f1280;--cmct:#fde68a}}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--ff);font-size:15px;line-height:1.5;background:var(--bg);color:var(--tx);min-height:100vh}
button,input,select,textarea{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--fc);outline-offset:2px;border-radius:var(--rs)}
.vh{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.skip{position:absolute;left:0;top:0;background:var(--ac);color:#fff;padding:.5rem 1rem;text-decoration:none;transform:translateY(-100%);z-index:1000}
.skip:focus{transform:translateY(0)}
.app-header{background:var(--sf);border-bottom:1px solid var(--bd);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.app-title{font-size:1.1rem;font-weight:600;margin:0;display:flex;align-items:center;gap:.5rem}
.app-title small{font-weight:400;color:var(--mu);font-size:.85rem}
.app-header-actions{margin-left:auto;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.unsaved{font-size:.8rem;color:var(--wn);margin-right:.5rem}
.unsaved[hidden]{display:none}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .75rem;background:var(--sf);color:var(--tx);border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;font-size:.9rem;transition:background var(--tr),border-color var(--tr);text-decoration:none}
.btn:hover{background:var(--sf2)}
.btn-pri{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn-pri:hover{background:var(--ach);border-color:var(--ach)}
.btn-dg{color:var(--dg);border-color:var(--bd)}
.btn-dg:hover{background:var(--dgb);border-color:var(--dg)}
.btn-gh{border-color:transparent;background:transparent}
.btn-gh:hover{background:var(--sf2)}
.btn-sm{padding:.25rem .5rem;font-size:.85rem}
.btn:disabled,.btn[aria-disabled=true]{opacity:.5;cursor:not-allowed}
.tabs{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 1rem;display:flex;gap:.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:.6rem 1rem;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--mu);font-size:.95rem;white-space:nowrap;display:inline-flex;align-items:center;gap:.4rem;border-radius:0}
.tab:hover{color:var(--tx)}
.tab[aria-selected=true]{color:var(--ac);border-bottom-color:var(--ac);font-weight:500}
.tab-c{background:var(--sf2);padding:.1rem .4rem;border-radius:999px;font-size:.75rem;color:var(--mu)}
main{max-width:1100px;margin:0 auto;padding:1.25rem 1rem 4rem}
.toolbar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.toolbar input[type=search]{flex:1;min-width:180px;padding:.45rem .7rem;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf)}
.toolbar select{padding:.45rem .5rem;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf)}
.elist{display:flex;flex-direction:column;gap:.5rem}
.ecard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:.75rem .9rem;cursor:pointer;transition:border-color var(--tr),box-shadow var(--tr);display:block;text-decoration:none;color:inherit}
.ecard:hover{border-color:var(--bds);box-shadow:var(--ss)}
.ecard-h{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;flex-wrap:wrap}
.etitle{font-weight:600;font-size:1rem;margin:0;flex:1;min-width:0}
.esnip{color:var(--mu);font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emeta{display:flex;gap:.75rem;margin-top:.4rem;font-size:.8rem;color:var(--mu);flex-wrap:wrap}
.bd{display:inline-flex;align-items:center;gap:.3rem;padding:.1rem .5rem;border-radius:999px;font-size:.75rem;background:var(--sf2);color:var(--mu);border:1px solid var(--bd)}
.bd-t{background:var(--acb);color:var(--ac);border-color:transparent}
.bd-i{background:var(--cmc);color:var(--cmct);border-color:transparent}
.empty{text-align:center;padding:3rem 1rem;color:var(--mu)}
.empty p{margin:.4rem 0}
.empty-ic{font-size:2.5rem;margin-bottom:.5rem;opacity:.5}
.qa{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:.75rem;margin-bottom:1rem}
.qa input[type="text"]{width:100%;padding:.45rem .55rem;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);font-family:inherit;margin-bottom:.4rem;font-size:1rem}
.qa textarea{width:100%;min-height:70px;padding:.5rem;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);resize:vertical;font-family:inherit}
.qa-act{display:flex;justify-content:space-between;align-items:center;margin-top:.5rem;gap:.5rem;flex-wrap:wrap}
.esel{border:1px solid var(--bd);border-radius:var(--r);padding:.5rem;background:var(--bg)}
.esel-cur{padding:.4rem;background:var(--sf2);border-radius:4px;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.esel-filt{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.4rem}
.esel-filt label{display:inline-flex;align-items:center;gap:.3rem;flex:1;min-width:140px}
.esel-filt input,.esel-filt select{flex:1;min-width:0}
.esel select[size]{font-family:inherit}
.clist-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:.4rem}
.clist-item-name{flex:1;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.clist-item-meta{font-size:.85rem;color:var(--mu)}
.outline{font-family:inherit;font-size:.95rem}
.out-n{margin:.15rem 0}
.out-h{display:flex;align-items:center;gap:.3rem;padding:.15rem .25rem;border-radius:4px}
.out-h:hover{background:var(--sf2)}
.out-tog{background:transparent;border:none;cursor:pointer;width:1.6rem;height:1.6rem;border-radius:4px;color:var(--mu);font-size:.9rem;flex:0 0 auto;padding:0}
.out-tog:hover:not(:disabled){background:var(--bd);color:var(--fg)}
.out-tog:focus-visible{outline:2px solid var(--ac);outline-offset:1px}
.out-tog:disabled{cursor:default;opacity:.4}
.out-l{flex:1;min-width:0;color:inherit;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.out-l:hover .out-ti{text-decoration:underline}
.out-tl{color:var(--mu);font-size:.85rem}
.out-c{color:var(--mu);font-size:.75rem;white-space:nowrap}
.out-b{margin-left:1.6rem;border-left:1px dashed var(--bd);padding-left:.5rem}
.out-g{margin:.3rem 0}
.out-gl{font-size:.75rem;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:.2rem 0}
.out-loop{color:var(--mu);font-style:italic;padding:.2rem .5rem}
.dh{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.dt{flex:1;margin:0;font-size:1.5rem;min-width:0}
.dact{display:flex;gap:.4rem;flex-wrap:wrap}
.dsec{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-bottom:1rem}
.dsec h3{margin:0 0 .75rem;font-size:1rem;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.arow{display:grid;grid-template-columns:200px 1fr;gap:.75rem;padding:.4rem 0;border-bottom:1px solid var(--bd);align-items:start}
.arow:last-child{border-bottom:none}
.alabel{color:var(--mu);font-size:.9rem;font-weight:500}
.aval{word-break:break-word}
.aempty{color:var(--mu);font-style:italic}
@media(max-width:600px){.arow{grid-template-columns:1fr;gap:.2rem}}
.fld{margin-bottom:.85rem}
.fld label{display:block;margin-bottom:.3rem;font-size:.9rem;color:var(--tx);font-weight:500}
.fhint{display:block;font-size:.8rem;color:var(--mu);margin-top:.25rem}
.fld input[type=text],.fld input[type=url],.fld input[type=date],.fld input[type=number],.fld select,.fld textarea{width:100%;padding:.45rem .6rem;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf);color:var(--tx)}
.fld textarea{min-height:110px;resize:vertical;font-family:inherit}
.frow{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.frow>*{flex:1;min-width:100px}
.cb{display:flex;align-items:center;gap:.5rem}
.cb input{width:auto}
.slay{display:grid;grid-template-columns:220px 1fr;gap:1rem;align-items:start}
@media(max-width:700px){.slay{grid-template-columns:1fr}}
.snav{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:.4rem;display:flex;flex-direction:column;gap:.15rem;position:sticky;top:80px}
@media(max-width:700px){.snav{position:static;flex-direction:row;overflow-x:auto}}
.snav button{background:transparent;border:none;text-align:left;padding:.5rem .7rem;border-radius:var(--rs);cursor:pointer;color:var(--tx);white-space:nowrap}
.snav button:hover{background:var(--sf2)}
.snav button[aria-current=page]{background:var(--acb);color:var(--ac);font-weight:500}
.scon{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1.25rem}
.scon h2{margin:0 0 1rem;font-size:1.2rem}
.clist{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.citem{border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);overflow:hidden}
.citem-h{display:flex;align-items:center;gap:.5rem;padding:.6rem .8rem;background:var(--sf);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.citem-b{padding:.8rem}
.acl{display:flex;flex-direction:column;gap:.5rem}
.acr{display:grid;grid-template-columns:1.2fr 1fr auto;gap:.5rem;padding:.5rem;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);align-items:start}
.acr-x{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;font-size:.85rem;color:var(--mu)}
.acr-a{display:flex;gap:.25rem;align-items:start}
@media(max-width:600px){.acr{grid-template-columns:1fr}}
.md{line-height:1.6;word-break:break-word}
.md>:first-child{margin-top:0}
.md>:last-child{margin-bottom:0}
.md h1,.md h2,.md h3,.md h4{margin:1em 0 .4em;line-height:1.3}
.md h1{font-size:1.4rem}.md h2{font-size:1.2rem}.md h3{font-size:1.05rem}
.md code{font-family:var(--fm);background:var(--sf2);padding:.1em .3em;border-radius:3px;font-size:.9em}
.md pre{background:var(--sf2);padding:.7rem;border-radius:var(--r);overflow-x:auto}
.md pre code{background:transparent;padding:0}
.md blockquote{border-left:3px solid var(--bds);margin:.6rem 0;padding:.2rem 0 .2rem .8rem;color:var(--mu)}
.md ul,.md ol{padding-left:1.5em;margin:.4em 0}
.md a{color:var(--ac);text-decoration:underline}
.md hr{border:none;border-top:1px solid var(--bd);margin:1rem 0}
.md table{border-collapse:collapse;margin:.6rem 0}
.md th,.md td{border:1px solid var(--bd);padding:.3rem .6rem}
.cm-add{background:var(--cma);color:var(--cmat);text-decoration:none;padding:0 .15em;border-radius:2px}
.cm-del{background:var(--cmd);color:var(--cmdt);text-decoration:line-through;padding:0 .15em;border-radius:2px}
.cm-mark{background:var(--cmm);padding:0 .15em;border-radius:2px}
.cm-cm{background:var(--cmc);color:var(--cmct);padding:.05em .4em;border-radius:4px;font-size:.9em;font-style:italic}
.rch,.elnk{display:inline-flex;align-items:center;gap:.3rem;padding:.15rem .55rem;border-radius:999px;background:var(--acb);color:var(--ac);text-decoration:none;font-size:.85rem;margin:.1rem .2rem .1rem 0;border:1px solid transparent}
.rch:hover,.elnk:hover{border-color:var(--ac)}
.rlist{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.rgrp{margin-bottom:.4rem}
.rgrp-l{font-size:.85rem;color:var(--mu);margin-right:.4rem}
dialog.dlg{border:1px solid var(--bd);border-radius:var(--rl);padding:0;background:var(--sf);color:var(--tx);max-width:95vw;width:500px;box-shadow:var(--sm)}
dialog.dlg::backdrop{background:rgba(0,0,0,.4)}
.dlg-h{padding:.9rem 1rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.5rem}
.dlg-h h3{margin:0;flex:1;font-size:1.05rem}
.dlg-b{padding:1rem;max-height:60vh;overflow-y:auto}
.dlg-f{padding:.7rem 1rem;border-top:1px solid var(--bd);display:flex;gap:.5rem;justify-content:flex-end}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:.6rem 1rem;border-radius:var(--r);box-shadow:var(--sm);z-index:200;max-width:90vw}
.toast[hidden]{display:none}
#dbg{position:fixed;bottom:0;right:0;width:min(420px,100vw);max-height:40vh;overflow-y:auto;background:var(--sf);border-top:1px solid var(--bd);border-left:1px solid var(--bd);border-radius:var(--r) 0 0 0;font-family:var(--fm);font-size:.8rem;padding:.5rem;z-index:100}
#dbg[hidden]{display:none}
#dbg .dl{padding:.15rem 0;border-bottom:1px solid var(--bd);white-space:pre-wrap}
#dbg .dl.err{color:var(--dg)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.6rem}
.sc{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:.7rem;text-align:center}
.sc-n{font-size:1.5rem;font-weight:600}
.sc-l{font-size:.85rem;color:var(--mu)}
.subhd{font-size:.8rem;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.2rem}
</style>
</head>
<body>
<a class="skip" href="#main">Přeskočit na obsah / Skip to content</a>
<header class="app-header" role="banner">
<h1 class="app-title"><span aria-hidden="true">🧩</span> <span id="h1n">DKM</span> <small id="sub">Dynamický správce znalostí</small></h1>
<div class="app-header-actions">
<span id="ind" class="unsaved" hidden></span>
<button class="btn btn-sm" id="b-load" type="button"></button>
<button class="btn btn-sm" id="b-save" type="button"></button>
<button class="btn btn-sm" id="b-exp" type="button"></button>
<button class="btn btn-sm" id="b-set" type="button"></button>
<button class="btn btn-sm btn-gh" id="b-lang" type="button"></button>
</div>
</header>
<nav class="tabs" role="tablist" id="tabs" aria-label="Záložky"></nav>
<main id="main" tabindex="-1" role="main"></main>
<div role="status" aria-live="polite" aria-atomic="true" id="lr" class="vh"></div>
<div class="toast" id="toast" hidden role="status"></div>
<div id="dbg" hidden aria-label="Debug"><div style="display:flex;gap:.4rem;margin-bottom:.3rem;"><strong>Debug</strong><button class="btn btn-sm btn-gh" id="dbg-clr" type="button">Clear</button><button class="btn btn-sm btn-gh" id="dbg-x" type="button">×</button></div><div id="dbg-c"></div></div>
<input type="file" id="fin" hidden>
<dialog id="dlg" class="dlg" aria-labelledby="dlg-t"><form method="dialog" id="dlg-f"><div class="dlg-h"><h3 id="dlg-t"></h3></div><div class="dlg-b" id="dlg-b"></div><div class="dlg-f" id="dlg-foot"></div></form></dialog>

/* STATE */
const SK_DATA='dkm-data-v1',SK_LANG='dkm-lang',SK_AS='dkm-autosave',SK_DBG='dkm-debug',SK_DRT='dkm-dirty',SK_GHTOKEN='dkm-github-token';
const SK_PROJECTS='dkm-projects-v1',SK_ACTIVE='dkm-active-project',SK_PDATA='dkm-pdata-';
const ATYPES=['text','textarea','date','url','select','yesno','relation','number'];
const RSCOPES=['universal','from','to','specific'];
const ATYPE_LBL={text:'attrTypeText',textarea:'attrTypeTextarea',date:'attrTypeDate',url:'attrTypeUrl',select:'attrTypeSelect',yesno:'attrTypeYesno',relation:'attrTypeRelation',number:'attrTypeNumber'};
const SORT_LBL={updated:'sortUpdated',newest:'sortNewest',oldest:'sortOldest',title:'sortTitle',titleDesc:'sortTitleDesc'};
const RSCOPE_LBL={universal:'relationScopeUniversal',from:'relationScopeFromType',to:'relationScopeToType',specific:'relationScopeSpecific'};

function emptyData(){return{version:1,projectName:'',projectDescription:'',ghPath:'',settings:{visibleTypeTabs:[],visibleAspectTabs:[]},entityTypes:[],aspects:[],relationTypes:[],selectLists:[],entities:[]}}

let state={
language:localStorage.getItem(SK_LANG)||'cs',
autosave:localStorage.getItem(SK_AS)!=='false',
showDebug:localStorage.getItem(SK_DBG)==='true',
data:emptyData(),
activeProjectId:'',
view:{name:'list',tab:'inbox',entityId:null,settingsTab:'types',settingsItemId:null,edit:null,typeId:null},
filters:{search:'',sort:'updated',filterAspect:'',filterType:'',filterUpdated:''},
dirty:false
};

/* UTILS */
function uid(p='id'){return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function t(k,v){let s=(I18N[state.language]&&I18N[state.language][k])||I18N.en[k]||k;if(v)Object.keys(v).forEach(x=>{s=s.replace('{'+x+'}',v[x])});return s}
function esc(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function announce(m){const lr=document.getElementById('lr');if(lr){lr.textContent='';setTimeout(()=>lr.textContent=m,50)}}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.hidden=false;clearTimeout(e._tm);e._tm=setTimeout(()=>{e.hidden=true},2500);announce(m)}
function dbg(m,err){if(!state.showDebug)return;const p=document.getElementById('dbg'),c=document.getElementById('dbg-c');p.hidden=false;const l=document.createElement('div');l.className='dl'+(err?' err':'');l.textContent='['+new Date().toLocaleTimeString()+'] '+(typeof m==='string'?m:JSON.stringify(m));c.appendChild(l);c.scrollTop=c.scrollHeight}
function setDirty(v){state.dirty=v;const i=document.getElementById('ind');i.hidden=!v;i.textContent='● '+t('unsaved');if(state.autosave)saveLS()}
function fmtDate(iso,wt){if(!iso)return'';try{const d=new Date(iso);if(isNaN(d.getTime()))return iso;return wt?d.toLocaleString(state.language,{dateStyle:'medium',timeStyle:'short'}):d.toLocaleDateString(state.language,{dateStyle:'medium'})}catch(e){return iso}}

/* DATA HELPERS */
function findEntity(id){return state.data.entities.find(e=>e.id===id)}
function findType(id){return state.data.entityTypes.find(e=>e.id===id)}
function findAspect(id){return state.data.aspects.find(a=>a.id===id)}
function findRT(id){return state.data.relationTypes.find(r=>r.id===id)}
function findList(id){return state.data.selectLists.find(l=>l.id===id)}

function getTitle(e){
if(!e)return t('untitled');
if(e.name&&String(e.name).trim())return String(e.name).trim();
const ty=e.typeId?findType(e.typeId):null;
if(ty){for(const a of ty.attributes){if(['text','textarea','url'].includes(a.type)){const v=e.attributes&&e.attributes[a.id];if(v&&String(v).trim())return String(v).split('\n')[0].slice(0,120)}}}
if(e.attributes){for(const k of Object.keys(e.attributes)){const v=e.attributes[k];if(typeof v==='string'&&v.trim())return v.split('\n')[0].slice(0,120)}}
if(e.customAttributes){for(const ca of e.customAttributes){if(typeof ca.value==='string'&&ca.value.trim())return ca.value.split('\n')[0].slice(0,120)}}
return t('untitled');
}
function getTypeLabel(e){
if(!e)return'';
if(e.inInbox)return t('tabInbox');
if(!e.typeId)return'';
const ty=findType(e.typeId);
return ty?ty.name:'';
}
function getTitleWithType(e){
const tt=getTitle(e);
const tl=getTypeLabel(e);
return tl?(tt+' ('+tl+')'):tt;
}
function getSnip(e){
const ty=e.typeId?findType(e.typeId):null;
if(ty){for(const a of ty.attributes){if(a.type==='textarea'){const v=e.attributes&&e.attributes[a.id];if(v)return String(v).replace(/\s+/g,' ').slice(0,200)}}}
if(e.customAttributes){for(const ca of e.customAttributes){if(ca.type==='textarea'&&typeof ca.value==='string')return ca.value.replace(/\s+/g,' ').slice(0,200)}}
return'';
}
function getAllAttrs(e){
const out=[];
if(e.typeId){const ty=findType(e.typeId);if(ty)ty.attributes.forEach(a=>out.push({source:'type',sourceId:ty.id,sourceLabel:ty.name,attr:a}))}
if(e.aspects)e.aspects.forEach(aid=>{const asp=findAspect(aid);if(asp)asp.attributes.forEach(a=>out.push({source:'aspect',sourceId:asp.id,sourceLabel:asp.name,attr:a}))});
if(e.customAttributes)e.customAttributes.forEach(a=>out.push({source:'custom',sourceId:'custom',sourceLabel:t('customAttrs'),attr:a}));
return out;
}
function getRelsFrom(e){return(e.relations||[]).filter(r=>{const tgt=findEntity(r.targetId);return tgt&&!tgt.archived})}
function getRelsTo(eid){const out=[];state.data.entities.forEach(e=>{if(e.archived)return;if(!e.relations)return;e.relations.forEach(r=>{if(r.targetId===eid)out.push({...r,sourceId:e.id})})});return out}
function isRelApplicable(rt,fromId,toId){
if(rt.scope==='universal')return true;
if(rt.scope==='from')return!rt.fromTypes||!rt.fromTypes.length||rt.fromTypes.includes(fromId);
if(rt.scope==='to')return!rt.toTypes||!rt.toTypes.length||rt.toTypes.includes(toId);
if(rt.scope==='specific'){const a=!rt.fromTypes||!rt.fromTypes.length||rt.fromTypes.includes(fromId);const b=!rt.toTypes||!rt.toTypes.length||rt.toTypes.includes(toId);return a&&b}
return true;
}
function moveItem(arr,idx,dir){const ni=idx+dir;if(ni<0||ni>=arr.length)return;const x=arr[idx];arr[idx]=arr[ni];arr[ni]=x;setDirty(true);render()}

/* STORAGE */
/* MULTI-PROJECT */
function listProjects(){try{return JSON.parse(localStorage.getItem(SK_PROJECTS)||'[]')}catch(e){return[]}}
function saveProjectsList(arr){localStorage.setItem(SK_PROJECTS,JSON.stringify(arr))}
function getActiveProjectId(){return localStorage.getItem(SK_ACTIVE)||''}
function setActiveProjectId(id){localStorage.setItem(SK_ACTIVE,id||'')}
function pdataKey(id){return SK_PDATA+id}
function readProjectData(id){try{const r=localStorage.getItem(pdataKey(id));if(!r)return null;return mergeEmpty(JSON.parse(r))}catch(e){return null}}
function writeProjectData(id,data){localStorage.setItem(pdataKey(id),JSON.stringify(data))}
function ensureProjects(){
let projects=listProjects();
if(!projects.length){
const oldRaw=localStorage.getItem(SK_DATA);
let p;
if(oldRaw){
try{const d=JSON.parse(oldRaw);
const id=uid('p');
p={id:id,name:d.projectName||'',description:d.projectDescription||'',ghPath:d.ghPath||'',updatedAt:new Date().toISOString()};
localStorage.setItem(pdataKey(id),oldRaw);
}catch(e){}
}
if(!p){const id=uid('p');p={id:id,name:'',description:'',ghPath:'',updatedAt:new Date().toISOString()};localStorage.setItem(pdataKey(id),JSON.stringify(emptyData()))}
projects=[p];
saveProjectsList(projects);
setActiveProjectId(p.id);
}
let active=getActiveProjectId();
if(!active||!projects.find(x=>x.id===active)){active=projects[0].id;setActiveProjectId(active)}
return active;
}
function refreshProjectMeta(){

const projects=listProjects();const p=projects.find(x=>x.id===id);if(!p)return;
p.name=state.data.projectName||'';
p.description=state.data.projectDescription||'';

saveProjectsList(projects);
}
function createProject(name,description){

writeProjectData(id,data);

projects.push({id:id,name:name||'',description:description||'',ghPath:'',updatedAt:new Date().toISOString()});

}
function deleteProject(id){

if(projects.length<=1){toast(t('cannotDeleteLast'));return false}

saveProjectsList(filtered);
localStorage.removeItem(pdataKey(id));
if(state.activeProjectId===id){

}

}
function switchProject(id){

if(d){state.data=d}else{state.data=emptyData()}
state.dirty=false;state.ghSha=null;

location.hash='';

}

function saveLS(){try{if(!state.activeProjectId)return;writeProjectData(state.activeProjectId,state.data);refreshProjectMeta();localStorage.setItem(SK_DRT,state.dirty?'1':'0')}catch(e){dbg('LS save failed: '+e.message,true)}}
function loadLS(){

const id=getActiveProjectId();
if(!id)return false;
state.activeProjectId=id;
const d=readProjectData(id);
if(!d)return false;
state.data=d;
state.dirty=localStorage.getItem(SK_DRT)==='1';
return true;
}
function mergeEmpty(d){const b=emptyData();return{version:d.version||1,projectName:typeof d.projectName==='string'?d.projectName:'',projectDescription:typeof d.projectDescription==='string'?d.projectDescription:'',ghPath:typeof d.ghPath==='string'?d.ghPath:'',settings:Object.assign({},b.settings,d.settings||{}),entityTypes:Array.isArray(d.entityTypes)?d.entityTypes:[],aspects:Array.isArray(d.aspects)?d.aspects:[],relationTypes:Array.isArray(d.relationTypes)?d.relationTypes:[],selectLists:Array.isArray(d.selectLists)?d.selectLists:[],entities:Array.isArray(d.entities)?d.entities:[]}}
function saveFile(){const data=JSON.stringify(state.data,null,2);const b=new Blob([data],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=(state.data.projectName?state.data.projectName.replace(/[^\w\u00C0-\u017F-]+/g,'_'):'dkm')+'-'+new Date().toISOString().slice(0,10)+'.dkmdata';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);setDirty(false);toast(t('saved'))}
function smartSave(){if(state.data.ghPath&&parseGhPath(state.data.ghPath)&&ghToken())return saveToGitHub();return saveFile()}

const merged=mergeEmpty(p);
const id=uid('p');

/* GITHUB */
function ghEncode(s){return btoa(unescape(encodeURIComponent(s)))}
function ghDecode(s){return decodeURIComponent(escape(atob(s)))}
function ghB64ToText(b64){return decodeURIComponent(escape(atob(b64.replace(/\n/g,''))))}
function ghTextToB64(text){return btoa(unescape(encodeURIComponent(text)))}
function parseGhPath(p){if(!p)return null;const parts=String(p).trim().split('/').filter(Boolean);if(parts.length<3)return null;return{owner:parts[0],repo:parts[1],path:parts.slice(2).join('/')}}
function ghToken(){return localStorage.getItem(SK_GHTOKEN)||''}
function ghSetToken(v){if(v)localStorage.setItem(SK_GHTOKEN,v);else localStorage.removeItem(SK_GHTOKEN)}
function ghHeaders(){const h={'Accept':'application/vnd.github.v3+json'};const tk=ghToken();if(tk)h['Authorization']='token '+tk;return h}
function ghErrFromStatus(status){if(status===404)return t('ghErr404');if(status===401)return t('ghErr401');if(status===403)return t('ghErr403');return t('ghErrGeneric')+'HTTP '+status}
function ghShareUrl(ghPath){return location.origin+location.pathname+'?id='+ghEncode(ghPath)}

function loadFromGitHub(ghPath,opts){
opts=opts||{};
const parsed=parseGhPath(ghPath);
if(!parsed){toast(t('ghErrInvalidPath'));return Promise.reject(new Error('invalid path'))}
const apiUrl='https://api.github.com/repos/'+parsed.owner+'/'+parsed.repo+'/contents/'+parsed.path;
toast(t('ghLoading'));dbg('GitHub GET '+apiUrl+(ghToken()?' (with token)':' (no token)'));
return fetch(apiUrl,{headers:ghHeaders()}).then(res=>{
if(!res.ok)throw new Error(ghErrFromStatus(res.status));
return res.json();
}).then(meta=>{
dbg('GH meta: size='+meta.size+' sha='+(meta.sha||'').slice(0,8));
if(meta.content&&meta.encoding==='base64'){return{text:ghB64ToText(meta.content),sha:meta.sha}}
const blobUrl='https://api.github.com/repos/'+parsed.owner+'/'+parsed.repo+'/git/blobs/'+meta.sha;
dbg('Large file, fetching blob: '+blobUrl);
return fetch(blobUrl,{headers:ghHeaders()}).then(res=>{
if(!res.ok)throw new Error(ghErrFromStatus(res.status));
return res.json();
}).then(blob=>{return{text:ghB64ToText(blob.content),sha:meta.sha}});
}).then(({text,sha})=>{
const p=JSON.parse(text);
if(!p||typeof p!=='object'||!Array.isArray(p.entities))throw new Error(t('errLoadInvalid'));
const merged=mergeEmpty(p);merged.ghPath=ghPath;
if(opts.asNewProject){
const id=uid('p');
const projects=listProjects();
projects.push({id:id,name:merged.projectName||'',description:merged.projectDescription||'',ghPath:ghPath,updatedAt:new Date().toISOString()});
saveProjectsList(projects);writeProjectData(id,merged);
state.activeProjectId=id;setActiveProjectId(id);
}
state.data=merged;
state.ghSha=sha;
state.dirty=false;
saveLS();
state.view={name:'list',tab:'inbox',entityId:null,settingsTab:'project',settingsItemId:null,edit:null,typeId:null};
location.hash='';render();
toast('✓ '+t('ghLoaded'));
dbg('Loaded from GitHub OK ('+text.length+' B)');
}).catch(err=>{
const msg=err.message||String(err);toast(msg);dbg('GitHub load failed: '+msg,true);throw err;
});
}

function saveToGitHub(){
const ghPath=state.data.ghPath;
if(!ghPath){toast(t('ghErrNoPath'));return Promise.reject(new Error('no path'))}
if(!ghToken()){toast(t('ghErrNoToken'));return Promise.reject(new Error('no token'))}
const parsed=parseGhPath(ghPath);
if(!parsed){toast(t('ghErrInvalidPath'));return Promise.reject(new Error('invalid path'))}
const apiUrl='https://api.github.com/repos/'+parsed.owner+'/'+parsed.repo+'/contents/'+parsed.path;
toast(t('ghSaving'));dbg('GitHub PUT '+apiUrl);
const json=JSON.stringify(state.data,null,2);
const content=ghTextToB64(json);
const doPut=sha=>{
const body={message:t('ghCommitMsg')+(state.data.projectName?' – '+state.data.projectName:''),content:content};
if(sha)body.sha=sha;
return fetch(apiUrl,{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},ghHeaders()),body:JSON.stringify(body)}).then(res=>{
if(!res.ok)return res.json().catch(()=>({})).then(j=>{throw new Error(ghErrFromStatus(res.status)+(j.message?' – '+j.message:''))});
return res.json();
});
};
return fetch(apiUrl,{headers:ghHeaders()}).then(res=>{
if(res.status===404)return null;
if(!res.ok)throw new Error(ghErrFromStatus(res.status));
return res.json();
}).then(meta=>doPut(meta?meta.sha:null)).then(result=>{
state.ghSha=result.content&&result.content.sha;
state.dirty=false;saveLS();
const ind=document.getElementById('ind');if(ind)ind.hidden=true;
toast('✓ '+t('ghSaved'));dbg('GitHub save OK');
return result;
}).catch(err=>{
const msg=err.message||String(err);toast(msg);dbg('GitHub save failed: '+msg,true);throw err;
});
}

function ghAutoLoadFromUrl(){
try{
const params=new URLSearchParams(location.search);
const idParam=params.get('id');
if(!idParam)return false;
const ghPath=ghDecode(idParam);
dbg('Auto-load from URL: '+ghPath);
const projects=listProjects();
const existing=projects.find(p=>p.ghPath===ghPath);
if(existing){
if(state.activeProjectId!==existing.id){
state.activeProjectId=existing.id;setActiveProjectId(existing.id);
const d=readProjectData(existing.id);if(d)state.data=d;
}
loadFromGitHub(ghPath);
}else{
loadFromGitHub(ghPath,{asNewProject:true});
}
return true;
}catch(e){dbg('URL id decode failed: '+e.message,true);return false}
}

function generateStaticViewer(){
let tpl;
try{tpl=decodeURIComponent(escape(atob(VIEWER_TPL_B64)))}catch(e){toast('?');dbg('Viewer decode failed: '+e.message,true);return}
const data=JSON.parse(JSON.stringify(state.data));
data.viewerLang=state.language;
delete data.ghPath;
const wrapper={generatedAt:new Date().toISOString(),version:1,data:data};
let safeJson=JSON.stringify(wrapper);
safeJson=safeJson.replace(/<\/script/gi,'<\\/script');
const escHtml=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const title=escHtml((data.projectName||'DKM Viewer').slice(0,200));
const lang=state.language;
const html=tpl.replace(/__LANG__/g,lang).replace(/__TITLE__/g,title).replace('__JSON_DATA__',safeJson);
const blob=new Blob([html],{type:'text/html;charset=utf-8'});
const u=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=u;
const safeName=(data.projectName||'dkm').replace(/[^\w\u00C0-\u017F-]+/g,'_').slice(0,60);
a.download=safeName+'-viewer-'+new Date().toISOString().slice(0,10)+'.html';
document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
toast('✓ '+t('viewerGenBtn'));dbg('Static viewer generated, size='+html.length+' B');
}

if(c.id==='__type'){const ty=findType(e.typeId);return ty?ty.name:''}
if(c.id==='__inbox')return e.inInbox?'1':'';
if(c.id==='__aspects')return(e.aspects||[]).map(aid=>{const a=findAspect(aid);return a?a.name:aid}).join('; ');
if(c.id==='__relations')return(e.relations||[]).map(r=>{const rt=findRT(r.relationTypeId),tgt=findEntity(r.targetId);return(rt?rt.name:'?')+' → '+(tgt?getTitle(tgt):r.targetId)}).join('; ');
if(c.id==='__created')return e.createdAt||'';
if(c.id==='__updated')return e.updatedAt||'';
if(c.id.startsWith('attr:')){const aid=c.id.slice(5);const v=e.attributes&&e.attributes[aid];return fmtAttrExp(aid,v,e)}
if(c.id.startsWith('cattr:')){const aid=c.id.slice(6);const ca=(e.customAttributes||[]).find(x=>x.id===aid);return ca?fmtCAExp(ca):''}
return'';
});
lines.push(row.map(escTSV).join('\t'));
});
const b=new Blob([lines.join('\n')],{type:'text/tab-separated-values'});
const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='dkm-export-'+new Date().toISOString().slice(0,10)+'.tsv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
toast('TSV ✓');
}
function fmtAttrExp(aid,v,e){const all=getAllAttrs(e);const def=all.find(x=>x.attr.id===aid);if(!def)return v==null?'':String(v);const a=def.attr;if(v==null)return'';if(a.type==='yesno')return v?t('yes'):t('no');if(a.type==='relation'){if(Array.isArray(v))return v.map(x=>{const z=findEntity(x);return z?getTitle(z):x}).join('; ');const z=findEntity(v);return z?getTitle(z):(v||'')}return String(v)}
function fmtCAExp(ca){if(ca.value==null)return'';if(ca.type==='yesno')return ca.value?t('yes'):t('no');if(ca.type==='relation'){if(Array.isArray(ca.value))return ca.value.map(v=>{const z=findEntity(v);return z?getTitle(z):v}).join('; ');const z=findEntity(ca.value);return z?getTitle(z):(ca.value||'')}return String(ca.value)}


/* MARKDOWN + CRITICMARKUP */
function renderMD(src){
if(!src)return'';
let text=String(src);
const tokens=[];
const tok=h=>{tokens.push(h);return'\u0001CMTOK'+(tokens.length-1)+'\u0001'};
text=text.replace(/\{~~([\s\S]*?)~>([\s\S]*?)~~\}/g,(m,a,b)=>tok('<del class="cm-del">'+esc(a)+'</del><ins class="cm-add">'+esc(b)+'</ins>'));
text=text.replace(/\{>>([\s\S]*?)<<\}/g,(m,a)=>tok('<span class="cm-cm">'+esc(a)+'</span>'));
text=text.replace(/\{==([\s\S]*?)==\}/g,(m,a)=>tok('<mark class="cm-mark">'+esc(a)+'</mark>'));
text=text.replace(/\{\+\+([\s\S]*?)\+\+\}/g,(m,a)=>tok('<ins class="cm-add">'+esc(a)+'</ins>'));
text=text.replace(/\{--([\s\S]*?)--\}/g,(m,a)=>tok('<del class="cm-del">'+esc(a)+'</del>'));
text=esc(text);
text=text.replace(/```([a-zA-Z0-9_-]*)\n([\s\S]*?)```/g,(m,l,c)=>'<pre><code>'+c.replace(/^\s+|\s+$/g,'')+'</code></pre>');
text=text.replace(/^#### (.+)$/gm,'<h4>$1</h4>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
text=text.replace(/^---+$/gm,'<hr>');
text=text.replace(/(^&gt; .+(\n&gt; .+)*)/gm,m=>'<blockquote>'+m.replace(/^&gt; ?/gm,'')+'</blockquote>');
text=text.replace(/(^- .+(\n- .+)*)/gm,m=>{const it=m.split(/\n/).map(l=>'<li>'+l.replace(/^- /,'')+'</li>').join('');return'<ul>'+it+'</ul>'});
text=text.replace(/(^\d+\. .+(\n\d+\. .+)*)/gm,m=>{const it=m.split(/\n/).map(l=>'<li>'+l.replace(/^\d+\. /,'')+'</li>').join('');return'<ol>'+it+'</ol>'});
text=text.replace(/\[([^\]]+)\]\((https?:[^)\s]+|mailto:[^)\s]+|#[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
text=text.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
text=text.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<em>$2</em>');
text=text.replace(/`([^`\n]+)`/g,'<code>$1</code>');
text=text.split(/\n{2,}/).map(b=>{if(/^\s*<(h\d|ul|ol|pre|blockquote|hr|table)/.test(b))return b;return'<p>'+b.replace(/\n/g,'<br>')+'</p>'}).join('\n');
text=text.replace(/\u0001CMTOK(\d+)\u0001/g,(m,i)=>tokens[parseInt(i,10)]||'');
return text;
}

/* ROUTING */
function navigateTo(v){
state.view=Object.assign({name:'list',tab:'inbox',entityId:null,settingsTab:'project',settingsItemId:null,edit:null,typeId:null},v);
let h='';
if(v.name==='list'){
if(v.tab==='inbox')h='';
else if(v.tab==='all')h='#all';
else if(v.tab==='archive')h='#archive';
else if(typeof v.tab==='string'&&v.tab.indexOf('aspect:')===0)h='#aspect/'+v.tab.slice(7);
else h='#type/'+v.tab;
}
else if(v.name==='detail')h='#entity/'+v.entityId;
else if(v.name==='settings'){h='#settings/'+(v.settingsTab||'types');if(v.settingsItemId)h+='/'+v.settingsItemId}
else if(v.name==='edit')h='#entity/'+v.entityId+'/edit';
else if(v.name==='new')h='#new'+(v.typeId?'/'+v.typeId:'');
if(location.hash!==h)location.hash=h;else render();
}
function parseHash(){
const h=location.hash.replace(/^#/,'');
if(!h)return{name:'list',tab:'inbox'};
const p=h.split('/');
if(p[0]==='all')return{name:'list',tab:'all'};
if(p[0]==='archive')return{name:'list',tab:'archive'};
if(p[0]==='type'&&p[1])return{name:'list',tab:p[1]};
if(p[0]==='aspect'&&p[1])return{name:'list',tab:'aspect:'+p[1]};
if(p[0]==='entity'&&p[1]){if(p[2]==='edit')return{name:'edit',entityId:p[1]};return{name:'detail',entityId:p[1]}}
if(p[0]==='settings')return{name:'settings',settingsTab:p[1]||'types',settingsItemId:p[2]||null};
if(p[0]==='new')return{name:'new',typeId:p[1]||null};
return{name:'list',tab:'inbox'};
}
window.addEventListener('hashchange',()=>{state.view=Object.assign({name:'list',tab:'inbox',entityId:null,settingsTab:'types',settingsItemId:null,edit:null,typeId:null},parseHash());render()});

/* LIST */
function getList(){
let list=state.data.entities.slice();
if(state.view.tab==='archive'){list=list.filter(e=>e.archived)}
else{
list=list.filter(e=>!e.archived);
if(state.view.tab==='inbox')list=list.filter(e=>e.inInbox);
else if(state.view.tab==='all'){/* all */}
else if(typeof state.view.tab==='string'&&state.view.tab.indexOf('aspect:')===0){
const aid=state.view.tab.slice(7);list=list.filter(e=>(e.aspects||[]).includes(aid));
}
else list=list.filter(e=>e.typeId===state.view.tab&&!e.inInbox);
}
const q=(state.filters.search||'').toLowerCase().trim();
if(q)list=list.filter(e=>{const hay=[getTitle(e),getSnip(e),...Object.values(e.attributes||{}).map(v=>typeof v==='string'?v:''),...((e.customAttributes||[]).map(a=>(a.name||'')+' '+(typeof a.value==='string'?a.value:'')))].join(' ').toLowerCase();return hay.includes(q)});
if(state.filters.filterAspect)list=list.filter(e=>(e.aspects||[]).includes(state.filters.filterAspect));
if(state.view.tab==='all'&&state.filters.filterType){
if(state.filters.filterType==='__none__')list=list.filter(e=>!e.typeId);
else list=list.filter(e=>e.typeId===state.filters.filterType);
}
if(state.filters.filterUpdated){
const now=Date.now();const day=86400000;
const todayStart=new Date();todayStart.setHours(0,0,0,0);const todayMs=todayStart.getTime();
list=list.filter(e=>{const u=e.updatedAt?new Date(e.updatedAt).getTime():0;
if(state.filters.filterUpdated==='today')return u>=todayMs;
if(state.filters.filterUpdated==='7d')return(now-u)<=7*day;
if(state.filters.filterUpdated==='30d')return(now-u)<=30*day;
if(state.filters.filterUpdated==='older')return(now-u)>30*day;
return true;
});
}
const s=state.filters.sort||'updated';
list.sort((a,b)=>{
if(s==='newest')return(b.createdAt||'').localeCompare(a.createdAt||'');
if(s==='oldest')return(a.createdAt||'').localeCompare(b.createdAt||'');
if(s==='updated')return(b.updatedAt||'').localeCompare(a.updatedAt||'');
if(s==='title')return getTitle(a).localeCompare(getTitle(b),state.language);
if(s==='titleDesc')return getTitle(b).localeCompare(getTitle(a),state.language);
return 0;
});
return list;
}

function renderOutlineSection(rootEntity){
const hasOut=getRelsFrom(rootEntity).length||getRelsTo(rootEntity.id).length;
if(!hasOut)return null;
const sec=document.createElement('section');sec.className='dsec';sec.setAttribute('aria-labelledby','h-outline');

const hint=document.createElement('p');hint.style.color='var(--mu)';hint.style.fontSize='.85rem';hint.style.marginTop='0';hint.textContent=t('detailOutlineHint');sec.appendChild(hint);
const tree=document.createElement('div');tree.className='outline';tree.setAttribute('role','tree');
tree.appendChild(buildOutlineNode(rootEntity,new Set([rootEntity.id]),0,true));
sec.appendChild(tree);return sec;
}

function buildOutlineNode(entity,visited,depth,isRoot){
const node=document.createElement('div');node.className='out-n';node.setAttribute('role','treeitem');
const out=getRelsFrom(entity);
const back=getRelsTo(entity.id);
const hasChildren=(out.length+back.length)>0;
const hdr=document.createElement('div');hdr.className='out-h';
let opened=isRoot;
const tog=document.createElement('button');tog.type='button';tog.className='out-tog';tog.setAttribute('aria-label',t('toggle'));
tog.textContent=hasChildren?(opened?'▾':'▸'):'·';
if(!hasChildren)tog.disabled=true;
hdr.appendChild(tog);
const lnk=document.createElement('a');lnk.className='out-l';lnk.href='#entity/'+entity.id;
const ti=document.createElement('span');ti.className='out-ti';ti.textContent=getTitle(entity);lnk.appendChild(ti);
const tl=getTypeLabel(entity);
if(tl){const sp=document.createElement('span');sp.className='out-tl';sp.textContent=' ('+tl+')';lnk.appendChild(sp)}
if(isRoot)lnk.style.fontWeight='600';
hdr.appendChild(lnk);
const ct=document.createElement('span');ct.className='out-c';
if(hasChildren)ct.textContent=' ['+out.length+'→ '+back.length+'←]';
hdr.appendChild(ct);
node.appendChild(hdr);
const body=document.createElement('div');body.className='out-b';body.setAttribute('role','group');
let built=false;
const buildChildren=()=>{
if(built)return;built=true;
const childWrap=document.createElement('div');
if(out.length){
const og={};out.forEach(r=>{const k=r.relationTypeId||'_';og[k]=og[k]||[];og[k].push(r)});
Object.keys(og).forEach(k=>{
const rt=findRT(k);const grp=document.createElement('div');grp.className='out-g';
const lbl=document.createElement('div');lbl.className='out-gl';lbl.textContent=(rt?rt.name:t('detailRelations'))+' →';grp.appendChild(lbl);
og[k].forEach(r=>{const tgt=findEntity(r.targetId);if(!tgt)return;
if(visited.has(tgt.id)){const cn=document.createElement('div');cn.className='out-loop';cn.textContent='↻ '+getTitle(tgt)+' ('+t('outlineCycle')+')';grp.appendChild(cn);return}
grp.appendChild(buildOutlineNode(tgt,new Set([...visited,tgt.id]),depth+1,false))});
childWrap.appendChild(grp);
});
}
if(back.length){
const bg={};back.forEach(r=>{const k=r.relationTypeId||'_';bg[k]=bg[k]||[];bg[k].push(r)});
Object.keys(bg).forEach(k=>{
const rt=findRT(k);const grp=document.createElement('div');grp.className='out-g';
const lbl=document.createElement('div');lbl.className='out-gl';lbl.textContent='← '+(rt?(rt.inverseName||rt.name):t('detailBacklinks'));grp.appendChild(lbl);
bg[k].forEach(r=>{const src=findEntity(r.sourceId);if(!src)return;
if(visited.has(src.id)){const cn=document.createElement('div');cn.className='out-loop';cn.textContent='↻ '+getTitle(src)+' ('+t('outlineCycle')+')';grp.appendChild(cn);return}
grp.appendChild(buildOutlineNode(src,new Set([...visited,src.id]),depth+1,false))});
childWrap.appendChild(grp);
});
}
body.appendChild(childWrap);
};
if(opened)buildChildren();
body.style.display=opened?'block':'none';
node.appendChild(body);
tog.addEventListener('click',()=>{
if(!hasChildren)return;
opened=!opened;
tog.textContent=opened?'▾':'▸';
node.setAttribute('aria-expanded',opened?'true':'false');
if(opened)buildChildren();
body.style.display=opened?'block':'none';
});
node.setAttribute('aria-expanded',opened?'true':'false');
return node;
}

function renderAttrRow(e,it){
const r=document.createElement('div');r.className='arow';
const l=document.createElement('div');l.className='alabel';l.textContent=it.attr.name+(it.attr.required?' *':'');r.appendChild(l);
const v=document.createElement('div');v.className='aval';
let val;
if(it.source==='custom')val=it.attr.value;
else val=e.attributes&&e.attributes[it.attr.id];
v.appendChild(renderAttrVal(it.attr,val,e));r.appendChild(v);return r;
}
function renderAttrVal(a,v,e){
if(v==null||v===''||(Array.isArray(v)&&!v.length)){const s=document.createElement('span');s.className='aempty';s.textContent=t('notSet');return s}
switch(a.type){
case'text':return document.createTextNode(String(v));
case'textarea':{const d=document.createElement('div');d.className='md';d.innerHTML=renderMD(String(v));return d}
case'date':return document.createTextNode(fmtDate(v));
case'url':{const x=document.createElement('a');x.href=v;x.textContent=v;x.target='_blank';x.rel='noopener noreferrer';return x}
case'select':return document.createTextNode(String(v));
case'yesno':return document.createTextNode(v?t('yes'):t('no'));
case'number':return document.createTextNode(String(v));
case'relation':{const w=document.createElement('span');w.className='rlist';const arr=Array.isArray(v)?v:[v];arr.forEach(id=>{const x=findEntity(id);const a=document.createElement('a');a.className='elnk';a.href='#entity/'+id;a.textContent=x?getTitle(x):id;w.appendChild(a)});return w}
}
return document.createTextNode(String(v));
}
function deleteEntity(id){
state.data.entities=state.data.entities.filter(e=>e.id!==id);
state.data.entities.forEach(e=>{
if(e.relations)e.relations=e.relations.filter(r=>r.targetId!==id);
if(e.attributes)Object.keys(e.attributes).forEach(k=>{const v=e.attributes[k];if(Array.isArray(v))e.attributes[k]=v.filter(x=>x!==id);else if(v===id)delete e.attributes[k]});
if(e.customAttributes)e.customAttributes.forEach(ca=>{if(Array.isArray(ca.value))ca.value=ca.value.filter(x=>x!==id);else if(ca.value===id)ca.value=''});
});
setDirty(true);toast(t('deleted'));
}

const sh2=document.createElement('h3');sh2.textContent=t('ghPath');sec2.appendChild(sh2);
const ph=document.createElement('small');ph.className='fhint';ph.style.display='block';ph.style.marginBottom='.5rem';ph.textContent=t('ghPathHint');sec2.appendChild(ph);
const pr=document.createElement('div');pr.style.display='flex';pr.style.gap='.4rem';pr.style.flexWrap='wrap';pr.style.alignItems='center';
const pi=document.createElement('input');pi.type='text';pi.id='gh-path';pi.value=state.data.ghPath||'';pi.placeholder='owner/repo/path/file.dkmdata';pi.style.flex='1';pi.style.minWidth='200px';pi.setAttribute('aria-label',t('ghPath'));
pr.appendChild(pi);
const pSave=document.createElement('button');pSave.type='button';pSave.className='btn btn-pri btn-sm';pSave.textContent=t('ghPathSave');
pSave.addEventListener('click',()=>{state.data.ghPath=pi.value.trim();setDirty(true);toast(t('ghPathSaved'));refreshStat();refreshLink()});
pr.appendChild(pSave);
sec2.appendChild(pr);
w.appendChild(sec2);

/* ACTIONS */
const sec3=document.createElement('section');sec3.className='dsec';
const sh3=document.createElement('h3');sh3.textContent=t('btnLoad')+' / '+t('btnSave');sec3.appendChild(sh3);
const ar=document.createElement('div');ar.style.display='flex';ar.style.gap='.4rem';ar.style.flexWrap='wrap';
const lb=document.createElement('button');lb.type='button';lb.className='btn btn-pri';lb.textContent='⬇ '+t('ghLoad');
lb.addEventListener('click',()=>{const p=pi.value.trim()||state.data.ghPath;if(!p){toast(t('ghErrNoPath'));return}if(state.dirty&&!confirm(t('confirmReset')))return;loadFromGitHub(p)});
ar.appendChild(lb);
const sb=document.createElement('button');sb.type='button';sb.className='btn btn-pri';sb.textContent='⬆ '+t('ghSave');
sb.addEventListener('click',()=>{if(pi.value.trim()!==state.data.ghPath){state.data.ghPath=pi.value.trim();setDirty(true)}saveToGitHub()});
ar.appendChild(sb);
sec3.appendChild(ar);
w.appendChild(sec3);

/* LINK */
const sec4=document.createElement('section');sec4.className='dsec';
const sh4=document.createElement('h3');sh4.textContent=t('ghLink');sec4.appendChild(sh4);
const lh=document.createElement('small');lh.className='fhint';lh.style.display='block';lh.style.marginBottom='.5rem';lh.textContent=t('ghLinkHint');sec4.appendChild(lh);
const lr=document.createElement('div');lr.style.display='flex';lr.style.gap='.4rem';lr.style.flexWrap='wrap';lr.style.alignItems='center';
const li=document.createElement('input');li.type='text';li.id='gh-link';li.readOnly=true;li.style.flex='1';li.style.minWidth='200px';li.setAttribute('aria-label',t('ghLink'));
const refreshLink=()=>{const p=state.data.ghPath;li.value=parseGhPath(p)?ghShareUrl(p):''};refreshLink();
lr.appendChild(li);
const cb=document.createElement('button');cb.type='button';cb.className='btn btn-sm';cb.textContent=t('ghCopyLink');
cb.addEventListener('click',()=>{if(!li.value){toast(t('ghErrNoPath'));return}li.select();try{navigator.clipboard.writeText(li.value).then(()=>toast(t('ghLinkCopied')),()=>{document.execCommand('copy');toast(t('ghLinkCopied'))})}catch(e){document.execCommand('copy');toast(t('ghLinkCopied'))}});
lr.appendChild(cb);
sec4.appendChild(lr);
w.appendChild(sec4);

return w;
}

function rsLists(){
const w=document.createElement('div');
const h=document.createElement('h2');h.textContent=t('settingsLists');w.appendChild(h);
const d=document.createElement('p');d.style.color='var(--mu)';d.textContent=t('settingsListsDesc');w.appendChild(d);
const list=document.createElement('div');list.className='clist';
state.data.selectLists.forEach((l,idx)=>{
const it=document.createElement('div');it.className='citem';
const head=document.createElement('div');head.className='citem-h';
const ni=document.createElement('input');ni.type='text';ni.value=l.name||'';ni.placeholder=t('name');ni.style.flex='1';ni.setAttribute('aria-label',t('name'));
ni.addEventListener('input',()=>{l.name=ni.value;setDirty(true)});head.appendChild(ni);
appendMoveDelete(head,state.data.selectLists,idx,()=>{state.data.selectLists.splice(idx,1);return true});
it.appendChild(head);
const b=document.createElement('div');b.className='citem-b';
const f=document.createElement('div');f.className='fld';
const lab=document.createElement('label');lab.textContent=t('listValues');f.appendChild(lab);
const ta=document.createElement('textarea');ta.value=(l.values||[]).join('\n');
ta.addEventListener('input',()=>{l.values=ta.value.split('\n').map(x=>x.trim()).filter(Boolean);setDirty(true)});
f.appendChild(ta);b.appendChild(f);
it.appendChild(b);list.appendChild(it);
});
w.appendChild(list);
const ab=document.createElement('button');ab.className='btn btn-pri';ab.type='button';ab.textContent='＋ '+t('addList');
ab.addEventListener('click',()=>{state.data.selectLists.push({id:uid('l'),name:'',values:[]});setDirty(true);render()});
w.appendChild(ab);return w;
}

function rsTabs(){
const w=document.createElement('div');
const h=document.createElement('h2');h.textContent=t('settingsTabs');w.appendChild(h);
const d=document.createElement('p');d.style.color='var(--mu)';d.textContent=t('settingsTabsDesc');w.appendChild(d);
state.data.settings.visibleTypeTabs=state.data.settings.visibleTypeTabs||[];
state.data.settings.visibleAspectTabs=state.data.settings.visibleAspectTabs||[];

/* TYPES */
const ht1=document.createElement('h3');ht1.textContent=t('settingsTypes');w.appendChild(ht1);
if(!state.data.entityTypes.length){const p=document.createElement('p');p.className='aempty';p.textContent=t('noTypesYet');w.appendChild(p)}
else{
const lst=document.createElement('div');lst.style.display='flex';lst.style.flexDirection='column';lst.style.gap='.4rem';
state.data.entityTypes.forEach(ty=>{
const lab=document.createElement('label');lab.className='cb';
const cb=document.createElement('input');cb.type='checkbox';cb.checked=state.data.settings.visibleTypeTabs.includes(ty.id);
cb.addEventListener('change',()=>{
const arr=state.data.settings.visibleTypeTabs;
if(cb.checked){if(!arr.includes(ty.id))arr.push(ty.id)}else{state.data.settings.visibleTypeTabs=arr.filter(x=>x!==ty.id)}
setDirty(true);renderTabs();
});
lab.appendChild(cb);const sp=document.createElement('span');sp.textContent=(ty.icon?ty.icon+' ':'')+ty.name;lab.appendChild(sp);
lst.appendChild(lab);
});
w.appendChild(lst);
}

/* ASPECTS */
const ht2=document.createElement('h3');ht2.textContent=t('settingsAspects');ht2.style.marginTop='1.2rem';w.appendChild(ht2);
if(!state.data.aspects.length){const p=document.createElement('p');p.className='aempty';p.textContent='—';w.appendChild(p)}
else{
const lst2=document.createElement('div');lst2.style.display='flex';lst2.style.flexDirection='column';lst2.style.gap='.4rem';
state.data.aspects.forEach(asp=>{
const lab=document.createElement('label');lab.className='cb';
const cb=document.createElement('input');cb.type='checkbox';cb.checked=state.data.settings.visibleAspectTabs.includes(asp.id);
cb.addEventListener('change',()=>{
const arr=state.data.settings.visibleAspectTabs;
if(cb.checked){if(!arr.includes(asp.id))arr.push(asp.id)}else{state.data.settings.visibleAspectTabs=arr.filter(x=>x!==asp.id)}
setDirty(true);renderTabs();
});
lab.appendChild(cb);const sp=document.createElement('span');sp.textContent='◎ '+asp.name;lab.appendChild(sp);
lst2.appendChild(lab);
});
w.appendChild(lst2);
}
return w;
}

function rsStats(){
const w=document.createElement('div');

[state.data.entities.length,t('statsTotal')],
[state.data.entities.filter(e=>e.inInbox&&!e.archived).length,t('statsInbox')],

[state.data.entityTypes.length,t('statsTypes')],
[state.data.aspects.length,t('statsAspects')],

function focusSearch(){
if(state.view.name!=='list'){navigateTo({name:'list',tab:state.view.tab||'all'});setTimeout(focusSearch,40);return}
const s=document.getElementById('sin');
if(s){s.focus();s.select()}else{navigateTo({name:'list',tab:'all'});setTimeout(()=>{const x=document.getElementById('sin');if(x){x.focus();x.select()}},40)}
}
function focusQuickAdd(){
if(state.view.name!=='list'||state.view.tab!=='inbox'){navigateTo({name:'list',tab:'inbox'});setTimeout(focusQuickAdd,40);return}
const q=document.getElementById('qa-n');if(q)q.focus();
}

/* INIT + EVENTS */
function init(){
if('serviceWorker' in navigator){
navigator.serviceWorker.getRegistrations().then(regs=>{
if(regs.length){
dbg('Cleaning up stale Service Worker(s)…');
return Promise.all(regs.map(r=>r.unregister())).then(()=>{
if('caches' in window){return caches.keys().then(ns=>Promise.all(ns.map(n=>caches.delete(n))))}
}).then(()=>{location.reload()});
}
bootstrap();
}).catch(bootstrap);
}else{bootstrap()}
}
function bootstrap(){
ensureProjects();
const params=new URLSearchParams(location.search);
const pParam=params.get('p');
if(pParam){
const projects=listProjects();
const found=projects.find(x=>x.id===pParam);
if(found){state.activeProjectId=pParam;setActiveProjectId(pParam);const d=readProjectData(pParam);if(d)state.data=d;}
else{loadLS()}
}else{loadLS()}
state.view=Object.assign({name:'list',tab:'inbox',entityId:null,settingsTab:'project',settingsItemId:null,edit:null,typeId:null},parseHash());
if(state.showDebug)document.getElementById('dbg').hidden=false;
setupEvents();
render();
ghAutoLoadFromUrl();
}
function setupEvents(){
document.getElementById('b-load').addEventListener('click',()=>{document.getElementById('fin').click()});
document.getElementById('fin').addEventListener('change',ev=>{const f=ev.target.files&&ev.target.files[0];if(!f)return;loadFile(f);ev.target.value=''});
document.getElementById('b-save').addEventListener('click',smartSave);
document.getElementById('b-exp').addEventListener('click',exportTSV);
document.getElementById('b-set').addEventListener('click',()=>navigateTo({name:'settings',settingsTab:state.view.settingsTab||'project'}));
document.getElementById('b-lang').addEventListener('click',()=>{state.language=state.language==='cs'?'en':'cs';localStorage.setItem(SK_LANG,state.language);render()});
document.getElementById('dbg-x').addEventListener('click',()=>{state.showDebug=false;localStorage.setItem(SK_DBG,'false');document.getElementById('dbg').hidden=true});
document.getElementById('dbg-clr').addEventListener('click',()=>{document.getElementById('dbg-c').innerHTML=''});
document.addEventListener('keydown',ev=>{
const tg=ev.target;
const isInput=tg&&(tg.tagName==='INPUT'||tg.tagName==='TEXTAREA'||tg.tagName==='SELECT'||tg.isContentEditable);
const dlg=document.getElementById('dlg');
const dlgOpen=dlg&&(dlg.hasAttribute('open')||dlg.open);
/* Ctrl/Cmd shortcuts work everywhere */
if((ev.ctrlKey||ev.metaKey)&&!ev.altKey&&ev.key==='s'){ev.preventDefault();smartSave();return}
if((ev.ctrlKey||ev.metaKey)&&!ev.altKey&&ev.key==='k'){ev.preventDefault();focusSearch();return}
/* Escape works everywhere */
if(ev.key==='Escape'){if(dlgOpen){closeDialog();return}if(state.view.name==='detail'||state.view.name==='edit'||state.view.name==='new'||state.view.name==='settings'){if(history.length>1)history.back();else navigateTo({name:'list',tab:'inbox'})}return}
/* Letter shortcuts only when not typing and no dialog open */
if(isInput||dlgOpen)return;
if(ev.altKey||ev.ctrlKey||ev.metaKey)return;
const k=ev.key.toLowerCase();
switch(k){
case's':ev.preventDefault();smartSave();break;
case'i':ev.preventDefault();navigateTo({name:'list',tab:'inbox'});break;
case'q':ev.preventDefault();focusQuickAdd();break;
case'n':ev.preventDefault();
if(state.data.entityTypes.length===0)navigateTo({name:'new'});
else openNewChooser();
break;
case'a':ev.preventDefault();navigateTo({name:'list',tab:'all'});break;
case'e':if(state.view.name==='detail'&&state.view.entityId){ev.preventDefault();navigateTo({name:'edit',entityId:state.view.entityId})}break;
case'r':if(state.view.name==='detail'&&state.view.entityId){const ent=findEntity(state.view.entityId);if(ent&&!ent.archived){ev.preventDefault();openAddRelDialog(ent,null)}}break;
case'u':if(state.view.name==='edit'){ev.preventDefault();commitEdit()}break;
case'f':ev.preventDefault();focusSearch();break;
case'/':ev.preventDefault();focusSearch();break;
}
});
window.addEventListener('beforeunload',ev=>{if(state.dirty&&!state.autosave){ev.preventDefault();ev.returnValue=''}});
}
init();


</script>
