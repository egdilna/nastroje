            generateMarkdown() {
                const generateSection = (section, isFirst = false) => {
                    const prefix = '#'.repeat(section.level);
                    let md = '';
                    
                    // Add empty line before heading (except for the very first section)
                    if (!isFirst) {
                        md += '\n';
                    }
                    
                    // Add heading
                    md += `${prefix} ${section.heading}\n`;
                    
                    // Add empty line after heading, then body
                    if (section.body && section.body.trim()) {
                        md += '\n' + section.body.trim() + '\n';
                    }
                    
                    // Process children
                    if (section.children.length > 0) {
                        section.children.forEach(child => {
                            md += generateSection(child, false);
                        });
                    }
                    
                    return md;
                };

                let markdown = '';
                this.data.sections.forEach((section, index) => {
                    markdown += generateSection(section, index === 0);
                });
                return markdown.trim() + '\n';
            },

            addRootSection() {
                const section = {
                    id: ++this.sectionCounter,
                    level: 1,
                    heading: '✏️',
                    body: '',
                    collapsed: false,
                    contentCollapsed: false,
                    children: []
                };
                this.data.sections.push(section);
                this.editingSectionId = section.id;
                this.render();
                
                setTimeout(() => {
                    const input = document.querySelector(`#section-${section.id} .section-heading-input`);
                    if (input) {
                        input.focus();
                        // Move cursor to end (after ✏️)
                        input.setSelectionRange(input.value.length, input.value.length);
                    }
                }, 100);
            },

            addChild(parentId) {
                const parent = this.findSection(this.data.sections, parentId);
                if (!parent) return;

                const section = {
                    id: ++this.sectionCounter,
                    level: parent.level + 1,
                    heading: '✏️',
                    body: '',
                    collapsed: false,
                    contentCollapsed: false,
                    children: []
                };
                parent.children.push(section);
                parent.collapsed = false;
                this.editingSectionId = section.id;
                this.render();
                
                setTimeout(() => {
                    const input = document.querySelector(`#section-${section.id} .section-heading-input`);
                    if (input) {
                        input.focus();
                        // Move cursor to end (after ✏️)
                        input.setSelectionRange(input.value.length, input.value.length);
                    }
                }, 100);
            },

            addSibling(id) {
                const result = this.findSectionWithParent(this.data.sections, id, null);
                if (!result) return;

                const { section, parent, index } = result;
                const sections = parent ? parent.children : this.data.sections;

                const newSection = {
                    id: ++this.sectionCounter,
                    level: section.level,
                    heading: '✏️',
                    body: '',
                    collapsed: false,
                    contentCollapsed: false,
                    children: []
                };

                // Insert after current section
                sections.splice(index + 1, 0, newSection);
                this.editingSectionId = newSection.id;
                this.render();
                
                setTimeout(() => {
                    const input = document.querySelector(`#section-${newSection.id} .section-heading-input`);
                    if (input) {
                        input.focus();
                        // Move cursor to end (after ✏️)
                        input.setSelectionRange(input.value.length, input.value.length);
                    }
                }, 100);
            },

            editSection(id) {
                this.editingSectionId = id;
                this.render();
                setTimeout(() => {
                    const input = document.querySelector(`#section-${id} .section-heading-input`);
                    if (input) input.focus();
                }, 100);
            },

            saveSection(id) {
                this.editingSectionId = null;
                this.render();
            },

            deleteSection(id) {
                if (!confirm(this.t('confirmDelete'))) {
                    return;
                }
                this.data.sections = this.removeSection(this.data.sections, id);
                this.render();
            },

            removeSection(sections, id) {
                return sections.filter(section => {
                    if (section.id === id) return false;
                    if (section.children.length > 0) {
                        section.children = this.removeSection(section.children, id);
                    }
                    return true;
                });
            },

            toggleCollapse(id) {
                const section = this.findSection(this.data.sections, id);
                if (section) {
                    section.collapsed = !section.collapsed;
                    this.render();
                }
            },

            collapseAll() {
                const setCollapsed = (sections, value) => {
                    sections.forEach(section => {
                        if (section.children && section.children.length > 0) {
                            section.collapsed = value;
                            setCollapsed(section.children, value);
                        }
                    });
                };
                setCollapsed(this.data.sections, true);
                this.render();
            },

            expandAll() {
                const setCollapsed = (sections, value) => {
                    sections.forEach(section => {
                        section.collapsed = value;
                        if (section.children && section.children.length > 0) {
                            setCollapsed(section.children, value);
                        }
                    });
                };
                setCollapsed(this.data.sections, false);
                this.render();
            },

            toggleContentCollapse(id) {
                const section = this.findSection(this.data.sections, id);
                if (section) {
                    section.contentCollapsed = !section.contentCollapsed;
                    this.render();
                }
            },

            moveUp(id) {
                const result = this.findSectionWithParent(this.data.sections, id, null);
                if (!result) return;

                const { parent, index } = result;
                const sections = parent ? parent.children : this.data.sections;
                
                if (index > 0) {
                    [sections[index], sections[index - 1]] = [sections[index - 1], sections[index]];
                    this.render();
                }
            },

            moveDown(id) {
                const result = this.findSectionWithParent(this.data.sections, id, null);
                if (!result) return;

                const { parent, index } = result;
                const sections = parent ? parent.children : this.data.sections;
                
                if (index < sections.length - 1) {
                    [sections[index], sections[index + 1]] = [sections[index + 1], sections[index]];
                    this.render();
                }
            },

            increaseLevel(id) {
                const result = this.findSectionWithParent(this.data.sections, id, null);
                if (!result) return;

                const { parent, index } = result;
                const sections = parent ? parent.children : this.data.sections;
                
                if (index > 0) {
                    const section = sections[index];
                    const newParent = sections[index - 1];
                    sections.splice(index, 1);
                    
                    section.level = newParent.level + 1;
                    this.updateChildLevels(section);
                    
                    newParent.children.push(section);
                    newParent.collapsed = false;
                    this.render();
                }
            },

            decreaseLevel(id) {
                const result = this.findSectionWithParent(this.data.sections, id, null);
                if (!result || !result.parent) return;

                const { parent, index } = result;
                const grandParentResult = this.findSectionWithParent(this.data.sections, parent.id, null);
                if (!grandParentResult) return;

                const section = parent.children[index];
                parent.children.splice(index, 1);
                
                const grandParent = grandParentResult.parent;
                const targetSections = grandParent ? grandParent.children : this.data.sections;
                const parentIndex = targetSections.findIndex(s => s.id === parent.id);
                
                section.level = parent.level;
                this.updateChildLevels(section);
                
                targetSections.splice(parentIndex + 1, 0, section);
                this.render();
            },

            updateChildLevels(section) {
                section.children.forEach(child => {
                    child.level = section.level + 1;
                    this.updateChildLevels(child);
                });
            },

            findSection(sections, id) {
                for (const section of sections) {
                    if (section.id === id) return section;
                    if (section.children.length > 0) {
                        const found = this.findSection(section.children, id);
                        if (found) return found;
                    }
                }
                return null;
            },
            
            getBreadcrumbPath(sections, targetId, path = []) {
                for (const section of sections) {
                    if (section.id === targetId) {
                        return [...path, section];
                    }
                    if (section.children.length > 0) {
                        const found = this.getBreadcrumbPath(section.children, targetId, [...path, section]);
                        if (found) return found;
                    }
                }
                return null;
            },

            countAllChildren(section) {
                let count = section.children.length;
                section.children.forEach(child => {
                    count += this.countAllChildren(child);
                });
                return count;
            },
            
            countVisibleChildren(section) {
                // Count how many children are visible after filters
                // Returns {total: X, visible: Y}
                let total = section.children.length;
                let visible = 0;
                
                section.children.forEach(child => {
                    const childTotal = this.countAllChildren(child);
                    total += childTotal;
                    
                    // Check if child matches current filters
                    let matches = true;
                    
                    if (this.activeTagFilter) {
                        matches = matches && this.sectionContainsTag(child, this.activeTagFilter);
                    }
                    
                    if (this.searchQuery) {
                        matches = matches && this.sectionMatchesSearch(child, this.searchQuery);
                    }
                    
                    if (matches) {
                        visible += 1; // Count the child itself
                        // Count visible grandchildren recursively
                        const grandchildStats = this.countVisibleChildren(child);
                        visible += grandchildStats.visible;
                    } else {
                        // Child doesn't match, but check its children
                        const grandchildStats = this.countVisibleChildren(child);
                        visible += grandchildStats.visible;
                    }
                });
                
                return { total, visible };
            },
            
            countCharactersAndWords(section) {
                // Count characters and words in this section including heading
                let text = (section.heading || '') + ' ' + (section.body || '');
                let chars = text.length;
                let words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                
                // Add children recursively
                section.children.forEach(child => {
                    const childStats = this.countCharactersAndWords(child);
                    chars += childStats.chars;
                    words += childStats.words;
                });
                
                return { chars, words };
            },
            
            countCompletionStats(section) {
                // Count total sections and work-in-progress sections (with ✏️)
                let total = 1; // Count this section
                let wip = (section.heading && section.heading.includes('✏️')) ? 1 : 0;
                
                // Add children recursively
                section.children.forEach(child => {
                    const childStats = this.countCompletionStats(child);
                    total += childStats.total;
                    wip += childStats.wip;
                });
                
                return { total, wip };
            },

            countTaskStats(section) {
                // Count tasks in this section and all children
                let totalTasks = 0;
                let completedTasks = 0;
                
                // Count tasks in this section's body
                if (section.body) {
                    const lines = section.body.split('\n');
                    lines.forEach(line => {
                        // Match task list items: - [ ] or - [x] or - [X]
                        const taskMatch = line.match(/^(\s*)-\s+\[([ xX])\]/);
                        if (taskMatch) {
                            totalTasks++;
                            const checked = taskMatch[2] !== ' ';
                            if (checked) {
                                completedTasks++;
                            }
                        }
                    });
                }
                
                // Add children recursively
                section.children.forEach(child => {
                    const childStats = this.countTaskStats(child);
                    totalTasks += childStats.totalTasks;
                    completedTasks += childStats.completedTasks;
                });
                
                return { totalTasks, completedTasks };
            },

            removeCompletedTasks(sectionId) {
                const section = this.findSection(this.data.sections, sectionId);
                if (!section || !section.body) return;
                
                const lines = section.body.split('\n');
                const filteredLines = lines.filter(line => {
                    // Keep line if it's NOT a completed task
                    const taskMatch = line.match(/^(\s*)-\s+\[([ xX])\]/);
                    if (!taskMatch) return true; // Not a task, keep it
                    const checked = taskMatch[2] !== ' ';
                    return !checked; // Keep only unchecked tasks
                });
                
                section.body = filteredLines.join('\n');
                this.render();
            },

            removeTags(sectionId) {
                const section = this.findSection(this.data.sections, sectionId);
                if (!section) return;
                
                // Remove tags from heading
                // Replace #tag followed by space with nothing, or #tag at end with nothing
                if (section.heading) {
                    section.heading = section.heading.replace(/#[\p{L}\p{N}_]+\s+/gu, '').replace(/#[\p{L}\p{N}_]+$/gu, '');
                    section.heading = section.heading.trim();
                }
                
                // Remove tags from body
                if (section.body) {
                    section.body = section.body.replace(/#[\p{L}\p{N}_]+\s+/gu, '').replace(/#[\p{L}\p{N}_]+$/gmu, '');
                }
                
                this.render();
            },

            toggleTask(sectionId, taskIndex) {
                const section = this.findSection(this.data.sections, sectionId);
                if (!section || !section.body) return;
                
                const lines = section.body.split('\n');
                let currentTaskIndex = 0;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    const taskMatch = line.match(/^(\s*)-\s+\[([ xX])\](.*)$/);
                    
                    if (taskMatch) {
                        if (currentTaskIndex === taskIndex) {
                            // Found the task to toggle
                            const indent = taskMatch[1];
                            const checked = taskMatch[2] !== ' ';
                            const rest = taskMatch[3];
                            
                            // Toggle the checkbox
                            lines[i] = `${indent}- [${checked ? ' ' : 'x'}]${rest}`;
                            section.body = lines.join('\n');
                            this.render();
                            return;
                        }
                        currentTaskIndex++;
                    }
                }
            },

            extractTags(text) {
                // Extract all tags from text (format: #tag)
                // Case insensitive, supports Unicode letters (including Czech)
                if (!text) return [];
                // Use \p{L} for Unicode letters and \p{N} for numbers
                const tagRegex = /#([\p{L}\p{N}_]+)/gu;
                const tags = [];
                let match;
                while ((match = tagRegex.exec(text)) !== null) {
                    tags.push(match[1].toLowerCase());
                }
                return tags;
            },

            getAllTags() {
                // Get all tags from all sections with counts
                const tagCounts = {};
                
                const processSections = (sections) => {
                    sections.forEach(section => {
                        // Extract from heading
                        const headingTags = this.extractTags(section.heading);
                        headingTags.forEach(tag => {
                            tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                        });
                        
                        // Extract from body
                        const bodyTags = this.extractTags(section.body);
                        bodyTags.forEach(tag => {
                            tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                        });
                        
                        // Process children
                        if (section.children.length > 0) {
                            processSections(section.children);
                        }
                    });
                };
                
                processSections(this.data.sections);
                
                // Convert to sorted array - alphabetically (case insensitive)
                return Object.entries(tagCounts)
                    .map(([tag, count]) => ({ tag, count }))
                    .sort((a, b) => a.tag.localeCompare(b.tag, 'cs', { sensitivity: 'base' }));
            },

            sectionContainsTag(section, tag) {
                // Check if section contains the tag (case insensitive)
                const headingTags = this.extractTags(section.heading);
                const bodyTags = this.extractTags(section.body);
                const allTags = [...headingTags, ...bodyTags];
                return allTags.includes(tag.toLowerCase());
            },

            filterByTag(tag) {
                this.activeTagFilter = tag.toLowerCase();
                this.render();
            },

            clearTagFilter() {
                this.activeTagFilter = null;
                this.render();
            },

            setSearchQuery(query) {
                this.searchQuery = query.trim();
                this.render();
            },

            clearSearch() {
                this.searchQuery = '';
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.value = '';
                this.render();
            },

            sectionMatchesSearch(section, query) {
                // Check if section heading or body contain the search query (case insensitive)
                if (!query) return true;
                const lowerQuery = query.toLowerCase();
                const headingMatches = section.heading && section.heading.toLowerCase().includes(lowerQuery);
                const bodyMatches = section.body && section.body.toLowerCase().includes(lowerQuery);
                return headingMatches || bodyMatches;
            },

            makeTagsClickable(html, sectionId, fieldType) {
                // Replace #tag with clickable links and delete icon
                // fieldType: 'heading' or 'body'
                // Supports Unicode letters (including Czech)
                let offset = 0;
                return html.replace(/#([\p{L}\p{N}_]+)/gu, (match, tag, position) => {
                    const currentOffset = offset;
                    offset++;
                    return `<a href="#" onclick="event.preventDefault(); app.filterByTag('${tag}'); return false;" style="color: #1890ff; text-decoration: none; font-weight: 600; cursor: pointer;">#${tag}</a><sup><a href="#" onclick="event.preventDefault(); app.removeTagAtPosition(${sectionId}, '${fieldType}', ${currentOffset}); return false;" style="color: #ff4d4f; text-decoration: none; font-size: 0.7em; cursor: pointer; margin-left: 2px;">🗑️</a></sup>`;
                });
            },

            makeEditorLinksClickable(html, sectionId) {
                // Replace editor URLs with buttons
                // Handles URLs already converted to <a> tags by marked.js
                
                const editorTypes = [
                    { file: 'opml-editor.html', label: this.t('openInOpmlEditor') },
                    { file: 'markdown-editor.html', label: this.t('openInMarkdownEditor') },
                    { file: 'json-editor.html', label: this.t('openInJsonEditor') }
                ];
                
                let result = html;
                
                editorTypes.forEach(({file, label}) => {
                    // Match <p><a href="...">...</a></p> or just <a href="...">...</a> with editor URLs
                    const fileEscaped = file.replace('.', '\\.');
                    const pattern = new RegExp(
                        `(<p>\\s*)?<a\\s+href="(https?://[^"]*${fileEscaped}[^"]*)"[^>]*>.*?</a>(\\s*</p>)?`,
                        'gi'
                    );
                    
                    result = result.replace(pattern, (match, pOpen, url, pClose) => {
                        // Use encodeURIComponent for safe storage
                        const encodedUrl = encodeURIComponent(url);
                        return `<div class="editor-link-button">
                            <button class="btn-small btn-primary" onclick="app.openEditorLinkEncoded('${encodedUrl}', ${sectionId})">${label}</button>
                        </div>`;
                    });
                });
                
                return result;
            },

            openEditorLinkEncoded(encodedUrl, sectionId) {
                // Open the editor URL in a new window and start editing the section
                const url = decodeURIComponent(encodedUrl);
                window.open(url, '_blank');
                this.editSection(sectionId);
            },

            removeTagAtPosition(sectionId, fieldType, tagIndex) {
                const section = this.findSection(this.data.sections, sectionId);
                if (!section) return;
                
                const field = fieldType === 'heading' ? 'heading' : 'body';
                if (!section[field]) return;
                
                // Find the Nth tag and remove it with trailing space if present
                const tagRegex = /#[\p{L}\p{N}_]+\s?/gu;
                let currentIndex = 0;
                
                section[field] = section[field].replace(tagRegex, (match) => {
                    if (currentIndex === tagIndex) {
                        currentIndex++;
                        return ''; // Remove this tag
                    }
                    currentIndex++;
                    return match; // Keep this tag
                });
                
                section[field] = section[field].trim();
                this.render();
            },
            
            countChangedStats(section) {
                // Count characters and words that have been added/changed since last save
                const isNew = this.isNewSection(section.id);
                const hasHeadingChanged = this.hasChangedHeading(section);
                const hasBodyChanged = this.hasChangedBody(section);
                
                let changedChars = 0;
                let changedWords = 0;
                
                // If entire section is new, count all of it
                if (isNew) {
                    const text = (section.heading || '') + ' ' + (section.body || '');
                    changedChars = text.length;
                    changedWords = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                } else {
                    // Count only changed parts
                    if (hasHeadingChanged) {
                        changedChars += (section.heading || '').length;
                        changedWords += (section.heading || '').trim().split(/\s+/).filter(w => w.length > 0).length;
                    }
                    if (hasBodyChanged) {
                        changedChars += (section.body || '').length;
                        changedWords += (section.body || '').trim().split(/\s+/).filter(w => w.length > 0).length;
                    }
                }
                
                // Add children recursively
                section.children.forEach(child => {
                    const childStats = this.countChangedStats(child);
                    changedChars += childStats.changedChars;
                    changedWords += childStats.changedWords;
                });
                
                return { changedChars, changedWords };
            },

            findSectionWithParent(sections, id, parent) {
                for (let i = 0; i < sections.length; i++) {
                    const section = sections[i];
                    if (section.id === id) {
                        return { section, parent, index: i };
                    }
                    if (section.children.length > 0) {
                        const found = this.findSectionWithParent(section.children, id, section);
                        if (found) return found;
                    }
                }
                return null;
            },

            updateHeading(id, heading) {
                const section = this.findSection(this.data.sections, id);
                if (section) {
                    section.heading = heading;
                }
            },

            updateBody(id, body) {
                const section = this.findSection(this.data.sections, id);
                if (section) section.body = body;
            },

            isNewSection(id) {
                if (!this.originalData) return false;
                return !this.findSection(this.originalData.sections, id);
            },

            hasChangedHeading(section) {
                if (!this.originalData) return false;
                const original = this.findSection(this.originalData.sections, section.id);
                if (!original) return false;
                return original.heading !== section.heading;
            },

            hasChangedBody(section) {
                if (!this.originalData) return false;
                const original = this.findSection(this.originalData.sections, section.id);
                if (!original) return false;
                return original.body !== section.body;
            },

            getSectionPosition(sections, id, parentSections = null) {
                const targetSections = parentSections || sections;
                for (let i = 0; i < targetSections.length; i++) {
                    if (targetSections[i].id === id) {
                        return { index: i + 1, total: targetSections.length };
                    }
                    if (targetSections[i].children.length > 0) {
                        const found = this.getSectionPosition(sections, id, targetSections[i].children);
                        if (found) return found;
                    }
                }
                return null;
            },

            canIncreaseLevel(id) {
                const result = this.findSectionWithParent(this.data.sections, id, null);
                return result && result.index > 0;
            },

            canDecreaseLevel(id) {
                const result = this.findSectionWithParent(this.data.sections, id, null);
                return result && result.parent !== null;
            },

            renderSection(section) {
                const hasChildren = section.children.length > 0;
                const collapseIcon = hasChildren ? (section.collapsed ? '▶' : '▼') : '';
                const childrenCount = hasChildren ? this.countAllChildren(section) : 0;
                const isEditing = !this.viewOnly && this.editingSectionId === section.id; // Never edit in view-only mode
                
                const result = this.findSectionWithParent(this.data.sections, section.id, null);
                const canMoveUp = result && result.index > 0;
                const canMoveDown = result && result.index < (result.parent ? result.parent.children : this.data.sections).length - 1;
                const canIncrease = this.canIncreaseLevel(section.id);
                const canDecrease = this.canDecreaseLevel(section.id);

                const isNew = this.isNewSection(section.id);
                const hasHeadingChanged = this.hasChangedHeading(section);
                const hasBodyChanged = this.hasChangedBody(section);

                const position = this.getSectionPosition(this.data.sections, section.id);
                const positionText = position ? `${this.t('sectionOf')} ${position.index} ${this.t('of')} ${position.total}` : '';

                if (isEditing) {
                    return `
                        <li class="section-item ${section.collapsed ? 'collapsed' : ''}">
                            <article class="section-article" id="section-${section.id}" aria-label="${this.t('sectionOf')} ${this.t('level')} ${section.level}: ${this.escapeHtml(section.heading) || this.t('emptySection')}">
                                <div class="section-header edit-mode">
                                    <div class="section-controls">
                                        ${hasChildren ? `
                                            <button class="btn-icon" 
                                                    onclick="app.toggleCollapse(${section.id})"
                                                    aria-label="${section.collapsed ? this.t('expanded') : this.t('collapsed')} ${this.t('collapseSubsections')}"
                                                    aria-expanded="${!section.collapsed}">
                                                <span class="collapse-indicator">${collapseIcon}</span>
                                            </button>
                                        ` : '<div style="width: 28px;"></div>'}
                                    </div>
                                    <div class="section-content">
                                        <div class="level-indicator">${this.t('level')} ${section.level} ${positionText ? `· ${positionText}` : ''}</div>
                                        <input type="text" 
                                               class="section-heading-input" 
                                               value="${this.escapeHtml(section.heading)}"
                                               oninput="app.updateHeading(${section.id}, this.value)"
                                               placeholder="${this.t('titlePlaceholder')}"
                                               aria-label="${this.t('titlePlaceholder')}">
                                        
                                        <textarea class="section-body-textarea"
                                                  oninput="app.updateBody(${section.id}, this.value)"
                                                  placeholder="${this.t('contentPlaceholder')}"
                                                  aria-label="${this.t('contentPlaceholder')}">${this.escapeHtml(section.body)}</textarea>

                                        <div class="edit-mode-controls">
                                            <button class="btn-small btn-success" 
                                                    onclick="app.saveSection(${section.id})"
                                                    aria-label="${this.t('saveSection')}">
                                                ✓ ${this.t('saveSection')}
                                            </button>
                                        </div>

                                        <div class="item-actions">
                                            <button class="btn-small btn-secondary" 
                                                    onclick="app.addChild(${section.id})"
                                                    aria-label="${this.t('addSubsection')}">
                                                ➕ ${this.t('addSubsection')}
                                            </button>
                                            <button class="btn-small btn-secondary" 
                                                    onclick="app.addSibling(${section.id})"
                                                    aria-label="${this.t('addSibling')}">
                                                ➕ ${this.t('addSibling')}
                                            </button>
                                            <button class="btn-icon" 
                                                    onclick="app.moveUp(${section.id})"
                                                    ${!canMoveUp ? 'disabled' : ''}
                                                    aria-label="${this.t('moveUp')}"
                                                    title="${this.t('moveUp')}">
                                                ⬆️
                                            </button>
                                            <button class="btn-icon" 
                                                    onclick="app.moveDown(${section.id})"
                                                    ${!canMoveDown ? 'disabled' : ''}
                                                    aria-label="${this.t('moveDown')}"
                                                    title="${this.t('moveDown')}">
                                                ⬇️
                                            </button>
                                            <button class="btn-icon" 
                                                    onclick="app.increaseLevel(${section.id})"
                                                    ${!canIncrease ? 'disabled' : ''}
                                                    aria-label="${this.t('indentRight')}"
                                                    title="${this.t('indentRight')}">
                                                ➡️
                                            </button>
                                            <button class="btn-icon" 
                                                    onclick="app.decreaseLevel(${section.id})"
                                                    ${!canDecrease ? 'disabled' : ''}
                                                    aria-label="${this.t('outdentLeft')}"
                                                    title="${this.t('outdentLeft')}">
                                                ⬅️
                                            </button>
                                            <button class="btn-icon btn-danger" 
                                                    onclick="app.deleteSection(${section.id})"
                                                    aria-label="${this.t('deleteSection')}">
                                                🗑️
                                            </button>
                                            ${hasChildren ? `
                                            <button class="btn-icon" 
                                                    onclick="app.startPresentation(${section.id})"
                                                    aria-label="${this.t('presentButton')}"
                                                    title="${this.t('presentButton')}">
                                                🎬
                                            </button>
                                            ` : ''}
                                        </div>
                                    </div>
                                </div>
                                ${hasChildren ? `
                                    <ul class="section-children">
                                        ${section.children.map(child => this.renderSection(child)).join('')}
                                    </ul>
                                ` : ''}
                            </article>
                        </li>
                    `;
                } else {
                    const headingLevel = Math.min(section.level, 6);
                    const headingTag = `h${headingLevel}`;
                    
                    let headingText = this.escapeHtml(section.heading) || `<em>${this.t('emptySection')}</em>`;
                    
                    // Make tags clickable in heading
                    headingText = this.makeTagsClickable(headingText, section.id, 'heading');
                    
                    if (isNew) {
                        headingText = `<ins title="${this.t('newSection')}">${headingText}</ins>`;
                    } else if (hasHeadingChanged) {
                        headingText = `<ins title="${this.t('changedTitle')}">${headingText}</ins>`;
                    }
                    
                    const headingHtml = `<${headingTag}>${headingText}</${headingTag}>`;
                    
                    let bodyHtml = '';
                    const hasBody = section.body && section.body.trim().length > 0;
                    if (hasBody && !section.contentCollapsed) {
                        try {
                            let renderedBody = marked.parse(processDokuWikiTables(processCriticMarkup(section.body)));
                            
                            // Make task checkboxes clickable by adding data attributes
                            // marked.js adds disabled="" attribute, we need to remove it
                            // Count tasks in order to assign proper indices
                            let taskIndex = 0;
                            renderedBody = renderedBody.replace(/<input[^>]*type="checkbox"[^>]*>/g, (match) => {
                                const currentTaskIndex = taskIndex;
                                taskIndex++;
                                const isChecked = match.includes('checked');
                                const checkedAttr = isChecked ? 'checked' : '';
                                return `<input type="checkbox" ${checkedAttr} data-section-id="${section.id}" data-task-index="${currentTaskIndex}" onclick="app.toggleTask(${section.id}, ${currentTaskIndex}); event.stopPropagation();" style="cursor: pointer;">`;
                            });
                            
                            // Make tags clickable in body
                            renderedBody = this.makeTagsClickable(renderedBody, section.id, 'body');
                            
                            // Make editor URLs into clickable buttons
                            renderedBody = this.makeEditorLinksClickable(renderedBody, section.id);
                            
                            if (isNew || hasBodyChanged) {
                                renderedBody = `<ins title="${isNew ? this.t('newSection') : this.t('changedContent')}">${renderedBody}</ins>`;
                            }
                            bodyHtml = `<div class="section-body-display">${renderedBody}</div>`;
                        } catch (e) {
                            bodyHtml = `<div class="section-body-display">${this.escapeHtml(section.body)}</div>`;
                        }
                    }
                    
                    const contentCollapseIcon = section.contentCollapsed ? '▶' : '▼';

                    return `
                        <li class="section-item ${section.collapsed ? 'collapsed' : ''}">
                            <article class="section-article" id="section-${section.id}" aria-label="${this.t('sectionOf')} ${this.t('level')} ${section.level}: ${this.escapeHtml(section.heading) || this.t('emptySection')}">
                                <div class="section-header view-mode">
                                    <div class="section-controls">
                                        ${hasChildren ? `
                                            <button class="btn-icon" 
                                                    onclick="app.toggleCollapse(${section.id})"
                                                    aria-label="${section.collapsed ? this.t('expanded') : this.t('collapsed')} ${this.t('collapseSubsections')}"
                                                    aria-expanded="${!section.collapsed}"
                                                    title="${section.collapsed ? this.t('expanded') : this.t('collapsed')} ${this.t('collapseSubsections')}">
                                                <span class="collapse-indicator">${collapseIcon}</span>
                                            </button>
                                        ` : '<div style="width: 28px;"></div>'}
                                        ${hasBody ? `
                                            <button class="btn-icon" 
                                                    onclick="app.toggleContentCollapse(${section.id})"
                                                    aria-label="${section.contentCollapsed ? this.t('expanded') : this.t('collapsed')} ${this.t('collapseContent')}"
                                                    aria-expanded="${!section.contentCollapsed}"
                                                    title="${section.contentCollapsed ? this.t('expanded') : this.t('collapsed')} ${this.t('collapseContent')}"
                                                    style="background: #718096;">
                                                <span class="collapse-indicator">${contentCollapseIcon}</span>
                                            </button>
                                        ` : '<div style="width: 28px;"></div>'}
                                    </div>
                                    <div class="section-content">
                                        <div class="level-indicator">${this.t('level')} ${section.level} ${positionText ? `· ${positionText}` : ''}</div>
                                        <div class="section-heading-display">${headingHtml}</div>
                                        
                                        ${hasChildren ? (() => {
                                            const childStats = this.countVisibleChildren(section);
                                            const isFiltered = this.activeTagFilter || this.searchQuery;
                                            const filterInfo = isFiltered && childStats.visible < childStats.total 
                                                ? ` (${this.currentLanguage === 'cs' ? 'zobrazeno' : 'shown'} ${childStats.visible})` 
                                                : '';
                                            
                                            return `
                                                <div class="section-children-info">
                                                    📦 ${section.collapsed ? this.t('collapsed') : this.t('expanded')}, ${this.t('contains')} ${childStats.total} ${childStats.total === 1 ? this.t('section') : childStats.total <= 4 ? this.t('sections2to4') : this.t('sections5plus')}${filterInfo}
                                                </div>
                                            `;
                                        })() : ''}
                                        
                                        ${(() => {
                                            // Only show completion stats if there are children AND work-in-progress sections
                                            if (hasChildren) {
                                                const completion = this.countCompletionStats(section);
                                                const completed = completion.total - completion.wip;
                                                const percent = completion.total > 0 ? Math.round((completed / completion.total) * 100) : 0;
                                                
                                                if (completion.wip > 0) {
                                                    return `
                                                        <div class="section-children-info" style="background: #ffa940; color: #000000; border: 2px solid #d87a16;">
                                                            ✏️ ${completion.wip} ${this.t('workInProgress')}, ✓ ${completed} ${this.t('completed')} (${percent}%)
                                                        </div>
                                                    `;
                                                }
                                            }
                                            return '';
                                        })()}
                                        
                                        ${(() => {
                                            // Show task stats if there are tasks
                                            const taskStats = this.countTaskStats(section);
                                            if (taskStats.totalTasks > 0) {
                                                const percent = Math.round((taskStats.completedTasks / taskStats.totalTasks) * 100);
                                                return `
                                                    <div class="section-children-info" style="background: #52c41a; color: #ffffff; border: 2px solid #389e0d;">
                                                        ✓ ${taskStats.completedTasks}/${taskStats.totalTasks} ${this.t('tasksCompleted')} (${percent}%)
                                                    </div>
                                                `;
                                            }
                                            return '';
                                        })()}
                                        
                                        ${(() => {
                                            const stats = this.countCharactersAndWords(section);
                                            const changed = this.countChangedStats(section);
                                            
                                            let display = `
                                                <div class="section-children-info" style="background: #1890ff; color: #ffffff; border: 2px solid #0050b3;">
                                                    📊 ${stats.chars} ${this.t('characters')}, ${stats.words} ${this.t('words')}
                                            `;
                                            
                                            // Show changed stats if there are any changes
                                            if (changed.changedChars > 0 || changed.changedWords > 0) {
                                                display += ` | ➕ ${changed.changedChars} ${this.t('characters')}, ${changed.changedWords} ${this.t('words')} ${this.t('added')}`;
                                            }
                                            
                                            display += `</div>`;
                                            return display;
                                        })()}
                                        
                                        ${bodyHtml}

                                        ${!this.viewOnly ? `
                                        <div class="item-actions">
                                            ${(() => {
                                                // Show "Remove completed tasks" button if there are completed tasks
                                                const taskStats = this.countTaskStats(section);
                                                if (taskStats.completedTasks > 0) {
                                                    return `
                                                        <button class="btn-small btn-secondary" 
                                                                onclick="app.removeCompletedTasks(${section.id})"
                                                                aria-label="${this.t('removeCompletedTasks')}">
                                                            🗑️ ${this.t('removeCompletedTasks')}
                                                        </button>
                                                    `;
                                                }
                                                return '';
                                            })()}
                                            ${(() => {
                                                // Show "Remove tags" button if section contains tags
                                                const headingTags = this.extractTags(section.heading);
                                                const bodyTags = this.extractTags(section.body);
                                                if (headingTags.length > 0 || bodyTags.length > 0) {
                                                    return `
                                                        <button class="btn-small btn-secondary" 
                                                                onclick="app.removeTags(${section.id})"
                                                                aria-label="${this.t('removeTags')}">
                                                            🏷️ ${this.t('removeTags')}
                                                        </button>
                                                    `;
                                                }
                                                return '';
                                            })()}
                                            <button class="btn-small btn-primary" 
                                                    onclick="app.editSection(${section.id})"
                                                    aria-label="${this.t('editSection')}">
                                                ✏️ ${this.t('edit')}
                                            </button>
                                            <button class="btn-small btn-secondary" 
                                                    onclick="app.hoistSection(${section.id})"
                                                    aria-label="${this.t('isolateSection')}">
                                                🔍 ${this.t('isolate')}
                                            </button>
                                            ${hasChildren ? `
                                            <button class="btn-small btn-secondary" 
                                                    onclick="app.startPresentation(${section.id})"
                                                    aria-label="${this.t('presentButton')}">
                                                🎬 ${this.t('presentButton')}
                                            </button>
                                            ` : ''}
                                            <button class="btn-small btn-secondary" 
                                                    onclick="app.addChild(${section.id})"
                                                    aria-label="${this.t('addSubsection')}">
                                                ➕ ${this.t('addSubsection')}
                                            </button>
                                            <button class="btn-small btn-secondary" 
                                                    onclick="app.addSibling(${section.id})"
                                                    aria-label="${this.t('addSibling')}">
                                                ➕ ${this.t('addSibling')}
                                            </button>
                                            <button class="btn-icon btn-danger" 
                                                    onclick="app.deleteSection(${section.id})"
                                                    aria-label="${this.t('deleteSection')}">
                                                🗑️
                                            </button>
                                        </div>
                                        ` : ''}
                                    </div>
                                </div>
                                ${hasChildren ? `
                                    <ul class="section-children">
                                        ${section.children.map(child => this.renderSection(child)).join('')}
                                    </ul>
                                ` : ''}
                            </article>
                        </li>
                    `;
                }
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            render() {
                // Update toolbar
                this.renderToolbar();
                
                const emptyState = document.getElementById('emptyState');
                const editorArea = document.getElementById('editorArea');

                if (this.data.sections.length === 0) {
                    emptyState.innerHTML = `
                        <div class="empty-state-icon">📄</div>
                        <h2>${this.t('emptyStateTitle')}</h2>
                        <p>${this.t('emptyStateDesc')}</p>
                    `;
                    emptyState.style.display = 'block';
                    editorArea.style.display = 'none';
                } else {
                    emptyState.style.display = 'none';
                    editorArea.style.display = 'block';
                    
                    let filenameHtml = '';
                    if (this.data.filename) {
                        filenameHtml = `<div class="filename-display">📄 <strong>${this.t('fileLabel')}</strong> ${this.escapeHtml(this.data.filename)}</div>`;
                    }
                    
                    editorArea.innerHTML = `
                        ${filenameHtml}
                        <div style="padding: 30px;">
                            <ul id="sectionTree" class="section-tree"></ul>
                        </div>
                    `;
                    
                    const sectionTree = document.getElementById('sectionTree');
                    
                    // If hoisted, only show the hoisted section
                    let sectionsToRender = this.data.sections;
                    
                    // Apply search filter if active
                    if (this.searchQuery) {
                        const filterSectionsBySearch = (sections) => {
                            const filtered = [];
                            sections.forEach(section => {
                                if (this.sectionMatchesSearch(section, this.searchQuery)) {
                                    // Section matches - but also filter its children recursively
                                    const filteredChildren = section.children.length > 0 
                                        ? filterSectionsBySearch(section.children) 
                                        : [];
                                    filtered.push({
                                        id: section.id,
                                        heading: section.heading,
                                        body: section.body,
                                        level: section.level,
                                        collapsed: section.collapsed,
                                        children: filteredChildren
                                    });
                                } else if (section.children.length > 0) {
                                    // Section doesn't match - check children recursively
                                    const filteredChildren = filterSectionsBySearch(section.children);
                                    if (filteredChildren.length > 0) {
                                        // Create a proper copy with only filtered children
                                        filtered.push({
                                            id: section.id,
                                            heading: section.heading,
                                            body: section.body,
                                            level: section.level,
                                            collapsed: section.collapsed,
                                            children: filteredChildren
                                        });
                                    }
                                }
                            });
                            return filtered;
                        };
                        
                        sectionsToRender = filterSectionsBySearch(sectionsToRender);
                        
                        // Show search results banner
                        const searchCount = sectionsToRender.length;
                        const searchBanner = document.createElement('div');
                        searchBanner.style.cssText = 'background: #52c41a; border: 2px solid #389e0d; color: #ffffff; padding: 12px 20px; margin: 0 0 20px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;';
                        searchBanner.innerHTML = `
                            <span style="font-weight: 600;">🔍 ${this.t('searchResults')} "${this.escapeHtml(this.searchQuery)}" (${searchCount} ${this.t('sectionsFound')})</span>
                            <button class="btn-small btn-secondary" onclick="app.clearSearch()" aria-label="${this.t('clearSearch')}">
                                ❌ ${this.t('clearSearch')}
                            </button>
                        `;
                        sectionTree.parentElement.insertBefore(searchBanner, sectionTree);
                    }
                    
                    // Apply tag filter if active
                    if (this.activeTagFilter) {
                        const filterSectionsByTag = (sections) => {
                            const filtered = [];
                            sections.forEach(section => {
                                if (this.sectionContainsTag(section, this.activeTagFilter)) {
                                    // Section has tag - but also filter its children recursively
                                    const filteredChildren = section.children.length > 0 
                                        ? filterSectionsByTag(section.children) 
                                        : [];
                                    filtered.push({
                                        id: section.id,
                                        heading: section.heading,
                                        body: section.body,
                                        level: section.level,
                                        collapsed: section.collapsed,
                                        children: filteredChildren
                                    });
                                } else if (section.children.length > 0) {
                                    // Section doesn't have tag - check children recursively
                                    const filteredChildren = filterSectionsByTag(section.children);
                                    if (filteredChildren.length > 0) {
                                        // Create a proper copy with only filtered children
                                        filtered.push({
                                            id: section.id,
                                            heading: section.heading,
                                            body: section.body,
                                            level: section.level,
                                            collapsed: section.collapsed,
                                            children: filteredChildren
                                        });
                                    }
                                }
                            });
                            return filtered;
                        };
                        
                        sectionsToRender = filterSectionsByTag(sectionsToRender);
                        
                        // Show tag filter banner
                        const tagCount = sectionsToRender.length;
                        const tagBanner = document.createElement('div');
                        tagBanner.style.cssText = 'background: #1890ff; border: 2px solid #0050b3; color: #ffffff; padding: 12px 20px; margin: 0 0 20px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;';
                        tagBanner.innerHTML = `
                            <span style="font-weight: 600;">🏷️ ${this.t('tagFilter')} #${this.activeTagFilter} (${tagCount} ${this.t('sectionsWithTag')})</span>
                            <button class="btn-small btn-secondary" onclick="app.clearTagFilter()" aria-label="${this.t('clearFilter')}">
                                ❌ ${this.t('clearFilter')}
                            </button>
                        `;
                        sectionTree.parentElement.insertBefore(tagBanner, sectionTree);
                    }
                    
                    if (this.hoistedSectionId !== null) {
                        const hoistedSection = this.findSection(this.data.sections, this.hoistedSectionId);
                        if (hoistedSection) {
                            sectionsToRender = [hoistedSection];
                            
                            // Get breadcrumb path
                            const breadcrumbPath = this.getBreadcrumbPath(this.data.sections, this.hoistedSectionId);
                            let breadcrumbHtml = '';
                            if (breadcrumbPath && breadcrumbPath.length > 0) {
                                breadcrumbHtml = breadcrumbPath.map((section, index) => {
                                    const isLast = index === breadcrumbPath.length - 1;
                                    const heading = this.escapeHtml(section.heading) || this.t('emptySection');
                                    if (isLast) {
                                        return `<strong>${heading}</strong>`;
                                    } else {
                                        return `<a href="#" onclick="event.preventDefault(); app.hoistSection(${section.id}); app.render();" style="color: #000000; text-decoration: underline; font-weight: 600;">${heading}</a>`;
                                    }
                                }).join(' › ');
                            }
                            
                            // Add hoist indicator with breadcrumb
                            const hoistBanner = document.createElement('div');
                            hoistBanner.style.cssText = 'background: #fa8c16; border: 2px solid #d46b08; padding: 12px 20px; margin: 0 0 20px 0; border-radius: 6px;';
                            hoistBanner.innerHTML = `
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: ${breadcrumbHtml ? '8px' : '0'};">
                                    <span style="font-weight: 600; color: #000000;">🔍 ${this.t('hoistBanner')} "${this.escapeHtml(hoistedSection.heading) || this.t('emptySection')}" ${this.t('hoistBannerSuffix')}</span>
                                    <button class="btn-small btn-secondary" onclick="app.unhoistAll()" aria-label="${this.t('showAll')}">
                                        ↩️ ${this.t('showAll')}
                                    </button>
                                </div>
                                ${breadcrumbHtml ? `
                                    <div style="font-size: 14px; color: #000000; padding-top: 8px; border-top: 2px solid #ad4e00;">
                                        📍 ${breadcrumbHtml}
                                    </div>
                                ` : ''}
                            `;
                            sectionTree.parentElement.insertBefore(hoistBanner, sectionTree);
                        }
                    }
                    
                    sectionTree.innerHTML = sectionsToRender.map(section => this.renderSection(section)).join('');
                    
                    // Add tags panel at the bottom
                    const allTags = this.getAllTags();
                    if (allTags.length > 0) {
                        const tagsPanel = document.createElement('div');
                        tagsPanel.style.cssText = 'background: #f0f2f5; border: 2px solid #d9d9d9; padding: 16px 20px; margin: 30px 0 0 0; border-radius: 6px;';
                        tagsPanel.innerHTML = `
                            <h3 style="margin: 0 0 12px 0; font-size: 14px; font-weight: 600; color: #000000; text-transform: uppercase;">
                                🏷️ ${this.t('tags')}
                            </h3>
                            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                                ${allTags.map(({tag, count}) => `
                                    <a href="#" 
                                       onclick="event.preventDefault(); app.filterByTag('${tag}'); return false;" 
                                       style="display: inline-block; padding: 6px 12px; background: ${this.activeTagFilter === tag ? '#1890ff' : '#ffffff'}; color: ${this.activeTagFilter === tag ? '#ffffff' : '#000000'}; border: 2px solid #d9d9d9; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;"
                                       onmouseover="if(this.style.background !== 'rgb(24, 144, 255)') this.style.background='#e6f7ff'"
                                       onmouseout="if(this.style.background !== 'rgb(24, 144, 255)') this.style.background='#ffffff'">
                                        #${tag} <span style="opacity: 0.7;">(${count})</span>
                                    </a>
                                `).join('')}
                            </div>
                        `;
                        sectionTree.parentElement.appendChild(tagsPanel);
                    }
                }
                
                // Update page title after rendering
                this.updatePageTitle();
            }
        };

        // Initialize and render
        app.init();
        app.render();
        app.updatePageTitle();

        // Check for Markdown in URL on page load
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const markdownBase64 = urlParams.get('md');
            const viewOnlyParam = urlParams.get('v');
            
            // Enable view-only mode if &v parameter exists
            if (viewOnlyParam !== null) {
                app.viewOnly = true;
            }
            
            if (markdownBase64) {
                try {
                    // Convert URL-safe base64 back to standard base64
                    let standardBase64 = markdownBase64.replace(/-/g, '+').replace(/_/g, '/');
                    // Add padding if needed
                    while (standardBase64.length % 4) {
                        standardBase64 += '=';
                    }
                    
                    // Decode base64 to Markdown with proper UTF-8 handling
                    const binaryString = atob(standardBase64);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    const markdown = new TextDecoder('utf-8').decode(bytes);
                    
                    app.parseMarkdown(markdown);
                    app.data.filename = 'z-url.md';
                    app.originalData = JSON.parse(JSON.stringify(app.data));
                    app.editingSectionId = null;
                    app.render();
                } catch (error) {
                    alert(app.t('errorLoadUrl') + ' ' + error.message);
                }
            }
        })();
        
        // DokuWiki Integration
        (function() {
            // Save to Wiki function
            window.saveToWiki = function() {
                if (!window.opener) {
                    alert('Tato funkce funguje pouze při otevření z DokuWiki');
                    return;
                }
                
                try {
                    var json = JSON.stringify(app.data);
                    var bytes = new TextEncoder().encode(json);
                    var binary = '';
                    for (var i = 0; i < bytes.length; i++) {
                        binary += String.fromCharCode(bytes[i]);
                    }
                    var base64 = btoa(binary);
                    
                    window.opener.postMessage({
                        type: 'saveData',
                        editorId: window.dokuwikiEditorId,
                        base64: base64
                    }, '*');
                } catch (e) {
                    alert('Chyba: ' + e.message);
                }
            };
            
            // Listen for messages from parent
            window.addEventListener('message', function(event) {
                var data = event.data;
                if (!data || !data.type) return;
                
                if (data.type === 'loadData') {
                    window.dokuwikiEditorId = data.editorId;
                    if (data.data) {
                        try {
                            var binary = atob(data.data);
                            var bytes = new Uint8Array(binary.length);
                            for (var i = 0; i < binary.length; i++) {
                                bytes[i] = binary.charCodeAt(i);
                            }
                            var json = new TextDecoder('utf-8').decode(bytes);
                            var parsed = JSON.parse(json);
                            app.data = parsed;
                            app.originalData = JSON.parse(JSON.stringify(parsed));
                            app.editingSectionId = null;
                            
                            // Find max ID and set sectionCounter
                            function findMaxId(sections) {
                                var maxId = 0;
                                if (!sections) return maxId;
                                for (var i = 0; i < sections.length; i++) {
                                    if (sections[i].id && sections[i].id > maxId) {
                                        maxId = sections[i].id;
                                    }
                                    if (sections[i].children) {
                                        var childMax = findMaxId(sections[i].children);
                                        if (childMax > maxId) maxId = childMax;
                                    }
                                }
                                return maxId;
                            }
                            app.sectionCounter = findMaxId(parsed.sections);
                            
                            app.render();
                        } catch (e) {
                            console.error('Load error:', e);
                        }
                    }
                }
                
                if (data.type === 'saveStatus') {
                    if (data.status === 'saved') {
                        alert('Uloženo!');
                    }
                }
                
                if (data.type === 'saveError') {
                    alert('Chyba při ukládání: ' + data.error);
                }
            }, false);
        })();
    </script>
</body>
</html>
