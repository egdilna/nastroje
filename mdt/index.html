  function findContaining(start, end) {
    for (const r of repeats) {
      if (start >= r.bodyStart && end <= r.bodyEnd) return r;
    }
    return null;
  }

  // Move inner placeholders into their containing repeat
  const globalPh = [];
  for (const ph of placeholders) {
    const r = findContaining(ph.start, ph.end);
    if (r) {
      const adj = Object.assign({}, ph);
      adj.start = ph.start - r.bodyStart;
      adj.end = ph.end - r.bodyStart;
      adj.idx = r.placeholders.length;
      adj.isMirror = false; // will be re-detected within repeat scope
      r.placeholders.push(adj);
    } else {
      globalPh.push(ph);
    }
  }
  // Re-index global placeholders and re-detect mirrors
  placeholders = globalPh;
  for (let i = 0; i < placeholders.length; i++) placeholders[i].idx = i;
  let seen = new Set();
  for (const ph of placeholders) {
    ph.isMirror = false;
    if (ph.dedupKey) {
      if (seen.has(ph.dedupKey)) ph.isMirror = true;
      else seen.add(ph.dedupKey);
    }
  }
  // Detect mirrors within each repeat
  for (const r of repeats) {
    seen = new Set();
    for (const ph of r.placeholders) {
      if (ph.dedupKey) {
        if (seen.has(ph.dedupKey)) ph.isMirror = true;
        else seen.add(ph.dedupKey);
      }
    }
  }

  // Move inner instructions
  const globalIns = [];
  for (const ins of instructions) {
    const r = findContaining(ins.start, ins.end);
    if (r) {
      const adj = Object.assign({}, ins);
      adj.start = ins.start - r.bodyStart;
      adj.end = ins.end - r.bodyStart;
      adj.idx = r.instructions.length;
      r.instructions.push(adj);
    } else {
      globalIns.push(ins);
    }
  }
  instructions = globalIns;
  for (let i = 0; i < instructions.length; i++) instructions[i].idx = i;

  // Move inner inline tables
  const globalTbl = [];
  for (const tbl of inlineTables) {
    const r = findContaining(tbl.start, tbl.end);
    if (r) {
      const adj = Object.assign({}, tbl);
      adj.start = tbl.start - r.bodyStart;
      adj.end = tbl.end - r.bodyStart;
      adj.idx = r.inlineTables.length;
      r.inlineTables.push(adj);
    } else {
      globalTbl.push(tbl);
    }
  }
  inlineTables = globalTbl;
  for (let i = 0; i < inlineTables.length; i++) inlineTables[i].idx = i;

  return {placeholders: placeholders, instructions: instructions, inlineTables: inlineTables, repeats: repeats};
}

function loadTemplate(text, name) {
  // Normalize line endings: handle CR-only (old Mac) and CRLF (Windows) → LF.
  text = String(text == null ? '' : text).replace(/\uFEFF/g, '').replace(/\r\n?/g, '\n');
  state.templateText = text;
  state.templateName = name || 'sablona';
  const parsed = parseTemplateStructure(text);
  state.placeholders = parsed.placeholders;
  state.instructions = parsed.instructions;
  state.inlineTables = parsed.inlineTables;
  state.repeats = parsed.repeats;
  state.values = {};
  // Pre-populate inline-table values with their original rows so toggling between modes is consistent.
  for (const tbl of state.inlineTables) {
    const initial = tbl.rows.map(function(arr) {
      const o = {};
      for (let k = 0; k < tbl.headers.length; k++) o[tbl.headers[k]] = arr[k] || '';
      return o;
    });
    state.values['__inline_table_' + tbl.idx] = initial;
  }
  // Initialize each repeat with one empty instance.
  for (const rep of state.repeats) {
    state.values['__repeat_' + rep.idx] = [createEmptyRepeatInstance(rep)];
  }
  state.mode = 'preview';
  setMode('preview');
  showWorkUI();
  renderMode();
  updateMissingStatus();
}

function createEmptyRepeatInstance(rep) {
  // An instance is an object whose keys mirror state.values' scheme but are scoped to this instance.
  // Pre-populate inline tables with their original rows so toggling between modes is consistent.
  const inst = {};
  for (const tbl of rep.inlineTables) {
    inst['__inline_table_' + tbl.idx] = tbl.rows.map(function(arr) {
      const o = {};
      for (let k = 0; k < tbl.headers.length; k++) o[tbl.headers[k]] = arr[k] || '';
      return o;
    });
  }
  return inst;
}

/* ---- Rozpracovaná verze (.mdd, draft) ---- */

const DRAFT_FORMAT = 'sablonar-draft';

function tryParseDraft(text) {
  // Returns the parsed draft object if `text` looks like a sablonar draft, otherwise null.
  if (!text || text.length === 0) return null;
  // Quick sniff: must start (after optional BOM/whitespace) with `{`.
  const trimmed = text.replace(/^\uFEFF/, '').trimStart();
  if (trimmed.charAt(0) !== '{') return null;
  let parsed;
  try { parsed = JSON.parse(trimmed); } catch (_) { return null; }
  if (!parsed || typeof parsed !== 'object') return null;
  if (parsed.format !== DRAFT_FORMAT) return null;
  if (typeof parsed.templateText !== 'string') return null;
  return parsed;
}

function loadDraft(draft, fallbackName, sourceLabel) {
  // Normalize line endings in stored template text.
  state.templateText = String(draft.templateText == null ? '' : draft.templateText).replace(/\uFEFF/g, '').replace(/\r\n?/g, '\n');
  state.templateName = draft.templateName || fallbackName || 'sablona';
  const parsed = parseTemplateStructure(state.templateText);
  state.placeholders = parsed.placeholders;
  state.instructions = parsed.instructions;
  state.inlineTables = parsed.inlineTables;
  state.repeats = parsed.repeats;
  state.values = (draft.values && typeof draft.values === 'object') ? draft.values : {};
  // Ensure inline tables have at least their original content if the draft didn't include them.
  for (const tbl of state.inlineTables) {
    const key = '__inline_table_' + tbl.idx;
    if (!Array.isArray(state.values[key])) {
      state.values[key] = tbl.rows.map(function(arr) {
        const o = {};
        for (let k = 0; k < tbl.headers.length; k++) o[tbl.headers[k]] = arr[k] || '';
        return o;
      });
    }
  }
  // Ensure each repeat has at least an empty instances array.
  for (const rep of state.repeats) {
    const key = '__repeat_' + rep.idx;
    if (!Array.isArray(state.values[key])) {
      state.values[key] = [createEmptyRepeatInstance(rep)];
    }
  }
  const m = (draft.mode === 'preview' || draft.mode === 'fill' || draft.mode === 'result')
    ? draft.mode : 'fill';
  state.mode = m;
  setMode(m);
  showWorkUI();
  renderMode();
  updateMissingStatus();
  let extra = '';
  if (draft.savedAt) {
    const d = new Date(draft.savedAt);
    if (!isNaN(d.getTime())) extra = ' (uloženo ' + d.toLocaleString('cs-CZ') + ')';
  }
  setStatus('ok', 'Načtena rozpracovaná šablona' + (sourceLabel ? ' z ' + sourceLabel : '') + extra + '.');
}

function loadFromText(text, name, sourceLabel) {
  // Auto-detect: JSON draft (.mdd) or raw template (.mdt).
  // Wrap each step so any error is reported with what we were doing when it threw.
  let stage = 'detekce typu (.mdd vs .mdt)';
  try {
    const draft = tryParseDraft(text);
    if (draft) {
      stage = 'načtení rozpracované verze (.mdd)';
      loadDraft(draft, name, sourceLabel);
    } else {
      stage = 'načtení šablony (.mdt)';
      loadTemplate(text, name);
      setStatus('ok', 'Načteno' + (sourceLabel ? ': ' + sourceLabel : '') + '.');
    }
  } catch (err) {
    showLoadError('Chyba při ' + stage + ': ' + (err && err.message ? err.message : String(err)), err);
    throw err; // let outer catch (in loadFromUrl) also see it
  }
}

function showLoadError(msg, err) {
  setStatus('err', msg);
  // Show diagnostic detail directly on page (not in browser console).
  const s = $('#status');
  if (err && err.stack) {
    const pre = el('pre', {style: {
      fontSize: '0.8rem', whiteSpace: 'pre-wrap',
      margin: '0.4rem 0 0', padding: '0.4rem 0.6rem',
      background: '#fff5f5', border: '1px solid #f5b5b5', borderRadius: '4px',
      maxHeight: '14rem', overflow: 'auto'
    }});
    pre.textContent = String(err.stack);
    s.appendChild(pre);
  }
  // Also offer recovery: open the source editor with the raw text so the user can inspect/repair it.
  if (state.templateText) {
    const btn = el('button', {
      type: 'button',
      style: {marginTop: '0.4rem'},
      text: '✏ Otevřít zdroj šablony k opravě',
      onclick: openSourceEditor,
    });
    s.appendChild(btn);
  }
}

function loadFromFile(file) {
  const reader = new FileReader();
  reader.onload = function() {
    try {
      const text = String(reader.result);
      const name = (file.name || 'sablona').replace(/\.[^.]+$/, '');
      loadFromText(text, name, file.name);
    } catch (err) {
      setStatus('err', 'Chyba při zpracování souboru: ' + err.message);
      if (err.stack) {
        const s = $('#status');
        const pre = el('pre', {style: {fontSize: '0.8rem', whiteSpace: 'pre-wrap', margin: '0.4rem 0 0', maxHeight: '12rem', overflow: 'auto'}});
        pre.textContent = String(err.stack);
        s.appendChild(pre);
      }
    }
  };
  reader.onerror = function() {
    setStatus('err', 'Chyba při čtení souboru.');
  };
  reader.readAsText(file, 'utf-8');
}

function loadFromUrl(url) {
  setStatus('info', 'Načítám: ' + url);
  fetch(url, {cache: 'no-cache'})
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      const name = url.split('/').pop().replace(/\?.*$/, '').replace(/\.[^.]+$/, '') || 'sablona';
      loadFromText(text, name, 'URL ' + url);
    })
    .catch(function(err) {
      // Distinguish network/CORS errors from JS runtime errors during processing.
      const isNetworkError = (err.name === 'TypeError' && /failed to fetch|networkerror|load failed/i.test(err.message))
        || /^HTTP \d+$/.test(err.message);
      const hint = isNetworkError ? ' (možná blokuje CORS nebo je URL nedostupná)' : '';
      setStatus('err', 'Chyba načtení z URL: ' + err.message + hint);
      // Surface the stack on the page for diagnosis (rather than a hidden console).
      if (!isNetworkError && err.stack) {
        const s = $('#status');
        const pre = el('pre', {style: {fontSize: '0.8rem', whiteSpace: 'pre-wrap', margin: '0.4rem 0 0', maxHeight: '12rem', overflow: 'auto'}});
        pre.textContent = String(err.stack);
        s.appendChild(pre);
      }
    });
}

/* ============================================================
 * UKLÁDÁNÍ
 * ============================================================ */

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function() {
    URL.revokeObjectURL(url);
    if (a.parentNode) a.parentNode.removeChild(a);
  }, 200);
}

function saveMdt() {
  if (!state.templateText) {
    setStatus('err', 'Není načtená žádná šablona.');
    return;
  }
  const blob = new Blob([state.templateText], {type: 'text/markdown;charset=utf-8'});
  downloadBlob(blob, state.templateName + '.mdt');
  setStatus('ok', 'Uloženo jako ' + state.templateName + '.mdt');
}

function saveMdd() {
  if (!state.templateText) {
    setStatus('err', 'Není načtená žádná šablona.');
    return;
  }
  const draft = {
    format: DRAFT_FORMAT,
    version: 1,
    templateName: state.templateName,
    savedAt: new Date().toISOString(),
    mode: state.mode,
    templateText: state.templateText,
    values: state.values,
  };
  const json = JSON.stringify(draft, null, 2);
  const blob = new Blob([json], {type: 'application/json;charset=utf-8'});
  downloadBlob(blob, state.templateName + '.mdd');
  setStatus('ok', 'Uloženo jako ' + state.templateName + '.mdd (rozpracovaná verze).');
}

function saveMd() {
  const filled = substituteFilled(state.templateText, state.placeholders, state.instructions, state.inlineTables, state.repeats);
  const blob = new Blob([filled], {type: 'text/markdown;charset=utf-8'});
  downloadBlob(blob, state.templateName + '.md');
  setStatus('ok', 'Uloženo jako ' + state.templateName + '.md');
}

function copyMd() {
  const filled = substituteFilled(state.templateText, state.placeholders, state.instructions, state.inlineTables, state.repeats);
  if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
    navigator.clipboard.writeText(filled).then(function() {
      setStatus('ok', 'Vyplněný markdown zkopírován do schránky (' + filled.length + ' znaků).');
    }).catch(function(err) {
      copyMdFallback(filled, err && err.message);
    });
  } else {
    copyMdFallback(filled, 'Clipboard API není dostupné.');
  }
}

function copyMdFallback(text, reason) {
  // Older-browser fallback: temporary textarea + execCommand('copy').
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('aria-hidden', 'true');
    ta.style.position = 'fixed';
    ta.style.top = '-1000px';
    ta.style.left = '-1000px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) {
      setStatus('ok', 'Vyplněný markdown zkopírován do schránky (' + text.length + ' znaků).');
    } else {
      setStatus('err', 'Kopírování selhalo' + (reason ? ': ' + reason : '') + '. Použijte „Vyplněný .md" pro stažení souboru.');
    }
  } catch (e) {
    setStatus('err', 'Kopírování selhalo: ' + e.message + '. Použijte „Vyplněný .md" pro stažení souboru.');
  }
}

/* ---- DOCX export ---- */

function saveDocx() {
  if (typeof docx === 'undefined') {
    setStatus('err', 'Knihovna docx není načtená — DOCX export není dostupný (zkontrolujte připojení).');
    return;
  }
  const filled = substituteFilled(state.templateText, state.placeholders, state.instructions, state.inlineTables, state.repeats);
  const blocks = parseMarkdown(filled);
  const doc = blocksToDocx(blocks);
  docx.Packer.toBlob(doc).then(function(blob) {
    downloadBlob(blob, state.templateName + '.docx');
    setStatus('ok', 'Uloženo jako ' + state.templateName + '.docx');
  }).catch(function(err) {
    setStatus('err', 'Chyba DOCX exportu: ' + err.message);
  });
}

function inlineToRuns(text) {
  // Returns array of TextRun configs based on simple inline markdown.
  const D = docx;
  const runs = [];
  // Tokenize: very simple — split by markers preserving them.
  // We'll handle **bold**, *italic*, `code` and plain text only.
  const re = /(\*\*[^*]+?\*\*)|(`[^`]+?`)|(\*[^*\s][^*]*?\*)/g;
  let last = 0;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) {
      runs.push(new D.TextRun({text: text.slice(last, m.index)}));
    }
    if (m[1]) {
      runs.push(new D.TextRun({text: m[1].slice(2, -2), bold: true}));
    } else if (m[2]) {
      runs.push(new D.TextRun({text: m[2].slice(1, -1), font: 'Consolas'}));
    } else if (m[3]) {
      runs.push(new D.TextRun({text: m[3].slice(1, -1), italics: true}));
    }
    last = m.index + m[0].length;
  }
  if (last < text.length) {
    runs.push(new D.TextRun({text: text.slice(last)}));
  }
  if (runs.length === 0) runs.push(new D.TextRun({text: ''}));
  return runs;
}

function blocksToDocx(blocks) {
  const D = docx;
  const HL = D.HeadingLevel;
  const headingMap = [
    HL.HEADING_1, HL.HEADING_2, HL.HEADING_3,
    HL.HEADING_4, HL.HEADING_5, HL.HEADING_6
  ];
  const children = [];
  for (const b of blocks) {
    if (b.type === 'heading') {
      const lvl = Math.min(Math.max(b.level, 1), 6);
      children.push(new D.Paragraph({
        heading: headingMap[lvl - 1],
        children: inlineToRuns(b.content),
      }));
    } else if (b.type === 'paragraph') {
      // Split content by newlines, each becomes paragraph (preserves textarea content)
      const segs = b.content.split('\n');
      for (const s of segs) {
        children.push(new D.Paragraph({children: inlineToRuns(s)}));
      }
    } else if (b.type === 'hr') {
      children.push(new D.Paragraph({
        border: {bottom: {color: '999999', space: 1, style: 'single', size: 6}},
        children: [new D.TextRun({text: ''})],
      }));
    } else if (b.type === 'code') {
      const segs = b.content.split('\n');
      for (const s of segs) {
        children.push(new D.Paragraph({
          children: [new D.TextRun({text: s, font: 'Consolas'})],
          shading: {type: 'clear', color: 'auto', fill: 'F4F4F4'},
        }));
      }
    } else if (b.type === 'blockquote') {
      // Detect SPOT blockquote (placeholder of type Spot was emitted as a blockquote
      // with "📍 **SPOT:**" prefix) and render as a distinctive bordered + shaded paragraph.
      const trimmed = b.content.trim();
      const spotMatch = trimmed.match(/^📍\s*\*\*SPOT:\*\*\s*([\s\S]*)$/);
      if (spotMatch) {
        const spotText = spotMatch[1].trim();
        children.push(new D.Paragraph({
          children: [
            new D.TextRun({text: '📍 SPOT: ', bold: true, color: 'B45309'}),
            new D.TextRun({text: spotText, italics: false}),
          ],
          shading: {type: 'clear', color: 'auto', fill: 'FFF3CD'},
          border: {
            top: {color: 'D4A017', space: 4, style: 'single', size: 6},
            bottom: {color: 'D4A017', space: 4, style: 'single', size: 6},
            left: {color: 'D4A017', space: 8, style: 'single', size: 24},
            right: {color: 'D4A017', space: 4, style: 'single', size: 6},
          },
          spacing: {before: 120, after: 120},
        }));
      } else {
        const segs = b.content.split('\n');
        for (const s of segs) {
          if (s.trim() === '') continue;
          children.push(new D.Paragraph({
            children: inlineToRuns(s),
            indent: {left: 720},
            border: {left: {color: '999999', space: 8, style: 'single', size: 12}},
          }));
        }
      }
    } else if (b.type === 'bullist') {
      for (const it of b.items) {
        children.push(new D.Paragraph({
          children: inlineToRuns(it),
          bullet: {level: 0},
        }));
      }
    } else if (b.type === 'numlist') {
      for (let i = 0; i < b.items.length; i++) {
        children.push(new D.Paragraph({
          children: inlineToRuns(b.items[i]),
          numbering: {reference: 'mdt-numbered', level: 0},
        }));
      }
    } else if (b.type === 'table') {
      const tblRows = [];
      // header
      tblRows.push(new D.TableRow({
        children: b.headers.map(function(c) {
          return new D.TableCell({
            children: [new D.Paragraph({
              children: [new D.TextRun({text: c, bold: true})]
            })],
            shading: {fill: 'EEEEEE'},
          });
        }),
        tableHeader: true,
      }));
      for (const r of b.rows) {
        tblRows.push(new D.TableRow({
          children: b.headers.map(function(_, ci) {
            return new D.TableCell({
              children: [new D.Paragraph({children: inlineToRuns(r[ci] || '')})],
            });
          }),
        }));
      }
      children.push(new D.Table({
        rows: tblRows,
        width: {size: 100, type: D.WidthType.PERCENTAGE},
      }));
      // empty paragraph after table
      children.push(new D.Paragraph({children: [new D.TextRun({text: ''})]}));
    }
  }

  const doc = new D.Document({
    creator: 'Šablonář MDT',
    title: state.templateName,
    numbering: {
      config: [{
        reference: 'mdt-numbered',
        levels: [{
          level: 0,
          format: 'decimal',
          text: '%1.',
          alignment: D.AlignmentType.START,
          style: {paragraph: {indent: {left: 720, hanging: 360}}},
        }],
      }],
    },
    sections: [{
      properties: {},
      children: children.length > 0 ? children : [new D.Paragraph({children: [new D.TextRun({text: ''})]})],
    }],
  });
  return doc;
}

/* ============================================================
 * REŽIMY
 * ============================================================ */

function setMode(mode) {
  state.mode = mode;
  const radios = $all('input[name="mode"]');
  for (const r of radios) {
    r.checked = (r.value === mode);
  }
  renderMode();
}

/* ============================================================
 * EDITACE ZDROJE
 * ============================================================ */

function openSourceEditor() {
  const view = $('#docview');
  view.innerHTML = '';
  const wrap = el('div');
  wrap.appendChild(el('h2', {text: 'Zdroj šablony (.mdt)'}));
  const ta = el('textarea', {
    rows: 25,
    style: {width: '100%', fontFamily: 'ui-monospace, Consolas, monospace', fontSize: '0.95rem'},
    'aria-label': 'Zdrojový text šablony',
  });
  ta.value = state.templateText;
  wrap.appendChild(ta);
  const acts = el('div', {style: {marginTop: '0.5rem', display: 'flex', gap: '0.4rem'}});
  acts.appendChild(el('button', {
    type: 'button',
    class: 'primary',
    text: '💾 Uložit změny do šablony',
    onclick: function() {
      const newText = ta.value.replace(/\uFEFF/g, '').replace(/\r\n?/g, '\n');
      state.templateText = newText;
      const parsed = parseTemplateStructure(newText);
      state.placeholders = parsed.placeholders;
      state.instructions = parsed.instructions;
      state.inlineTables = parsed.inlineTables;
      state.repeats = parsed.repeats;
      // Re-populate inline-table values for any new tables (preserve existing ones if still present).
      for (const tbl of state.inlineTables) {
        const key = '__inline_table_' + tbl.idx;
        if (!Array.isArray(state.values[key])) {
          state.values[key] = tbl.rows.map(function(arr) {
            const o = {};
            for (let k = 0; k < tbl.headers.length; k++) o[tbl.headers[k]] = arr[k] || '';
            return o;
          });
        }
      }
      // Initialize empty repeats; preserve existing instance counts where possible.
      for (const rep of state.repeats) {
        const key = '__repeat_' + rep.idx;
        if (!Array.isArray(state.values[key])) {
          state.values[key] = [createEmptyRepeatInstance(rep)];
        }
      }
      // Reset values that no longer have a matching placeholder? Keep all, harmless.
      setStatus('ok', 'Šablona aktualizována.');
      setMode(state.mode);
    }
  }));
  acts.appendChild(el('button', {
    type: 'button',
    text: 'Zrušit',
    onclick: function() { renderMode(); }
  }));
  wrap.appendChild(acts);
  view.appendChild(wrap);
}

/* ============================================================
 * INIT
 * ============================================================ */

function init() {
  // File input
  $('#file-in').addEventListener('change', function(e) {
    const f = e.target.files && e.target.files[0];
    if (f) loadFromFile(f);
    e.target.value = '';
  });
  // URL load
  $('#btn-url').addEventListener('click', function() {
    const u = $('#url-in').value.trim();
    if (!u) { setStatus('err', 'Zadejte URL.'); return; }
    loadFromUrl(u);
  });
  $('#url-in').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      $('#btn-url').click();
    }
  });
  // Mode radios
  $all('input[name="mode"]').forEach(function(r) {
    r.addEventListener('change', function() {
      if (r.checked) setMode(r.value);
    });
  });
  // Save buttons
  $('#btn-save-mdt').addEventListener('click', saveMdt);
  $('#btn-save-mdd').addEventListener('click', saveMdd);
  $('#btn-save-md').addEventListener('click', saveMd);
  $('#btn-copy-md').addEventListener('click', copyMd);
  $('#btn-save-docx').addEventListener('click', saveDocx);
  // Source edit
  $('#btn-edit-src').addEventListener('click', openSourceEditor);
  // New empty template
  $('#btn-new').addEventListener('click', function() {
    loadTemplate('# Nová šablona\n\n', 'sablona');
    setStatus('ok', 'Vytvořena nová prázdná šablona — upravte ji v režimu Zdroj.');
    // Auto-open the source editor for immediate editing.
    openSourceEditor();
  });
  // Clear values
  $('#btn-clear').addEventListener('click', function() {
    if (!confirm('Opravdu smazat všechny vyplněné hodnoty?')) return;
    state.values = {};
    // Restore initial rows for inline markdown tables (their content is part of the template).
    for (const tbl of state.inlineTables) {
      state.values['__inline_table_' + tbl.idx] = tbl.rows.map(function(arr) {
        const o = {};
        for (let k = 0; k < tbl.headers.length; k++) o[tbl.headers[k]] = arr[k] || '';
        return o;
      });
    }
    // Reset each repeat to one fresh empty instance.
    for (const rep of state.repeats) {
      state.values['__repeat_' + rep.idx] = [createEmptyRepeatInstance(rep)];
    }
    setMode(state.mode);
    setStatus('info', 'Vyplněné hodnoty byly vymazány.');
  });
  // URL parameter ?template=
  const params = new URLSearchParams(location.search);
  const tplUrl = params.get('template');
  if (tplUrl) {
    $('#url-in').value = tplUrl;
    loadFromUrl(tplUrl);
  } else {
    renderWelcome($('#docview'));
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
</body>
</html>
