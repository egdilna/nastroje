<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Šablonář MDT</title>
<style>
:root {
  --bg: #fafafa;
  --fg: #111;
  --muted: #666;
  --border: #c8c8c8;
  --accent: #0057a3;
  --accent-fg: #fff;
  --warn: #b54a00;
  --error: #b00020;
  --ph-text-bg: #fff3cd;
  --ph-text-bd: #d4a017;
  --ph-textarea-bg: #d4edda;
  --ph-textarea-bd: #2f7a3d;
  --ph-bull-bg: #d1ecf1;
  --ph-bull-bd: #1f7c8c;
  --ph-num-bg: #cce5ff;
  --ph-num-bd: #1a5fab;
  --ph-vol-bg: #e2d5f7;
  --ph-vol-bd: #5e3aa3;
  --ph-tbl-bg: #f8d7da;
  --ph-tbl-bd: #a32a35;
  --ph-spot-bg: #fff3cd;
  --ph-spot-bd: #d4a017;
  --ph-spot-fg: #5c4400;
  --instr-bg: #fff8e1;
  --instr-bd: #f59e0b;
  --instr-fg: #5d4400;
  --inline-tbl-bd: #804000;
  --form-bg: #fff;
  --row-alt: #f0f0f0;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.5;
}

a:focus, button:focus, input:focus, textarea:focus, select:focus {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}

.toolbar {
  /* legacy class — no longer used in markup */
}

button, .btn {
  background: #fff;
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 0.35rem 0.7rem;
  border-radius: 4px;
  font-size: 0.95rem;
  cursor: pointer;
  font-family: inherit;
}
button:hover, .btn:hover {
  background: #e8eef5;
}
button.primary {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
}
button.primary:hover {
  background: #003e75;
}
button.danger {
  background: var(--error);
  color: #fff;
  border-color: var(--error);
}
button[disabled] {
  opacity: 0.5;
  cursor: not-allowed;
}

input[type="text"], input[type="url"], input[type="search"], textarea, select {
  font-family: inherit;
  font-size: 1rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.3rem 0.5rem;
  background: var(--form-bg);
}
.url-input {
  min-width: 18rem;
}

.mode-radio {
  display: inline-flex;
  gap: 0.5rem;
  align-items: center;
}
.mode-radio label {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.25rem 0.5rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: #fff;
  cursor: pointer;
}
.mode-radio input[type="radio"]:checked + span {
  font-weight: bold;
}
.mode-radio label:has(input:checked) {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
}

.status-bar {
  padding: 0.5rem 1rem;
  border-bottom: 1px solid var(--border);
  background: #fffbe6;
  font-size: 0.95rem;
  min-height: 1.5rem;
}
.status-bar.ok { background: #e3f5e1; }
.status-bar.err { background: #fde2e2; color: var(--error); }
.status-bar.info { background: #e2efff; }
.status-bar:empty { display: none; }

/* Layout: NAV (full width) -> .app-layout (ASIDE + MAIN side by side via CSS Grid) */
.app-layout {
  display: grid;
  grid-template-columns: 1fr;  /* single column by default (no aside yet) */
}
.app-layout.with-aside {
  grid-template-columns: 12rem 1fr;
}

aside#mode-aside {
  background: #f0f0f0;
  border-right: 1px solid var(--border);
  padding: 0.6rem 0.7rem;
}
aside#mode-aside h2 {
  margin: 0 0 0.4rem;
  font-size: 0.85rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: normal;
}
aside#mode-aside .mode-radio {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 0.3rem;
}
aside#mode-aside .mode-radio label {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 0.5rem;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
}

main#app-main {
  background: #fff;
  min-width: 0;
}

#docview {
  padding: 1rem 1.5rem 4rem;
  max-width: 60rem;
  margin: 0 auto;
}

/* NAV — top toolbar with collapsible load section */
nav#app-nav {
  background: #f0f0f0;
  border-bottom: 1px solid var(--border);
  padding: 0.5rem 1rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}
nav#app-nav .grp {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  align-items: center;
}
nav#app-nav details {
  border: 1px solid var(--border);
  border-radius: 4px;
  background: #fff;
}
nav#app-nav details > summary {
  padding: 0.35rem 0.7rem;
  cursor: pointer;
  user-select: none;
  font-size: 0.95rem;
}
nav#app-nav details > summary:hover {
  background: #e8eef5;
}
nav#app-nav details > summary:focus {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}
nav#app-nav details[open] > summary {
  border-bottom: 1px solid var(--border);
}
nav#app-nav details > .grp {
  padding: 0.5rem 0.7rem;
}
nav#app-nav details .grp label[for="url-in"] {
  font-size: 0.9rem;
  color: var(--muted);
}
nav#app-nav .load-or {
  font-size: 0.85rem;
  color: var(--muted);
  padding: 0 0.4rem;
  white-space: nowrap;
}
nav#app-nav .load-grp {
  align-items: center;
}
nav#app-nav .load-grp label.load-file-label,
nav#app-nav .load-grp label.load-url-label {
  font-size: 0.95rem;
  color: var(--fg);
  font-weight: 500;
}
nav#app-nav .load-grp input[type="file"] {
  font-size: 0.95rem;
  padding: 0.2rem 0;
}
nav#app-nav .load-grp .load-sep {
  display: inline-block;
  width: 1px;
  height: 1.4rem;
  background: var(--border);
  margin: 0 0.3rem;
}

.vol-select {
  font-family: inherit;
  font-size: 0.95rem;
  padding: 0.15em 0.3em;
  border-radius: 3px;
  border: 1px solid var(--ph-vol-bd);
  background: #fff;
  margin-left: 0.3em;
}
nav#app-nav #work-toolbar {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  align-items: center;
}
nav#app-nav #work-toolbar[hidden] { display: none; }
nav#app-nav #work-toolbar .sep {
  display: inline-block;
  width: 1px;
  height: 1.4rem;
  background: var(--border);
  margin: 0 0.3rem;
}

.welcome {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 2rem;
  text-align: center;
}
.welcome h2 { margin-top: 0; }

#docview h1 { font-size: 1.7rem; margin-top: 1.5em; }
#docview h2 { font-size: 1.4rem; margin-top: 1.3em; }
#docview h3 { font-size: 1.2rem; margin-top: 1.1em; }
#docview h4, #docview h5, #docview h6 { font-size: 1.05rem; margin-top: 1em; }
#docview p { margin: 0.6em 0; }
#docview ul, #docview ol { margin: 0.6em 0 0.6em 1.5em; }
#docview blockquote {
  border-left: 4px solid var(--border);
  margin: 0.6em 0;
  padding: 0.2em 0.8em;
  color: #444;
  background: #f7f7f7;
}
#docview pre {
  background: #f4f4f4;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.6em;
  overflow-x: auto;
}
#docview code {
  background: #f4f4f4;
  padding: 0 0.3em;
  border-radius: 3px;
  font-size: 0.95em;
}
#docview pre code { background: transparent; padding: 0; }
#docview hr {
  border: 0;
  border-top: 1px solid var(--border);
  margin: 1.2em 0;
}
#docview table.md-table {
  border-collapse: collapse;
  margin: 0.7em 0;
  width: 100%;
}
#docview table.md-table th,
#docview table.md-table td {
  border: 1px solid var(--border);
  padding: 0.3em 0.5em;
  text-align: left;
  vertical-align: top;
}
#docview table.md-table thead th { background: #eee; }

/* === PLACEHOLDER STYLES === */

/* Preview mode (highlighted placeholders) */
.ph-marker {
  display: inline-block;
  padding: 0.05em 0.4em;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
  font-size: 0.92em;
  margin: 0 0.1em;
  background: #f7f7f7;
}
.ph-marker.ph-text { background: var(--ph-text-bg); border-color: var(--ph-text-bd); }
.ph-marker.ph-textarea { background: var(--ph-textarea-bg); border-color: var(--ph-textarea-bd); display: block; margin: 0.3em 0; padding: 0.3em 0.6em; }
.ph-marker.ph-bull { background: var(--ph-bull-bg); border-color: var(--ph-bull-bd); display: block; margin: 0.3em 0; padding: 0.3em 0.6em; }
.ph-marker.ph-num { background: var(--ph-num-bg); border-color: var(--ph-num-bd); display: block; margin: 0.3em 0; padding: 0.3em 0.6em; }
.ph-marker.ph-vol { background: var(--ph-vol-bg); border-color: var(--ph-vol-bd); }
.ph-marker.ph-tbl { background: var(--ph-tbl-bg); border-color: var(--ph-tbl-bd); display: block; margin: 0.3em 0; padding: 0.3em 0.6em; }
.ph-marker.ph-spot { background: var(--ph-spot-bg); border-color: var(--ph-spot-bd); border-left: 5px solid var(--ph-spot-bd); display: block; margin: 0.6em 0; padding: 0.5em 0.8em; color: var(--ph-spot-fg); font-weight: 500; }

/* Spot block — also used in result mode (rendered from blockquote) */
.spot-block {
  display: block;
  background: var(--ph-spot-bg);
  border: 1px solid var(--ph-spot-bd);
  border-left: 5px solid var(--ph-spot-bd);
  border-radius: 4px;
  padding: 0.6em 0.9em;
  margin: 0.6em 0;
  color: var(--ph-spot-fg);
}
.spot-block .spot-prefix {
  font-weight: bold;
  color: #b45309;
  margin-right: 0.3em;
}

/* Fill mode form elements */
.ph-form {
  display: inline-block;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.2em 0.4em;
  margin: 0.05em 0.1em;
  background: var(--form-bg);
  vertical-align: middle;
}
.ph-form.ph-block {
  display: block;
  margin: 0.5em 0;
  padding: 0.5em 0.7em;
}
.ph-form.ph-text { background: #fffdf3; border-color: var(--ph-text-bd); }
.ph-form.ph-textarea { background: #f5fbf5; border-color: var(--ph-textarea-bd); }
.ph-form.ph-bull { background: #f0f9fb; border-color: var(--ph-bull-bd); }
.ph-form.ph-num { background: #f0f5fc; border-color: var(--ph-num-bd); }
.ph-form.ph-vol { background: #f7f4fc; border-color: var(--ph-vol-bd); }
.ph-form.ph-tbl { background: #fcf3f4; border-color: var(--ph-tbl-bd); }

/* Instructions ({{{...}}}) */
.ph-instr {
  background: var(--instr-bg);
  color: var(--instr-fg);
  border: 1px dashed var(--instr-bd);
  border-radius: 4px;
  padding: 0.1em 0.45em;
  font-style: italic;
  font-size: 0.95em;
}
.ph-instr.is-block {
  display: block;
  margin: 0.6em 0;
  padding: 0.5em 0.8em;
  border-left: 4px solid var(--instr-bd);
  white-space: pre-wrap;
}
.ph-instr.is-inline {
  display: inline;
}
.ph-instr-icon {
  font-style: normal;
  margin-right: 0.3em;
  font-weight: bold;
  color: #b45309;
}

/* Inline editable markdown tables (in fill mode) */
.inline-tbl-wrap {
  display: block;
  margin: 0.6em 0;
  border: 1px dashed var(--inline-tbl-bd);
  border-radius: 4px;
  padding: 0.4em 0.6em;
  background: #fff8f0;
}
.inline-tbl-wrap > .inline-tbl-label {
  display: block;
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 0.3em;
}
.inline-tbl-wrap > .inline-tbl-label .ph-type {
  font-weight: bold;
  color: var(--inline-tbl-bd);
}

/* Repeat sections (Opakování) */
.rep-block {
  display: block;
  margin: 0.8em 0;
  border: 2px solid #6b35d1;
  border-radius: 6px;
  padding: 0.6em 0.8em;
  background: #f5f0ff;
}
.rep-block > legend {
  font-weight: bold;
  color: #4a1eb8;
  padding: 0 0.4em;
  background: #f5f0ff;
}
.rep-block.rep-preview > .rep-body {
  padding: 0.3em 0;
}
.rep-instances {
  display: block;
}
.rep-instance {
  display: block;
  margin: 0.6em 0;
  border: 1px solid #b39ee0;
  border-radius: 4px;
  padding: 0.5em 0.7em;
  background: #fefbff;
}
.rep-instance > legend {
  font-weight: bold;
  color: #6b35d1;
  padding: 0 0.4em;
  background: #fefbff;
  font-size: 0.95em;
}
.rep-instance-body {
  padding: 0.2em 0 0.4em 0;
}
.rep-instance-acts {
  display: flex;
  gap: 0.3em;
  margin-top: 0.4em;
  border-top: 1px solid #e0d4f5;
  padding-top: 0.4em;
}
.rep-instance-acts button {
  padding: 0.2em 0.6em;
  font-size: 0.9em;
}
.rep-footer {
  margin-top: 0.6em;
  padding-top: 0.4em;
  border-top: 1px dashed #b39ee0;
}
.rep-empty {
  padding: 0.6em 0.8em;
  margin: 0.4em 0;
  background: #fcf5e3;
  border: 1px dashed #d4a017;
  border-radius: 4px;
  color: #5c4400;
  font-style: italic;
}

/* Tabulka activator (optional Tabulka placeholder, before user creates it) */
.ph-tbl-activator {
  background: #fdf2e6;
  border-style: dashed;
}
.ph-tbl-activator .ph-tbl-act-hint {
  font-size: 0.85rem;
  color: var(--muted);
  margin: 0.3em 0 0.5em 0;
  font-style: italic;
}

button.btn-danger {
  background: #c0392b;
  color: #fff;
  border-color: #922b21;
}
button.btn-danger:hover, button.btn-danger:focus {
  background: #922b21;
}

.ph-form-label {
  display: block;
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 0.2em;
}
.ph-form-label .ph-type {
  font-weight: bold;
  color: var(--fg);
}

.ph-form input[type="text"], .ph-form textarea {
  width: 100%;
  font-family: inherit;
}
.ph-form input.inline-input {
  width: auto;
  min-width: 8rem;
}
.ph-form textarea {
  min-height: 3rem;
}

.ph-mirror {
  display: inline-block;
  background: #f5f5f5;
  border: 1px dashed #999;
  padding: 0 0.3em;
  border-radius: 3px;
  font-style: italic;
}
.ph-mirror.ph-empty { color: var(--muted); }
.ph-mirror.block { display: block; padding: 0.3em 0.5em; margin: 0.3em 0; }

/* Volba radios */
.vol-options {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.vol-options label {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.15rem 0.5rem;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: #fff;
  cursor: pointer;
}
.vol-options label:has(input:checked) {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
}

/* Item editor (Odrážky, Číslované) and Table editor */
.te-wrap {
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.4em;
  background: #fff;
  margin-top: 0.4em;
}
.te-tbl {
  border-collapse: collapse;
  width: 100%;
}
.te-tbl th, .te-tbl td {
  border: 1px solid var(--border);
  padding: 0.25em 0.4em;
  vertical-align: top;
  font-size: 0.95rem;
}
.te-tbl thead th {
  background: #ececec;
  font-weight: bold;
  text-align: left;
}
.te-tbl tbody tr:nth-child(odd) td { background: #fbfbfb; }

.te-cell {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  min-height: 1.5em;
}
.te-cell .te-cell-text {
  flex: 1;
  word-break: break-word;
}
.te-cell .te-cell-text.empty {
  color: var(--muted);
  font-style: italic;
}
.te-cell input.te-cell-input {
  flex: 1;
  font-size: 0.95rem;
  padding: 0.15em 0.3em;
}
.te-btn-cell {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0.05em 0.35em;
  font-size: 0.85rem;
  cursor: pointer;
  white-space: nowrap;
}

.te-row-acts {
  display: flex;
  flex-wrap: wrap;
  gap: 0.2em;
  white-space: nowrap;
}
.te-row-acts button {
  font-size: 0.85rem;
  padding: 0.05em 0.35em;
}

.te-foot {
  margin-top: 0.4em;
  display: flex;
  gap: 0.4em;
}

/* Item editor variant (single column) */
.ie-wrap {
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.4em;
  background: #fff;
  margin-top: 0.4em;
}
.ie-list {
  list-style: none;
  margin: 0;
  padding: 0;
}
.ie-list li {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.2em 0;
  border-bottom: 1px solid #eee;
}
.ie-list li:last-child { border-bottom: 0; }
.ie-num {
  min-width: 1.6em;
  text-align: right;
  color: var(--muted);
  font-size: 0.9rem;
}
.ie-bul {
  min-width: 1em;
  text-align: center;
  color: var(--muted);
}
.ie-text {
  flex: 1;
  word-break: break-word;
}
.ie-text.empty {
  color: var(--muted);
  font-style: italic;
}
.ie-input {
  flex: 1;
  font-size: 0.95rem;
  padding: 0.15em 0.3em;
}
.ie-acts {
  display: flex;
  gap: 0.2em;
}
.ie-foot {
  margin-top: 0.4em;
}

/* Result mode marker for unfilled */
.unfilled {
  background: #ffe6e6;
  border: 1px dashed var(--error);
  padding: 0 0.3em;
  border-radius: 3px;
  color: var(--error);
  font-style: italic;
}

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0);
  white-space: nowrap; border: 0;
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

@media (max-width: 800px) {
  nav#app-nav { padding: 0.4rem 0.6rem; }
  #docview { padding: 0.6rem 0.8rem 3rem; }
  .url-input { min-width: 12rem; }
  .app-layout.with-aside {
    grid-template-columns: 1fr;
  }
  aside#mode-aside {
    border-right: 0;
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 0.8rem;
  }
  aside#mode-aside .mode-radio {
    flex-direction: row;
    flex-wrap: wrap;
  }
}
</style>
</head>
<body>
<a class="sr-only" href="#docview" accesskey="m">Přeskočit na obsah dokumentu</a>

<nav id="app-nav" aria-label="Akce s šablonou">
  <details id="load-details" open>
    <summary>📂 Načíst nebo změnit šablonu</summary>
    <div class="grp load-grp">
      <label for="file-in" class="load-file-label">📂 Soubor:</label>
      <input id="file-in" type="file" accept=".mdt,.mdd,.md,.txt,.json,application/json,text/plain,text/markdown" accesskey="o">
      <span class="load-or" aria-hidden="true">— nebo —</span>
      <label for="url-in" class="load-url-label">🌐 URL:</label>
      <input id="url-in" class="url-input" type="url" placeholder="https://..." aria-label="URL šablony" accesskey="u">
      <button id="btn-url" type="button">Načíst z URL</button>
      <span class="load-sep" aria-hidden="true"></span>
      <button id="btn-new" type="button" title="Vytvořit novou prázdnou šablonu">📄 Nová</button>
      <button id="btn-edit-src" type="button" accesskey="z" title="Zobrazit/upravit zdrojový text šablony (Alt+Z)">✏ Zdroj</button>
      <button id="btn-save-mdt" type="button" title="Uložit šablonu jako .mdt">💾 Uložit .mdt</button>
    </div>
  </details>

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script>
(function() {
'use strict';

/* ============================================================
 * STAV APLIKACE
 * ============================================================ */

const state = {
  templateText: '',          // raw text šablony
  templateName: 'sablona',   // jméno souboru bez přípony
  placeholders: [],          // array of parsed placeholders
  instructions: [],          // array of parsed instructions {{{...}}}
  inlineTables: [],          // array of inline (mid-template) markdown tables
  repeats: [],               // array of [[[Opakování]]]…[[[/Opakování]]] sections
  values: {},                // map: dedupKey or __idx_N or __inline_table_N or __repeat_N -> value
  mode: 'preview',           // 'preview' | 'fill' | 'result'
};

const TYPES = {
  text: 'Text',
  textarea: 'Textarea',
  odrazky: 'Odrážky',
  cislovane: 'Číslované',
  volba: 'Volba',
  tabulka: 'Tabulka',
  spot: 'Spot',
};

const DEDUP_TYPES = ['Text', 'Textarea', 'Odrážky', 'Číslované'];
const BLOCK_TYPES = ['Textarea', 'Odrážky', 'Číslované', 'Tabulka', 'Spot'];

/* ============================================================
 * UTILITY
 * ============================================================ */

function $(sel, root) { return (root || document).querySelector(sel); }
function $all(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'text') e.textContent = attrs[k];
      else if (k === 'html') e.innerHTML = attrs[k];
      else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(e.style, attrs[k]);
      else if (k.startsWith('on') && typeof attrs[k] === 'function') e.addEventListener(k.slice(2), attrs[k]);
      else if (k === 'data' && typeof attrs[k] === 'object') {
        for (const dk in attrs[k]) e.dataset[dk] = attrs[k][dk];
      }
      else if (attrs[k] === true) e.setAttribute(k, '');
      else if (attrs[k] === false || attrs[k] == null) {} // skip
      else e.setAttribute(k, attrs[k]);
    }
  }
  if (children) {
    if (!Array.isArray(children)) children = [children];
    for (const c of children) {
      if (c == null) continue;
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    }
  }
  return e;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function setStatus(kind, msg) {
  const bar = $('#status');
  bar.className = 'status-bar ' + (kind || '');
  bar.textContent = msg || '';
}

function normalizeType(raw) {
  const norm = raw.toLowerCase()
    .replace(/[áä]/g, 'a').replace(/[éě]/g, 'e').replace(/[íï]/g, 'i')
    .replace(/[óö]/g, 'o').replace(/[úůü]/g, 'u').replace(/[ý]/g, 'y')
    .replace(/[čć]/g, 'c').replace(/[ď]/g, 'd').replace(/[ň]/g, 'n')
    .replace(/[ř]/g, 'r').replace(/[š]/g, 's').replace(/[ť]/g, 't')
    .replace(/[ž]/g, 'z');
  return TYPES[norm] || null;
}

function typeClass(type) {
  return ({
    'Text': 'ph-text',
    'Textarea': 'ph-textarea',
    'Odrážky': 'ph-bull',
    'Číslované': 'ph-num',
    'Volba': 'ph-vol',
    'Tabulka': 'ph-tbl',
    'Spot': 'ph-spot',
  })[type] || '';
}

/* ============================================================
 * PARSER PLACEHOLDERŮ
 * ============================================================ */

const PH_REGEX = /\[\[\[\s*([A-Za-zÁÉÍÓÚÝČĎĚŇŘŠŤŮŽáéíóúýčďěňřšťůž]+)\s*:\s*([^\]]+?)\s*\]\]\]/g;
const INS_REGEX = /\{\{\{([\s\S]*?)\}\}\}/g;

function parsePlaceholders(text) {
  const placeholders = [];
  PH_REGEX.lastIndex = 0;
  let m;
  while ((m = PH_REGEX.exec(text)) !== null) {
    const type = normalizeType(m[1]);
    if (!type) continue;
    const content = m[2].trim();
    const idx = placeholders.length;
    const dedupKey = DEDUP_TYPES.indexOf(type) >= 0 ? (type + '::' + content) : null;
    placeholders.push({
      idx: idx,
      type: type,
      content: content,
      raw: m[0],
      start: m.index,
      end: m.index + m[0].length,
      dedupKey: dedupKey,
      isBlock: BLOCK_TYPES.indexOf(type) >= 0,
      isMirror: false, // set below
    });
  }
  // Mark mirrors
  const seen = new Set();
  for (const ph of placeholders) {
    if (ph.dedupKey) {
      if (seen.has(ph.dedupKey)) ph.isMirror = true;
      else seen.add(ph.dedupKey);
    }
  }
  return placeholders;
}

/* ---- Pokyny pro vyplňujícího {{{...}}} ---- */

function isOnOwnLine(text, start, end) {
  // Check if the chars before start (back to \n or BOF) and after end (forward to \n or EOF) are all whitespace.
  let lineStart = start;
  while (lineStart > 0 && text[lineStart - 1] !== '\n') lineStart--;
  let lineEnd = end;
  while (lineEnd < text.length && text[lineEnd] !== '\n') lineEnd++;
  const before = text.slice(lineStart, start);
  const after = text.slice(end, lineEnd);
  return /^\s*$/.test(before) && /^\s*$/.test(after);
}

function parseInstructions(text) {
  const out = [];
  INS_REGEX.lastIndex = 0;
  let m;
  while ((m = INS_REGEX.exec(text)) !== null) {
    const start = m.index;
    const end = m.index + m[0].length;
    out.push({
      idx: out.length,
      content: m[1],
      raw: m[0],
      start: start,
      end: end,
      isOnOwnLine: isOnOwnLine(text, start, end),
    });
  }
  return out;
}

/* ---- Inline (vnitřní) markdown tabulky ----
 * Najde markdown tabulky v textu šablony, které NEJSOU součástí placeholderů
 * ani pokynů, a pro které lze v režimu "Vyplnění" zobrazit editor tabulky.
 */

const REP_OPEN_RE = /\[\[\[\s*Opakov[áa]n[íi]\s*:\s*([^\]]+?)\s*\]\]\]/gi;
const REP_CLOSE_RE = /\[\[\[\s*\/\s*Opakov[áa]n[íi]\s*\]\]\]/gi;

function parseRepeats(text) {
  // Parse [[[Opakování: Name]]] ... [[[/Opakování]]] pairs.
  // Pairing is flat (FIFO, no nesting). If nesting/imbalance occurs, unmatched markers are left as text.
  const events = [];
  let m;
  REP_OPEN_RE.lastIndex = 0;
  while ((m = REP_OPEN_RE.exec(text)) !== null) {
    events.push({type: 'open', name: m[1].trim(), start: m.index, end: m.index + m[0].length});
  }
  REP_CLOSE_RE.lastIndex = 0;
  while ((m = REP_CLOSE_RE.exec(text)) !== null) {
    events.push({type: 'close', start: m.index, end: m.index + m[0].length});
  }
  events.sort(function(a, b) { return a.start - b.start; });
  const repeats = [];
  let i = 0;
  while (i < events.length) {
    if (events[i].type !== 'open') { i++; continue; }
    let j = i + 1;
    while (j < events.length && events[j].type !== 'close') j++;
    if (j >= events.length) break;
    const open = events[i];
    const close = events[j];
    repeats.push({
      idx: repeats.length,
      name: open.name,
      start: open.start,
      end: close.end,
      bodyStart: open.end,
      bodyEnd: close.start,
      placeholders: [],
      instructions: [],
      inlineTables: [],
    });
    i = j + 1;
  }
  return repeats;
}

function findInlineTables(text, placeholders, instructions) {
  const tables = [];
  const lines = text.split('\n');
  // Compute char offset of each line start
  const offsets = [0];
  for (let p = 0; p < text.length; p++) {
    if (text[p] === '\n') offsets.push(p + 1);
  }
  // offsets.length === lines.length

  let i = 0;
  let tableIdx = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (i + 1 < lines.length && line.indexOf('|') >= 0 &&
        /^\s*\|?[\s:|-]+\|[\s:|-]+/.test(lines[i+1])) {
      const startLine = i;
      const headers = parseTableCells(line);
      let j = i + 2;
      const rows = [];
      while (j < lines.length && lines[j].indexOf('|') >= 0 && lines[j].trim() !== '') {
        rows.push(parseTableCells(lines[j]));
        j++;
      }
      const endLine = j; // exclusive
      const startChar = offsets[startLine];
      let endChar;
      if (endLine < lines.length) {
        // endLine points to a real line. The position offsets[endLine] is right after
        // the \n that ended the last table line. We want endChar to be that \n's
        // position so text.slice(endChar) starts with that \n (preserves separator).
        endChar = offsets[endLine] - 1;
      } else {
        endChar = text.length;
      }
      // Check overlap with placeholders/instructions
      let overlaps = false;
      for (const ph of placeholders) {
        if (ph.start < endChar && ph.end > startChar) { overlaps = true; break; }
      }
      if (!overlaps) {
        for (const ins of instructions) {
          if (ins.start < endChar && ins.end > startChar) { overlaps = true; break; }
        }
      }
      if (!overlaps) {
        tables.push({
          idx: tableIdx++,
          headers: headers,
          rows: rows,
          start: startChar,
          end: endChar,
        });
      }
      i = endLine;
      continue;
    }
    i++;
  }
  return tables;
}

function expandInstructionRangeForRemoval(text, ins) {
  // If the instruction is on its own line (whitespace only before/after on that line),
  // expand to consume the line including its trailing newline.
  if (!ins.isOnOwnLine) return {start: ins.start, end: ins.end};
  let lineStart = ins.start;
  while (lineStart > 0 && text[lineStart - 1] !== '\n') lineStart--;
  let lineEnd = ins.end;
  while (lineEnd < text.length && text[lineEnd] !== '\n') lineEnd++;
  // Consume the trailing \n if present
  if (lineEnd < text.length && text[lineEnd] === '\n') lineEnd++;
  return {start: lineStart, end: lineEnd};
}

function getValue(ph) {
  const src = ph._valuesSrc || state.values;
  if (ph._virtualKey) return src[ph._virtualKey];
  if (ph.dedupKey) return src[ph.dedupKey];
  return src['__idx_' + ph.idx];
}

function setValue(ph, val) {
  const src = ph._valuesSrc || state.values;
  if (ph._virtualKey) src[ph._virtualKey] = val;
  else if (ph.dedupKey) src[ph.dedupKey] = val;
  else src['__idx_' + ph.idx] = val;
}

/* ============================================================
 * MARKDOWN PARSER (do AST i HTML)
 * ============================================================ */

function isBlockStart(line) {
  if (/^#{1,6}\s/.test(line)) return true;
  if (/^---+\s*$/.test(line)) return true;
  if (/^```/.test(line)) return true;
  if (/^>/.test(line)) return true;
  if (/^\s*[-*+]\s/.test(line)) return true;
  if (/^\s*\d+\.\s/.test(line)) return true;
  return false;
}

function parseTableCells(line) {
  let s = line.trim();
  if (s.startsWith('|')) s = s.slice(1);
  if (s.endsWith('|')) s = s.slice(0, -1);
  return s.split('|').map(c => c.trim());
}

function parseMarkdown(text) {
  const lines = text.split('\n');
  const blocks = [];
  let i = 0;
  let safetyCounter = 0;
  const safetyLimit = lines.length * 4 + 100;
  while (i < lines.length) {
    if (++safetyCounter > safetyLimit) {
      // Emergency exit — something would otherwise loop forever.
      break;
    }
    const iAtStart = i;
    const line = lines[i];
    // Heading
    let m = line.match(/^(#{1,6})\s+(.*)$/);
    if (m) {
      blocks.push({type: 'heading', level: m[1].length, content: m[2]});
      i++; continue;
    }
    // Hr
    if (/^---+\s*$/.test(line)) {
      blocks.push({type: 'hr'});
      i++; continue;
    }
    // Code fence
    if (/^```/.test(line)) {
      const lang = line.slice(3).trim();
      const codeLines = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) {
        codeLines.push(lines[i]);
        i++;
      }
      if (i < lines.length) i++; // skip closing
      blocks.push({type: 'code', lang: lang, content: codeLines.join('\n')});
      continue;
    }
    // Blockquote
    if (/^>/.test(line)) {
      const ql = [];
      while (i < lines.length && /^>/.test(lines[i])) {
        ql.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      blocks.push({type: 'blockquote', content: ql.join('\n')});
      continue;
    }
    // Bullet list
    if (/^\s*[-*+]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*[-*+]\s+/, ''));
        i++;
      }
      blocks.push({type: 'bullist', items: items});
      continue;
    }
    // Numbered list
    if (/^\s*\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*\d+\.\s+/, ''));
        i++;
      }
      blocks.push({type: 'numlist', items: items});
      continue;
    }
    // Table (GFM)
    if (i + 1 < lines.length && line.indexOf('|') >= 0 &&
        /^\s*\|?[\s:|-]+\|[\s:|-]+/.test(lines[i+1])) {
      const headers = parseTableCells(line);
      i += 2; // skip header + separator
      const rows = [];
      while (i < lines.length && lines[i].indexOf('|') >= 0 && lines[i].trim() !== '') {
        rows.push(parseTableCells(lines[i]));
        i++;
      }
      blocks.push({type: 'table', headers: headers, rows: rows});
      continue;
    }
    // Empty
    if (line.trim() === '') { i++; continue; }
    // Paragraph
    const pl = [];
    while (i < lines.length && lines[i].trim() !== '' && !isBlockStart(lines[i])) {
      pl.push(lines[i]);
      i++;
    }
    blocks.push({type: 'paragraph', content: pl.join('\n')});
    // Safety: if no advance happened in this iteration, force one to avoid infinite loop.
    if (i === iAtStart) i++;
  }
  return blocks;
}

/* ---- Inline rendering for HTML ---- */

function renderInlineHtml(text) {
  // text already has \u0001PH<n>\u0001 markers preserved
  let html = escapeHtml(text);
  // Code spans first
  html = html.replace(/`([^`]+?)`/g, function(_, c) { return '<code>' + c + '</code>'; });
  // Bold (**) — lazy
  html = html.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
  // Italic (*)
  html = html.replace(/(^|[^*])\*([^*\s][^*]*?)\*(?!\*)/g, '$1<em>$2</em>');
  // Links [t](u)
  html = html.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function(_, t, u) {
    return '<a href="' + escapeHtml(u) + '">' + t + '</a>';
  });
  return html;
}

function renderBlocksHtml(blocks) {
  const parts = [];
  for (const b of blocks) {
    if (b.type === 'heading') {
      parts.push('<h' + b.level + '>' + renderInlineHtml(b.content) + '</h' + b.level + '>');
    } else if (b.type === 'paragraph') {
      parts.push('<p>' + renderInlineHtml(b.content) + '</p>');
    } else if (b.type === 'hr') {
      parts.push('<hr>');
    } else if (b.type === 'code') {
      parts.push('<pre><code>' + escapeHtml(b.content) + '</code></pre>');
    } else if (b.type === 'blockquote') {
      const sub = parseMarkdown(b.content);
      parts.push('<blockquote>' + renderBlocksHtml(sub) + '</blockquote>');
    } else if (b.type === 'bullist') {
      parts.push('<ul>' + b.items.map(it => '<li>' + renderInlineHtml(it) + '</li>').join('') + '</ul>');
    } else if (b.type === 'numlist') {
      parts.push('<ol>' + b.items.map(it => '<li>' + renderInlineHtml(it) + '</li>').join('') + '</ol>');
    } else if (b.type === 'table') {
      let h = '<table class="md-table"><thead><tr>';
      for (const c of b.headers) h += '<th>' + renderInlineHtml(c) + '</th>';
      h += '</tr></thead><tbody>';
      for (const r of b.rows) {
        h += '<tr>';
        for (let ci = 0; ci < b.headers.length; ci++) {
          h += '<td>' + renderInlineHtml(r[ci] || '') + '</td>';
        }
        h += '</tr>';
      }
      h += '</tbody></table>';
      parts.push(h);
    }
  }
  return parts.join('\n');
}

function md2html(text) {
  return renderBlocksHtml(parseMarkdown(text));
}

/* ============================================================
 * SUBSTITUCE HODNOT (template -> filled markdown)
 * ============================================================ */

function formatValueAsMarkdown(ph) {
  const v = getValue(ph);
  if (ph.type === 'Spot') {
    // Spot is always emitted (not user-fillable). The "📍 **SPOT:**" prefix is recognized
    // later by HTML and DOCX rendering to apply distinctive styling.
    return '> 📍 **SPOT:** ' + ph.content;
  }
  if (ph.type === 'Text') {
    return v == null || v === '' ? '' : String(v);
  }
  if (ph.type === 'Textarea') {
    return v == null || v === '' ? '' : String(v);
  }
  if (ph.type === 'Odrážky') {
    if (!Array.isArray(v) || v.length === 0) return '';
    return v.filter(x => x != null && x !== '').map(x => '- ' + x).join('\n');
  }
  if (ph.type === 'Číslované') {
    if (!Array.isArray(v) || v.length === 0) return '';
    return v.filter(x => x != null && x !== '').map((x, i) => (i+1) + '. ' + x).join('\n');
  }
  if (ph.type === 'Volba') {
    return v == null || v === '' ? '' : String(v);
  }
  if (ph.type === 'Tabulka') {
    const rows = Array.isArray(v) ? v : [];
    // Optional table — if not activated or no rows, skip entirely (renders nothing).
    if (rows.length === 0) return '';
    const cols = ph.content.split(',').map(c => c.trim());
    let out = '| ' + cols.join(' | ') + ' |\n';
    out += '| ' + cols.map(() => '---').join(' | ') + ' |\n';
    for (const r of rows) {
      out += '| ' + cols.map(c => (r[c] || '').replace(/\|/g, '\\|').replace(/\n/g, ' ')).join(' | ') + ' |\n';
    }
    return out.replace(/\n$/, '');
  }
  return '';
}

function formatInlineTableMarkdown(tbl) {
  const cols = tbl.headers;
  const src = tbl._valuesSrc || state.values;
  const v = src['__inline_table_' + tbl.idx];
  let useRows;
  if (Array.isArray(v)) {
    useRows = v;
  } else {
    // Convert original arrays-of-strings to objects keyed by header
    useRows = tbl.rows.map(function(arr) {
      const o = {};
      for (let k = 0; k < cols.length; k++) o[cols[k]] = arr[k] || '';
      return o;
    });
  }
  let out = '| ' + cols.join(' | ') + ' |\n';
  out += '| ' + cols.map(function() { return '---'; }).join(' | ') + ' |\n';
  if (useRows.length === 0) {
    out += '| ' + cols.map(function() { return ''; }).join(' | ') + ' |';
  } else {
    for (const r of useRows) {
      out += '| ' + cols.map(function(c) {
        return (r[c] || '').replace(/\|/g, '\\|').replace(/\n/g, ' ');
      }).join(' | ') + ' |\n';
    }
    out = out.replace(/\n$/, '');
  }
  return out;
}

function expandRepeatToMarkdown(rep) {
  // Expand all instances of a repeat into concatenated markdown.
  // Each instance's body is substituted using its own _valuesSrc-scoped items.
  const repKey = '__repeat_' + rep.idx;
  const instances = state.values[repKey];
  if (!Array.isArray(instances) || instances.length === 0) return '';
  const body = state.templateText.slice(rep.bodyStart, rep.bodyEnd);
  const out = [];
  for (let i = 0; i < instances.length; i++) {
    const instance = instances[i];
    const scope = makeScopedItems(rep, instance);
    // Substitute the body with this instance's scoped items (no nested repeats — Opakování doesn't nest).
    const filled = substituteFilled(body, scope.placeholders, scope.instructions, scope.inlineTables, null);
    out.push(filled);
  }
  // Join with a blank line so rendered markdown treats them as separate blocks.
  return out.join('\n\n');
}

function substituteFilled(text, placeholders, instructions, inlineTables, repeats) {
  // Build event list across all marker kinds, sort, walk linearly.
  const events = [];
  if (placeholders) {
    for (const ph of placeholders) {
      events.push({start: ph.start, end: ph.end, replacement: formatValueAsMarkdown(ph)});
    }
  }
  if (instructions) {
    for (const ins of instructions) {
      const r = expandInstructionRangeForRemoval(text, ins);
      events.push({start: r.start, end: r.end, replacement: ''});
    }
  }
  if (inlineTables) {
    for (const tbl of inlineTables) {
      events.push({start: tbl.start, end: tbl.end, replacement: formatInlineTableMarkdown(tbl)});
    }
  }
  if (repeats) {
    for (const rep of repeats) {
      events.push({start: rep.start, end: rep.end, replacement: expandRepeatToMarkdown(rep)});
    }
  }
  events.sort(function(a, b) { return a.start - b.start; });
  // Skip overlapping (defensive)
  const taken = [];
  let lastEnd = -1;
  for (const ev of events) {
    if (ev.start < lastEnd) continue;
    taken.push(ev);
    if (ev.end > lastEnd) lastEnd = ev.end;
  }
  let out = '';
  let pos = 0;
  for (const ev of taken) {
    out += text.slice(pos, ev.start);
    out += ev.replacement;
    pos = ev.end;
  }
  out += text.slice(pos);
  return out;
}

/* ============================================================
 * RENDER REŽIMU
 * ============================================================ */

const MARK_RE = /\u0001(PH|IN|MT|RP)(\d+)\u0001/g;

function buildMarkedTemplate(mode, scope, text) {
  // Build text with markers replacing placeholders, instructions, repeats,
  // and (in fill mode) inline tables.
  // mode: 'preview' | 'fill'
  // scope: object with .placeholders, .instructions, .inlineTables, optional .repeats — defaults to state
  // text: source text to mark — defaults to state.templateText
  if (!scope) scope = state;
  if (text == null) text = state.templateText;
  const events = [];
  for (const ph of scope.placeholders) {
    events.push({kind: 'PH', start: ph.start, end: ph.end, idx: ph.idx});
  }
  for (const ins of scope.instructions) {
    events.push({kind: 'IN', start: ins.start, end: ins.end, idx: ins.idx});
  }
  if (mode === 'fill') {
    for (const tbl of scope.inlineTables) {
      events.push({kind: 'MT', start: tbl.start, end: tbl.end, idx: tbl.idx});
    }
  }
  if (scope.repeats) {
    for (const rep of scope.repeats) {
      events.push({kind: 'RP', start: rep.start, end: rep.end, idx: rep.idx});
    }
  }
  events.sort(function(a, b) { return a.start - b.start; });
  // Filter out events that overlap a previously taken event (defensive — should not normally occur)
  const taken = [];
  let lastEnd = -1;
  for (const ev of events) {
    if (ev.start < lastEnd) continue; // overlapping, skip
    taken.push(ev);
    if (ev.end > lastEnd) lastEnd = ev.end;
  }
  let out = '';
  let pos = 0;
  for (const ev of taken) {
    out += text.slice(pos, ev.start);
    out += '\u0001' + ev.kind + ev.idx + '\u0001';
    pos = ev.end;
  }
  out += text.slice(pos);
  return out;
}

function renderMode() {
  const view = $('#docview');
  view.innerHTML = '';

  if (!state.templateText) {
    renderWelcome(view);
    return;
  }

  let stage = 'inicializace';
  try {
    if (state.mode === 'preview') {
      stage = 'vykreslení režimu Náhled vzoru (renderPreview)';
      renderPreview(view);
    } else if (state.mode === 'fill') {
      stage = 'vykreslení režimu Vyplnění (renderFill)';
      renderFill(view);
    } else {
      stage = 'vykreslení režimu Náhled výsledku (renderResult)';
      renderResult(view);
    }
    stage = 'aktualizace stavu vyplněnosti';
    updateMissingStatus();
  } catch (err) {
    // Show the failure inline in docview rather than letting it bubble up silently.
    view.innerHTML = '';
    const wrap = el('div', {style: {
      padding: '0.8rem 1rem', background: '#fff5f5',
      border: '1px solid #f5b5b5', borderRadius: '4px', margin: '1rem 0',
    }});
    wrap.appendChild(el('h2', {text: 'Chyba při vykreslení šablony', style: {marginTop: 0}}));
    wrap.appendChild(el('p', {text: 'Selhalo: ' + stage}));
    wrap.appendChild(el('p', {text: (err && err.message ? err.message : String(err))}));
    if (err && err.stack) {
      const pre = el('pre', {style: {fontSize: '0.8rem', whiteSpace: 'pre-wrap', maxHeight: '20rem', overflow: 'auto'}});
      pre.textContent = String(err.stack);
      wrap.appendChild(pre);
    }
    wrap.appendChild(el('p', {text: 'Můžeš zkusit otevřít zdroj šablony tlačítkem ✏ Zdroj v horním panelu a opravit ji.'}));
    view.appendChild(wrap);
    setStatus('err', 'Chyba ve vykreslení (' + stage + '): ' + (err && err.message ? err.message : String(err)));
  }
}

function renderWelcome(view) {
  const w = el('div', {class: 'welcome'}, [
    el('h2', {text: 'Vítejte v Šablonáři MDT'}),
    el('p', {html: 'Otevřete soubor <code>.mdt</code> (šablona) nebo <code>.mdd</code> (rozpracovaná verze) tlačítkem nahoře nebo načtěte šablonu z URL.'}),
    el('p', {html:
      'Šablona je markdown text s placeholdery typu <code>[[[Text: Název]]]</code>, ' +
      '<code>[[[Tabulka: Sloupec1, Sloupec2]]]</code>, atd.'
    }),
    el('p', {html:
      'Pokyny pro vyplňujícího lze do šablony vložit pomocí <code>{{{tady text pokynu}}}</code> — ' +
      'při exportu do .md / .docx se neobjeví.'
    }),
    el('p', {html:
      'Pro místa, kam je nutné něco doplnit ručně (obrázek, schéma…), použijte ' +
      '<code>[[[Spot: popis co tam má být]]]</code> — zobrazí se i ve výsledku jako zvýrazněný blok.'
    }),
    el('p', {html:
      'Pro opakující se sekce (přílohy, položky…) použijte párové značky ' +
      '<code>[[[Opakování: Název]]]</code> … <code>[[[/Opakování]]]</code> — uvnitř může být cokoli ' +
      'včetně dalších placeholderů, pokynů a tabulek; v režimu vyplnění lze přidávat libovolný počet instancí.'
    }),
    el('p', {html:
      'I klasickou markdown tabulku v šabloně lze v režimu Vyplnění upravovat ' +
      'stejným editorem jako placeholder typu <code>[[[Tabulka]]]</code>.'
    }),
    el('p', {html: 'Předat URL šablony je možné parametrem <code>?template=https://…/soubor.mdt</code>.'}),
  ]);
  view.appendChild(w);
}

function setMarkedHtmlInto(container, html) {
  // Replace marker chars in html with marker spans before setting innerHTML
  const replaced = html.replace(MARK_RE, function(_, kind, n) {
    return '<span data-mk="' + kind + '" data-mki="' + n + '"></span>';
  });
  container.innerHTML = replaced;
}

function processMarkers(container, mode, scope) {
  // mode: 'preview' | 'fill' | 'result'
  // scope: defaults to state
  if (!scope) scope = state;
  const markers = $all('[data-mk]', container);
  for (const marker of markers) {
    const kind = marker.dataset.mk;
    const idx = parseInt(marker.dataset.mki, 10);
    let item, isBlock, newEl;
    if (kind === 'PH') {
      item = scope.placeholders[idx];
      if (!item) { marker.remove(); continue; }
      isBlock = item.isBlock;
      newEl = (mode === 'preview') ? buildPreviewElement(item)
            : (mode === 'fill') ? buildFillElement(item)
            : buildResultElement(item);
    } else if (kind === 'IN') {
      item = scope.instructions[idx];
      if (!item) { marker.remove(); continue; }
      // Block-vs-inline detection: if marker is sole child of its <p> with only whitespace text,
      // it'll be treated as block. Otherwise inline.
      const par = marker.parentElement;
      const aloneInP = par && par.tagName === 'P' && par.children.length === 1 &&
                       par.textContent.replace(/\s+/g, '') === '';
      isBlock = !!aloneInP;
      newEl = buildInstructionElement(item, isBlock);
    } else if (kind === 'MT') {
      item = scope.inlineTables[idx];
      if (!item) { marker.remove(); continue; }
      isBlock = true;
      newEl = buildInlineTableElement(item, mode);
    } else if (kind === 'RP') {
      item = (scope.repeats || [])[idx];
      if (!item) { marker.remove(); continue; }
      isBlock = true;
      newEl = (mode === 'fill') ? buildRepeatFillElement(item) : buildRepeatPreviewElement(item);
    } else {
      marker.remove();
      continue;
    }
    if (isBlock && marker.parentElement) {
      const par = marker.parentElement;
      if (par.tagName === 'P' && par.children.length === 1) {
        const text = par.textContent.replace(/\s+/g, '');
        if (text === '') {
          par.replaceWith(newEl);
          continue;
        }
      }
    }
    marker.replaceWith(newEl);
  }
}

function renderPreview(view) {
  const marked = buildMarkedTemplate('preview');
  const html = md2html(marked);
  setMarkedHtmlInto(view, html);
  processMarkers(view, 'preview');
}

function renderFill(view) {
  const marked = buildMarkedTemplate('fill');
  const html = md2html(marked);
  setMarkedHtmlInto(view, html);
  processMarkers(view, 'fill');
}

function renderResult(view) {
  // Build the filled output:
  //  - Substitute placeholder values (or insert "NEVYPLNĚNO" marker)
  //  - Remove instructions (line-aware)
  //  - Substitute inline tables with current values
  // Then render to HTML.
  const events = [];
  for (const ph of state.placeholders) {
    const md = formatValueAsMarkdown(ph);
    const v = getValue(ph);
    let isUnfilled;
    if (ph.type === 'Tabulka' || ph.type === 'Spot') {
      // Tabulka is optional, Spot always renders — never marked unfilled.
      isUnfilled = false;
    } else {
      isUnfilled = (md === '');
    }
    events.push({
      kind: 'PH',
      start: ph.start,
      end: ph.end,
      replacement: isUnfilled ? ('\u0002UF' + ph.idx + '\u0002') : md,
    });
  }
  for (const ins of state.instructions) {
    const r = expandInstructionRangeForRemoval(state.templateText, ins);
    events.push({kind: 'IN', start: r.start, end: r.end, replacement: ''});
  }
  for (const tbl of state.inlineTables) {
    events.push({
      kind: 'MT',
      start: tbl.start,
      end: tbl.end,
      replacement: formatInlineTableMarkdown(tbl),
    });
  }
  for (const rep of state.repeats) {
    events.push({
      kind: 'RP',
      start: rep.start,
      end: rep.end,
      replacement: expandRepeatToMarkdown(rep),
    });
  }
  events.sort(function(a, b) { return a.start - b.start; });
  // Skip overlapping events (defensive)
  const taken = [];
  let lastEnd = -1;
  for (const ev of events) {
    if (ev.start < lastEnd) continue;
    taken.push(ev);
    if (ev.end > lastEnd) lastEnd = ev.end;
  }
  let out = '';
  let pos = 0;
  for (const ev of taken) {
    out += state.templateText.slice(pos, ev.start);
    out += ev.replacement;
    pos = ev.end;
  }
  out += state.templateText.slice(pos);
  let html = md2html(out);
  html = html.replace(/\u0002UF(\d+)\u0002/g, function(_, n) {
    const ph = state.placeholders[parseInt(n, 10)];
    return '<span class="unfilled" role="note">[NEVYPLNĚNO: ' +
      escapeHtml(ph.type) + ' — ' + escapeHtml(ph.content) + ']</span>';
  });
  view.innerHTML = html;
  // Post-process: convert blockquotes containing the SPOT marker into stylized spot-block divs.
  $all('blockquote', view).forEach(function(bq) {
    if (/📍\s*\*?\*?\s*SPOT:/.test(bq.textContent) || /📍/.test(bq.textContent.slice(0, 4))) {
      // Extract content text (strip the "📍 SPOT: " prefix from the rendered HTML)
      const txt = bq.textContent.replace(/^\s*📍\s*SPOT:\s*/, '').trim();
      const div = el('div', {class: 'spot-block', role: 'note',
        'aria-label': 'Manuálně doplnit (SPOT): ' + txt});
      div.appendChild(el('span', {class: 'spot-prefix', 'aria-hidden': 'true', text: '📍 SPOT:'}));
      div.appendChild(document.createTextNode(' ' + txt));
      bq.replaceWith(div);
    }
  });
}

/* ---- Element builders ---- */

function buildInstructionElement(ins, isBlock) {
  const span = el(isBlock ? 'div' : 'span', {
    class: 'ph-instr ' + (isBlock ? 'is-block' : 'is-inline'),
    role: 'note',
    'aria-label': 'Pokyn pro vyplňujícího: ' + ins.content.replace(/\s+/g, ' ').trim(),
  });
  const icon = el('span', {class: 'ph-instr-icon', 'aria-hidden': 'true', text: '💡 Pokyn:'});
  span.appendChild(icon);
  span.appendChild(document.createTextNode(' '));
  // Preserve content as text (CSS white-space:pre-wrap on .is-block keeps newlines).
  span.appendChild(document.createTextNode(ins.content));
  return span;
}

function buildInlineTableElement(tbl, mode) {
  // mode: 'preview' | 'fill' | 'result'
  if (mode === 'fill') {
    return buildInlineTableEditor(tbl);
  }
  // preview / result: render static table reflecting current values (or original if not edited).
  const cols = tbl.headers;
  const src = tbl._valuesSrc || state.values;
  const v = src['__inline_table_' + tbl.idx];
  let useRows;
  if (Array.isArray(v)) {
    useRows = v;
  } else {
    useRows = tbl.rows.map(function(arr) {
      const o = {};
      for (let k = 0; k < cols.length; k++) o[cols[k]] = arr[k] || '';
      return o;
    });
  }
  const tableEl = el('table', {class: 'md-table'});
  const thead = el('thead');
  const trh = el('tr');
  for (const c of cols) trh.appendChild(el('th', {scope: 'col', text: c}));
  thead.appendChild(trh);
  tableEl.appendChild(thead);
  const tbody = el('tbody');
  for (const r of useRows) {
    const tr = el('tr');
    for (const c of cols) {
      tr.appendChild(el('td', {text: r[c] || ''}));
    }
    tbody.appendChild(tr);
  }
  tableEl.appendChild(tbody);
  return tableEl;
}

function buildInlineTableEditor(tbl) {
  // Wrap the existing buildTableEditor by passing a virtual placeholder.
  const cols = tbl.headers;
  const virtualPh = {
    idx: -1,
    type: 'Tabulka',
    content: cols.join(', '),
    raw: '',
    start: tbl.start,
    end: tbl.end,
    dedupKey: null,
    isBlock: true,
    isMirror: false,
    _virtualKey: '__inline_table_' + tbl.idx,
    _valuesSrc: tbl._valuesSrc, // propagate to scoped storage if set
  };
  const wrap = el('div', {class: 'inline-tbl-wrap', role: 'region',
    'aria-label': 'Editovatelná tabulka: ' + cols.join(', ')});
  wrap.appendChild(el('div', {class: 'inline-tbl-label'}, [
    el('span', {class: 'ph-type', text: 'Editovatelná tabulka: '}),
    cols.join(', '),
  ]));
  const editor = buildTableEditor(virtualPh);
  // Strip the inner ph-form wrapper's own label since we have our own.
  // (buildTableEditor returns a div with class 'ph-form ph-block ph-tbl' starting with ph-form-label.)
  // Just append it; the visual nesting is acceptable, but keep it cleaner by removing the inner label:
  const innerLabel = editor.querySelector(':scope > .ph-form-label');
  if (innerLabel) innerLabel.remove();
  // Also drop the ph-tbl colored background — the outer wrap has its own style.
  editor.classList.remove('ph-form', 'ph-block', 'ph-tbl');
  wrap.appendChild(editor);
  return wrap;
}

function buildSpotElement(ph) {
  // Used in preview, fill, and result modes — Spot is always shown to the user.
  const div = el('div', {
    class: 'spot-block',
    role: 'note',
    'aria-label': 'Manuálně doplnit (SPOT): ' + ph.content,
  });
  div.appendChild(el('span', {class: 'spot-prefix', 'aria-hidden': 'true', text: '📍 SPOT:'}));
  div.appendChild(document.createTextNode(' ' + ph.content));
  return div;
}

/* ============================================================
 * REPEAT (Opakování) BUILDERS
 * ============================================================ */

function makeScopedItems(rep, instanceObj) {
  // Return shallow-copied placeholders/instructions/inlineTables with _valuesSrc set to instanceObj.
  // Used to render the body of a single repeat instance against its own values namespace.
  const phs = rep.placeholders.map(function(ph) {
    const c = Object.assign({}, ph);
    c._valuesSrc = instanceObj;
    return c;
  });
  const ins = rep.instructions; // instructions have no values, no scoping needed
  const tbls = rep.inlineTables.map(function(tbl) {
    const c = Object.assign({}, tbl);
    c._valuesSrc = instanceObj;
    return c;
  });
  return {placeholders: phs, instructions: ins, inlineTables: tbls};
}

function buildRepeatPreviewElement(rep) {
  const wrap = el('fieldset', {class: 'rep-block rep-preview',
    'aria-label': 'Opakovaná sekce: ' + rep.name});
  wrap.appendChild(el('legend', {text: 'Opakovaná sekce: ' + rep.name}));
  const body = state.templateText.slice(rep.bodyStart, rep.bodyEnd);
  // For preview, scope is just rep's own items — no _valuesSrc needed (no values displayed).
  const scope = {placeholders: rep.placeholders, instructions: rep.instructions, inlineTables: rep.inlineTables};
  const marked = buildMarkedTemplate('preview', scope, body);
  const html = md2html(marked);
  const inner = el('div', {class: 'rep-body'});
  setMarkedHtmlInto(inner, html);
  processMarkers(inner, 'preview', scope);
  wrap.appendChild(inner);
  return wrap;
}

function buildRepeatFillElement(rep) {
  const wrap = el('fieldset', {class: 'rep-block rep-fill',
    'aria-label': 'Opakovaná sekce: ' + rep.name});
  wrap.appendChild(el('legend', {text: 'Opakovaná sekce: ' + rep.name}));
  const repKey = '__repeat_' + rep.idx;
  if (!Array.isArray(state.values[repKey])) {
    state.values[repKey] = [createEmptyRepeatInstance(rep)];
  }

  const instancesContainer = el('div', {class: 'rep-instances'});
  wrap.appendChild(instancesContainer);

  function rerender() {
    instancesContainer.innerHTML = '';
    const arr = state.values[repKey];
    if (arr.length === 0) {
      const hint = el('div', {class: 'rep-empty', role: 'note',
        text: 'Sekce „' + rep.name + '" nemá žádnou instanci. Pro vytvoření klikněte na tlačítko „Přidat instanci" níže — nebo nechte prázdné, sekce se ve výsledku přeskočí.'});
      instancesContainer.appendChild(hint);
    }
    for (let i = 0; i < arr.length; i++) {
      instancesContainer.appendChild(buildInstance(arr[i], i, arr.length));
    }
    updateMissingStatus();
  }

  function buildInstance(instanceObj, instanceIdx, total) {
    const fs = el('fieldset', {class: 'rep-instance'});
    fs.appendChild(el('legend', {text: rep.name + ' #' + (instanceIdx + 1)}));

    const body = state.templateText.slice(rep.bodyStart, rep.bodyEnd);
    const scope = makeScopedItems(rep, instanceObj);
    const marked = buildMarkedTemplate('fill', scope, body);
    const html = md2html(marked);
    const bodyEl = el('div', {class: 'rep-instance-body'});
    setMarkedHtmlInto(bodyEl, html);
    processMarkers(bodyEl, 'fill', scope);
    fs.appendChild(bodyEl);

    // Instance management buttons
    const acts = el('div', {class: 'rep-instance-acts', role: 'group',
      'aria-label': 'Akce pro instanci ' + (instanceIdx + 1)});
    const upBtn = el('button', {
      type: 'button',
      'aria-label': 'Posunout instanci ' + (instanceIdx + 1) + ' nahoru',
      title: 'Posunout nahoru',
      text: '▲',
      onclick: function() {
        if (instanceIdx <= 0) return;
        const arr = state.values[repKey];
        const tmp = arr[instanceIdx - 1];
        arr[instanceIdx - 1] = arr[instanceIdx];
        arr[instanceIdx] = tmp;
        rerender();
      },
    });
    if (instanceIdx === 0) upBtn.disabled = true;
    const downBtn = el('button', {
      type: 'button',
      'aria-label': 'Posunout instanci ' + (instanceIdx + 1) + ' dolů',
      title: 'Posunout dolů',
      text: '▼',
      onclick: function() {
        const arr = state.values[repKey];
        if (instanceIdx >= arr.length - 1) return;
        const tmp = arr[instanceIdx + 1];
        arr[instanceIdx + 1] = arr[instanceIdx];
        arr[instanceIdx] = tmp;
        rerender();
      },
    });
    if (instanceIdx >= total - 1) downBtn.disabled = true;
    const delBtn = el('button', {
      type: 'button',
      'aria-label': 'Smazat instanci ' + (instanceIdx + 1),
      title: 'Smazat instanci',
      text: '🗑',
      onclick: function() {
        const arr = state.values[repKey];
        arr.splice(instanceIdx, 1);
        rerender();
      },
    });
    acts.appendChild(upBtn);
    acts.appendChild(downBtn);
    acts.appendChild(delBtn);
    fs.appendChild(acts);
    return fs;
  }

  // Footer: add instance button
  const footer = el('div', {class: 'rep-footer'});
  const addBtn = el('button', {
    type: 'button',
    class: 'primary',
    text: '➕ Přidat instanci „' + rep.name + '"',
    'aria-label': 'Přidat novou instanci sekce ' + rep.name,
    onclick: function() {
      state.values[repKey].push(createEmptyRepeatInstance(rep));
      rerender();
    },
  });
  footer.appendChild(addBtn);
  wrap.appendChild(footer);

  rerender();
  return wrap;
}

function buildPreviewElement(ph) {
  if (ph.type === 'Spot') return buildSpotElement(ph);
  const cls = 'ph-marker ' + typeClass(ph.type);
  const aria = 'Šablona, typ ' + ph.type + ', obsah: ' + ph.content;
  const e = el('span', {
    class: cls,
    'aria-label': aria,
    role: 'note',
  });
  e.textContent = '[[[' + ph.type + ': ' + ph.content + ']]]';
  return e;
}

function buildResultElement(ph) {
  if (ph.type === 'Spot') return buildSpotElement(ph);
  // In result mode, value is shown as part of filled markdown.
  // This builder is only called if for some reason a marker remains.
  const v = getValue(ph);
  if (v == null || v === '' || (Array.isArray(v) && v.length === 0)) {
    return el('span', {class: 'unfilled', role: 'note',
      text: '[NEVYPLNĚNO: ' + ph.type + ' — ' + ph.content + ']'});
  }
  return document.createTextNode(String(v));
}

/* ============================================================
 * FILL ELEMENTS
 * ============================================================ */

function buildFillElement(ph) {
  if (ph.isMirror) return buildMirrorElement(ph);
  if (ph.type === 'Text') return buildTextInput(ph);
  if (ph.type === 'Textarea') return buildTextareaInput(ph);
  if (ph.type === 'Volba') return buildChoiceInput(ph);
  if (ph.type === 'Odrážky') return buildItemsEditor(ph, 'bullet');
  if (ph.type === 'Číslované') return buildItemsEditor(ph, 'number');
  if (ph.type === 'Tabulka') return buildTableSlot(ph);
  if (ph.type === 'Spot') return buildSpotElement(ph);
  return el('span', {text: ph.raw});
}

function buildTableSlot(ph) {
  // For real Tabulka placeholders (not virtual proxies for inline markdown tables):
  // a Tabulka is OPTIONAL — show an activation button until the user creates it.
  // Once created, show the editor with a "Remove table" button to deactivate.
  if (ph._virtualKey) {
    // Virtual proxy (inline markdown table) — always show editor (table is mandatory in template).
    return buildTableEditor(ph);
  }
  const v = getValue(ph);
  if (Array.isArray(v)) {
    return buildTableEditor(ph);
  }
  return buildTableActivator(ph);
}

function buildTableActivator(ph) {
  const cols = ph.content.split(',').map(s => s.trim()).filter(Boolean);
  const wrap = el('div', {class: 'ph-form ph-block ph-tbl ph-tbl-activator', role: 'group',
    'aria-label': 'Volitelná tabulka: ' + ph.content});
  wrap.appendChild(el('div', {class: 'ph-form-label'}, [
    el('span', {class: 'ph-type', text: ph.type + ' (volitelná): '}),
    cols.join(', '),
  ]));
  wrap.appendChild(el('div', {class: 'ph-tbl-act-hint',
    text: 'Tabulka se ve výsledku zobrazí pouze pokud ji vytvoříte.'}));
  const btn = el('button', {
    type: 'button',
    class: 'primary',
    text: '➕ Vytvořit tabulku',
    'aria-label': 'Vytvořit volitelnou tabulku se sloupci ' + cols.join(', '),
    onclick: function() {
      const initial = {};
      for (const c of cols) initial[c] = '';
      setValue(ph, [initial]);
      const ed = buildTableEditor(ph);
      wrap.replaceWith(ed);
      const firstInput = ed.querySelector('input, textarea, [contenteditable="true"]');
      if (firstInput) firstInput.focus();
      updateMissingStatus();
    },
  });
  wrap.appendChild(btn);
  return wrap;
}

function buildMirrorElement(ph) {
  const cur = getValue(ph);
  const isEmpty = cur == null || cur === '' || (Array.isArray(cur) && cur.length === 0);
  const display = formatMirrorDisplay(ph, cur);
  const cls = 'ph-mirror' + (isEmpty ? ' ph-empty' : '') + (ph.isBlock ? ' block' : '');
  const aria = 'Synchronizovaná hodnota: ' + ph.type + ' ' + ph.content;
  const e = el('span', {
    class: cls,
    'aria-label': aria,
    role: 'note',
    data: {phMirror: ph.dedupKey || ('idx_' + ph.idx)},
  });
  e.textContent = display;
  return e;
}

function formatMirrorDisplay(ph, v) {
  if (v == null || v === '') return '(nevyplněno: ' + ph.content + ')';
  if (Array.isArray(v)) {
    if (v.length === 0) return '(nevyplněno: ' + ph.content + ')';
    return v.filter(x => x).join(', ');
  }
  return String(v);
}

function refreshMirrors(ph) {
  const key = ph.dedupKey;
  if (!key) return;
  const sel = '[data-ph-mirror="' + key.replace(/"/g, '\\"') + '"]';
  const mirrors = $all(sel);
  for (const m of mirrors) {
    const v = state.values[key];
    const isEmpty = v == null || v === '' || (Array.isArray(v) && v.length === 0);
    m.textContent = formatMirrorDisplay(ph, v);
    m.classList.toggle('ph-empty', isEmpty);
  }
}

function makeFormLabel(ph, htmlFor) {
  const lbl = el('label', {class: 'ph-form-label', for: htmlFor},
    [el('span', {class: 'ph-type', text: ph.type + ': '}), ph.content]
  );
  return lbl;
}

function buildTextInput(ph) {
  const id = 'ph-' + ph.idx;
  const cur = getValue(ph) || '';
  const inp = el('input', {
    type: 'text',
    id: id,
    class: 'inline-input',
    value: cur,
    'aria-label': ph.type + ': ' + ph.content,
    placeholder: ph.content,
  });
  inp.addEventListener('input', function() {
    setValue(ph, inp.value);
    refreshMirrors(ph);
    updateMissingStatus();
  });
  const wrap = el('span', {class: 'ph-form ph-text'}, [inp]);
  return wrap;
}

function buildTextareaInput(ph) {
  const id = 'ph-' + ph.idx;
  const cur = getValue(ph) || '';
  const ta = el('textarea', {
    id: id,
    rows: 4,
    'aria-label': ph.type + ': ' + ph.content,
    placeholder: ph.content,
  });
  ta.value = cur;
  ta.addEventListener('input', function() {
    setValue(ph, ta.value);
    refreshMirrors(ph);
    updateMissingStatus();
  });
  const wrap = el('div', {class: 'ph-form ph-textarea ph-block'}, [
    makeFormLabel(ph, id),
    ta,
  ]);
  return wrap;
}

function buildChoiceInput(ph) {
  const opts = ph.content.split(',').map(s => s.trim()).filter(Boolean);
  const cur = getValue(ph);
  const wrap = el('span', {class: 'ph-form ph-vol'});
  wrap.appendChild(el('span', {class: 'ph-form-label'}, [
    el('span', {class: 'ph-type', text: ph.type + ': '}),
  ]));
  const sel = el('select', {
    'aria-label': 'Volba: ' + ph.content,
    class: 'vol-select',
  });
  // Empty placeholder option
  const emptyOpt = el('option', {value: ''});
  emptyOpt.textContent = '— vyberte —';
  sel.appendChild(emptyOpt);
  for (const opt of opts) {
    const o = el('option', {value: opt});
    o.textContent = opt;
    if (cur === opt) o.selected = true;
    sel.appendChild(o);
  }
  sel.addEventListener('change', function() {
    setValue(ph, sel.value);
    updateMissingStatus();
  });
  wrap.appendChild(sel);
  return wrap;
}

/* ---- Item editor (Odrážky / Číslované) ---- */

function buildItemsEditor(ph, kind) {
  // kind: 'bullet' | 'number'
  const wrap = el('div', {class: 'ph-form ph-block ' + (kind === 'bullet' ? 'ph-bull' : 'ph-num')});
  wrap.appendChild(el('div', {class: 'ph-form-label'}, [
    el('span', {class: 'ph-type', text: ph.type + ': '}),
    ph.content,
  ]));
  const ie = el('div', {class: 'ie-wrap'});
  const ul = el('ul', {class: 'ie-list', 'aria-label': 'Položky: ' + ph.content});
  ie.appendChild(ul);

  const foot = el('div', {class: 'ie-foot'}, [
    el('button', {type: 'button', text: '➕ Přidat položku',
      onclick: function() { addItem(); }})
  ]);
  ie.appendChild(foot);

  function getItems() {
    let v = getValue(ph);
    if (!Array.isArray(v)) v = [];
    return v;
  }
  function setItems(arr) {
    setValue(ph, arr);
    refreshMirrors(ph);
    updateMissingStatus();
  }
  function rerender() {
    while (ul.firstChild) ul.removeChild(ul.firstChild);
    const items = getItems();
    if (items.length === 0) {
      const li = el('li');
      li.appendChild(el('span', {class: 'ie-text empty', text: '(zatím žádné položky)'}));
      ul.appendChild(li);
      return;
    }
    items.forEach(function(it, i) {
      ul.appendChild(buildRow(i, it));
    });
  }
  function addItem() {
    const arr = getItems().slice();
    arr.push('');
    setItems(arr);
    rerender();
    // focus newly added in edit mode
    setTimeout(function() {
      const lastLi = ul.lastChild;
      const editBtn = lastLi && lastLi.querySelector('.te-btn-cell');
      if (editBtn) editBtn.click();
    }, 0);
  }
  function buildRow(i, value) {
    const li = el('li');
    if (kind === 'number') {
      li.appendChild(el('span', {class: 'ie-num', text: (i+1) + '.', 'aria-hidden': 'true'}));
    } else {
      li.appendChild(el('span', {class: 'ie-bul', text: '•', 'aria-hidden': 'true'}));
    }
    const text = el('span', {class: 'ie-text' + (value === '' ? ' empty' : ''),
      text: value === '' ? '(prázdné)' : value});
    li.appendChild(text);
    const acts = el('div', {class: 'ie-acts'});
    const editBtn = el('button', {
      type: 'button',
      class: 'te-btn-cell',
      'aria-label': 'Upravit položku ' + (i+1),
      text: '✏',
      onclick: function() { startEdit(i, li, text, editBtn); }
    });
    const upBtn = el('button', {
      type: 'button',
      class: 'te-btn-cell',
      'aria-label': 'Přesunout položku ' + (i+1) + ' nahoru',
      text: '▲',
      onclick: function() {
        if (i === 0) return;
        const arr = getItems().slice();
        const tmp = arr[i-1]; arr[i-1] = arr[i]; arr[i] = tmp;
        setItems(arr); rerender();
      }
    });
    if (i === 0) upBtn.disabled = true;
    const dnBtn = el('button', {
      type: 'button',
      class: 'te-btn-cell',
      'aria-label': 'Přesunout položku ' + (i+1) + ' dolů',
      text: '▼',
      onclick: function() {
        const arr = getItems().slice();
        if (i >= arr.length - 1) return;
        const tmp = arr[i+1]; arr[i+1] = arr[i]; arr[i] = tmp;
        setItems(arr); rerender();
      }
    });
    if (i >= getItems().length - 1) dnBtn.disabled = true;
    const insBtn = el('button', {
      type: 'button',
      class: 'te-btn-cell',
      'aria-label': 'Vložit položku pod ' + (i+1),
      text: '➕ pod',
      onclick: function() {
        const arr = getItems().slice();
        arr.splice(i+1, 0, '');
        setItems(arr); rerender();
        setTimeout(function() {
          const newLi = ul.children[i+1];
          if (newLi) {
            const eb = newLi.querySelector('.te-btn-cell');
            if (eb) eb.click();
          }
        }, 0);
      }
    });
    const delBtn = el('button', {
      type: 'button',
      class: 'te-btn-cell',
      'aria-label': 'Smazat položku ' + (i+1),
      text: '🗑',
      onclick: function() {
        const arr = getItems().slice();
        arr.splice(i, 1);
        setItems(arr); rerender();
      }
    });
    acts.appendChild(editBtn);
    acts.appendChild(upBtn);
    acts.appendChild(dnBtn);
    acts.appendChild(insBtn);
    acts.appendChild(delBtn);
    li.appendChild(acts);
    return li;
  }
  function startEdit(i, li, textSpan, editBtn) {
    const arr = getItems();
    const inp = el('input', {
      type: 'text',
      class: 'ie-input',
      value: arr[i] || '',
      'aria-label': 'Položka ' + (i+1) + ' - hodnota',
    });
    const okBtn = el('button', {
      type: 'button',
      class: 'te-btn-cell',
      'aria-label': 'Uložit',
      text: '✓',
    });
    const cancelBtn = el('button', {
      type: 'button',
      class: 'te-btn-cell',
      'aria-label': 'Zrušit',
      text: '✗',
    });
    function commit() {
      const newArr = getItems().slice();
      newArr[i] = inp.value;
      setItems(newArr); rerender();
    }
    function cancel() { rerender(); }
    okBtn.addEventListener('click', commit);
    cancelBtn.addEventListener('click', cancel);
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
    // Replace text span with input + replace edit button area
    textSpan.replaceWith(inp);
    // Replace acts buttons: keep just OK / Cancel
    const acts = li.querySelector('.ie-acts');
    while (acts.firstChild) acts.removeChild(acts.firstChild);
    acts.appendChild(okBtn);
    acts.appendChild(cancelBtn);
    inp.focus();
    inp.select();
  }
  rerender();
  wrap.appendChild(ie);
  return wrap;
}

/* ---- Table editor ---- */

function buildTableEditor(ph) {
  const cols = ph.content.split(',').map(s => s.trim()).filter(Boolean);
  const wrap = el('div', {class: 'ph-form ph-block ph-tbl'});
  wrap.appendChild(el('div', {class: 'ph-form-label'}, [
    el('span', {class: 'ph-type', text: ph.type + ': '}),
    cols.join(', '),
  ]));
  const teWrap = el('div', {class: 'te-wrap'});

  const tbl = el('table', {class: 'te-tbl', 'aria-label': 'Tabulka: ' + ph.content});
  const thead = el('thead');
  const trh = el('tr');
  for (const c of cols) trh.appendChild(el('th', {scope: 'col', text: c}));
  trh.appendChild(el('th', {scope: 'col', text: 'Akce'}));
  thead.appendChild(trh);
  tbl.appendChild(thead);
  const tbody = el('tbody');
  tbl.appendChild(tbody);
  teWrap.appendChild(tbl);

  const foot = el('div', {class: 'te-foot'});
  foot.appendChild(el('button', {type: 'button', text: '➕ Přidat řádek dolů',
    onclick: function() { addRow(); }}));
  // For real Tabulka placeholders (not virtual inline tables): allow removing the whole table.
  if (ph.type === 'Tabulka' && !ph._virtualKey) {
    foot.appendChild(el('button', {
      type: 'button',
      class: 'btn-danger',
      text: '🗑 Odebrat tabulku celou',
      'aria-label': 'Odebrat celou tabulku — bude přeskočena ve výsledku',
      onclick: function() {
        if (!confirm('Opravdu odebrat celou tabulku? Bude ve výsledku přeskočena.')) return;
        setValue(ph, undefined);
        const act = buildTableActivator(ph);
        wrap.replaceWith(act);
        updateMissingStatus();
      },
    }));
  }
  teWrap.appendChild(foot);

  function getRows() {
    let v = getValue(ph);
    if (!Array.isArray(v)) v = [];
    return v;
  }
  function setRows(arr) {
    setValue(ph, arr);
    updateMissingStatus();
  }
  function rerender() {
    while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
    let rows = getRows();
    if (rows.length === 0) {
      // Provide one empty row by default (per spec)
      rows = [makeEmptyRow()];
      setRows(rows);
    }
    rows.forEach(function(r, i) { tbody.appendChild(buildRow(i, r)); });
  }
  function makeEmptyRow() {
    const r = {};
    for (const c of cols) r[c] = '';
    return r;
  }
  function addRow() {
    const arr = getRows().slice();
    arr.push(makeEmptyRow());
    setRows(arr);
    rerender();
    setTimeout(function() {
      const lastTr = tbody.lastChild;
      if (lastTr) {
        const firstEdit = lastTr.querySelector('.te-btn-cell');
        if (firstEdit) firstEdit.click();
      }
    }, 0);
  }
  function buildRow(rowIdx, rowData) {
    const tr = el('tr');
    cols.forEach(function(col, ci) {
      const td = el('td');
      td.appendChild(buildCell(rowIdx, col, ci));
      tr.appendChild(td);
    });
    const actsTd = el('td');
    actsTd.appendChild(buildRowActs(rowIdx));
    tr.appendChild(actsTd);
    return tr;
  }
  function buildCell(rowIdx, col, colIdx) {
    const cell = el('div', {class: 'te-cell'});
    const arr = getRows();
    const val = (arr[rowIdx] && arr[rowIdx][col]) || '';
    const text = el('span', {
      class: 'te-cell-text' + (val === '' ? ' empty' : ''),
      text: val === '' ? '(prázdné)' : val,
    });
    const editBtn = el('button', {
      type: 'button',
      class: 'te-btn-cell',
      'aria-label': 'Upravit ' + col + ', řádek ' + (rowIdx+1),
      text: '✏',
    });
    function startEdit() {
      const inp = el('input', {
        type: 'text',
        class: 'te-cell-input',
        value: (getRows()[rowIdx] && getRows()[rowIdx][col]) || '',
        'aria-label': col + ', řádek ' + (rowIdx+1),
      });
      const ok = el('button', {
        type: 'button', class: 'te-btn-cell', text: '✓', 'aria-label': 'Uložit'
      });
      const cancel = el('button', {
        type: 'button', class: 'te-btn-cell', text: '✗', 'aria-label': 'Zrušit'
      });
      function commit() {
        const a = getRows().slice();
        if (!a[rowIdx]) a[rowIdx] = makeEmptyRow();
        a[rowIdx] = Object.assign({}, a[rowIdx], (function(){var o={};o[col]=inp.value;return o;})());
        setRows(a);
        rerender();
      }
      function abort() { rerender(); }
      ok.addEventListener('click', commit);
      cancel.addEventListener('click', abort);
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        else if (e.key === 'Escape') { e.preventDefault(); abort(); }
      });
      while (cell.firstChild) cell.removeChild(cell.firstChild);
      cell.appendChild(inp);
      cell.appendChild(ok);
      cell.appendChild(cancel);
      inp.focus();
      inp.select();
    }
    editBtn.addEventListener('click', startEdit);
    cell.appendChild(text);
    cell.appendChild(editBtn);
    return cell;
  }
  function buildRowActs(rowIdx) {
    const wrap = el('div', {class: 'te-row-acts'});
    const total = getRows().length;
    const upBtn = el('button', {
      type: 'button', class: 'te-btn-cell', text: '▲',
      'aria-label': 'Posunout řádek ' + (rowIdx+1) + ' nahoru',
      onclick: function() {
        if (rowIdx === 0) return;
        const a = getRows().slice();
        const t = a[rowIdx-1]; a[rowIdx-1] = a[rowIdx]; a[rowIdx] = t;
        setRows(a); rerender();
      }
    });
    if (rowIdx === 0) upBtn.disabled = true;
    const dnBtn = el('button', {
      type: 'button', class: 'te-btn-cell', text: '▼',
      'aria-label': 'Posunout řádek ' + (rowIdx+1) + ' dolů',
      onclick: function() {
        const a = getRows().slice();
        if (rowIdx >= a.length - 1) return;
        const t = a[rowIdx+1]; a[rowIdx+1] = a[rowIdx]; a[rowIdx] = t;
        setRows(a); rerender();
      }
    });
    if (rowIdx >= total - 1) dnBtn.disabled = true;
    const insBtn = el('button', {
      type: 'button', class: 'te-btn-cell', text: '➕ pod',
      'aria-label': 'Vložit řádek pod ' + (rowIdx+1),
      onclick: function() {
        const a = getRows().slice();
        a.splice(rowIdx+1, 0, makeEmptyRow());
        setRows(a); rerender();
        setTimeout(function() {
          const newTr = tbody.children[rowIdx+1];
          if (newTr) {
            const eb = newTr.querySelector('.te-btn-cell');
            if (eb) eb.click();
          }
        }, 0);
      }
    });
    const delBtn = el('button', {
      type: 'button', class: 'te-btn-cell', text: '🗑',
      'aria-label': 'Smazat řádek ' + (rowIdx+1),
      onclick: function() {
        const a = getRows().slice();
        a.splice(rowIdx, 1);
        setRows(a); rerender();
      }
    });
    wrap.appendChild(upBtn);
    wrap.appendChild(dnBtn);
    wrap.appendChild(insBtn);
    wrap.appendChild(delBtn);
    return wrap;
  }
  rerender();
  wrap.appendChild(teWrap);
  return wrap;
}

/* ============================================================
 * STATUS / VYPLNĚNOST
 * ============================================================ */

function updateMissingStatus() {
  if (!state.templateText) return;
  let missing = 0;
  let total = 0;
  const seenKeys = new Set();
  function countPlaceholder(ph, src) {
    if (ph.type === 'Spot') return; // Spot has no fill state
    if (ph.type === 'Tabulka') return; // Tabulka is optional
    if (ph.dedupKey) {
      if (seenKeys.has(ph.dedupKey)) return;
      seenKeys.add(ph.dedupKey);
    }
    total++;
    const valuesSrc = src || state.values;
    const v = ph._virtualKey ? valuesSrc[ph._virtualKey]
            : ph.dedupKey ? valuesSrc[ph.dedupKey]
            : valuesSrc['__idx_' + ph.idx];
    const empty = v == null || v === '' || (Array.isArray(v) && (v.length === 0 || v.every(function(x){
      if (typeof x === 'string') return x === '';
      if (typeof x === 'object' && x !== null) return Object.values(x).every(function(y){return y === '';});
      return false;
    })));
    if (empty) missing++;
  }
  for (const ph of state.placeholders) countPlaceholder(ph, state.values);
  // Count placeholders inside each repeat instance — each instance is its own dedup scope.
  let repeatExtra = 0;
  for (const rep of state.repeats) {
    const repKey = '__repeat_' + rep.idx;
    const instances = state.values[repKey];
    if (!Array.isArray(instances)) continue;
    for (let ii = 0; ii < instances.length; ii++) {
      seenKeys.clear();
      const before = missing;
      const beforeTotal = total;
      for (const ph of rep.placeholders) countPlaceholder(ph, instances[ii]);
      // Track extra instance-level placeholders for clarity (not strictly needed).
      repeatExtra += (total - beforeTotal);
    }
    seenKeys.clear();
    // Restore global seenKeys for any subsequent global pass (none now).
  }
  // After scanning instances, restore seenKeys content with global dedup keys for safety
  // (subsequent counting passes would need this; currently none).
  const filled = total - missing;
  if (total === 0) {
    setStatus('info', 'Šablona nemá žádné placeholdery.');
  } else if (missing === 0) {
    setStatus('ok', 'Vyplněno: ' + filled + ' / ' + total + ' polí.');
  } else {
    setStatus('info', 'Vyplněno: ' + filled + ' / ' + total + ' polí (' + missing + ' nevyplněno).');
  }
}

/* ============================================================
 * NAČTENÍ ŠABLONY
 * ============================================================ */

function showWorkUI() {
  // After a template is loaded: collapse the loader, reveal the work toolbar and mode switcher.
  const ld = $('#load-details');
  if (ld) ld.open = false;
  const wt = $('#work-toolbar');
  if (wt) wt.hidden = false;
  const ma = $('#mode-aside');
  if (ma) ma.hidden = false;
  const layout = document.querySelector('.app-layout');
  if (layout) layout.classList.add('with-aside');
}

function parseTemplateStructure(text) {
  // Parse a template string into placeholders, instructions, inline tables, and repeats.
  // Items that fall inside an Opakování body are moved into that repeat's per-instance arrays
  // (with positions adjusted to be relative to bodyStart and indices re-numbered).
  // Mirror flags are re-detected per-scope (each repeat is a separate dedup scope).
  const repeats = parseRepeats(text);
  let placeholders = parsePlaceholders(text);
  let instructions = parseInstructions(text);
  let inlineTables = findInlineTables(text, placeholders, instructions);
