}

function dlgVFolderAddNotes(noteId) {
  var n = getNote(noteId);
  if (!n || !n.vfolderData) return;
  var existing = n.vfolderData.noteIds || [];
  var h = '<label>Vyberte poznámky k přidání:</label>';
  h += '<input id="dlg-vf-search" placeholder="Hledat..." oninput="filterDlgList(this.value,\'vf-add-item\')" style="margin-bottom:6px">';
  h += '<div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;padding:6px">';
  for (var i = 0; i < BD.notes.length; i++) {
    var cn = BD.notes[i];
    if (cn.id === noteId) continue;
    if (existing.indexOf(cn.id) !== -1) continue;
    h += '<label class="vf-add-item" style="display:flex;align-items:center;gap:6px;padding:3px 4px;font-size:.88rem;cursor:pointer">';
    h += '<input type="checkbox" value="' + cn.id + '" class="vf-add-cb" style="width:auto">';
    h += (cn.icon || "&#128221;") + ' ' + esc(cn.name);
    h += '</label>';
  }
  h += '</div>';
  showDialog("Přidat poznámky", h, function() {
    var cbs = document.querySelectorAll(".vf-add-cb:checked");
    for (var j = 0; j < cbs.length; j++) {
      n.vfolderData.noteIds.push(cbs[j].value);
    }
    n.modified = now();
    closeDialog();
    renderNoteView(noteId);
    dbg("Přidáno " + cbs.length + " poznámek do virtuální složky");
  });
}

function filterDlgList(query, cls) {
  var q = query.toLowerCase();
  var items = document.querySelectorAll("." + cls);
  for (var i = 0; i < items.length; i++) {
    items[i].style.display = items[i].textContent.toLowerCase().indexOf(q) !== -1 ? "" : "none";
  }
}

function dlgVFolderEditDesc(noteId) {
  var n = getNote(noteId);
  if (!n || !n.vfolderData) return;
  var h = '<label>Popis (Markdown):</label><textarea id="dlg-vf-desc" rows="6">' + esc(n.vfolderData.description || "") + '</textarea>';
  showDialog("Popis virtuální složky", h, function() {
    n.vfolderData.description = document.getElementById("dlg-vf-desc").value;
    n.modified = now();
    closeDialog();
    renderNoteView(noteId);
  });
}

function removeFromVFolder(noteId, removeId) {
  var n = getNote(noteId);
  if (!n || !n.vfolderData) return;
  var idx = n.vfolderData.noteIds.indexOf(removeId);
  if (idx !== -1) {
    n.vfolderData.noteIds.splice(idx, 1);
    n.modified = now();
    renderNoteView(noteId);
    dbg("Poznámka odebrána z virtuální složky");
  }
}

// ===== DATABASE NOTE =====
var DB_SORT = { field: null, dir: "asc" };
var DB_FILTERS = {};

function renderDbNoteView(noteId) {
  var n = getNote(noteId);
  if (!n) return;
  var db = n.dbData || { fields: [], records: [] };

  var tb = document.getElementById("toolbar");
  var tbH = "";
  var bmCls = n.bookmarked ? "bm-star active" : "bm-star";
  tbH += '<button class="' + bmCls + '" onclick="toggleBookmark(\'' + noteId + '\')" accesskey="b" title="Oblíbené (Alt+B)">Oblíbené<span class="ak">B</span></button>';
  tbH += '<button class="sm" onclick="dlgDbAddField(\'' + noteId + '\')">Pole</button>';
  if (db.fields.length > 0) {
    tbH += '<button class="sm primary" onclick="dlgDbAddRecord(\'' + noteId + '\')">Záznam</button>';
  }
  tbH += '<button class="sm" onclick="dbClearFilters(\'' + noteId + '\')">Reset filtrů</button>';
  tbH += '<button class="sm" onclick="dlgRenameNote(\'' + noteId + '\')">Přejmenovat</button>';
  tbH += '<button class="sm" onclick="dlgNoteTags(\'' + noteId + '\')">Štítky</button>';
  tbH += '<button class="sm" onclick="dlgNoteMeta(\'' + noteId + '\')" accesskey="m">Metadata<span class="ak">M</span></button>';
  tbH += '<button class="sm" onclick="dlgMoveNote(\'' + noteId + '\')">Přesunout</button>';
  tbH += '<span class="sep"></span>';
  tbH += '<button class="sm danger" onclick="dlgDeleteNote(\'' + noteId + '\')">Smazat</button>';
  tb.innerHTML = tbH;

  var vw = document.getElementById("view");
  var h = '<div id="crumb">' + breadcrumb(n.folderId) + "</div>";
  h += renderVFolderMemberships(noteId);
  h += '<h6 style="margin:0 0 4px;font-size:.72rem;text-transform:uppercase;color:var(--text2);letter-spacing:.5px">Databáze</h6>';
  h += "<h1>" + (n.icon || "&#128202;") + " " + esc(n.name) + "</h1>";

  if (db.fields.length === 0) {
    h += '<div class="empty">Databáze nemá žádná pole. Klikněte na <strong>➕ Pole</strong> pro definici struktury.</div>';
    vw.innerHTML = h; return;
  }

  // Fields management
  h += '<details style="margin:8px 0;font-size:.84rem"><summary style="cursor:pointer;color:var(--text2)">Struktura (' + db.fields.length + ' polí)</summary>';
  h += '<div style="padding:6px 0">';
  for (var fi = 0; fi < db.fields.length; fi++) {
    var fld = db.fields[fi];
    var tl = fld.type === "text" ? "Text" : fld.type === "number" ? "Číslo" : fld.type === "date" ? "Datum" : fld.type === "bool" ? "Ano/Ne" : "Výběr";
    h += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0">';
    h += '<strong>' + esc(fld.name) + '</strong> <span style="color:var(--text2)">(' + tl;
    if (fld.type === "select" && fld.options) h += ': ' + esc(fld.options.join(", "));
    h += ')</span>';
    h += ' <button class="sm" onclick="dlgDbEditField(\'' + noteId + '\',\'' + fld.id + '\')" style="font-size:.7rem;padding:1px 5px">&#9998;</button>';
    h += ' <button class="sm danger" onclick="dbDeleteField(\'' + noteId + '\',\'' + fld.id + '\')" style="font-size:.7rem;padding:1px 5px">&#10060;</button>';
    h += '</div>';
  }
  h += '</div></details>';

  // Filter row
  h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin:6px 0;font-size:.82rem">';
  for (var ffi = 0; ffi < db.fields.length; ffi++) {
    var ff = db.fields[ffi];
    var fVal = DB_FILTERS[ff.id] || "";
    h += '<label style="display:flex;align-items:center;gap:3px">' + esc(ff.name) + ': ';
    if (ff.type === "bool") {
      h += '<select onchange="dbSetFilter(\'' + noteId + '\',\'' + ff.id + '\',this.value)" style="font-size:.8rem;padding:1px 4px;width:auto">';
      h += '<option value="">vše</option><option value="true"' + (fVal === "true" ? " selected" : "") + '>Ano</option><option value="false"' + (fVal === "false" ? " selected" : "") + '>Ne</option></select>';
    } else if (ff.type === "select" && ff.options) {
      h += '<select onchange="dbSetFilter(\'' + noteId + '\',\'' + ff.id + '\',this.value)" style="font-size:.8rem;padding:1px 4px;width:auto">';
      h += '<option value="">vše</option>';
      for (var oi = 0; oi < ff.options.length; oi++) {
        h += '<option value="' + esc(ff.options[oi]) + '"' + (fVal === ff.options[oi] ? " selected" : "") + '>' + esc(ff.options[oi]) + '</option>';
      }
      h += '</select>';
    } else {
      h += '<input value="' + esc(fVal) + '" onchange="dbSetFilter(\'' + noteId + '\',\'' + ff.id + '\',this.value)" style="font-size:.8rem;padding:1px 4px;width:80px">';
    }
    h += '</label>';
  }
  h += '</div>';

  // Records
  var recs = dbFilteredRecords(db);
  recs = dbSortedRecords(recs, db);

  h += '<table class="tbl"><thead><tr>';
  for (var ci = 0; ci < db.fields.length; ci++) {
    var sf = db.fields[ci];
    var arrow = DB_SORT.field === sf.id ? (DB_SORT.dir === "asc" ? " &#9650;" : " &#9660;") : "";
    h += '<th style="cursor:pointer" onclick="dbToggleSort(\'' + noteId + '\',\'' + sf.id + '\')">' + esc(sf.name) + arrow + '</th>';
  }
  h += '<th style="width:1%">Akce</th></tr></thead><tbody>';

  if (recs.length === 0) {
    h += '<tr><td colspan="' + (db.fields.length + 1) + '" style="text-align:center;color:var(--text2)">Žádné záznamy</td></tr>';
  }
  for (var ri = 0; ri < recs.length; ri++) {
    var rec = recs[ri];
    h += '<tr>';
    for (var rci = 0; rci < db.fields.length; rci++) {
      var rf = db.fields[rci];
      var val = rec.values[rf.id];
      if (val === undefined || val === null) val = "";
      if (rf.type === "bool") val = val ? "Ano" : "Ne";
      h += '<td>' + esc(String(val)) + '</td>';
    }
    h += '<td style="white-space:nowrap">';
    h += '<button class="sm" onclick="dlgDbEditRecord(\'' + noteId + '\',\'' + rec.id + '\')" style="font-size:.7rem;padding:1px 5px">&#9998;</button> ';
    h += '<button class="sm danger" onclick="dbDeleteRecord(\'' + noteId + '\',\'' + rec.id + '\')" style="font-size:.7rem;padding:1px 5px">&#10060;</button>';
    h += '</td></tr>';
  }
  h += '</tbody></table>';
  h += '<p style="font-size:.82rem;color:var(--text2);margin:6px 0">' + recs.length + ' / ' + db.records.length + ' záznamů</p>';

  // Backlinks
  var bl = findBacklinks(noteId);
  if (bl.links.length > 0) {
    h += '<div class="backlinks"><h3>&#8617; Odkazuje sem</h3><ul>';
    for (var li = 0; li < bl.links.length; li++) {
      var bn = getNote(bl.links[li]);
      if (bn) h += '<li><a href="#" onclick="openNote(\'' + bn.id + '\');return false">' + (bn.icon || "&#128221;") + " " + esc(bn.name) + "</a></li>";
    }
    h += "</ul></div>";
  }

  vw.innerHTML = h;
}

function renderDbInclude(note) {
  var db = note.dbData || {};
  if (!db.fields || db.fields.length === 0) return '<em>[Databáze: ' + esc(note.name) + ' (prázdná)]</em>';
  var h = '<table style="border-collapse:collapse;width:100%;font-size:.88rem;margin:6px 0"><thead><tr>';
  for (var i = 0; i < db.fields.length; i++) {
    h += '<th style="border:1px solid var(--border);padding:4px 8px;background:var(--surface2);text-align:left;font-size:.82rem">' + esc(db.fields[i].name) + '</th>';
  }
  h += '</tr></thead><tbody>';
  var recs = db.records || [];
  for (var ri = 0; ri < recs.length; ri++) {
    h += '<tr>';
    for (var ci = 0; ci < db.fields.length; ci++) {
      var f = db.fields[ci], val = recs[ri].values[f.id];
      if (val === undefined || val === null) val = "";
      if (f.type === "bool") val = val ? "Ano" : "Ne";
      h += '<td style="border:1px solid var(--border);padding:4px 8px">' + esc(String(val)) + '</td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table>';
  return h;
}

function dlgDbAddField(noteId) {
  var h = '<label>Název pole:</label><input id="dlg-db-fname" placeholder="Název">';
  h += '<label>Typ:</label><select id="dlg-db-ftype" onchange="document.getElementById(\'dlg-db-fopts-wrap\').style.display=this.value===\'select\'?\'block\':\'none\'">';
  h += '<option value="text">Text</option><option value="number">Číslo</option><option value="date">Datum</option><option value="bool">Ano/Ne</option><option value="select">Výběr</option></select>';
  h += '<div id="dlg-db-fopts-wrap" style="display:none"><label>Hodnoty (oddělte čárkou):</label><input id="dlg-db-fopts" placeholder="hodnota1, hodnota2"></div>';
  showDialog("Přidat pole", h, function() {
    var name = document.getElementById("dlg-db-fname").value.trim();
    var type = document.getElementById("dlg-db-ftype").value;
    if (!name) return alert("Zadejte název pole.");
    var n = getNote(noteId); if (!n || !n.dbData) return;
    var fld = { id: genId(), name: name, type: type };
    if (type === "select") {
      fld.options = document.getElementById("dlg-db-fopts").value.split(",").map(function(s){return s.trim()}).filter(function(s){return s});
    }
    n.dbData.fields.push(fld);
    n.modified = now();
    closeDialog();
    renderNoteView(noteId);
    dbg("Pole přidáno: " + name);
  });
}

function dlgDbEditField(noteId, fieldId) {
  var n = getNote(noteId); if (!n || !n.dbData) return;
  var fld = null;
  for (var i = 0; i < n.dbData.fields.length; i++) { if (n.dbData.fields[i].id === fieldId) { fld = n.dbData.fields[i]; break; } }
  if (!fld) return;
  var h = '<label>Název pole:</label><input id="dlg-db-fname" value="' + esc(fld.name) + '">';
  h += '<label>Typ: <strong>' + esc(fld.type) + '</strong> (nelze změnit)</label>';
  if (fld.type === "select") {
    h += '<label>Hodnoty (oddělte čárkou):</label><input id="dlg-db-fopts" value="' + esc((fld.options || []).join(", ")) + '">';
  }
  showDialog("Upravit pole", h, function() {
    fld.name = document.getElementById("dlg-db-fname").value.trim() || fld.name;
    if (fld.type === "select") {
      fld.options = document.getElementById("dlg-db-fopts").value.split(",").map(function(s){return s.trim()}).filter(function(s){return s});
    }
    n.modified = now();
    closeDialog();
    renderNoteView(noteId);
  });
}

function dbDeleteField(noteId, fieldId) {
  var n = getNote(noteId); if (!n || !n.dbData) return;
  if (!confirm("Smazat pole a všechna jeho data?")) return;
  n.dbData.fields = n.dbData.fields.filter(function(f){return f.id !== fieldId});
  for (var i = 0; i < n.dbData.records.length; i++) { delete n.dbData.records[i].values[fieldId]; }
  n.modified = now();
  renderNoteView(noteId);
}

function dlgDbAddRecord(noteId) {
  var n = getNote(noteId); if (!n || !n.dbData) return;
  var db = n.dbData;
  var h = '';
  for (var i = 0; i < db.fields.length; i++) {
    var f = db.fields[i];
    h += '<label>' + esc(f.name) + ':</label>';
    if (f.type === "bool") {
      h += '<select id="dlg-dbr-' + f.id + '"><option value="false">Ne</option><option value="true">Ano</option></select>';
    } else if (f.type === "select" && f.options) {
      h += '<select id="dlg-dbr-' + f.id + '"><option value="">—</option>';
      for (var j = 0; j < f.options.length; j++) { h += '<option value="' + esc(f.options[j]) + '">' + esc(f.options[j]) + '</option>'; }
      h += '</select>';
    } else if (f.type === "date") {
      h += '<input id="dlg-dbr-' + f.id + '" type="date">';
    } else if (f.type === "number") {
      h += '<input id="dlg-dbr-' + f.id + '" type="number" step="any">';
    } else {
      h += '<input id="dlg-dbr-' + f.id + '">';
    }
  }
  showDialog("Přidat záznam", h, function() {
    var rec = { id: genId(), values: {} };
    for (var k = 0; k < db.fields.length; k++) {
      var fk = db.fields[k];
      var el = document.getElementById("dlg-dbr-" + fk.id);
      if (!el) continue;
      if (fk.type === "bool") rec.values[fk.id] = el.value === "true";
      else if (fk.type === "number") rec.values[fk.id] = el.value ? parseFloat(el.value) : null;
      else rec.values[fk.id] = el.value;
    }
    db.records.push(rec);
    n.modified = now();
    closeDialog();
    renderNoteView(noteId);
  });
}

function dlgDbEditRecord(noteId, recId) {
  var n = getNote(noteId); if (!n || !n.dbData) return;
  var db = n.dbData;
  var rec = null;
  for (var i = 0; i < db.records.length; i++) { if (db.records[i].id === recId) { rec = db.records[i]; break; } }
  if (!rec) return;
  var h = '';
  for (var fi = 0; fi < db.fields.length; fi++) {
    var f = db.fields[fi];
    var val = rec.values[f.id];
    if (val === undefined || val === null) val = "";
    h += '<label>' + esc(f.name) + ':</label>';
    if (f.type === "bool") {
      h += '<select id="dlg-dbr-' + f.id + '"><option value="false"' + (!val ? " selected" : "") + '>Ne</option><option value="true"' + (val ? " selected" : "") + '>Ano</option></select>';
    } else if (f.type === "select" && f.options) {
      h += '<select id="dlg-dbr-' + f.id + '"><option value="">—</option>';
      for (var j = 0; j < f.options.length; j++) { h += '<option value="' + esc(f.options[j]) + '"' + (String(val) === f.options[j] ? " selected" : "") + '>' + esc(f.options[j]) + '</option>'; }
      h += '</select>';
    } else if (f.type === "date") {
      h += '<input id="dlg-dbr-' + f.id + '" type="date" value="' + esc(String(val)) + '">';
    } else if (f.type === "number") {
      h += '<input id="dlg-dbr-' + f.id + '" type="number" step="any" value="' + esc(String(val)) + '">';
    } else {
      h += '<input id="dlg-dbr-' + f.id + '" value="' + esc(String(val)) + '">';
    }
  }
  showDialog("Upravit záznam", h, function() {
    for (var k = 0; k < db.fields.length; k++) {

function dbToggleSort(noteId, fieldId) {
  if (DB_SORT.field === fieldId) { DB_SORT.dir = DB_SORT.dir === "asc" ? "desc" : "asc"; }
  else { DB_SORT.field = fieldId; DB_SORT.dir = "asc"; }
  renderNoteView(noteId);
}

function dbSetFilter(noteId, fieldId, val) {
  DB_FILTERS[fieldId] = val;
  renderNoteView(noteId);
}

function dbClearFilters(noteId) {
  DB_FILTERS = {};
  DB_SORT = { field: null, dir: "asc" };
  renderNoteView(noteId);
}

function dbFilteredRecords(db) {
  var recs = db.records.slice();
  for (var fid in DB_FILTERS) {
    var fval = DB_FILTERS[fid];
    if (!fval) continue;
    var fld = null;
    for (var i = 0; i < db.fields.length; i++) { if (db.fields[i].id === fid) { fld = db.fields[i]; break; } }
    if (!fld) continue;
    recs = recs.filter(function(r) {
      var v = r.values[fid];
      if (v === undefined || v === null) v = "";
      if (fld.type === "bool") return String(v) === fval;
      if (fld.type === "number") return String(v).indexOf(fval) !== -1;
      return String(v).toLowerCase().indexOf(fval.toLowerCase()) !== -1;
    });
  }
  return recs;
}

function dbSortedRecords(recs, db) {
  if (!DB_SORT.field) return recs;
  var fld = null;
  for (var i = 0; i < db.fields.length; i++) { if (db.fields[i].id === DB_SORT.field) { fld = db.fields[i]; break; } }
  if (!fld) return recs;
  var dir = DB_SORT.dir === "asc" ? 1 : -1;
  return recs.slice().sort(function(a, b) {
    var va = a.values[fld.id], vb = b.values[fld.id];
    if (va === undefined || va === null) va = "";
    if (vb === undefined || vb === null) vb = "";
    if (fld.type === "number") return (parseFloat(va) - parseFloat(vb)) * dir || 0;
    return String(va).localeCompare(String(vb), "cs") * dir;
  });
}

// ===== TOC =====
function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9áčďéěíňóřšťúůýž]+/gi, "-").replace(/(^-|-$)/g, "");
}

function generateTOC(content) {
  if (!content) return "";
  var lines = content.split("\n");
  var headings = [];
  var inCode = false;
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].match(/^```/)) { inCode = !inCode; continue; }
    if (inCode) continue;
    var m = lines[i].match(/^(#{1,6})\s+(.+)/);
    if (m) headings.push({ level: m[1].length, text: m[2] });
  }
  if (headings.length < 2) return "";
  var minLevel = 6;
  for (var j = 0; j < headings.length; j++) {
    if (headings[j].level < minLevel) minLevel = headings[j].level;
  }
  var h = '<div class="note-toc"><h3>Obsah</h3>';
  var curDepth = 0;
  for (var k = 0; k < headings.length; k++) {
    var targetDepth = headings[k].level - minLevel + 1;
    while (curDepth < targetDepth) { h += "<ul>"; curDepth++; }
    while (curDepth > targetDepth) { h += "</ul>"; curDepth--; }
    var slug = slugify(headings[k].text) + "-" + k;
    h += '<li><a href="#toc-' + slug + '">' + esc(headings[k].text) + "</a></li>";
  }
  while (curDepth > 0) { h += "</ul>"; curDepth--; }
  h += "</div>";
  return h;
}

function renderMarkdownWithIds(src, noteId) {
  var html = renderMarkdown(src, noteId);
  var lines = (src || "").split("\n");
  var headings = [];
  var inCode = false;
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].match(/^```/)) { inCode = !inCode; continue; }
    if (inCode) continue;
    var m = lines[i].match(/^(#{1,6})\s+(.+)/);
    if (m) headings.push({ level: m[1].length, text: m[2] });
  }
  var headingIdx = 0;
  html = html.replace(/<h([1-6])([^>]*)>/g, function(match, level, attrs) {
    var slug = headingIdx < headings.length ? slugify(headings[headingIdx].text) + "-" + headingIdx : "h-" + headingIdx;
    headingIdx++;
    return '<h' + level + attrs + ' id="toc-' + slug + '">';
  });
  return html;
}

function renderSectionEdit(note) {
  var sections = splitSections(note.content || "");
  var tables = findMarkdownTables(note.content || "");
  var h = "";
  var globalTblIdx = 0;
  for (var i = 0; i < sections.length; i++) {
    var sec = sections[i];
    h += '<div style="border:1px solid var(--border);border-radius:6px;margin:8px 0;padding:10px">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
    h += '<strong style="font-size:.88rem;color:var(--text2)">' + (sec.heading ? esc(sec.heading) : "Úvod") + "</strong>";
    h += '<button class="sec-edit-btn" onclick="editSection(' + i + ')" aria-label="Upravit sekci: ' + esc(sec.heading || "Úvod").replace(/^#+\s*/, "") + '">&#9998; Upravit</button>';
    h += "</div>";
    var mdHtml = renderMarkdown(sec.content, note.id);
    // Inject table edit buttons
    if (tables.length > globalTblIdx) {
      var tIdx = globalTblIdx;
      mdHtml = mdHtml.replace(/<\/table>/g, function() {
        var btn = '<div style="margin:4px 0"><button class="sec-edit-btn" onclick="tblEd.open(\'' + note.id + '\',' + tIdx + ')" title="Upravit tabulku ' + (tIdx + 1) + '">&#9998; Upravit tabulku</button></div>';
        tIdx++;
        return '</table>' + btn;
      });
      globalTblIdx = tIdx;
    }
    h += '<div class="md">' + mdHtml + "</div></div>";
  }
  return h;
}

function splitSections(content) {
  var lines = content.split("\n");
  var sections = [];
  var current = { heading: "", content: "" };
  for (var i = 0; i < lines.length; i++) {
    var m = lines[i].match(/^(#{1,6})\s+(.+)/);
    if (m && i > 0) {
      sections.push(current);
      current = { heading: lines[i], content: lines[i] + "\n" };
    } else {
      current.content += lines[i] + "\n";
    }
  }
  sections.push(current);
  return sections;
}

// ===== TASK CHECKBOXES =====
function bindTaskCheckboxes(noteId) {
  var cbs = document.querySelectorAll('.task-cb[data-note="' + noteId + '"]');
  for (var ci = 0; ci < cbs.length; ci++) {
    (function(cb) {
      cb.addEventListener("change", function() {
        var n = getNote(noteId);
        if (!n) return;
        var idx = parseInt(this.dataset.idx, 10);
        var lines = n.content.split("\n");
        var taskCount = 0;
        for (var i = 0; i < lines.length; i++) {
          if (/^- \[[ x]\]/.test(lines[i])) {
            if (taskCount === idx) {
              if (cb.checked) lines[i] = lines[i].replace("- [ ]", "- [x]");
              else lines[i] = lines[i].replace("- [x]", "- [ ]");
              break;
            }
            taskCount++;
          }
        }
        n.content = lines.join("\n");
        n.modified = now();
        renderNoteView(noteId);
        renderNav();
        refreshPreview(noteId);
      });
    })(cbs[ci]);
  }
}

function deleteCompletedTasks(noteId) {
  var n = getNote(noteId);
  if (!n || !n.content) return;
  var lines = n.content.split("\n");
  var filtered = [];
  var removed = 0;
  for (var i = 0; i < lines.length; i++) {
    if (/^- \[x\] /.test(lines[i])) {
      removed++;
    } else {
      filtered.push(lines[i]);
    }
  }
  if (removed === 0) {
    alert("Žádné hotové úkoly k smazání.");
    return;
  }
  if (!confirm("Smazat " + removed + " hotový" + (removed === 1 ? " úkol" : removed < 5 ? "é úkoly" : "ch úkolů") + "?")) return;
  n.content = filtered.join("\n");
  n.modified = now();
  renderNoteView(noteId);
  renderNav();
  refreshPreview(noteId);
  dbg("Smazáno " + removed + " hotových úkolů z: " + n.name);
}

// ===== MARKDOWN RENDERING =====
function renderMarkdown(src, noteId, depth, seen) {
  if (!src) return "";
  depth = depth || 0;
  seen = seen || {};
  if (depth > 10) return "<em>(příliš hluboké vnoření)</em>";

  src = src.replace(/\{\{(.+?)\}\}/g, function(match, name) {
    var inc = findNoteByName(name.trim());
    if (!inc) return '<em style="color:var(--danger)">[Include nenalezeno: ' + esc(name) + "]</em>";
    if (seen[inc.id]) return '<em style="color:var(--danger)">[Cyklický include: ' + esc(name) + "]</em>";
    if (inc.noteType === "task") return renderTaskInclude(inc);
    if (inc.noteType === "file") return '<em>[Soubor: ' + esc(inc.name) + "]</em>";
    if (inc.noteType === "iframe") return '<em>[Web: <a href="' + esc(inc.iframeUrl || "") + '" target="_blank">' + esc(inc.name) + '</a>]</em>';
    if (inc.noteType === "vfolder") return renderVFolderInclude(inc);
    if (inc.noteType === "database") return renderDbInclude(inc);
    var newSeen = {}; for (var k in seen) newSeen[k] = true; newSeen[inc.id] = true;
    return renderMarkdown(inc.content || "", inc.id, depth + 1, newSeen);
  });

  var placeholders = [];
  var phCounter = 0;
  function addPH(html) {
    var key = "XYZPH" + phCounter + "ZYX";
    placeholders.push({ key: key, html: html });
    phCounter++;
    return key;
  }

  src = src.replace(/\{~~(.+?)~>(.+?)~~\}/g, function(m, o, n) {
    return addPH("<del>" + esc(o) + "</del><ins>" + esc(n) + "</ins>");
  });
  src = src.replace(/\{\+\+(.+?)\+\+\}/g, function(m, t) {
    return addPH("<ins>" + esc(t) + "</ins>");
  });
  src = src.replace(/\{--(.+?)--\}/g, function(m, t) {
    return addPH("<del>" + esc(t) + "</del>");
  });
  src = src.replace(/\{==(.+?)==\}/g, function(m, t) {
    return addPH("<mark>" + esc(t) + "</mark>");
  });
  src = src.replace(/\{>>(.+?)<<\}/g, function(m, t) {
    return addPH('<span class="cm-cmt">[komentář: ' + esc(t) + "]</span>");
  });

  src = src.replace(/\[\[(.+?)\]\]/g, function(m, name) {
    var linked = findNoteByName(name.trim());
    if (linked) {
      return addPH('<a href="#" class="wlink" onclick="openNote(\'' + linked.id + "');return false\">" + esc(name) + "</a>");
    } else {
      return addPH('<span class="wlink-broken" title="Poznámka nenalezena">' + esc(name) + "</span>");
    }
  });

  var taskIdx = 0;
  src = src.replace(/^- \[( |x)\] (.*)$/gm, function(m, check, text) {
    var checked = check === "x";
    var html = '<label style="display:flex;align-items:baseline;gap:0">' +
      '<input type="checkbox" class="task-cb" data-note="' + (noteId || "") + '" data-idx="' + taskIdx + '"' + (checked ? " checked" : "") + ">" +
      "<span" + (checked ? ' class="task-done"' : "") + ">" + esc(text) + "</span></label>";
    taskIdx++;
    return addPH(html);
  });

  var html;
  try { html = marked.parse(src); }
  catch (e) { dbg("Marked error: " + e.message); html = "<pre>" + esc(src) + "</pre>"; }

  for (var i = 0; i < placeholders.length; i++) {
    html = html.split(placeholders[i].key).join(placeholders[i].html);
  }
  // External links open in new window
  html = html.replace(/<a href="(https?:\/\/)/g, '<a target="_blank" rel="noopener" href="$1');
  return html;
}

// ===== DIALOGS =====
function showDialog(title, bodyHTML, onOk, okLabel) {
  closeDialog();
  var overlay = document.createElement("div");
  overlay.className = "dlg-overlay";
  overlay.id = "dlg-current";
  overlay.addEventListener("click", function(e) {
    if (e.target === overlay) closeDialog();
  });
  var dlg = document.createElement("div");
  dlg.className = "dlg";
  dlg.innerHTML = "<h2>" + title + "</h2>" + bodyHTML +
    '<div class="btn-row"><button onclick="closeDialog()">Zrušit</button>' +
    '<button class="primary" id="dlg-ok">' + (okLabel || "OK") + "</button></div>";
  overlay.appendChild(dlg);
  document.body.appendChild(overlay);
  document.getElementById("dlg-ok").addEventListener("click", onOk);
  document.addEventListener("keydown", dlgKeyHandler);
  var fi = dlg.querySelector("input,textarea,select");
  if (fi) setTimeout(function() { fi.focus(); }, 50);
}

function dlgKeyHandler(e) {
  if (e.key === "Escape") closeDialog();
  if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
    var ok = document.getElementById("dlg-ok");
    if (ok) ok.click();
  }
}

function closeDialog() {
  var d = document.getElementById("dlg-current");
  if (d) d.remove();
  document.removeEventListener("keydown", dlgKeyHandler);
}

  if (noteCount > 0) h += "<p>Bude smazáno <strong>" + noteCount + " poznámek</strong>.</p>";
  showDialog("Smazat složku", h, function() {
    BD.notes = BD.notes.filter(function(n) { return allIds.indexOf(n.folderId) === -1; });

}

// ===== PREVIEW WINDOW =====
function buildPreviewHTML(noteId) {
  var n = getNote(noteId);
  if (!n) return "";
  var css = 'body{font-family:"Segoe UI",Tahoma,sans-serif;background:#ffffff;color:#1a1a2e;padding:28px 36px;margin:0;line-height:1.6}';
  css += 'h1,h2,h3,h4,h5,h6{color:#1a5f96;margin:1em 0 .4em}h1{font-size:1.5rem}';
  css += 'a{color:#2b7bb9}a:hover{color:#1a5f96}';
  css += 'pre{background:#f5f6f8;padding:10px;border-radius:6px;overflow-x:auto;font-size:.88rem}';
  css += 'code{background:#f5f6f8;padding:1px 5px;border-radius:3px;font-size:.88rem}pre code{background:none;padding:0}';
  css += 'blockquote{border-left:3px solid #d0d5dd;padding:4px 14px;margin:8px 0;color:#5f6b7a}';
  css += 'table{border-collapse:collapse;width:100%;font-size:.88rem;margin:8px 0}th,td{padding:5px 10px;border:1px solid #d0d5dd;text-align:left}th{background:#f5f6f8}';
  css += 'img{max-width:100%}ul,ol{margin:4px 0 4px 20px}';
  css += 'ol ol{list-style-type:lower-alpha}';
  css += '.meta-table{width:100%;font-size:.84rem;border-collapse:collapse;margin:8px 0 16px}';
  css += '.meta-table td{padding:3px 8px;border-bottom:1px solid #d0d5dd}.meta-table td:first-child{color:#5f6b7a;font-weight:600;white-space:nowrap;width:1%}';
  css += '.tag-chip{background:#e5eef8;padding:2px 8px;border-radius:10px;font-size:.78rem;color:#2b7bb9;margin-right:4px;display:inline-block}';
  css += 'ins{background:#dff5df;color:#1a6a1a;text-decoration:none}del{background:#fde0e0;color:#a02020}mark{background:#fdf5cc;color:#6a5a00}';
  css += '.cm-cmt{background:#e0eaf8;color:#2a4a8a;font-style:italic}';
  css += '.task-done{text-decoration:line-through;opacity:.6}';
  var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + esc(n.name) + '</title><style>' + css + '</style></head><body>';
  h += '<h1>' + (n.icon || '&#128221;') + ' ' + esc(n.name) + '</h1>';
  if (n.tags && n.tags.length) {
    h += '<div style="margin:6px 0 12px">';
    for (var i = 0; i < n.tags.length; i++) h += '<span class="tag-chip">' + esc(n.tags[i]) + '</span>';
    h += '</div>';
  }
  if (n.meta && n.meta.length) {
    h += '<table class="meta-table">';
    for (var mi = 0; mi < n.meta.length; mi++) {
      var mv = n.meta[mi].value;
      var mvH = /^https?:\/\/\S+$/i.test(mv) ? '<a href="' + esc(mv) + '" target="_blank" rel="noopener">' + esc(mv) + '</a>' : esc(mv);
      h += '<tr><td>' + esc(n.meta[mi].key) + '</td><td>' + mvH + '</td></tr>';
    }
    h += '</table>';
  }
  h += '<div>' + renderMarkdown(n.content || "", noteId) + '</div>';
  h += '<script>window.addEventListener("message",function(e){if(e.data&&e.data.type==="noteblk-preview-refresh")location.reload();});<\/script>';
  h += '</body></html>';
  return h;
}

function openPreviewWindow(noteId) {
  var n = getNote(noteId);
  if (!n) return;
  // Close existing preview for this note
  if (PREVIEW_WINS[noteId] && !PREVIEW_WINS[noteId].closed) {
    PREVIEW_WINS[noteId].focus();
    return;
  }
  var win = window.open("", "preview_" + noteId, "width=800,height=600,scrollbars=yes,resizable=yes");
  if (!win) { alert("Povolte vyskakovací okna."); return; }
  PREVIEW_WINS[noteId] = win;
  var html = buildPreviewHTML(noteId);
  win.document.open();
  win.document.write(html);
  win.document.close();
  dbg("Náhled otevřen: " + n.name);
}

function refreshPreview(noteId) {
  if (!PREVIEW_WINS[noteId] || PREVIEW_WINS[noteId].closed) return;
  var win = PREVIEW_WINS[noteId];
  var html = buildPreviewHTML(noteId);
  win.document.open();
  win.document.write(html);
  win.document.close();
}

// ===== VERSIONS =====
function dlgSaveVersion(noteId) {
  var n = getNote(noteId);

      id: genId(),

    });

function formatBytes(str) {
  var b = new Blob([str || ""]).size;
  if (b < 1024) return b + " B";
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + " KB";
  return (b / (1024 * 1024)).toFixed(1) + " MB";
}

function showVersions(noteId) {
  var n = getNote(noteId);
  if (!n) return;
  var versions = n.versions || [];
  var vw = document.getElementById("view");
  var h = '<div id="crumb">' + breadcrumb(n.folderId) + "</div>";
  h += "<h2>&#128203; Verze: " + (n.icon || "&#128221;") + " " + esc(n.name) + " (" + versions.length + ")</h2>";
  h += '<p style="font-size:.84rem;color:var(--text2);margin:6px 0 14px">Aktuální velikost: ' + formatBytes(n.content) + "</p>";
  if (versions.length === 0) {
    h += '<div class="empty">Žádné uložené verze. Použijte tlačítko Verze+ (Alt+W) pro uložení aktuálního stavu.</div>';
  } else {
    h += '<table class="tbl"><thead><tr><th>Datum</th><th>Název</th><th>Velikost</th><th>Akce</th></tr></thead><tbody>';
    for (var i = versions.length - 1; i >= 0; i--) {
      var v = versions[i];
      h += "<tr><td style=\"white-space:nowrap\">" + esc(v.date) + "</td>";
      h += "<td>" + esc(v.name) + "</td>";
      h += "<td>" + formatBytes(v.content) + "</td>";
      h += '<td><button class="sm" onclick="openVersion(\'' + noteId + "','" + v.id + "')\" title=\"Otevřít\">&#128065; Otevřít</button> ";
      h += '<button class="sm danger" onclick="deleteVersion(\'' + noteId + "','" + v.id + '\')">&#128465;</button></td></tr>';
    }
    h += "</tbody></table>";
  }
  vw.innerHTML = h;
  document.getElementById("toolbar").innerHTML = '<button class="sm" onclick="openNote(\'' + noteId + '\')">Zpět na poznámku</button>';
}

function openVersion(noteId, versionId) {
  var n = getNote(noteId);
  if (!n || !n.versions) return;
  var v = null;
  for (var i = 0; i < n.versions.length; i++) {
    if (n.versions[i].id === versionId) { v = n.versions[i]; break; }
  }
  if (!v) return;
  var vw = document.getElementById("view");
  var h = '<div id="crumb">' + breadcrumb(n.folderId) + "</div>";
  h += '<h6 style="margin:0 0 4px;font-size:.72rem;text-transform:uppercase;color:var(--text2);letter-spacing:.5px">Verze: ' + esc(v.name) + " (" + esc(v.date) + ")</h6>";
  h += "<h1>" + (n.icon || "&#128221;") + " " + esc(n.name) + "</h1>";
  h += '<div class="md">' + renderMarkdown(v.content || "", noteId) + "</div>";
  vw.innerHTML = h;

  var tbH = '<button class="sm" onclick="showVersions(\'' + noteId + '\')">Zpět na verze</button>';
  tbH += '<span class="sep"></span>';
  tbH += '<button class="sm primary" onclick="restoreVersion(\'' + noteId + "','" + versionId + "')\" title=\"Přepsat aktuální obsah touto verzí\">Obnovit jako aktuální</button>";
  tbH += '<button class="sm" onclick="versionAsNewNote(\'' + noteId + "','" + versionId + "')\" title=\"Uložit tuto verzi jako novou poznámku\">Uložit jako novou poznámku</button>";
  tbH += '<span class="sep"></span>';
  tbH += '<button class="sm" onclick="editVersion(\'' + noteId + "','" + versionId + '\')">Upravit</button>';
  document.getElementById("toolbar").innerHTML = tbH;
}

function restoreVersion(noteId, versionId) {
  var n = getNote(noteId);
  if (!n || !n.versions) return;
  var v = null;
  for (var i = 0; i < n.versions.length; i++) {
    if (n.versions[i].id === versionId) { v = n.versions[i]; break; }
  }
  if (!v) return;
  showDialog("Obnovit verzi", "<p>Přepsat aktuální obsah poznámky <strong>" + esc(n.name) + "</strong> verzí <strong>" + esc(v.name) + "</strong>?</p>", function() {
    n.content = v.content;
    if (v.tags) n.tags = v.tags.slice();
    if (v.meta) n.meta = v.meta.map(function(m) { return { key: m.key, value: m.value }; });
    n.modified = now();
    closeDialog();
    openNote(noteId);
    dbg("Verze obnovena: " + v.name);
  });
}

function versionAsNewNote(noteId, versionId) {
  var n = getNote(noteId);
  if (!n || !n.versions) return;
  var v = null;
  for (var i = 0; i < n.versions.length; i++) {

function editVersion(noteId, versionId) {
  var n = getNote(noteId);
  if (!n || !n.versions) return;
  var v = null;
  for (var i = 0; i < n.versions.length; i++) {
    if (n.versions[i].id === versionId) { v = n.versions[i]; break; }
  }
  if (!v) return;
  var vw = document.getElementById("view");
  var h = '<div id="crumb">' + breadcrumb(n.folderId) + "</div>";
  h += '<h6 style="margin:0 0 4px;font-size:.72rem;text-transform:uppercase;color:var(--text2);letter-spacing:.5px">Editace verze: ' + esc(v.name) + "</h6>";
  h += '<textarea id="ver-edit-area" style="flex:1;min-height:400px">' + esc(v.content || "") + "</textarea>";

  var ta = document.getElementById("ver-edit-area");
  ta.addEventListener("keydown", function(e) { if (e.key === "Tab") { e.preventDefault(); var s = this.selectionStart, en = this.selectionEnd; this.value = this.value.substring(0, s) + "\t" + this.value.substring(en); this.selectionStart = this.selectionEnd = s + 1; } });

  var tbH = '<button class="sm" onclick="showVersions(\'' + noteId + '\')">Zrušit</button>';
  tbH += '<span class="sep"></span>';
  tbH += '<button class="sm primary" onclick="saveVersionEdit(\'' + noteId + "','" + versionId + "','current')\" accesskey=\"u\">Uložit jako aktuální<span class=\"ak\">U</span></button>";
  tbH += '<button class="sm" onclick="saveVersionEdit(\'' + noteId + "','" + versionId + "','new')\">Uložit jako novou poznámku</button>";
  document.getElementById("toolbar").innerHTML = tbH;
}

function saveVersionEdit(noteId, versionId, mode) {
  var content = document.getElementById("ver-edit-area").value;
  var n = getNote(noteId);
  if (!n) return;
  if (mode === "current") {
    n.content = content;
    n.modified = now();
    openNote(noteId);
    dbg("Verze uložena jako aktuální");
  } else {
    var v = null;
    for (var i = 0; i < n.versions.length; i++) {
      if (n.versions[i].id === versionId) { v = n.versions[i]; break; }
    }
    var vName = v ? v.name : "verze";
    var newName = n.name + " (" + vName + ")";
    var dup = {
      id: genId(), name: newName, folderId: n.folderId, icon: n.icon,
      content: content, tags: (n.tags || []).slice(),
      meta: (n.meta || []).map(function(m) { return { key: m.key, value: m.value }; }),
      bookmarked: false, versions: [],
      created: now(), modified: now()
    };
    BD.notes.push(dup);
    openNote(dup.id);
    dbg("Verze uložena jako nová poznámka: " + newName);
  }
}

function deleteVersion(noteId, versionId) {
  var n = getNote(noteId);
  if (!n || !n.versions) return;
  var v = null;
  for (var i = 0; i < n.versions.length; i++) {
    if (n.versions[i].id === versionId) { v = n.versions[i]; break; }
  }
  if (!v) return;
  showDialog("Smazat verzi", "<p>Opravdu smazat verzi <strong>" + esc(v.name) + "</strong>?</p>", function() {

}

// ===== DELETE NOTE =====
function dlgDeleteNote(noteId) {
  var n = getNote(noteId);
  if (!n) return;
  showDialog("Smazat poznámku", "<p>Opravdu smazat <strong>" + esc(n.name) + "</strong>?" + (n.versions && n.versions.length ? "<br>Bude smazáno i " + n.versions.length + " verzí." : "") + "</p>", function() {
    BD.notes = BD.notes.filter(function(x) { return x.id !== noteId; });

    for (var pi = PANELS.length - 1; pi >= 0; pi--) {
      if (PANELS[pi] === noteId) { PANELS.splice(pi, 1); if (ACTIVE_PANEL >= PANELS.length) ACTIVE_PANEL = PANELS.length - 1; }
    }
    closeDialog();
    if (n.folderId) openFolder(n.folderId);
    else openRoot();
    dbg("Poznámka smazána: " + n.name);
  }, "Smazat");
}

// ===== METADATA =====
function dlgNoteMeta(noteId) {
  var n = getNote(noteId);
  if (!n) return;
  if (!n.meta) n.meta = [];
  var h = '<div id="dlg-meta-rows">';
  h += buildMetaRows(n.meta);
  h += '</div>';
  h += '<button type="button" class="sm" onclick="addMetaRow()" style="margin-top:6px">+ Přidat pole</button>';
  h += '<div style="margin-top:8px;font-size:.78rem;color:var(--text2)">Příklady klíčů: stav, priorita, datum, autor, verze</div>';
  showDialog("Metadata", h, function() {
    var rows = document.querySelectorAll(".dlg-meta-row");
    var meta = [];
    for (var i = 0; i < rows.length; i++) {
      var k = rows[i].querySelector(".meta-key").value.trim();
      var v = rows[i].querySelector(".meta-val").value.trim();
      if (k) meta.push({ key: k, value: v });
    }
    n.meta = meta;
    n.modified = now();
    closeDialog();
    openNote(noteId);
    dbg("Metadata aktualizována: " + n.name);
  });
}

function buildMetaRows(meta) {
  var h = "";
  for (var i = 0; i < meta.length; i++) {
    h += '<div class="dlg-meta-row" style="display:flex;gap:4px;margin:4px 0;align-items:center">';
    h += '<input class="meta-key" value="' + esc(meta[i].key) + '" placeholder="Klíč" style="width:35%">';
    h += '<input class="meta-val" value="' + esc(meta[i].value) + '" placeholder="Hodnota" style="flex:1">';
    h += '<button type="button" class="sm danger" onclick="this.parentElement.remove()" style="padding:3px 6px">&#10005;</button>';
    h += "</div>";
  }
  return h;
}

function addMetaRow() {
  var container = document.getElementById("dlg-meta-rows");
  if (!container) return;
  var row = document.createElement("div");
  row.className = "dlg-meta-row";
  row.style = "display:flex;gap:4px;margin:4px 0;align-items:center";
  row.innerHTML = '<input class="meta-key" placeholder="Klíč" style="width:35%">' +
    '<input class="meta-val" placeholder="Hodnota" style="flex:1">' +
    '<button type="button" class="sm danger" onclick="this.parentElement.remove()" style="padding:3px 6px">&#10005;</button>';
  container.appendChild(row);
  row.querySelector(".meta-key").focus();
}

// ===== TAG FILTER =====
function filterTag(tag) {
  if (STAG === tag) {
    STAG = null;
    renderNav();
    if (CUR.type === "folder") renderFolderView(CUR.id);
    else openRoot();
    return;
  }
  STAG = tag;
  CUR = { type: "tag", id: tag };
  renderNav();
  var tb = document.getElementById("toolbar");
  tb.innerHTML = '<span style="font-size:.88rem">Filtr: <strong>' + esc(tag) + '</strong></span> <button class="sm" onclick="filterTag(\'' + esc(tag).replace(/'/g, "\\'") + "')\">&#10005; Zrušit filtr</button>";
  var notes = [];
  for (var i = 0; i < BD.notes.length; i++) {
    if (BD.notes[i].tags && BD.notes[i].tags.indexOf(tag) !== -1) notes.push(BD.notes[i]);
  }
  notes.sort(function(a, b) { return a.name.localeCompare(b.name, "cs"); });
  var vw = document.getElementById("view");
  var h = "<h2>&#127991; Štítek: " + esc(tag) + "</h2>";
  if (notes.length === 0) {
    h += '<div class="empty">Žádné poznámky s tímto štítkem.</div>';
  } else {
    h += '<table class="tbl"><thead><tr><th>Název</th><th>Složka</th></tr></thead><tbody>';
    for (var j = 0; j < notes.length; j++) {
      var n = notes[j];
      var fname = n.folderId ? (getFolder(n.folderId) || {}).name || "" : "(kořen)";
      h += '<tr><td><a href="#" onclick="openNote(\'' + n.id + '\');return false">' + (n.icon || "&#128221;") + " " + esc(n.name) + "</a></td>";
      h += '<td style="font-size:.82rem;color:var(--text2)">' + esc(fname) + "</td></tr>";
    }
    h += "</tbody></table>";
  }
  vw.innerHTML = h;
}

// ===== SEARCH =====
function doSearch() {
  if (!BD) return;
  showDialog("Hledat", '<label>Hledaný text:</label><input id="dlg-search" placeholder="Hledej...">', function() {
    var q = document.getElementById("dlg-search").value.trim().toLowerCase();
    if (!q) return;
    closeDialog();
    var results = [];
    for (var i = 0; i < BD.notes.length; i++) {
      var n = BD.notes[i];
      var score = 0, snippet = "";
      if (n.name.toLowerCase().indexOf(q) !== -1) score += 3;
      if (n.tags) {
        for (var ti = 0; ti < n.tags.length; ti++) {
          if (n.tags[ti].toLowerCase().indexOf(q) !== -1) { score += 2; break; }
        }
      }
      if (n.content && n.content.toLowerCase().indexOf(q) !== -1) {
        score += 1;
        var idx = n.content.toLowerCase().indexOf(q);
        var start = Math.max(0, idx - 40);
        var end = Math.min(n.content.length, idx + q.length + 60);
        snippet = (start > 0 ? "..." : "") + n.content.substring(start, end) + (end < n.content.length ? "..." : "");
      }
      if (score > 0) results.push({ note: n, score: score, snippet: snippet });
    }
    results.sort(function(a, b) { return b.score - a.score; });
    CUR = { type: "search", id: q };
    ACTIVE_PANEL = -1;
    renderTabs();
    document.getElementById("toolbar").innerHTML = '<span style="font-size:.88rem">Výsledky: <strong>' + esc(q) + "</strong> (" + results.length + ")</span>";
    var vw = document.getElementById("view");
    var h = "<h2>&#128269; Hledání: " + esc(q) + "</h2>";
    if (results.length === 0) {
      h += '<div class="empty">Nic nenalezeno.</div>';
    } else {
      for (var ri = 0; ri < results.length; ri++) {
        var r = results[ri];
        h += '<div style="margin:8px 0;padding:8px 10px;border:1px solid var(--border);border-radius:6px">';
        h += '<a href="#" onclick="openNote(\'' + r.note.id + '\');return false" style="font-weight:600">' + (r.note.icon || "&#128221;") + " " + esc(r.note.name) + "</a>";
        if (r.snippet) h += '<div style="font-size:.82rem;color:var(--text2);margin-top:4px">' + esc(r.snippet) + "</div>";
        h += "</div>";
      }
    }
    vw.innerHTML = h;
  });
}

// ===== TASKS VIEW =====
function showTasks() {
  if (!BD) return;
  CUR = { type: "tasks", id: null };
  ACTIVE_PANEL = -1;
  renderNav(); renderTabs(); updateTitle();
  document.getElementById("toolbar").innerHTML = '<span style="font-size:.88rem">&#9745; Nevyřízené úkoly</span>';
  var groups = [];
  var totalCount = 0;
  for (var i = 0; i < BD.notes.length; i++) {
    var n = BD.notes[i];
    if (!n.content) continue;
    var lines = n.content.split("\n");
    var noteTasks = [];
    var inCode = false;
    var curHeading = "";
    for (var li = 0; li < lines.length; li++) {
      if (lines[li].match(/^```/)) { inCode = !inCode; continue; }
      if (inCode) continue;
      var hm = lines[li].match(/^#{1,6}\s+(.+)/);
      if (hm) curHeading = hm[1];
      var m = lines[li].match(/^- \[ \] (.+)/);
      if (m) noteTasks.push({ text: m[1], heading: curHeading });
    }
    if (noteTasks.length > 0) {
      groups.push({ note: n, tasks: noteTasks });
      totalCount += noteTasks.length;
    }
  }
  groups.sort(function(a, b) { return a.note.name.localeCompare(b.note.name, "cs"); });
  var vw = document.getElementById("view");
  var h = "<h2>&#9745; Nevyřízené úkoly (" + totalCount + ")</h2>";
  if (totalCount === 0) {
    h += '<div class="empty">Žádné nevyřízené úkoly!</div>';
  } else {
    for (var gi = 0; gi < groups.length; gi++) {
      var g = groups[gi];
      h += '<div style="margin:12px 0">';
      h += '<h3 style="font-size:.95rem;margin:0 0 6px"><a href="#" onclick="openNote(\'' + g.note.id + '\');return false">' + (g.note.icon || "&#128221;") + " " + esc(g.note.name) + "</a>";
      h += ' <span style="font-size:.78rem;color:var(--text2)">(' + g.tasks.length + ")</span></h3>";
      h += '<ul style="list-style:none;padding:0;margin:0 0 0 8px">';
      for (var ti = 0; ti < g.tasks.length; ti++) {
        h += '<li style="padding:3px 0;border-bottom:1px solid var(--border);font-size:.9rem">&#9744; ' + esc(g.tasks[ti].text);
        if (g.tasks[ti].heading) h += ' <span style="font-size:.78rem;color:var(--text2)">— ' + esc(g.tasks[ti].heading) + "</span>";
        h += "</li>";
      }
      h += "</ul></div>";
    }
  }
  vw.innerHTML = h;
}

// ===== EXPORT MD =====
function exportNoteMD(noteId) {
  var n = getNote(noteId);
  if (!n) return;
  var md = "# " + n.name + "\n\n" + resolveIncludes(n.content || "");
  downloadFile(sanitize(n.name) + ".md", md, "text/markdown");
  dbg("Exportováno MD: " + n.name);
}

function copyNoteMD(noteId) {
  var n = getNote(noteId);
  if (!n) return;
  navigator.clipboard.writeText(resolveIncludes(n.content || "")).then(function() {
    dbg("Zkopírováno: " + n.name);
    alert("Zkopírováno do schránky.");
  });
}

function exportFolderMD(folderId) {
  var f = getFolder(folderId);
  if (!f) return;
  var md = buildFolderMD(folderId, 1);
  downloadFile(sanitize(f.name) + ".md", md, "text/markdown");
  dbg("Exportována složka: " + f.name);
}

function buildFolderMD(folderId, level) {
  var f = getFolder(folderId);
  var prefix = "";
  for (var x = 0; x < Math.min(level, 6); x++) prefix += "#";
  prefix += " ";
  var md = prefix + (f ? f.name : "Root") + "\n\n";
  var notes = notesInFolder(folderId);
  for (var i = 0; i < notes.length; i++) {
    md += prefix + "# " + notes[i].name + "\n\n" + resolveIncludes(notes[i].content || "") + "\n\n";
  }
  var subs = childFolders(folderId);
  for (var j = 0; j < subs.length; j++) {
    md += buildFolderMD(subs[j].id, level + 1);
  }
  return md;
}

function exportFolderDOCX(folderId) {
  var f = getFolder(folderId);
  if (!f) return;
  dbg("Generuji DOCX složky: " + f.name);
  try {
    var result = buildFolderDocxXml(folderId, 1);
    buildDocxZip(result.xml, sanitize(f.name) + ".docx", result.numInstances);
  } catch (e) {
    dbg("Chyba DOCX: " + e.message);
    alert("Chyba při exportu DOCX: " + e.message);
  }
}

function buildFolderDocxXml(folderId, level) {
  var f = getFolder(folderId);
  var hLevel = Math.min(level, 6);
  var xml = '<w:p><w:pPr><w:pStyle w:val="Heading' + hLevel + '"/></w:pPr><w:r><w:t>' + xmlEsc(f ? f.name : "Root") + '</w:t></w:r></w:p>';
  var allNumInstances = [];
  var runningOffset = 0;
  var notes = notesInFolder(folderId);
  for (var i = 0; i < notes.length; i++) {
    var resolved = resolveIncludes(notes[i].content || "");
    var result = mdToDocxXml(resolved, notes[i].name, runningOffset);
    xml += result.xml;
    allNumInstances = allNumInstances.concat(result.numInstances);
    runningOffset += result.numInstances.length;
  }
  var subs = childFolders(folderId);
  for (var j = 0; j < subs.length; j++) {
    var subResult = buildFolderDocxXml(subs[j].id, level + 1);
    // Re-offset sub-result numIds
    if (subResult.numInstances.length > 0 && runningOffset > 0) {
      subResult.xml = subResult.xml.replace(/w:numId="(\d+)"/g, function(m, id) {
        return 'w:numId="' + (parseInt(id, 10) + runningOffset) + '"';
      });
    }
    xml += subResult.xml;
    allNumInstances = allNumInstances.concat(subResult.numInstances);
    runningOffset += subResult.numInstances.length;
  }
  return { xml: xml, numInstances: allNumInstances };
}

// ===== EXPORT DOCX (via JSZip) =====
function exportNoteDOCX(noteId) {
  var n = getNote(noteId);
  if (!n) return;
  dbg("Generuji DOCX: " + n.name);
  try {
    var resolved = resolveIncludes(n.content || "");
    var result = mdToDocxXml(resolved, n.name);
    buildDocxZip(result.xml, sanitize(n.name) + ".docx", result.numInstances);
  } catch (e) {
    dbg("Chyba DOCX: " + e.message);
    alert("Chyba při exportu DOCX: " + e.message);
  }
}

function xmlEsc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function mdToDocxXml(md, title, numIdOffset) {
  var lines = md.split("\n");
  var paras = [];
  var inCodeBlock = false;
  var inTable = false;
  var tableRows = [];

  function flushTable() {
    if (tableRows.length > 0) {
      paras.push(buildDocxTable(tableRows));
      tableRows = [];
    }
    inTable = false;
  }

  // List state tracking for proper numbering restart per list group
  var curListType = null; // 'ul' or 'ol'
  var listIndentStack = [];
  var listNumId = 0;
  var numIdCounter = numIdOffset || 0;
  var numInstances = []; // each: {abstractNumId: 0|1}

  function startListGroup(type) {
    numIdCounter++;
    listNumId = numIdCounter;
    numInstances.push({ abstractNumId: (type === "ul") ? 0 : 1 });
    curListType = type;
    listIndentStack = [];
  }

  function endListGroup() {
    curListType = null;
    listIndentStack = [];
    listNumId = 0;
  }

  function resolveIlvl(spaces) {
    if (spaces === 0) return 0;
    for (var j = 0; j < listIndentStack.length; j++) {
      if (spaces <= listIndentStack[j]) return j + 1;
    }
    listIndentStack.push(spaces);
    return listIndentStack.length;
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Code block
    if (line.match(/^```/)) {
      if (inTable) flushTable();
      inCodeBlock = !inCodeBlock;
      continue;
    }
    if (inCodeBlock) {
      paras.push('<w:p><w:pPr><w:pStyle w:val="Code"/></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Consolas" w:hAnsi="Consolas"/><w:sz w:val="18"/></w:rPr><w:t xml:space="preserve">' + xmlEsc(line) + "</w:t></w:r></w:p>");
      continue;
    }

    // Table
    var tline = line.trim();
    if (tline.charAt(0) === "|" && tline.indexOf("|", 1) > 0) {
      if (/^\|[\s\-:|]+\|?\s*$/.test(tline)) continue; // separator
      inTable = true;
      var raw = tline;
      if (raw.charAt(0) === "|") raw = raw.substring(1);
      if (raw.charAt(raw.length - 1) === "|") raw = raw.substring(0, raw.length - 1);
      var cells = raw.split("|").map(function(c) { return c.trim(); });
      tableRows.push(cells);
      continue;
    } else if (inTable) {
      flushTable();
    }

    // Empty line - skip (MD structural separator, not needed in DOCX)
    if (line.trim() === "") {
      if (curListType) endListGroup();
      continue;
    }

    // Track list context - end group if non-list line
    var isListLine = (line.match(/^( *)[-*]\s/) && !line.match(/^- \[[ x]\]/)) || line.match(/^( *)\d+\.\s/);
    if (!isListLine && curListType) endListGroup();

    // Headings
    var hm = line.match(/^(#{1,6})\s+(.+)/);
    if (hm) {
      var hlevel = hm[1].length;
      paras.push('<w:p><w:pPr><w:pStyle w:val="Heading' + hlevel + '"/></w:pPr>' + inlineToDocx(hm[2]) + "</w:p>");
      continue;
    }

    // Blockquote
    if (line.match(/^>\s*/)) {
      var qt = line.replace(/^>\s*/, "");
      paras.push('<w:p><w:pPr><w:ind w:left="720"/><w:pBdr><w:left w:val="single" w:sz="12" w:space="4" w:color="4EA8DE"/></w:pBdr></w:pPr>' + inlineToDocx(qt) + "</w:p>");
      continue;
    }

    // Task
    var tm = line.match(/^- \[( |x)\] (.+)/);
    if (tm) {
      var check = tm[1] === "x" ? "&#9745; " : "&#9744; ";
      paras.push("<w:p>" + inlineToDocx(check + tm[2]) + "</w:p>");
      continue;
    }

    // Unordered list
    var ulm = line.match(/^( *)[-*]\s+(.*)/);
    if (ulm) {
      if (curListType !== "ul") startListGroup("ul");
      var ilvl = resolveIlvl(ulm[1].length);
      paras.push('<w:p><w:pPr><w:pStyle w:val="ListParagraph"/><w:numPr><w:ilvl w:val="' + ilvl + '"/><w:numId w:val="' + listNumId + '"/></w:numPr></w:pPr>' + inlineToDocx(ulm[2]) + "</w:p>");
      continue;
    }

    // Ordered list
    var om = line.match(/^( *)\d+\.\s+(.+)/);
    if (om) {
      if (curListType !== "ol") startListGroup("ol");
      var ilvl = resolveIlvl(om[1].length);
      paras.push('<w:p><w:pPr><w:pStyle w:val="ListParagraph"/><w:numPr><w:ilvl w:val="' + ilvl + '"/><w:numId w:val="' + listNumId + '"/></w:numPr></w:pPr>' + inlineToDocx(om[2]) + "</w:p>");
      continue;
    }

    // HR
    if (line.match(/^(-{3,}|\*{3,}|_{3,})$/)) {
      paras.push('<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:space="1" w:color="auto"/></w:pBdr></w:pPr></w:p>');
      continue;
    }

    // Normal paragraph
    paras.push("<w:p>" + inlineToDocx(line) + "</w:p>");
  }

  if (inTable) flushTable();

  return { xml: paras.join("\n"), numInstances: numInstances };
}

function inlineToDocx(text) {
  var runs = [];
  // Process inline formatting
  // Order: CriticMarkup substitution, addition, deletion, highlight, comment, bold, italic, code, wiki links, includes
  var parts = [];
  var regex = /(\{~~.+?~>.+?~~\}|\{\+\+.+?\+\+\}|\{--.+?--\}|\{==.+?==\}|\{>>.+?<<\}|\*\*\*.+?\*\*\*|\*\*.+?\*\*|\*.+?\*|`.+?`|\[\[.+?\]\]|\{\{.+?\}\})/g;
  var lastIdx = 0;
  var match;
  while ((match = regex.exec(text)) !== null) {
    if (match.index > lastIdx) {
      parts.push({ type: "text", val: text.substring(lastIdx, match.index) });
    }
    var m = match[0];
    if (m.match(/^\{~~(.+?)~>(.+?)~~\}$/)) {
      var sm = m.match(/^\{~~(.+?)~>(.+?)~~\}$/);
      parts.push({ type: "del", val: sm[1] });
      parts.push({ type: "add", val: sm[2] });
    } else if (m.match(/^\{\+\+(.+?)\+\+\}$/)) {
      parts.push({ type: "add", val: m.match(/^\{\+\+(.+?)\+\+\}$/)[1] });
    } else if (m.match(/^\{--(.+?)--\}$/)) {
      parts.push({ type: "del", val: m.match(/^\{--(.+?)--\}$/)[1] });
    } else if (m.match(/^\{==(.+?)==\}$/)) {
      parts.push({ type: "highlight", val: m.match(/^\{==(.+?)==\}$/)[1] });
    } else if (m.match(/^\{>>(.+?)<<\}$/)) {
      parts.push({ type: "comment", val: m.match(/^\{>>(.+?)<<\}$/)[1] });
    } else if (m.match(/^\*\*\*(.+?)\*\*\*$/)) {
      parts.push({ type: "bolditalic", val: m.match(/^\*\*\*(.+?)\*\*\*$/)[1] });
    } else if (m.match(/^\*\*(.+?)\*\*$/)) {
      parts.push({ type: "bold", val: m.match(/^\*\*(.+?)\*\*$/)[1] });
    } else if (m.match(/^\*(.+?)\*$/)) {
      parts.push({ type: "italic", val: m.match(/^\*(.+?)\*$/)[1] });
    } else if (m.match(/^`(.+?)`$/)) {
      parts.push({ type: "code", val: m.match(/^`(.+?)`$/)[1] });
    } else if (m.match(/^\[\[(.+?)\]\]$/)) {
      parts.push({ type: "wlink", val: m.match(/^\[\[(.+?)\]\]$/)[1] });
    } else if (m.match(/^\{\{(.+?)\}\}$/)) {
      parts.push({ type: "include", val: m.match(/^\{\{(.+?)\}\}$/)[1] });
    }
    lastIdx = regex.lastIndex;
  }
  if (lastIdx < text.length) {
    parts.push({ type: "text", val: text.substring(lastIdx) });
  }

  var revId = 1;
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i];
    var rpr = "";
    var wrapStart = "";
    var wrapEnd = "";
    var textTag = "w:t";
    switch (p.type) {
      case "bold": rpr = "<w:rPr><w:b/></w:rPr>"; break;
      case "italic": rpr = "<w:rPr><w:i/></w:rPr>"; break;
      case "bolditalic": rpr = "<w:rPr><w:b/><w:i/></w:rPr>"; break;
      case "code": rpr = '<w:rPr><w:rFonts w:ascii="Consolas" w:hAnsi="Consolas"/><w:sz w:val="20"/><w:shd w:val="clear" w:fill="E0E0E0"/></w:rPr>'; break;
      case "add":
        wrapStart = '<w:ins w:id="' + revId + '" w:author="Autor" w:date="' + new Date().toISOString().replace(/\.\d+/, "") + '">';
        wrapEnd = "</w:ins>";
        revId++;
        break;
      case "del":
        wrapStart = '<w:del w:id="' + revId + '" w:author="Autor" w:date="' + new Date().toISOString().replace(/\.\d+/, "") + '">';
        wrapEnd = "</w:del>";
        rpr = "<w:rPr><w:strike/></w:rPr>";
        textTag = "w:delText";
        revId++;
        break;
      case "highlight": rpr = '<w:rPr><w:highlight w:val="yellow"/></w:rPr>'; break;
      case "comment": rpr = '<w:rPr><w:color w:val="4472C4"/><w:i/></w:rPr>'; break;
      case "wlink": rpr = '<w:rPr><w:color w:val="0070C0"/><w:u w:val="dash"/></w:rPr>'; break;
      case "include": break;
    }
    var prefix = "";
    var suffix = "";
    if (p.type === "wlink") prefix = "\u2192 ";
    if (p.type === "comment") { prefix = "[komentář: "; suffix = "]"; }

    runs.push(wrapStart + "<w:r>" + rpr + "<" + textTag + ' xml:space="preserve">' + xmlEsc(prefix + p.val + suffix) + "</" + textTag + "></w:r>" + wrapEnd);
  }
  return runs.join("");
}

function buildDocxTable(rows) {
  var xml = '<w:tbl><w:tblPr><w:tblBorders>';
  xml += '<w:top w:val="single" w:sz="4" w:space="0" w:color="auto"/>';
  xml += '<w:left w:val="single" w:sz="4" w:space="0" w:color="auto"/>';
  xml += '<w:bottom w:val="single" w:sz="4" w:space="0" w:color="auto"/>';
  xml += '<w:right w:val="single" w:sz="4" w:space="0" w:color="auto"/>';
  xml += '<w:insideH w:val="single" w:sz="4" w:space="0" w:color="auto"/>';
  xml += '<w:insideV w:val="single" w:sz="4" w:space="0" w:color="auto"/>';
  xml += '</w:tblBorders><w:tblW w:w="0" w:type="auto"/></w:tblPr>';
  for (var r = 0; r < rows.length; r++) {
    xml += "<w:tr>";
    for (var c = 0; c < rows[r].length; c++) {
      if (r === 0) {
        xml += "<w:tc><w:p><w:r><w:rPr><w:b/></w:rPr>" + '<w:t xml:space="preserve">' + xmlEsc(rows[r][c]) + "</w:t></w:r></w:p></w:tc>";
      } else {
        xml += "<w:tc><w:p>" + inlineToDocx(rows[r][c]) + "</w:p></w:tc>";
      }
    }
    xml += "</w:tr>";
  }
  xml += "</w:tbl>";
  return xml;
}

function buildDocxZip(bodyXml, filename, numInstances) {

  var zip = new JSZip();

  zip.file("[Content_Types].xml",

    '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>' +

  zip.folder("_rels").file(".rels",

    '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering" Target="numbering.xml"/>' +

  var docXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +

  var stylesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +

    '<w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/><w:rPr><w:rFonts w:ascii="Calibri" w:hAnsi="Calibri"/><w:sz w:val="22"/></w:rPr></w:style>' +

    '<w:style w:type="paragraph" w:styleId="Heading2"><w:name w:val="heading 2"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:before="200" w:after="100"/></w:pPr><w:rPr><w:b/><w:sz w:val="30"/><w:color w:val="2F5496"/></w:rPr></w:style>' +

  zip.generateAsync({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" }).then(function(blob) {

  });
}

// ===== FILE OPS =====
function downloadFile(name, content, type) {
  var blob = new Blob([content], { type: type + ";charset=utf-8" });
  if (window.showSaveFilePicker) {
    var ext = name.split(".").pop();
    var mimeMap = { nmb: "application/json", md: "text/markdown", json: "application/json" };
    var descMap = { nmb: "NoteBlock soubor", md: "Markdown", json: "JSON" };
    window.showSaveFilePicker({
      suggestedName: name,
      types: [{
        description: descMap[ext] || "Soubor",
        accept: (function() { var o = {}; o[mimeMap[ext] || type] = ["." + ext]; return o; })()
      }]
    }).then(function(handle) {
      return handle.createWritable().then(function(w) {
        return w.write(blob).then(function() { return w.close(); });
      });
    }).then(function() {
      dbg("Uloženo přes systémový dialog: " + name);
    }).catch(function(err) {
      if (err.name !== "AbortError") {
        dbg("Fallback na stažení: " + err.message);
        fallbackDownload(name, blob);
      }
    });
  } else {
    fallbackDownload(name, blob);
  }
}

function fallbackDownload(name, blob) {
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function sanitize(s) {
  return s.replace(/[\/\\:*?"<>|]/g, "_");
}

function loadBlock() {
  if (window.showOpenFilePicker) {
    window.showOpenFilePicker({
      types: [{
        description: "NoteBlock soubor",
        accept: { "application/json": [".nmb", ".json"] }
      }]
    }).then(function(handles) {
      return handles[0].getFile();
    }).then(function(file) {
      readBlockFile(file);
    }).catch(function(err) {
      if (err.name !== "AbortError") {
        dbg("Fallback na input: " + err.message);
        document.getElementById("file-in").click();
      }
    });
  } else {
    document.getElementById("file-in").click();
  }
}

function readBlockFile(file) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      BD = JSON.parse(ev.target.result);
      if (!BD.folders) BD.folders = [];
      if (!BD.notes) BD.notes = [];
      if (BD.emojis === undefined) BD.emojis = "";
      for (var i = 0; i < BD.notes.length; i++) {
        if (!BD.notes[i].versions) BD.notes[i].versions = [];
      }
      EXPANDED = {};
      PANELS = [];
      ACTIVE_PANEL = -1;
      if (BD.ghPath) {
        history.replaceState(null, "", location.pathname + "?id=" + ghEncode(BD.ghPath));
      }
      openRoot();
      dbg("Blok nahrán: " + BD.name);
    } catch (err) {
      alert("Chyba při načítání: " + err.message);
      dbg("Chyba: " + err.message);
    }
  };
  reader.readAsText(file);
}

document.getElementById("file-in").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (!file) return;
  readBlockFile(file);
  this.value = "";
});

function saveBlock() {
  if (!BD) return alert("Žádný blok.");

  } else if (token && !BD.ghPath) {
    if (confirm("Uložit do GitHub? (Zrušit = uložit jako soubor)")) {
      dlgSetGhPath(function() { saveToGitHub(); });
    } else {
      saveBlockToFile();
    }
  } else {
    saveBlockToFile();
  }
}

function saveBlockToFile() {
  if (!BD) return alert("Žádný blok.");
  var json = JSON.stringify(BD, null, 2);

  dbg("Blok uložen do souboru: " + BD.name);
}

function parseGhPath(ghPath) {
  var parts = ghPath.split("/");
  if (parts.length < 3) return null;
  return { owner: parts[0], repo: parts[1], path: parts.slice(2).join("/") };
}

function ghEncode(ghPath) { return btoa(unescape(encodeURIComponent(ghPath))); }
function ghDecode(encoded) { return decodeURIComponent(escape(atob(encoded))); }

function dlgSetGhPath(callback) {
  var h = '<label>Cesta v repozitáři (owner/repo/cesta/soubor.nmb):</label>';
  h += '<input id="dlg-gh-path" value="' + esc((BD && BD.ghPath) || "") + '" placeholder="uzivatel/repo/noteblock.nmb">';
  showDialog("Nastavit cestu na GitHubu", h, function() {
    var p = document.getElementById("dlg-gh-path").value.trim();
    if (!p || !parseGhPath(p)) return alert("Neplatná cesta. Formát: owner/repo/cesta/soubor.nmb");
    BD.ghPath = p;
    closeDialog();
    if (callback) callback();
  });
}

function saveToGitHub() {
  if (!BD || !BD.ghPath) return;
  var token = localStorage.getItem("nb_github_token");
  if (!token) return alert("GitHub token není nastaven. Nastavte ho v Nastavení.");
  var parsed = parseGhPath(BD.ghPath);
  if (!parsed) return alert("Neplatná cesta: " + BD.ghPath);

  var apiUrl = "https://api.github.com/repos/" + parsed.owner + "/" + parsed.repo + "/contents/" + parsed.path;
  var headers = { "Authorization": "token " + token, "Accept": "application/json" };

  dbg("Ukládám do GitHub: " + BD.ghPath + "...");

  // Step 1: GET to find current SHA (if file exists)
  fetch(apiUrl, { headers: headers })
  .then(function(res) {
    if (res.status === 404) return null; // file doesn't exist yet
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }).then(function(existing) {
    // Step 2: PUT (create or update)
    var json = JSON.stringify(BD, null, 2);
    var body = {
      message: "NoteBlock: " + BD.name + " (" + new Date().toISOString().replace(/T/, " ").replace(/\..+/, "") + ")",
      content: btoa(unescape(encodeURIComponent(json)))
    };
    if (existing && existing.sha) body.sha = existing.sha;

    return fetch(apiUrl, {
      method: "PUT",
      headers: { "Authorization": "token " + token, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
  }).then(function(res) {
    if (!res.ok) return res.json().then(function(err) { throw new Error("HTTP " + res.status + ": " + (err.message || "")); });
    return res.json();
  }).then(function(data) {
    // Update URL
    history.replaceState(null, "", location.pathname + "?id=" + ghEncode(BD.ghPath));
    dbg("GitHub uložen: " + BD.ghPath);
  }).catch(function(err) {
    alert("Chyba při ukládání do GitHub: " + err.message);
    dbg("GitHub chyba: " + err.message);
  });
}

function loadFromGitHub(ghPath) {
  var token = localStorage.getItem("nb_github_token");
  var parsed = parseGhPath(ghPath);
  if (!parsed) { alert("Neplatná cesta: " + ghPath); return; }

  var apiUrl = "https://api.github.com/repos/" + parsed.owner + "/" + parsed.repo + "/contents/" + parsed.path;
  var headers = { "Accept": "application/json" };
  if (token) headers["Authorization"] = "token " + token;

  dbg("Načítám z GitHub: " + apiUrl + (token ? " (s tokenem)" : " (bez tokenu)"));

  fetch(apiUrl, { headers: headers })
  .then(function(res) {
    if (res.status === 404) throw new Error("Soubor nenalezen (404). Zkontrolujte cestu: " + ghPath);
    if (res.status === 401 || res.status === 403) throw new Error("Přístup odepřen (" + res.status + "). " + (token ? "Token nemá dostatečná oprávnění." : "Repozitář je pravděpodobně privátní — nastavte token v Nastavení."));
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }).then(function(data) {
    if (data.content) {
      dbg("Soubor nalezen: " + (data.size / 1024).toFixed(0) + " KB, dekóduji base64...");
      return decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));
    } else if (data.download_url) {
      dbg("Soubor je velký (" + (data.size / 1024 / 1024).toFixed(1) + " MB), stahuji přes download_url...");
      return fetch(data.download_url).then(function(rawRes) {
        if (!rawRes.ok) throw new Error("HTTP " + rawRes.status + " při stahování souboru");
        return rawRes.text();
      });
    } else {
      throw new Error("Soubor nemá obsah.");
    }
  }).then(function(content) {
    BD = JSON.parse(content);
    if (!BD.folders) BD.folders = [];
    if (!BD.notes) BD.notes = [];
    if (BD.emojis === undefined) BD.emojis = "";
    for (var i = 0; i < BD.notes.length; i++) {
      if (!BD.notes[i].versions) BD.notes[i].versions = [];
    }
    BD.ghPath = ghPath;
    EXPANDED = {};
    PANELS = [];
    ACTIVE_PANEL = -1;
    openRoot();
    dbg("Blok nahrán z GitHub: " + BD.name + " (" + (content.length / 1024).toFixed(0) + " KB)");
  }).catch(function(err) {
    alert("Chyba při načítání z GitHub: " + err.message);
    dbg("GitHub chyba: " + err.message);
  });
}

// ===== MISSING LINKS =====
function showMissingLinks() {
  if (!BD) return;
  var tb = document.getElementById("toolbar");
  var vw = document.getElementById("view");
  if (!tb || !vw) return;

  tb.innerHTML = '<button class="sm" onclick="openRoot()">Zpět</button>';

  // Scan all notes for broken [[links]] and {{includes}}
  var missingLinks = {}; // name → [noteIds]
  var missingIncludes = {}; // name → [noteIds]

  for (var i = 0; i < BD.notes.length; i++) {
    var n = BD.notes[i];
    if (!n.content) continue;
    var content = n.content;

    // Find [[links]]
    var lre = /\[\[(.+?)\]\]/g, lm;
    while ((lm = lre.exec(content)) !== null) {
      var lname = lm[1].trim();
      if (!findNoteByName(lname)) {
        if (!missingLinks[lname]) missingLinks[lname] = [];
        if (missingLinks[lname].indexOf(n.id) === -1) missingLinks[lname].push(n.id);
      }
    }

    // Find {{includes}}
    var ire = /\{\{(.+?)\}\}/g, im;
    while ((im = ire.exec(content)) !== null) {
      var iname = im[1].trim();
      if (!findNoteByName(iname)) {
        if (!missingIncludes[iname]) missingIncludes[iname] = [];
        if (missingIncludes[iname].indexOf(n.id) === -1) missingIncludes[iname].push(n.id);
      }
    }
  }

  var lKeys = Object.keys(missingLinks).sort(function(a, b) { return a.localeCompare(b, "cs"); });
  var iKeys = Object.keys(missingIncludes).sort(function(a, b) { return a.localeCompare(b, "cs"); });

  var h = '<h6 style="margin:0 0 4px;font-size:.72rem;text-transform:uppercase;color:var(--text2);letter-spacing:.5px">Kontrola integrity</h6>';
  h += '<h2 style="margin:0 0 12px;font-size:1.05rem">&#128269; Chybějící odkazy a includy</h2>';

  if (lKeys.length === 0 && iKeys.length === 0) {
    h += '<p style="color:var(--text2)">&#9989; Žádné chybějící odkazy ani includy. Vše je v pořádku.</p>';
    vw.innerHTML = h;
    return;
  }

  if (lKeys.length > 0) {
    h += '<div style="margin-bottom:16px">';
    h += '<h3 style="font-size:.92rem;color:var(--danger);margin:0 0 8px">&#128279; Chybějící interní odkazy (' + lKeys.length + ')</h3>';
    h += '<ul style="list-style:none;padding:0;margin:0">';
    for (var li = 0; li < lKeys.length; li++) {
      var lk = lKeys[li];
      var lnotes = missingLinks[lk];
      h += '<li style="margin:6px 0;padding:8px 10px;border:1px solid var(--border);border-radius:4px">';
      h += '<strong style="color:var(--danger)">[[' + esc(lk) + ']]</strong>';
      h += '<span style="color:var(--text2);font-size:.82rem;margin-left:8px">— odkazováno z ' + lnotes.length + ' poznámek:</span>';
      h += '<ul style="list-style:disc;padding-left:1.4em;margin:4px 0 0">';
      for (var lj = 0; lj < lnotes.length; lj++) {
        var ln = getNote(lnotes[lj]);
        if (ln) h += '<li style="margin:2px 0"><a href="#" onclick="openNote(\'' + ln.id + '\');return false" style="font-size:.86rem">' + (ln.icon || "&#128221;") + ' ' + esc(ln.name) + '</a></li>';
      }
      h += '</ul></li>';
    }
    h += '</ul></div>';
  }

  if (iKeys.length > 0) {
    h += '<div style="margin-bottom:16px">';
    h += '<h3 style="font-size:.92rem;color:var(--danger);margin:0 0 8px">&#128206; Chybějící includy (' + iKeys.length + ')</h3>';

      h += '<li style="margin:6px 0;padding:8px 10px;border:1px solid var(--border);border-radius:4px">';
      h += '<strong style="color:var(--danger)">{{' + esc(ik) + '}}</strong>';
      h += '<span style="color:var(--text2);font-size:.82rem;margin-left:8px">— vkládáno z ' + inotes.length + ' poznámek:</span>';
      h += '<ul style="list-style:disc;padding-left:1.4em;margin:4px 0 0">';
      for (var ij = 0; ij < inotes.length; ij++) {

        if (inn) h += '<li style="margin:2px 0"><a href="#" onclick="openNote(\'' + inn.id + '\');return false" style="font-size:.86rem">' + (inn.icon || "&#128221;") + ' ' + esc(inn.name) + '</a></li>';
      }
      h += '</ul></li>';
    }
    h += '</ul></div>';
  }

  var totalMissing = lKeys.length + iKeys.length;
  h += '<p style="font-size:.82rem;color:var(--text2);margin-top:12px">Celkem ' + totalMissing + ' chybějících cílů.</p>';

  vw.innerHTML = h;
}

// ===== ADVANCED EDITOR =====
var AE_ACTIVE = false;

function aeRenderBody(body, sid) {
  if (!body || !body.trim()) return "";
  var src = body;
  var phs = [], phc = 0;
  function addPH(html) { var k = "AEPH" + phc + "ZZ"; phs.push({k:k,h:html}); phc++; return k; }
  // CriticMarkup
  src = src.replace(/\{~~(.+?)~>(.+?)~~\}/g, function(m,o,n) { return addPH("<del>"+esc(o)+"</del><ins>"+esc(n)+"</ins>"); });
  src = src.replace(/\{\+\+(.+?)\+\+\}/g, function(m,t) { return addPH("<ins>"+esc(t)+"</ins>"); });
  src = src.replace(/\{--(.+?)--\}/g, function(m,t) { return addPH("<del>"+esc(t)+"</del>"); });
  src = src.replace(/\{==(.+?)==\}/g, function(m,t) { return addPH("<mark>"+esc(t)+"</mark>"); });
  src = src.replace(/\{>>(.+?)<<\}/g, function(m,t) { return addPH('<span class="cm-cmt">['+esc(t)+"]</span>"); });
  // Wiki links
  src = src.replace(/\[\[(.+?)\]\]/g, function(m,name) {
    var lk = findNoteByName(name.trim());
    if (lk) return addPH('<a href="#" class="wlink" onclick="advEd.closeAndOpen(\''+lk.id+'\');return false">'+esc(name)+"</a>");
    return addPH('<span class="wlink-broken">'+esc(name)+"</span>");
  });
  // Includes
  src = src.replace(/\{\{(.+?)\}\}/g, function(m,name) {
    var inc = findNoteByName(name.trim());
    if (!inc) return addPH('<em style="color:var(--danger)">[Include: '+esc(name)+"]</em>");
    return addPH('<div style="border-left:3px solid var(--accent);padding:4px 12px;margin:4px 0;opacity:.8"><small>📎 '+esc(name)+'</small></div>');
  });
  // Tasks
  var ti = 0;
  src = src.replace(/^- \[( |x)\] (.*)$/gm, function(m,chk,txt) {
    var ck = chk === "x";
    var h = '<label style="display:flex;align-items:baseline;gap:0"><input type="checkbox" onclick="advEd.toggleTask('+sid+','+ti+')" '+(ck?"checked":"")+' style="cursor:pointer"><span'+(ck?' class="task-done"':"")+">"+ esc(txt) +"</span></label>";
    ti++;
    return addPH(h);
  });
  // Tags: #word preceded by space/SOL, not inside code
  src = src.replace(/(^|[\s(])#([\u00C0-\u024F\u0100-\u017Fa-zA-Z0-9_]+)/gm, function(m,pre,tag) {
    return pre + addPH('<a href="#" class="ae-tag" onclick="event.preventDefault();advEd.filterByTag(\''+tag.toLowerCase()+'\');">#'+esc(tag)+"</a>");
  });
  var html;
  try { html = marked.parse(src); } catch(e) { html = "<pre>"+esc(src)+"</pre>"; }
  for (var i = 0; i < phs.length; i++) html = html.split(phs[i].k).join(phs[i].h);
  html = html.replace(/<a href="(https?:\/\/)/g, '<a target="_blank" rel="noopener" href="$1');
  return html;
}

function aeTagsInHeading(text, sid) {
  return text.replace(/(^|[\s(])#([\u00C0-\u024F\u0100-\u017Fa-zA-Z0-9_]+)/g, function(m,pre,tag) {
    return pre + '<a href="#" class="ae-tag" onclick="event.preventDefault();advEd.filterByTag(\''+tag.toLowerCase()+'\');">#'+esc(tag)+"</a>";
  });
}

    h+='<button onclick="advEd.toggleOverview()" title="P\u0159ehled (O)" style="margin-left:8px">'+(isOv?"\uD83C\uDFAC Slajdy":"\uD83D\uDCCB P\u0159ehled")+"</button>";
