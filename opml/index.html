                                        ${item.children.map(child => this.renderItem(child, level + 1)).join('')}
                                    </ul>
                                ` : ''}
                            </article>
                        </li>
                    `;
                } else {
                    // View mode - with change tracking and del for checked items
                    let textContent = this.escapeHtml(item.text) || `<em>${this.t('emptyItem')}</em>`;
                    
                    // Parse project attributes from notes
                    const projectAttrs = this.parseProjectAttrs(item.notes);
                    
                    // If item is checked, completion is 100%
                    let displayCompletion = null;
                    let displayStart = null;
                    let displayEnd = null;
                    let displayStatus = null;
                    let isCalculated = false;
                    let projectType = null;
                    
                    if (projectAttrs) {
                        projectType = projectAttrs.type;
                        displayStatus = projectAttrs.status;
                        
                        // Calculate stats from children
                        const calculatedStats = this.calculateProjectStats(item);
                        
                        if (item.checked) {
                            displayCompletion = 100;
                            // Still show dates from attrs or calculated
                            displayStart = calculatedStats.start || projectAttrs.start;
                            displayEnd = calculatedStats.end || projectAttrs.end;
                            isCalculated = calculatedStats.hasProjectChildren;
                        } else if (calculatedStats.hasProjectChildren) {
                            displayCompletion = calculatedStats.completion;
                            displayStart = calculatedStats.start || projectAttrs.start;
                            displayEnd = calculatedStats.end || projectAttrs.end;
                            isCalculated = true;
                        } else {
                            displayCompletion = projectAttrs.completion || 0;
                            displayStart = projectAttrs.start;
                            displayEnd = projectAttrs.end;
                        }
                    }
                    
                    // Determine heading level (h1-h6, max h6 for levels 6+)
                    const headingLevel = Math.min(displayLevel, 6);
                    const headingTag = `h${headingLevel}`;
                    
                    // Wrap in appropriate tags based on state
                    let styledText = textContent;
                    if (item.checked) {
                        styledText = `<del>${styledText}</del>`;
                    }
                    
                    // Make tags clickable in text
                    styledText = this.makeTagsClickable(styledText, item.id, 'text');
                    
                    if (isNew) {
                        styledText = `<ins title="${this.t('newItem')}">${styledText}</ins>`;
                    } else if (hasTextChanged) {
                        styledText = `<ins title="${this.t('changedText')}">${styledText}</ins>`;
                    }
                    
                    // Add type badge AFTER all transformations to avoid issues
                    if (projectType) {
                        const wbsNumber = this.getWbsNumber(item.id);
                        const wbsBadge = wbsNumber ? `<span class="project-wbs-badge">${wbsNumber}</span>` : '';
                        styledText = `${wbsBadge}<span class="project-type-badge">${this.escapeHtml(projectType)}</span>${styledText}`;
                    }
                    
                    // Create heading with styled content
                    const headingContent = `<${headingTag}>${styledText}</${headingTag}>`;
                    
                    // Build project info box if applicable
                    let projectInfoContent = '';
                    if (projectAttrs && displayCompletion !== null) {
                        const days = this.calculateDaysBetween(displayStart, displayEnd);
                        const daysText = days ? `(${this.formatDuration(days)})` : '';
                        const remainingDays = this.calculateRemainingDays(displayEnd);
                        const remainingText = displayCompletion < 100 ? this.formatRemainingDays(remainingDays) : '';
                        const progressBar = this.renderProgressBar(displayCompletion);
                        const calculatedLabel = isCalculated ? ` · ${this.t('projectCalculated')}` : '';
                        const statusText = displayStatus ? `<span class="project-status">${this.escapeHtml(displayStatus)}</span>` : '';
                        
                        // Calculate optimal percentage
                        const optimalPercent = this.calculateOptimalPercent(displayStart, displayEnd);
                        const optimalText = (optimalPercent !== null && displayCompletion < 100) 
                            ? `<span class="project-optimal">${this.t('tableOptimal')} ${optimalPercent} %</span>` 
                            : '';
                        
                        projectInfoContent = `
                            <div class="outline-project-info ${isCalculated ? 'calculated' : ''} ${remainingDays !== null && remainingDays < 0 && displayCompletion < 100 ? 'overdue' : ''}">
                                ${statusText}
                                <span class="project-dates">
                                    📅 ${displayStart ? this.formatProjectDate(displayStart) : '?'} - ${displayEnd ? this.formatProjectDate(displayEnd) : '?'} ${daysText}
                                </span>
                                ${remainingText ? `<span class="project-remaining">${remainingText}</span>` : ''}
                                ${progressBar}
                                <span class="project-percent">${displayCompletion}%${calculatedLabel}</span>
                                ${optimalText}
                            </div>
                        `;
                    }

                    let notesContent = '';
                    // Use restNotes if project item, otherwise full notes
                    const notesToRender = projectAttrs ? projectAttrs.restNotes : item.notes;
                    if (notesToRender) {
                        // Render notes as Markdown
                        let notesHtml;
                        try {
                            notesHtml = marked.parse(processDokuWikiTables(processCriticMarkup(notesToRender)));
                        } catch (e) {
                            // Fallback to escaped HTML if Markdown parsing fails
                            notesHtml = this.escapeHtml(notesToRender);
                        }
                        
                        // Make tags clickable in notes
                        notesHtml = this.makeTagsClickable(notesHtml, item.id, 'notes');
                        
                        // Make editor URLs into clickable buttons
                        notesHtml = this.makeEditorLinksClickable(notesHtml, item.id);
                        
                        if (isNew || hasNotesChanged) {
                            notesHtml = `<ins title="${isNew ? this.t('newNote') : this.t('changedNote')}">${notesHtml}</ins>`;
                        }
                        notesContent = `<div class="outline-notes-display">${notesHtml}</div>`;
                    }
                    
                    // Generate project table if applicable
                    const projectTableContent = this.generateProjectTable(item);

                    return `
                        <li class="outline-item ${item.collapsed ? 'collapsed' : ''}">
                            <article class="outline-article" id="item-${item.id}" aria-label="${this.t('itemOf')} ${this.t('level')} ${displayLevel}: ${this.escapeHtml(item.text) || this.t('emptyItem')}">
                                <div class="outline-header view-mode">
                                    <div class="outline-controls">
                                        ${hasChildren ? `
                                            <button class="btn-icon" 
                                                    onclick="app.toggleCollapse(${item.id})"
                                                    aria-label="${item.collapsed ? this.t('expanded') : this.t('collapsed')} ${this.t('collapseSubitems')}"
                                                    aria-expanded="${!item.collapsed}">
                                                <span class="collapse-indicator">${collapseIcon}</span>
                                            </button>
                                        ` : '<div style="width: 28px;"></div>'}
                                    </div>
                                    <div class="outline-content">
                                        <div class="level-indicator">${this.t('level')} ${displayLevel} ${positionText ? `· ${positionText}` : ''}</div>
                                        <div class="outline-text-display">${headingContent}</div>
                                        
                                        ${projectInfoContent}
                                        
                                        ${hasChildren ? (() => {
                                            const childStats = this.countVisibleChildren(item);
                                            const isFiltered = this.activeTagFilter || this.searchQuery || this.hideCompleted;
                                            const filterInfo = isFiltered && childStats.visible < childStats.total 
                                                ? ` (${this.currentLanguage === 'cs' ? 'zobrazeno' : 'shown'} ${childStats.visible})` 
                                                : '';
                                            
                                            return `
                                                <div class="outline-children-info">
                                                    📦 ${item.collapsed ? this.t('collapsed') : this.t('expanded')}, ${this.t('contains')} ${childStats.total} ${childStats.total === 1 ? this.t('item') : childStats.total <= 4 ? this.t('items2to4') : this.t('items5plus')}${filterInfo}
                                                </div>
                                            `;
                                        })() : ''}

                                        ${anyChecked && hasChildren && stats.total > 0 ? `
                                            <div class="outline-completion-info">
                                                ✓ ${this.t('completedCount')} ${stats.completed} ${this.t('of')} ${stats.total}, ${completionPercent}%
                                            </div>
                                        ` : ''}
                                        
                                        ${notesContent}

                                        <div class="outline-checkbox">
                                            <input type="checkbox" 
                                                   id="check-view-${item.id}"
                                                   ${item.checked ? 'checked' : ''}
                                                   onchange="app.updateItemChecked(${item.id}, this.checked); app.render();"
                                                   aria-label="${this.t('markCompleted')}">
                                        </div>

                                        ${!this.viewOnly ? `
                                        <div class="item-actions">
                                            ${(() => {
                                                // Show "Remove tags" button if item contains tags
                                                const textTags = this.extractTags(item.text);
                                                const noteTags = this.extractTags(item.notes);
                                                if (textTags.length > 0 || noteTags.length > 0) {
                                                    return `
                                                        <button class="btn-small btn-secondary" 
                                                                onclick="app.removeTags(${item.id})"
                                                                aria-label="${this.t('removeTags')}">
                                                            🏷️ ${this.t('removeTags')}
                                                        </button>
                                                    `;
                                                }
                                                return '';
                                            })()}
                                            <button class="btn-small btn-primary" 
                                                    onclick="app.editItem(${item.id})"
                                                    aria-label="${this.t('editItem')}">
                                                ✏️ ${this.t('edit')}
                                            </button>
                                            <button class="btn-small btn-secondary" 
                                                    onclick="app.hoistItem(${item.id})"
                                                    aria-label="${this.t('isolateItem')}">
                                                🔍 ${this.t('isolate')}
                                            </button>
                                            <button class="btn-small btn-secondary" 
                                                    onclick="app.addChild(${item.id})"
                                                    aria-label="${this.t('addChild')}">
                                                ➕ ${this.t('addChild')}
                                            </button>
                                            <button class="btn-small btn-secondary" 
                                                    onclick="app.addSibling(${item.id})"
                                                    aria-label="${this.t('addSibling')}">
                                                ➕ ${this.t('addSibling')}
                                            </button>
                                            <button class="btn-icon btn-danger" 
                                                    onclick="app.deleteItem(${item.id})"
                                                    aria-label="${this.t('deleteItem')}"
                                                    title="${this.t('deleteItem')}">
                                                🗑️
                                            </button>
                                            ${this.hasCompletedChildren(item) ? `
                                            <button class="btn-icon btn-warning" 
                                                    onclick="app.deleteCompletedChildren(${item.id})"
                                                    aria-label="${this.t('deleteCompleted')}"
                                                    title="${this.t('deleteCompleted')}">
                                                🧹
                                            </button>
                                            ` : ''}
                                            <button class="btn-icon" 
                                                    onclick="app.copyItemToClipboard(${item.id})"
                                                    aria-label="${this.t('copyToClipboard')}"
                                                    title="${this.t('copyToClipboard')}">
                                                📋
                                            </button>
                                            <button class="btn-icon" 
                                                    onclick="app.importIntoItem(${item.id})"
                                                    aria-label="${this.t('importOpml')}"
                                                    title="${this.t('importOpml')}">
                                                📥
                                            </button>
                                            ${this.hasProjectDates(item) ? `
                                            <button class="btn-icon" 
                                                    onclick="app.showGanttDiagram(${item.id})"
                                                    aria-label="${this.t('ganttShow')}"
                                                    title="${this.t('ganttShow')}">
                                                📊
                                            </button>
                                            ` : ''}
                                        </div>
                                        ` : ''}
                                        
                                        ${projectTableContent}
                                    </div>
                                </div>
                                ${hasChildren ? `
                                    <ul class="outline-children">
                                        ${item.children.map(child => this.renderItem(child, level + 1)).join('')}
                                    </ul>
                                ` : ''}
                            </article>
                        </li>
                    `;
                }
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            renderToolbar() {
                const toolbar = document.getElementById('toolbar');
                if (!toolbar) return;
                
                // In view-only mode, show only search and hide completed
                if (this.viewOnly) {
                    toolbar.innerHTML = `
                        <div style="background: #fff3cd; color: #856404; padding: 8px 16px; border-radius: 6px; font-weight: 600; margin-right: 16px;">
                            👁️ Režim pouze pro čtení / Read-only mode
                        </div>
                        
                        <div style="flex: 1; min-width: 20px;"></div>
                        
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <input type="text" 
                                   id="searchInput" 
                                   placeholder="${this.t('searchPlaceholder')}"
                                   value="${this.escapeHtml(this.searchQuery)}"
                                   onkeydown="if(event.key === 'Enter') app.setSearchQuery(this.value)"
                                   style="padding: 10px 12px; border: 2px solid var(--border); border-radius: 6px; font-size: 14px; min-width: 250px;"
                                   aria-label="${this.t('searchPlaceholder')}">
                            <button class="btn-secondary" 
                                    onclick="app.setSearchQuery(document.getElementById('searchInput').value)"
                                    aria-label="${this.t('searchButton')}">
                                🔍 ${this.t('searchButton')}
                            </button>
                            ${this.searchQuery ? `
                                <button class="btn-secondary" 
                                        onclick="app.clearSearch()"
                                        aria-label="${this.t('clearSearch')}">
                                    ❌ ${this.t('clearSearch')}
                                </button>
                            ` : ''}
                        </div>
                        
                        <button class="btn-secondary" 
                                onclick="app.toggleHideCompleted()"
                                aria-label="${this.hideCompleted ? this.t('showCompleted') : this.t('hideCompleted')}"
                                style="${this.hideCompleted ? 'background: #38a169; color: white;' : ''}">
                            ${this.hideCompleted ? '👁️ ' + this.t('showCompleted') : '🙈 ' + this.t('hideCompleted')}
                        </button>
                    `;
                    return;
                }
                
                // Normal mode - show all buttons
                const hasGH = this.hasGitHubConnection();
                toolbar.innerHTML = `
                    <button class="btn-primary" onclick="app.newFile()" aria-label="${this.t('newFile')}">
                        ➕ ${this.t('newFile')}
                    </button>
                    
                    <button class="btn-secondary" onclick="document.getElementById('fileInput').click()" aria-label="${this.t('loadFile')}">
                        📂 ${this.t('loadFile')}
                    </button>
                    <input type="file" id="fileInput" accept=".opml,.xml" onchange="app.loadFile(event)" style="display: none;" aria-hidden="true">
                    
                    <button class="btn-secondary" onclick="app.loadFromGitHub()" aria-label="${this.t('ghLoadFromGitHub')}" title="${this.t('ghLoadFromGitHub')}" style="background: #6e5494; color: white;">
                        🐙 ${this.t('ghLoadFromGitHub')}
                    </button>
                    
                    <button class="btn-success" onclick="app.saveFile()" aria-label="${this.t('saveFile')}" accesskey="s" title="${this.t('saveFile')} (Alt+S)">
                        💾 ${this.t('saveFile')}
                    </button>
                    
                    ${hasGH ? `
                    <button class="btn-success" onclick="app.saveToGitHub()" aria-label="${this.t('ghSaveToGitHub')}" accesskey="g" title="${this.t('ghSaveToGitHub')} (Alt+G)" style="background: #6e5494;">
                        🐙 ${this.t('ghSaveToGitHub')}
                    </button>
                    ` : ''}
                    
                    <button class="btn-secondary" onclick="app.showGitHubSettings()" aria-label="${this.t('ghSettings')}" title="${this.t('ghSettings')}" style="${hasGH ? 'background: #6e5494; color: white;' : ''}">
                        ⚙️ ${hasGH ? this.t('ghConnected') : this.t('ghSettings')}
                    </button>
                    
                    <button class="btn-success" onclick="app.copyUrlSource()" aria-label="${this.t('copyUrl')}">
                        🔗 ${this.t('copyUrl')}
                    </button>
                    
                    <button class="btn-success" onclick="app.copyAsMarkdown()" aria-label="${this.t('copyMarkdown')}" accesskey="c" title="${this.t('copyMarkdown')} (Alt+C)">
                        📝 ${this.t('copyMarkdown')}
                    </button>
                    
                    <button class="btn-secondary" onclick="app.addRootItem()" aria-label="${this.t('addItem')}">
                        ➕ ${this.t('addItem')}
                    </button>
                    
                    <button class="btn-secondary" onclick="app.expandAll()" aria-label="${this.t('expandAll')}" accesskey="e" title="${this.t('expandAll')} (Alt+E)">
                        ⊞ ${this.t('expandAll')}
                    </button>
                    
                    <button class="btn-secondary" onclick="app.collapseAll()" aria-label="${this.t('collapseAll')}" accesskey="w" title="${this.t('collapseAll')} (Alt+W)">
                        ⊟ ${this.t('collapseAll')}
                    </button>
                    
                    <div style="flex: 1; min-width: 20px;"></div>
                    
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" 
                               id="searchInput" 
                               placeholder="${this.t('searchPlaceholder')}"
                               value="${this.escapeHtml(this.searchQuery)}"
                               onkeydown="if(event.key === 'Enter') app.setSearchQuery(this.value)"
                               style="padding: 10px 12px; border: 2px solid var(--border); border-radius: 6px; font-size: 14px; min-width: 250px;"
                               aria-label="${this.t('searchPlaceholder')}">
                        <button class="btn-secondary" 
                                onclick="app.setSearchQuery(document.getElementById('searchInput').value)"
                                aria-label="${this.t('searchButton')}">
                            🔍 ${this.t('searchButton')}
                        </button>
                        ${this.searchQuery ? `
                            <button class="btn-secondary" 
                                    onclick="app.clearSearch()"
                                    aria-label="${this.t('clearSearch')}">
                                ❌ ${this.t('clearSearch')}
                            </button>
                        ` : ''}
                    </div>
                    
                    <button class="btn-secondary" 
                            onclick="app.toggleHideCompleted()"
                            aria-label="${this.hideCompleted ? this.t('showCompleted') : this.t('hideCompleted')}"
                            style="${this.hideCompleted ? 'background: #38a169; color: white;' : ''}">
                        ${this.hideCompleted ? '👁️ ' + this.t('showCompleted') : '🙈 ' + this.t('hideCompleted')}
                    </button>
                `;
            },

            render() {
                // Update toolbar
                this.renderToolbar();
                
                const emptyState = document.getElementById('emptyState');
                const editorArea = document.getElementById('editorArea');
                const outlineTree = document.getElementById('outlineTree');

                if (this.data.items.length === 0) {
                    emptyState.innerHTML = `
                        <div class="empty-state-icon">📄</div>
                        <h2>${this.t('emptyStateTitle')}</h2>
                        <p>${this.t('emptyStateDesc')}</p>
                    `;
                    emptyState.style.display = 'block';
                    editorArea.style.display = 'none';
                } else {
                    emptyState.style.display = 'none';
                    editorArea.style.display = 'block';
                    
                    // Add filename display if exists
                    let filenameHtml = '';
                    if (this.data.filename) {
                        filenameHtml = `<div class="filename-display">📄 <strong>${this.t('fileLabel')}</strong> ${this.escapeHtml(this.data.filename)}</div>`;
                    }
                    
                    editorArea.innerHTML = `
                        ${filenameHtml}
                        <div class="document-title-section">
                            <label for="documentTitle">${this.t('documentTitle')}</label>
                            <input type="text" 
                                   id="documentTitle" 
                                   class="document-title-input"
                                   value="${this.escapeHtml(this.data.title)}"
                                   oninput="app.updateTitle(this.value)"
                                   placeholder="${this.t('documentTitlePlaceholder')}"
                                   aria-label="${this.t('documentTitle')}">
                        </div>
                        <div style="padding: 30px;">
                            <ul id="outlineTree" class="outline-tree"></ul>
                        </div>
                    `;
                    
                    const newOutlineTree = document.getElementById('outlineTree');
                    
                    // If hoisted, only show the hoisted item
                    let itemsToRender = this.data.items;
                    
                    // Apply search filter if active
                    if (this.searchQuery) {
                        const filterItemsBySearch = (items) => {
                            const filtered = [];
                            items.forEach(item => {
                                if (this.itemMatchesSearch(item, this.searchQuery)) {
                                    // Item matches - but also filter its children recursively
                                    const filteredChildren = item.children.length > 0 
                                        ? filterItemsBySearch(item.children) 
                                        : [];
                                    filtered.push({
                                        id: item.id,
                                        text: item.text,
                                        notes: item.notes,
                                        checked: item.checked,
                                        collapsed: item.collapsed,
                                        children: filteredChildren
                                    });
                                } else if (item.children.length > 0) {
                                    // Item doesn't match - check children recursively
                                    const filteredChildren = filterItemsBySearch(item.children);
                                    if (filteredChildren.length > 0) {
                                        // Create a proper copy with only filtered children
                                        filtered.push({
                                            id: item.id,
                                            text: item.text,
                                            notes: item.notes,
                                            checked: item.checked,
                                            collapsed: item.collapsed,
                                            children: filteredChildren
                                        });
                                    }
                                }
                            });
                            return filtered;
                        };
                        
                        itemsToRender = filterItemsBySearch(itemsToRender);
                        
                        // Show search results banner
                        const searchCount = itemsToRender.length;
                        const searchBanner = document.createElement('div');
                        searchBanner.style.cssText = 'background: #52c41a; border: 2px solid #389e0d; color: #ffffff; padding: 12px 20px; margin: 0 0 20px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;';
                        searchBanner.innerHTML = `
                            <span style="font-weight: 600;">🔍 ${this.t('searchResults')} "${this.escapeHtml(this.searchQuery)}" (${searchCount} ${this.t('itemsFound')})</span>
                            <button class="btn-small btn-secondary" onclick="app.clearSearch()" aria-label="${this.t('clearSearch')}">
                                ❌ ${this.t('clearSearch')}
                            </button>
                        `;
                        newOutlineTree.parentElement.insertBefore(searchBanner, newOutlineTree);
                    }
                    
                    // Apply hide completed filter if active
                    if (this.hideCompleted) {
                        const filterCompletedItems = (items) => {
                            const filtered = [];
                            items.forEach(item => {
                                if (!item.checked) {
                                    // Item is not completed, include it
                                    const filteredChildren = item.children.length > 0 ? filterCompletedItems(item.children) : [];
                                    filtered.push({
                                        id: item.id,
                                        text: item.text,
                                        notes: item.notes,
                                        checked: item.checked,
                                        collapsed: item.collapsed,
                                        children: filteredChildren
                                    });
                                }
                                // If item is completed (checked), skip it entirely
                            });
                            return filtered;
                        };
                        
                        itemsToRender = filterCompletedItems(itemsToRender);
                    }
                    
                    // Apply tag filter if active
                    if (this.activeTagFilter) {
                        const filterItemsByTag = (items) => {
                            const filtered = [];
                            items.forEach(item => {
                                if (this.itemContainsTag(item, this.activeTagFilter)) {
                                    // Item has tag - but also filter its children recursively
                                    const filteredChildren = item.children.length > 0 
                                        ? filterItemsByTag(item.children) 
                                        : [];
                                    filtered.push({
                                        id: item.id,
                                        text: item.text,
                                        notes: item.notes,
                                        checked: item.checked,
                                        collapsed: item.collapsed,
                                        children: filteredChildren
                                    });
                                } else if (item.children.length > 0) {
                                    // Item doesn't have tag - check children recursively
                                    const filteredChildren = filterItemsByTag(item.children);
                                    if (filteredChildren.length > 0) {
                                        // Create a proper copy with only filtered children
                                        filtered.push({
                                            id: item.id,
                                            text: item.text,
                                            notes: item.notes,
                                            checked: item.checked,
                                            collapsed: item.collapsed,
                                            children: filteredChildren
                                        });
                                    }
                                }
                            });
                            return filtered;
                        };
                        
                        itemsToRender = filterItemsByTag(itemsToRender);
                        
                        // Show tag filter banner
                        const tagCount = itemsToRender.length;
                        const tagBanner = document.createElement('div');
                        tagBanner.style.cssText = 'background: #1890ff; border: 2px solid #0050b3; color: #ffffff; padding: 12px 20px; margin: 0 0 20px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;';
                        tagBanner.innerHTML = `
                            <span style="font-weight: 600;">🏷️ ${this.t('tagFilter')} #${this.activeTagFilter} (${tagCount} ${this.t('itemsWithTag')})</span>
                            <button class="btn-small btn-secondary" onclick="app.clearTagFilter()" aria-label="${this.t('clearFilter')}">
                                ❌ ${this.t('clearFilter')}
                            </button>
                        `;
                        newOutlineTree.parentElement.insertBefore(tagBanner, newOutlineTree);
                    }
                    
                    if (this.hoistedItemId !== null) {
                        const hoistedItem = this.findItem(this.data.items, this.hoistedItemId);
                        if (hoistedItem) {
                            itemsToRender = [hoistedItem];
                            
                            // Get breadcrumb path
                            const breadcrumbPath = this.getBreadcrumbPath(this.data.items, this.hoistedItemId);
                            let breadcrumbHtml = '';
                            if (breadcrumbPath && breadcrumbPath.length > 0) {
                                breadcrumbHtml = breadcrumbPath.map((item, index) => {
                                    const isLast = index === breadcrumbPath.length - 1;
                                    const text = this.escapeHtml(item.text) || this.t('emptyItem');
                                    if (isLast) {
                                        return `<strong>${text}</strong>`;
                                    } else {
                                        return `<a href="#" onclick="event.preventDefault(); app.hoistItem(${item.id}); app.render();" style="color: #000000; text-decoration: underline; font-weight: 600;">${text}</a>`;
                                    }
                                }).join(' › ');
                            }
                            
                            // Add hoist indicator with breadcrumb
                            const hoistBanner = document.createElement('div');
                            hoistBanner.style.cssText = 'background: #fa8c16; border: 2px solid #d46b08; padding: 12px 20px; margin: 0 0 20px 0; border-radius: 6px;';
                            hoistBanner.innerHTML = `
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: ${breadcrumbHtml ? '8px' : '0'};">
                                    <span style="font-weight: 600; color: #000000;">🔍 ${this.t('hoistBanner')} "${this.escapeHtml(hoistedItem.text) || this.t('emptyItem')}" ${this.t('hoistBannerSuffix')}</span>
                                    <button class="btn-small btn-secondary" onclick="app.unhoistAll()" aria-label="${this.t('showAll')}">
                                        ↩️ ${this.t('showAll')}
                                    </button>
                                </div>
                                ${breadcrumbHtml ? `
                                    <div style="font-size: 14px; color: #000000; padding-top: 8px; border-top: 2px solid #ad4e00;">
                                        📍 ${breadcrumbHtml}
                                    </div>
                                ` : ''}
                            `;
                            newOutlineTree.parentElement.insertBefore(hoistBanner, newOutlineTree);
                        }
                    }
                    
                    newOutlineTree.innerHTML = itemsToRender.map(item => this.renderItem(item, 0)).join('');
                    
                    // Add tags panel at the bottom
                    const allTags = this.getAllTags();
                    if (allTags.length > 0) {
                        const tagsPanel = document.createElement('div');
                        tagsPanel.style.cssText = 'background: #f0f2f5; border: 2px solid #d9d9d9; padding: 16px 20px; margin: 30px 0 0 0; border-radius: 6px;';
                        tagsPanel.innerHTML = `
                            <h3 style="margin: 0 0 12px 0; font-size: 14px; font-weight: 600; color: #000000; text-transform: uppercase;">
                                🏷️ ${this.t('tags')}
                            </h3>
                            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                                ${allTags.map(({tag, count}) => `
                                    <a href="#" 
                                       onclick="event.preventDefault(); app.filterByTag('${tag}'); return false;" 
                                       style="display: inline-block; padding: 6px 12px; background: ${this.activeTagFilter === tag ? '#1890ff' : '#ffffff'}; color: ${this.activeTagFilter === tag ? '#ffffff' : '#000000'}; border: 2px solid #d9d9d9; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;"
                                       onmouseover="if(this.style.background !== 'rgb(24, 144, 255)') this.style.background='#e6f7ff'"
                                       onmouseout="if(this.style.background !== 'rgb(24, 144, 255)') this.style.background='#ffffff'">
                                        #${tag} <span style="opacity: 0.7;">(${count})</span>
                                    </a>
                                `).join('')}
                            </div>
                        `;
                        newOutlineTree.parentElement.appendChild(tagsPanel);
                    }
                }
            }
        };

        // Initialize and render
        app.init();
        app.render();
        app.updatePageTitle();

        // Check for OPML in URL on page load
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const opmlBase64 = urlParams.get('opml');
            const ghIdParam = urlParams.get('id');
            const viewOnlyParam = urlParams.get('v');
            
            // Enable view-only mode if &v parameter exists
            if (viewOnlyParam !== null) {
                app.viewOnly = true;
            }
            
            // GitHub ?id= parameter - load from GitHub
            if (ghIdParam) {
                try {
                    const ghPath = GitHubStorage.decode(ghIdParam);
                    app.loadFromGitHub(ghPath);
                    return;
                } catch (e) {
                    console.error('Invalid GitHub id parameter:', e);
                }
            }
            
            if (opmlBase64) {
                try {
                    // Convert URL-safe base64 back to standard base64
                    let standardBase64 = opmlBase64.replace(/-/g, '+').replace(/_/g, '/');
                    // Add padding if needed
                    while (standardBase64.length % 4) {
                        standardBase64 += '=';
                    }
                    
                    // Decode base64 to OPML XML with proper UTF-8 handling
                    const binaryString = atob(standardBase64);
                    
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    const opmlXml = new TextDecoder('utf-8').decode(bytes);
                    
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(opmlXml, 'text/xml');
                    
                    const parserError = xmlDoc.querySelector('parsererror');
                    if (parserError) {
                        throw new Error('Chyba při parsování XML z URL');
                    }
                    
                    app.parseOPML(xmlDoc);
                    app.data.filename = 'z-url.opml';
                    app.originalData = JSON.parse(JSON.stringify(app.data));
                    app.editingItemId = null;
                    app.updatePageTitle();
                    app.render();
                } catch (error) {
                    alert(app.t('errorLoadUrl') + ' ' + error.message);
                }
            }
        })();
    </script>
</body>
</html>
