            addChild(parentId) {
                const parent = this.findItem(this.data.items, parentId);
                if (!parent) return;

                const item = {
                    id: ++this.itemCounter,
                    text: '',
                    notes: '',
                    checked: false,
                    collapsed: false,
                    children: []
                };
                parent.children.push(item);
                parent.collapsed = false;
                this.editingItemId = item.id;
                this.render();
                
                setTimeout(() => {
                    const input = document.querySelector(`#item-${item.id} .outline-text`);
                    if (input) input.focus();
                }, 100);
            },

            addSibling(id) {
                const result = this.findItemWithParent(this.data.items, id, null);
                if (!result) return;

                const { item, parent, index } = result;
                const items = parent ? parent.children : this.data.items;

                const newItem = {
                    id: ++this.itemCounter,
                    text: '',
                    notes: '',
                    checked: false,
                    collapsed: false,
                    children: []
                };

                // Insert after current item
                items.splice(index + 1, 0, newItem);
                this.editingItemId = newItem.id;
                this.render();
                
                setTimeout(() => {
                    const input = document.querySelector(`#item-${newItem.id} .outline-text`);
                    if (input) input.focus();
                }, 100);
            },

            deleteItem(id) {
                this.data.items = this.removeItem(this.data.items, id);
                this.render();
            },

            deleteCompletedChildren(id) {
                const item = this.findItem(this.data.items, id);
                if (item && item.children) {
                    item.children = this.removeCompletedItems(item.children);
                    this.render();
                }
            },

            removeCompletedItems(items) {
                return items.filter(item => {
                    if (item.checked) return false;
                    if (item.children && item.children.length > 0) {
                        item.children = this.removeCompletedItems(item.children);
                    }
                    return true;
                });
            },

            hasCompletedChildren(item) {
                if (!item.children || item.children.length === 0) return false;
                return item.children.some(child => child.checked || this.hasCompletedChildren(child));
            },

            copyItemToClipboard(id) {
                const item = this.findItem(this.data.items, id);
                if (!item) return;
                
                let content = item.text || '';
                if (item.notes && item.notes.trim()) {
                    content += '\n\n' + item.notes.trim();
                }
                
                navigator.clipboard.writeText(content).then(() => {
                    // Visual feedback
                    const btn = event.target.closest('button');
                    if (btn) {
                        const originalText = btn.innerHTML;
                        btn.innerHTML = '✓';
                        setTimeout(() => { btn.innerHTML = originalText; }, 1000);
                    }
                }).catch(err => {
                    alert(this.t('copyError') + ': ' + err);
                });
            },

            importIntoItem(id) {
                // Store target ID for the file input handler
                this.importTargetId = id;
                
                // Create and trigger file input
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.opml,.xml';
                input.onchange = (e) => this.handleImportIntoItem(e);
                input.click();
            },

            handleImportIntoItem(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(e.target.result, 'text/xml');
                        
                        const parserError = xmlDoc.querySelector('parsererror');
                        if (parserError) {
                            throw new Error('Chyba při parsování XML');
                        }

                        // Parse the OPML content
                        const body = xmlDoc.querySelector('body');
                        const outlines = body ? Array.from(body.children) : [];
                        const importedItems = this.parseOutlines(outlines);
                        
                        if (importedItems.length === 0) {
                            alert(this.t('importEmpty'));
                            return;
                        }

                        // Find target item and add imported items as children
                        const targetItem = this.findItem(this.data.items, this.importTargetId);
                        if (targetItem) {
                            // Append to existing children
                            targetItem.children = targetItem.children.concat(importedItems);
                            // Make sure it's expanded to show the new items
                            targetItem.collapsed = false;
                            this.render();
                        }
                        
                        this.importTargetId = null;
                    } catch (error) {
                        alert(this.t('errorLoadFile') + ' ' + error.message);
                    }
                };
                reader.readAsText(file);
            },

            // Gantt diagram functions
            showGanttDiagram(id) {
                const item = this.findItem(this.data.items, id);
                if (!item) return;

                // Collect all project items from this item and children
                const projectItems = this.collectProjectItems(item, 0);
                
                if (projectItems.length === 0) {
                    alert(this.t('ganttNoData'));
                    return;
                }

                // Create and show modal
                this.renderGanttModal(item.text, projectItems);
            },

            collectProjectItems(item, level) {
                const items = [];
                const attrs = this.parseProjectAttrs(item.notes);
                
                if (attrs && (attrs.start || attrs.end)) {
                    const calculated = this.calculateProjectStats(item);
                    items.push({
                        id: item.id,
                        text: item.text,
                        level: level,
                        start: calculated.start || attrs.start,
                        end: calculated.end || attrs.end,
                        completion: item.checked ? 100 : (calculated.completion !== null ? calculated.completion : (attrs.completion || 0)),
                        status: attrs.status || '',
                        checked: item.checked
                    });
                }

                // Process children
                if (item.children) {
                    item.children.forEach(child => {
                        items.push(...this.collectProjectItems(child, level + 1));
                    });
                }

                return items;
            },

            renderGanttModal(title, items) {
                // Find date range
                let minDate = null;
                let maxDate = null;

                items.forEach(item => {
                    if (item.start) {
                        const start = new Date(item.start);
                        if (!minDate || start < minDate) minDate = start;
                    }
                    if (item.end) {
                        const end = new Date(item.end);
                        if (!maxDate || end > maxDate) maxDate = end;
                    }
                });

                if (!minDate || !maxDate) {
                    alert(this.t('ganttNoData'));
                    return;
                }

                // Add some padding to dates
                minDate = new Date(minDate);
                minDate.setDate(minDate.getDate() - 3);
                maxDate = new Date(maxDate);
                maxDate.setDate(maxDate.getDate() + 3);

                // Generate days array
                const days = [];
                const currentDate = new Date(minDate);
                while (currentDate <= maxDate) {
                    days.push(new Date(currentDate));
                    currentDate.setDate(currentDate.getDate() + 1);
                }

                // Group days by month
                const months = [];
                let currentMonth = null;
                days.forEach((day, index) => {
                    const monthKey = `${day.getFullYear()}-${day.getMonth()}`;
                    if (monthKey !== currentMonth) {
                        months.push({
                            name: day.toLocaleDateString(this.currentLanguage, { month: 'short', year: 'numeric' }),
                            startIndex: index,
                            days: 1
                        });
                        currentMonth = monthKey;
                    } else {
                        months[months.length - 1].days++;
                    }
                });

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                // Create modal HTML
                const modalHtml = `
                    <div class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="gantt-title" onclick="if(event.target === this) app.closeGanttModal()">
                        <div class="modal-content" role="document">
                            <div class="modal-header">
                                <h2 id="gantt-title">📊 ${this.t('ganttTitle')}: ${this.escapeHtml(title)}</h2>
                                <button class="modal-close" onclick="app.closeGanttModal()" aria-label="${this.t('close')}" title="${this.t('close')}">&times;</button>
                            </div>
                            <div class="modal-body">
                                <div class="gantt-container" role="region" aria-label="${this.t('ganttTitle')}">
                                    <!-- Header with months -->
                                    <div class="gantt-header" role="row">
                                        <div class="gantt-header-task" role="columnheader">${this.t('ganttTask')}</div>
                                        <div class="gantt-header-timeline">
                                            ${months.map(m => `
                                                <div class="gantt-month" style="width: ${m.days * 28}px" role="columnheader">${m.name}</div>
                                            `).join('')}
                                        </div>
                                    </div>
                                    <!-- Header with days -->
                                    <div class="gantt-header" role="row">
                                        <div class="gantt-header-task" role="columnheader">
                                            <span class="gantt-sr-only">${this.t('ganttDays')}</span>
                                        </div>
                                        <div class="gantt-header-timeline">
                                            ${days.map(d => {
                                                const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                                                const isToday = d.getTime() === today.getTime();
                                                return `<div class="gantt-day ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''}" 
                                                             role="columnheader" 
                                                             title="${d.toLocaleDateString(this.currentLanguage)}">${d.getDate()}</div>`;
                                            }).join('')}
                                        </div>
                                    </div>
                                    <!-- Task rows -->
                                    ${items.map(item => this.renderGanttRow(item, days, today, minDate)).join('')}
                                </div>
                                
                                <!-- Legend -->
                                <div class="gantt-legend" role="list" aria-label="${this.t('ganttLegend')}">
                                    <div class="gantt-legend-item" role="listitem">
                                        <div class="gantt-legend-color" style="background: #718096"></div>
                                        <span>${this.t('ganttNotStarted')}</span>
                                    </div>
                                    <div class="gantt-legend-item" role="listitem">
                                        <div class="gantt-legend-color" style="background: #3182ce"></div>
                                        <span>${this.t('ganttInProgress')}</span>
                                    </div>
                                    <div class="gantt-legend-item" role="listitem">
                                        <div class="gantt-legend-color" style="background: #38a169"></div>
                                        <span>${this.t('ganttCompleted')}</span>
                                    </div>
                                    <div class="gantt-legend-item" role="listitem">
                                        <div class="gantt-legend-color" style="background: #e53e3e"></div>
                                        <span>${this.t('ganttOverdue')}</span>
                                    </div>
                                </div>
                                
                                <!-- Screen reader summary -->
                                <div class="gantt-sr-only" role="status" aria-live="polite">
                                    ${this.t('ganttSummary').replace('{count}', items.length)}
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Add modal to body
                const container = document.createElement('div');
                container.id = 'gantt-modal-container';
                container.innerHTML = modalHtml;
                document.body.appendChild(container);

                // Focus trap and keyboard handling
                document.addEventListener('keydown', this.ganttKeyHandler);
                
                // Focus close button
                container.querySelector('.modal-close').focus();
            },

            renderGanttRow(item, days, today, minDate) {
                const indent = '&nbsp;&nbsp;&nbsp;&nbsp;'.repeat(item.level);
                
                // Calculate bar position and width
                const startDate = item.start ? new Date(item.start) : null;
                const endDate = item.end ? new Date(item.end) : null;
                
                let barHtml = '';
                
                if (startDate && endDate) {
                    const startOffset = Math.max(0, Math.floor((startDate - minDate) / (1000 * 60 * 60 * 24)));
                    const duration = Math.max(1, Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1);
                    
                    // Determine status class
                    let statusClass = 'status-not-started';
                    if (item.checked || item.completion === 100) {
                        statusClass = 'status-completed';
                    } else if (endDate < today && item.completion < 100) {
                        statusClass = 'status-overdue';
                    } else if (item.completion > 0) {
                        statusClass = 'status-in-progress';
                    }

                    const progressWidth = item.completion || 0;
                    
                    barHtml = `
                        <div class="gantt-bar ${statusClass}" 
                             style="left: ${startOffset * 28}px; width: ${duration * 28 - 4}px;"
                             role="img"
                             aria-label="${this.escapeHtml(item.text)}: ${item.start} - ${item.end}, ${item.completion}% ${this.t('ganttComplete')}">
                            <div class="gantt-bar-progress" style="width: ${progressWidth}%"></div>
                            <span class="gantt-bar-text">${item.completion}%</span>
                        </div>
                    `;
                }

                // Status icon
                let statusIcon = '⏳';
                if (item.checked || item.completion === 100) {
                    statusIcon = '✅';
                } else if (endDate && endDate < today) {
                    statusIcon = '🚨';
                } else if (item.completion > 0) {
                    statusIcon = '🔄';
                }

                return `
                    <div class="gantt-row" role="row">
                        <div class="gantt-task-name" role="cell">
                            <span class="gantt-task-indent">${indent}</span>
                            <span class="gantt-task-status" aria-hidden="true">${statusIcon}</span>
                            <span>${this.escapeHtml(item.text)}</span>
                        </div>
                        <div class="gantt-timeline" role="cell">
                            ${days.map(d => {
                                const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                                return `<div class="gantt-cell ${isWeekend ? 'weekend' : ''}"></div>`;
                            }).join('')}
                            ${barHtml}
                        </div>
                    </div>
                `;
            },

            ganttKeyHandler(e) {
                if (e.key === 'Escape') {
                    app.closeGanttModal();
                }
            },

            closeGanttModal() {
                const container = document.getElementById('gantt-modal-container');
                if (container) {
                    container.remove();
                    document.removeEventListener('keydown', this.ganttKeyHandler);
                }
            },

            hasProjectDates(item) {
                // Check if item or any children have project dates
                const attrs = this.parseProjectAttrs(item.notes);
                if (attrs && (attrs.start || attrs.end)) return true;
                
                if (item.children) {
                    return item.children.some(child => this.hasProjectDates(child));
                }
                return false;
            },

            removeItem(items, id) {
                return items.filter(item => {
                    if (item.id === id) return false;
                    if (item.children.length > 0) {
                        item.children = this.removeItem(item.children, id);
                    }
                    return true;
                });
            },

            toggleCollapse(id) {
                const item = this.findItem(this.data.items, id);
                if (item) {
                    item.collapsed = !item.collapsed;
                    this.render();
                }
            },

            collapseAll() {
                const setCollapsed = (items, value) => {
                    items.forEach(item => {
                        if (item.children && item.children.length > 0) {
                            item.collapsed = value;
                            setCollapsed(item.children, value);
                        }
                    });
                };
                setCollapsed(this.data.items, true);
                this.render();
            },

            expandAll() {
                const setCollapsed = (items, value) => {
                    items.forEach(item => {
                        item.collapsed = value;
                        if (item.children && item.children.length > 0) {
                            setCollapsed(item.children, value);
                        }
                    });
                };
                setCollapsed(this.data.items, false);
                this.render();
            },

            hoistItem(id) {
                this.hoistedItemId = id;
                this.render();
            },

            unhoistAll() {
                this.hoistedItemId = null;
                this.render();
            },

            moveUp(id) {
                const result = this.findItemWithParent(this.data.items, id, null);
                if (!result) return;

                const { parent, index } = result;
                const items = parent ? parent.children : this.data.items;
                
                if (index > 0) {
                    [items[index], items[index - 1]] = [items[index - 1], items[index]];
                    this.render();
                }
            },

            moveDown(id) {
                const result = this.findItemWithParent(this.data.items, id, null);
                if (!result) return;

                const { parent, index } = result;
                const items = parent ? parent.children : this.data.items;
                
                if (index < items.length - 1) {
                    [items[index], items[index + 1]] = [items[index + 1], items[index]];
                    this.render();
                }
            },

            indent(id) {
                const result = this.findItemWithParent(this.data.items, id, null);
                if (!result) return;

                const { parent, index } = result;
                const items = parent ? parent.children : this.data.items;
                
                if (index > 0) {
                    const item = items[index];
                    const newParent = items[index - 1];
                    items.splice(index, 1);
                    newParent.children.push(item);
                    newParent.collapsed = false;
                    this.render();
                }
            },

            outdent(id) {
                const result = this.findItemWithParent(this.data.items, id, null);
                if (!result || !result.parent) return;

                const { parent, index } = result;
                const grandParentResult = this.findItemWithParent(this.data.items, parent.id, null);
                if (!grandParentResult) return;

                const item = parent.children[index];
                parent.children.splice(index, 1);
                
                const grandParent = grandParentResult.parent;
                const targetItems = grandParent ? grandParent.children : this.data.items;
                const parentIndex = targetItems.findIndex(i => i.id === parent.id);
                
                targetItems.splice(parentIndex + 1, 0, item);
                this.render();
            },

            findItem(items, id) {
                for (const item of items) {
                    if (item.id === id) return item;
                    if (item.children.length > 0) {
                        const found = this.findItem(item.children, id);
                        if (found) return found;
                    }
                }
                return null;
            },
            
            getBreadcrumbPath(items, targetId, path = []) {
                for (const item of items) {
                    if (item.id === targetId) {
                        return [...path, item];
                    }
                    if (item.children.length > 0) {
                        const found = this.getBreadcrumbPath(item.children, targetId, [...path, item]);
                        if (found) return found;
                    }
                }
                return null;
            },

            countAllChildren(item) {
                let count = item.children.length;
                item.children.forEach(child => {
                    count += this.countAllChildren(child);
                });
                return count;
            },

            countVisibleChildren(item) {
                // Count how many children are visible after filters
                // Returns {total: X, visible: Y}
                let total = item.children.length;
                let visible = 0;
                
                item.children.forEach(child => {
                    const childTotal = this.countAllChildren(child);
                    total += childTotal;
                    
                    // Check if child matches current filters
                    let matches = true;
                    
                    if (this.activeTagFilter) {
                        matches = matches && this.itemContainsTag(child, this.activeTagFilter);
                    }
                    
                    if (this.searchQuery) {
                        matches = matches && this.itemMatchesSearch(child, this.searchQuery);
                    }
                    
                    if (this.hideCompleted && child.checked) {
                        matches = false;
                    }
                    
                    if (matches) {
                        visible += 1; // Count the child itself
                        // Count visible grandchildren recursively
                        const grandchildStats = this.countVisibleChildren(child);
                        visible += grandchildStats.visible;
                    } else {
                        // Child doesn't match, but check its children
                        const grandchildStats = this.countVisibleChildren(child);
                        visible += grandchildStats.visible;
                    }
                });
                
                return { total, visible };
            },

            hasAnyCheckedItems(items) {
                for (const item of items) {
                    if (item.checked) return true;
                    if (item.children.length > 0) {
                        if (this.hasAnyCheckedItems(item.children)) return true;
                    }
                }
                return false;
            },

            countCompletionStats(item) {
                let total = 0;
                let completed = 0;

                // Only count children, not this item itself
                item.children.forEach(child => {
                    total++; // Count the child
                    if (child.checked) completed++;
                    
                    // Recursively count grandchildren
                    if (child.children.length > 0) {
                        const childStats = this.countCompletionStats(child);
                        total += childStats.total;
                        completed += childStats.completed;
                    }
                });

                return { total, completed };
            },

            // ==================== PROJECT MANAGEMENT ====================
            
            parseProjectAttrs(notes) {
                // Parse project attributes from beginning of notes
                // Format: Type: X\nStatus: Y\nStart: YYYY-MM-DD\nEnd: YYYY-MM-DD\nCompletion: N
                if (!notes) return null;
                
                const lines = notes.split('\n');
                const attrs = {};
                let contentStartIndex = 0;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    // Check for attribute lines
                    const typeMatch = line.match(/^Type:\s*(.+)$/i);
                    const statusMatch = line.match(/^Status:\s*(.+)$/i);
                    const startMatch = line.match(/^Start:\s*(\d{4}-\d{2}-\d{2})$/i);
                    const endMatch = line.match(/^End:\s*(\d{4}-\d{2}-\d{2})$/i);
                    const completionMatch = line.match(/^Completion:\s*(\d+)$/i);
                    
                    if (typeMatch) {
                        attrs.type = typeMatch[1].trim();
                        contentStartIndex = i + 1;
                    } else if (statusMatch) {
                        attrs.status = statusMatch[1].trim();
                        contentStartIndex = i + 1;
                    } else if (startMatch) {
                        attrs.start = startMatch[1];
                        contentStartIndex = i + 1;
                    } else if (endMatch) {
                        attrs.end = endMatch[1];
                        contentStartIndex = i + 1;
                    } else if (completionMatch) {
                        attrs.completion = parseInt(completionMatch[1], 10);
                        contentStartIndex = i + 1;
                    } else if (line === '') {
                        // Empty line after attrs - skip it
                        if (Object.keys(attrs).length > 0) {
                            contentStartIndex = i + 1;
                        }
                    } else {
                        // Non-attribute line - stop parsing
                        break;
                    }
                }
                
                // If no type found, not a project item
                if (!attrs.type) return null;
                
                // Get remaining content (notes without attrs)
                attrs.restNotes = lines.slice(contentStartIndex).join('\n').trim();
                
                return attrs;
            },
            
            calculateProjectStats(item) {
                // Calculate Start, End, Completion from children recursively
                // Returns {start, end, completion, hasProjectChildren}
                
                const childStats = [];
                
                // Process all children that have Type attribute
                item.children.forEach(child => {
                    const childAttrs = this.parseProjectAttrs(child.notes);
                    
                    if (childAttrs) {
                        // Child has project attrs - get calculated values
                        const calculated = this.calculateProjectStats(child);
                        
                        let childCompletion;
                        if (child.checked) {
                            childCompletion = 100;
                        } else if (calculated.hasProjectChildren) {
                            childCompletion = calculated.completion;
                        } else {
                            // Default to 0 if Completion not specified
                            childCompletion = childAttrs.completion !== undefined ? childAttrs.completion : 0;
                        }
                        
                        childStats.push({
                            start: calculated.start || childAttrs.start,
                            end: calculated.end || childAttrs.end,
                            completion: childCompletion
                        });
                    }
                });
                
                if (childStats.length === 0) {
                    return { hasProjectChildren: false };
                }
                
                // Calculate aggregates
                let minStart = null;
                let maxEnd = null;
                let totalCompletion = 0;
                
                childStats.forEach(stat => {
                    if (stat.start) {
                        if (!minStart || stat.start < minStart) {
                            minStart = stat.start;
                        }
                    }
                    if (stat.end) {
                        if (!maxEnd || stat.end > maxEnd) {
                            maxEnd = stat.end;
                        }
                    }
                    // Always count completion (it's always defined now)
                    totalCompletion += stat.completion;
                });
                
                return {
                    start: minStart,
                    end: maxEnd,
                    completion: Math.round(totalCompletion / childStats.length),
                    hasProjectChildren: true
                };
            },
            
            formatProjectDate(dateStr) {
                // Format YYYY-MM-DD to localized format (DD.MM.YYYY for CS, MM/DD/YYYY for EN)
                if (!dateStr) return '';
                const [year, month, day] = dateStr.split('-');
                if (this.currentLanguage === 'cs') {
                    return `${day}.${month}.${year}`;
                } else {
                    return `${month}/${day}/${year}`;
                }
            },
            
            calculateDaysBetween(startStr, endStr) {
                // Calculate days between two dates
                // 15-15 = 0 days, 15-16 = 1 day, etc.
                if (!startStr || !endStr) return null;
                const start = new Date(startStr);
                const end = new Date(endStr);
                const diffTime = Math.abs(end - start);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return diffDays;
            },
            
            calculateRemainingDays(endStr) {
                // Calculate days remaining until end date
                // Positive = days remaining, 0 = due today, negative = overdue
                if (!endStr) return null;
                const today = new Date();
                today.setHours(0, 0, 0, 0); // Reset time to midnight
                const end = new Date(endStr);
                end.setHours(0, 0, 0, 0);
                const diffTime = end - today;
                const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                return diffDays;
            },
            
            formatRemainingDays(days) {
                // Format remaining days as text with icon
                if (days === null) return '';
                if (days === 0) {
                    return `⚠️ ${this.t('projectDueToday')}`;
                } else if (days > 0) {
                    return `⏳ ${this.t('projectRemaining')} ${this.formatDuration(days)}`;
                } else {
                    const overdue = Math.abs(days);
                    return `🚨 ${this.t('projectOverdue')} ${this.formatDuration(overdue)}`;
                }
            },
            
            formatDuration(totalDays) {
                // Format days as months/weeks/days intelligently
                // < 7 days: just days
                // 7-29 days: weeks + days
                // 30+ days: months + days
                if (totalDays === null || totalDays === undefined) return '';
                
                const days = Math.abs(totalDays);
                
                if (days < 7) {
                    // Just days
                    return `${days} ${this.getDaysWord(days)}`;
                } else if (days < 30) {
                    // Weeks + days
                    const weeks = Math.floor(days / 7);
                    const remainingDays = days % 7;
                    
                    if (remainingDays === 0) {
                        return `${weeks} ${this.getWeeksWord(weeks)}`;
                    } else {
                        return `${weeks} ${this.getWeeksWord(weeks)} ${this.t('projectAnd')} ${remainingDays} ${this.getDaysWord(remainingDays)}`;
                    }
                } else {
                    // Months + days
                    const months = Math.floor(days / 30);
                    const remainingDays = days % 30;
                    
                    if (remainingDays === 0) {
                        return `${months} ${this.getMonthsWord(months)}`;
                    } else {
                        return `${months} ${this.getMonthsWord(months)} ${this.t('projectAnd')} ${remainingDays} ${this.getDaysWord(remainingDays)}`;
                    }
                }
            },
            
            getDaysWord(count) {
                // Get correct Czech/English word for days
                if (this.currentLanguage === 'cs') {
                    if (count === 1) return this.t('projectDay');
                    if (count >= 2 && count <= 4) return this.t('projectDays2to4');
                    return this.t('projectDays');
                }
                return count === 1 ? this.t('projectDay') : this.t('projectDays');
            },
            
            getWeeksWord(count) {
                // Get correct Czech/English word for weeks
                if (this.currentLanguage === 'cs') {
                    if (count === 1) return this.t('projectWeek');
                    if (count >= 2 && count <= 4) return this.t('projectWeeks2to4');
                    return this.t('projectWeeks5plus');
                }
                return count === 1 ? this.t('projectWeek') : this.t('projectWeeks2to4');
            },
            
            getMonthsWord(count) {
                // Get correct Czech/English word for months
                if (this.currentLanguage === 'cs') {
                    if (count === 1) return this.t('projectMonth');
                    if (count >= 2 && count <= 4) return this.t('projectMonths2to4');
                    return this.t('projectMonths5plus');
                }
                return count === 1 ? this.t('projectMonth') : this.t('projectMonths2to4');
            },
            
            renderProgressBar(percent) {
                // Render HTML progress bar
                return `<progress value="${percent}" max="100" style="width: 100px; height: 16px; vertical-align: middle;"></progress>`;
            },
            
            calculateOptimalPercent(startStr, endStr) {
                // Calculate what percentage should be complete today based on elapsed time
                // Returns null if dates are invalid or project hasn't started yet
                if (!startStr || !endStr) return null;
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const start = new Date(startStr);
                start.setHours(0, 0, 0, 0);
                const end = new Date(endStr);
                end.setHours(0, 0, 0, 0);
                
                // If project hasn't started yet, optimal is 0%
                if (today < start) return 0;
                
                // If project is past end date, optimal is 100%
                if (today > end) return 100;
                
                // Calculate total duration and elapsed time
                const totalDays = (end - start) / (1000 * 60 * 60 * 24);
                if (totalDays <= 0) return 100; // Same day start/end
                
                const elapsedDays = (today - start) / (1000 * 60 * 60 * 24);
                const optimalPercent = Math.round((elapsedDays / totalDays) * 100);
                
                return Math.min(100, Math.max(0, optimalPercent));
            },
            
            getWbsNumber(itemId) {
                // Calculate WBS number for an item within a project
                // Returns null if item is not in a project, or the WBS string like "1.2.3"
                
                // Find the path from root to this item
                const findPath = (items, targetId, currentPath = []) => {
                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        const newPath = [...currentPath, { item, index: i }];
                        
                        if (item.id === targetId) {
                            return newPath;
                        }
                        
                        if (item.children.length > 0) {
                            const found = findPath(item.children, targetId, newPath);
                            if (found) return found;
                        }
                    }
                    return null;
                };
                
                const path = findPath(this.data.items, itemId);
                if (!path || path.length === 0) return null;
                
                // Find the project root (first item with Type: Project in the path)
                let projectStartIndex = -1;
                for (let i = 0; i < path.length; i++) {
                    const attrs = this.parseProjectAttrs(path[i].item.notes);
                    if (attrs && attrs.type.toLowerCase() === 'project') {
                        projectStartIndex = i;
                        break;
                    }
                }
                
                // If no project found in path, or this item IS the project, no WBS
                if (projectStartIndex === -1) return null;
                if (projectStartIndex === path.length - 1) return null; // This is the project itself
                
                // Check if current item has a Type attribute (only show WBS for typed items)
                const currentAttrs = this.parseProjectAttrs(path[path.length - 1].item.notes);
                if (!currentAttrs) return null;
                
                // Build WBS from items after project root that have Type
                const wbsParts = [];
                for (let i = projectStartIndex + 1; i < path.length; i++) {
                    const pathItem = path[i];
                    const attrs = this.parseProjectAttrs(pathItem.item.notes);
                    if (attrs) {
                        // Count only siblings with Type attribute before this one
                        const parent = i > 0 ? path[i - 1].item : { children: this.data.items };
                        let typeIndex = 0;
                        for (let j = 0; j <= pathItem.index; j++) {
                            const sibling = parent.children[j];
                            const siblingAttrs = this.parseProjectAttrs(sibling.notes);
                            if (siblingAttrs) {
                                typeIndex++;
                            }
                        }
                        wbsParts.push(typeIndex);
                    }
                }
                
                return wbsParts.length > 0 ? wbsParts.join('.') : null;
            },
            
            generateProjectTable(item) {
                // Generate a table with all project items including this one
                // Only for items with Type attribute and children with Type
                const projectAttrs = this.parseProjectAttrs(item.notes);
                if (!projectAttrs) return '';
                
                // Check if there are any children with Type
                const hasProjectChildren = item.children.some(child => {
                    return this.parseProjectAttrs(child.notes) !== null;
                });
                if (!hasProjectChildren) return '';
                
                // Collect all project items recursively
                const rows = [];
                
                // Add current item first (use getWbsNumber for absolute WBS)
                const currentWbs = this.getWbsNumber(item.id);
                const currentCalc = this.calculateProjectStats(item);
                const currentCompletion = item.checked ? 100 : (currentCalc.hasProjectChildren ? currentCalc.completion : (projectAttrs.completion || 0));
                const currentStart = currentCalc.start || projectAttrs.start;
                const currentEnd = currentCalc.end || projectAttrs.end;
                
                rows.push({
                    wbs: currentWbs || '',
                    type: projectAttrs.type,
                    name: item.text,
                    status: projectAttrs.status || '',
                    completion: currentCompletion,
                    start: currentStart,
                    end: currentEnd,
                    checked: item.checked
                });
                
                // Recursively collect children using getWbsNumber for absolute WBS
                const collectChildren = (children) => {
                    children.forEach((child) => {
                        const attrs = this.parseProjectAttrs(child.notes);
                        if (attrs) {
                            const wbs = this.getWbsNumber(child.id) || '';
                            
                            const calc = this.calculateProjectStats(child);
                            const completion = child.checked ? 100 : (calc.hasProjectChildren ? calc.completion : (attrs.completion || 0));
                            const start = calc.start || attrs.start;
                            const end = calc.end || attrs.end;
                            
                            rows.push({
                                wbs: wbs,
                                type: attrs.type,
                                name: child.text,
                                status: attrs.status || '',
                                completion: completion,
                                start: start,
                                end: end,
                                checked: child.checked
                            });
                            
                            if (child.children.length > 0) {
                                collectChildren(child.children);
                            }
                        }
                    });
                };
                
                collectChildren(item.children);
                
                // Generate table HTML
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                let tableHtml = `
                    <div class="project-table-container">
                        <div class="project-table-title">📊 ${this.t('tableProjectOverview')}</div>
                        <table class="project-overview-table">
                            <thead>
                                <tr>
                                    <th>${this.t('tableStatus')}</th>
                                    <th>${this.t('tablePercent')}</th>
                                    <th>${this.t('tableFrom')}</th>
                                    <th>${this.t('tableTo')}</th>
                                    <th>${this.t('tableTask')}</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                rows.forEach(row => {
                    // Determine row class based on status
                    let rowClass = '';
                    if (row.completion === 100 || row.checked) {
                        rowClass = 'row-complete';
                    } else if (row.end) {
                        const endDate = new Date(row.end);
                        endDate.setHours(0, 0, 0, 0);
                        const diffDays = Math.round((endDate - today) / (1000 * 60 * 60 * 24));
                        if (diffDays < 0) {
                            rowClass = 'row-overdue';
                        } else if (diffDays === 0) {
                            rowClass = 'row-due-today';
                        }
                    }
                    
                    const taskName = row.wbs 
                        ? `${row.wbs} ${row.type} ${row.name}`
                        : `${row.type} ${row.name}`;
                    
                    tableHtml += `
                        <tr class="${rowClass}">
                            <td>${this.escapeHtml(row.status)}</td>
                            <td class="cell-percent">${row.completion} %</td>
                            <td class="cell-date">${row.start ? this.formatProjectDate(row.start) : ''}</td>
                            <td class="cell-date">${row.end ? this.formatProjectDate(row.end) : ''}</td>
                            <td class="cell-task">${this.escapeHtml(taskName)}</td>
                        </tr>
                    `;
                });
                
                tableHtml += `
                            </tbody>
                        </table>
                    </div>
                `;
                
                return tableHtml;
            },
            
            // ==================== END PROJECT MANAGEMENT ====================

            extractTags(text) {
                // Extract all tags from text (format: #tag)
                // Case insensitive, supports Unicode letters (including Czech)
                if (!text) return [];
                // Use \p{L} for Unicode letters and \p{N} for numbers
                const tagRegex = /#([\p{L}\p{N}_]+)/gu;
                const tags = [];
                let match;
                while ((match = tagRegex.exec(text)) !== null) {
                    tags.push(match[1].toLowerCase());
                }
                return tags;
            },

            getAllTags() {
                // Get all tags from all items with counts
                const tagCounts = {};
                
                const processItems = (items) => {
                    items.forEach(item => {
                        // Extract from text
                        const textTags = this.extractTags(item.text);
                        textTags.forEach(tag => {
                            tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                        });
                        
                        // Extract from notes
                        const noteTags = this.extractTags(item.notes);
                        noteTags.forEach(tag => {
                            tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                        });
                        
                        // Process children
                        if (item.children.length > 0) {
                            processItems(item.children);
                        }
                    });
                };
                
                processItems(this.data.items);
                
                // Convert to sorted array - alphabetically (case insensitive)
                return Object.entries(tagCounts)
                    .map(([tag, count]) => ({ tag, count }))
                    .sort((a, b) => a.tag.localeCompare(b.tag, 'cs', { sensitivity: 'base' }));
            },

            itemContainsTag(item, tag) {
                // Check if item contains the tag (case insensitive)
                const textTags = this.extractTags(item.text);
                const noteTags = this.extractTags(item.notes);
                const allTags = [...textTags, ...noteTags];
                return allTags.includes(tag.toLowerCase());
            },

            filterByTag(tag) {
                this.activeTagFilter = tag.toLowerCase();
                this.render();
            },

            clearTagFilter() {
                this.activeTagFilter = null;
                this.render();
            },

            toggleHideCompleted() {
                this.hideCompleted = !this.hideCompleted;
                this.render();
            },

            setSearchQuery(query) {
                this.searchQuery = query.trim();
                this.render();
            },

            clearSearch() {
                this.searchQuery = '';
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.value = '';
                this.render();
            },

            itemMatchesSearch(item, query) {
                // Check if item text or notes contain the search query (case insensitive)
                if (!query) return true;
                const lowerQuery = query.toLowerCase();
                const textMatches = item.text && item.text.toLowerCase().includes(lowerQuery);
                const notesMatches = item.notes && item.notes.toLowerCase().includes(lowerQuery);
                return textMatches || notesMatches;
            },

            makeTagsClickable(html, itemId, fieldType) {
                // Replace #tag with clickable links and delete icon
                // fieldType: 'text' or 'notes'
                // Supports Unicode letters (including Czech)
                let offset = 0;
                return html.replace(/#([\p{L}\p{N}_]+)/gu, (match, tag, position) => {
                    const currentOffset = offset;
                    offset++;
                    return `<a href="#" onclick="event.preventDefault(); app.filterByTag('${tag}'); return false;" style="color: #1890ff; text-decoration: none; font-weight: 600; cursor: pointer;">#${tag}</a><sup><a href="#" onclick="event.preventDefault(); app.removeTagAtPosition(${itemId}, '${fieldType}', ${currentOffset}); return false;" style="color: #ff4d4f; text-decoration: none; font-size: 0.7em; cursor: pointer; margin-left: 2px;">🗑️</a></sup>`;
                });
            },

            makeEditorLinksClickable(html, itemId) {
                // Replace editor URLs with buttons
                // Handles URLs already converted to <a> tags by marked.js
                
                const editorTypes = [
                    { file: 'opml-editor.html', label: this.t('openInOpmlEditor') },
                    { file: 'markdown-editor.html', label: this.t('openInMarkdownEditor') },
                    { file: 'json-editor.html', label: this.t('openInJsonEditor') }
                ];
                
                let result = html;
                
                editorTypes.forEach(({file, label}) => {
                    // Match <p><a href="...">...</a></p> or just <a href="...">...</a> with editor URLs
                    const fileEscaped = file.replace('.', '\\.');
                    const pattern = new RegExp(
                        `(<p>\\s*)?<a\\s+href="(https?://[^"]*${fileEscaped}[^"]*)"[^>]*>.*?</a>(\\s*</p>)?`,
                        'gi'
                    );
                    
                    result = result.replace(pattern, (match, pOpen, url, pClose) => {
                        // Store URL in data attribute to avoid escaping issues
                        const urlId = 'editorUrl_' + itemId + '_' + Math.random().toString(36).substr(2, 9);
                        // Use encodeURIComponent for safe storage
                        const encodedUrl = encodeURIComponent(url);
                        return `<div class="editor-link-button">
                            <button class="btn-small btn-primary" onclick="app.openEditorLinkEncoded('${encodedUrl}', ${itemId})">${label}</button>
                        </div>`;
                    });
                });
                
                return result;
            },

            openEditorLinkEncoded(encodedUrl, itemId) {
                // Open the editor URL in a new window and start editing the item
                const url = decodeURIComponent(encodedUrl);
                window.open(url, '_blank');
                this.editItem(itemId);
            },

            removeTagAtPosition(itemId, fieldType, tagIndex) {
                const item = this.findItem(this.data.items, itemId);
                if (!item) return;
                
                const field = fieldType === 'text' ? 'text' : 'notes';
                if (!item[field]) return;
                
                // Find the Nth tag and remove it with trailing space if present
                const tagRegex = /#[\p{L}\p{N}_]+\s?/gu;
                let currentIndex = 0;
                
                item[field] = item[field].replace(tagRegex, (match) => {
                    if (currentIndex === tagIndex) {
                        currentIndex++;
                        return ''; // Remove this tag
                    }
                    currentIndex++;
                    return match; // Keep this tag
                });
                
                item[field] = item[field].trim();
                this.render();
            },

            removeTags(itemId) {
                const item = this.findItem(this.data.items, itemId);
                if (!item) return;
                
                // Remove tags from text
                // Replace #tag followed by space with nothing, or #tag at end with nothing
                if (item.text) {
                    item.text = item.text.replace(/#[\p{L}\p{N}_]+\s+/gu, '').replace(/#[\p{L}\p{N}_]+$/gu, '');
                    item.text = item.text.trim();
                }
                
                // Remove tags from note
                if (item.notes) {
                    item.notes = item.notes.replace(/#[\p{L}\p{N}_]+\s+/gu, '').replace(/#[\p{L}\p{N}_]+$/gmu, '');
                }
                
                this.render();
            },

            findItemWithParent(items, id, parent) {
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    if (item.id === id) {
                        return { item, parent, index: i };
                    }
                    if (item.children.length > 0) {
                        const found = this.findItemWithParent(item.children, id, item);
                        if (found) return found;
                    }
                }
                return null;
            },

            updateItemText(id, text) {
                const item = this.findItem(this.data.items, id);
                if (item) item.text = text;
            },

            updateItemNotes(id, notes) {
                const item = this.findItem(this.data.items, id);
                if (item) item.notes = notes;
            },

            updateItemChecked(id, checked) {
                const item = this.findItem(this.data.items, id);
                if (item) {
                    item.checked = checked;
                    
                    // If this is a project item, update Completion in notes
                    const projectAttrs = this.parseProjectAttrs(item.notes);
                    if (projectAttrs) {
                        const newCompletion = checked ? 100 : 0;
                        item.notes = this.updateProjectAttr(item.notes, 'Completion', newCompletion);
                    }
                    
                    // Recalculate all parent items
                    this.recalculateParentCompletions(this.data.items, id);
                }
            },
            
            updateProjectAttr(notes, attrName, value) {
                // Update or add an attribute in notes while preserving structure
                if (!notes) {
                    return `${attrName}: ${value}`;
                }
                
                const lines = notes.split('\n');
                const attrRegex = new RegExp(`^${attrName}:\\s*.*$`, 'i');
                let found = false;
                let insertIndex = 0;
                
                // Find and update the attribute, or find where to insert it
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    // Check if this line is the attribute we're looking for
                    if (attrRegex.test(line)) {
                        // Update existing attribute - preserve original line's indentation
                        const indent = lines[i].match(/^(\s*)/)[1];
                        lines[i] = `${indent}${attrName}: ${value}`;
                        found = true;
                        break;
                    }
                    
                    // Track where attributes end (for insertion if not found)
                    if (/^(Type|Status|Start|End|Completion):\s*/i.test(line)) {
                        insertIndex = i + 1;
                    } else if (line === '') {
                        // Empty line might be part of attrs section
                        if (insertIndex > 0) {
                            insertIndex = i + 1;
                        }
                    } else if (insertIndex > 0) {
                        // Non-attribute, non-empty line - stop
                        break;
                    }
                }
                
                if (!found) {
                    // Insert at the appropriate position
                    if (insertIndex > 0) {
                        lines.splice(insertIndex, 0, `${attrName}: ${value}`);
                    } else {
                        // No attrs found at all - add at beginning
                        lines.unshift(`${attrName}: ${value}`);
                    }
                }
                
                return lines.join('\n');
            },
            
            recalculateParentCompletions(items, changedId, parent = null) {
                // Find the changed item and recalculate its parent chain
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    
                    if (item.id === changedId) {
                        // Found the changed item - now update parent if exists
                        if (parent) {
                            this.updateParentFromChildren(parent);
                        }
                        return true;
                    }
                    
                    if (item.children.length > 0) {
                        if (this.recalculateParentCompletions(item.children, changedId, item)) {
                            // Child was found - now update this item if it's a project item
                            const projectAttrs = this.parseProjectAttrs(item.notes);
                            if (projectAttrs) {
                                this.updateParentFromChildren(item);
                            }
                            // Continue up the chain
                            if (parent) {
                                const parentAttrs = this.parseProjectAttrs(parent.notes);
                                if (parentAttrs) {
                                    this.updateParentFromChildren(parent);
                                }
                            }
                            return true;
                        }
                    }
                }
                return false;
            },
            
            updateParentFromChildren(item) {
                // Recalculate parent's Start, End, Completion from children
                const projectAttrs = this.parseProjectAttrs(item.notes);
                if (!projectAttrs) return;
                
                const stats = this.calculateProjectStats(item);
                if (!stats.hasProjectChildren) return;
                
                // Update attributes in notes
                if (stats.start) {
                    item.notes = this.updateProjectAttr(item.notes, 'Start', stats.start);
                }
                if (stats.end) {
                    item.notes = this.updateProjectAttr(item.notes, 'End', stats.end);
                }
                if (stats.completion !== undefined) {
                    item.notes = this.updateProjectAttr(item.notes, 'Completion', stats.completion);
                }
            },

            updateTitle(title) {
                this.data.title = title;
                this.updatePageTitle();
            },

            updatePageTitle() {
                const docTitle = this.data.title || this.t('emptyStateTitle');
                document.title = `${this.t('appName')}: ${docTitle}`;
                
                // Update header title
                const appTitle = document.getElementById('app-title');
                if (appTitle) {
                    appTitle.textContent = `📝 ${this.t('appName')}`;
                }
                
                // Update language label
                const langLabel = document.getElementById('language-label');
                if (langLabel) {
                    langLabel.textContent = this.t('language');
                }
                
                // Update language selector
                const langSelect = document.getElementById('languageSelect');
                if (langSelect) {
                    langSelect.value = this.currentLanguage;
                }
            },

            calculateLevel(items, id, level = 0) {
                for (const item of items) {
                    if (item.id === id) return level;
                    if (item.children.length > 0) {
                        const found = this.calculateLevel(item.children, id, level + 1);
                        if (found !== -1) return found;
                    }
                }
                return -1;
            },

            canIndent(id) {
                const result = this.findItemWithParent(this.data.items, id, null);
                return result && result.index > 0;
            },

            canOutdent(id) {
                const result = this.findItemWithParent(this.data.items, id, null);
                return result && result.parent !== null;
            },

            isNewItem(id) {
                if (!this.originalData) return false;
                return !this.findItem(this.originalData.items, id);
            },

            hasChangedNotes(item) {
                if (!this.originalData) return false;
                const original = this.findItem(this.originalData.items, item.id);
                if (!original) return false;
                return original.notes !== item.notes;
            },

            hasChangedText(item) {
                if (!this.originalData) return false;
                const original = this.findItem(this.originalData.items, item.id);
                if (!original) return false;
                return original.text !== item.text;
            },

            getItemPosition(items, id, parentItems = null) {
                const targetItems = parentItems || items;
                for (let i = 0; i < targetItems.length; i++) {
                    if (targetItems[i].id === id) {
                        return { index: i + 1, total: targetItems.length };
                    }
                    if (targetItems[i].children.length > 0) {
                        const found = this.getItemPosition(items, id, targetItems[i].children);
                        if (found) return found;
                    }
                }
                return null;
            },

            renderItem(item, level) {
                const hasChildren = item.children.length > 0;
                const collapseIcon = hasChildren ? (item.collapsed ? '▶' : '▼') : '';
                const collapsedCount = hasChildren ? this.countAllChildren(item) : 0;
                const displayLevel = level + 1; // Start from level 1 instead of 0
                const isEditing = !this.viewOnly && this.editingItemId === item.id; // Never edit in view-only mode
                
                // Check if any item in the whole tree is checked
                const anyChecked = this.hasAnyCheckedItems(this.data.items);
                
                // Calculate completion stats for this item and all descendants
                const stats = this.countCompletionStats(item);
                const completionPercent = stats.total > 0 ? Math.round((stats.completed / stats.total) * 100) : 0;
                
                const result = this.findItemWithParent(this.data.items, item.id, null);
                const canMoveUp = result && result.index > 0;
                const canMoveDown = result && result.index < (result.parent ? result.parent.children : this.data.items).length - 1;
                const canIndent = this.canIndent(item.id);
                const canOutdent = this.canOutdent(item.id);

                // Change tracking
                const isNew = this.isNewItem(item.id);
                const hasTextChanged = this.hasChangedText(item);
                const hasNotesChanged = this.hasChangedNotes(item);

                // Position info
                const position = this.getItemPosition(this.data.items, item.id);
                const positionText = position ? `${this.t('itemOf')} ${position.index} ${this.t('of')} ${position.total}` : '';

                if (isEditing) {
