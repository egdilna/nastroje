<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DMS úložiště</title>
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f7f7f7;
  --bg-elevated: #ffffff;
  --text: #1a1a1a;
  --text-muted: #5a5a5a;
  --text-faint: #888;
  --border: #e2e2e2;
  --border-strong: #c8c8c8;
  --accent: #0c63d4;
  --accent-text: #ffffff;
  --accent-soft: #e7f0fb;
  --success: #1e7a3a;
  --warning: #a85c00;
  --danger: #b3261e;
  --danger-soft: #fbe9e9;
  --focus: #0c63d4;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.06);
  --radius: 8px;
  --radius-sm: 4px;
  --gap: 12px;
  --gap-lg: 20px;
  --maxw: 980px;
  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #131517;
    --bg-soft: #1a1d20;
    --bg-elevated: #1d2024;
    --text: #ececec;
    --text-muted: #b5b5b5;
    --text-faint: #888;
    --border: #2c3036;
    --border-strong: #3a3f46;
    --accent: #4a9eff;
    --accent-text: #0a0a0a;
    --accent-soft: #1a2c44;
    --success: #4caf6a;
    --warning: #d9933a;
    --danger: #e57373;
    --danger-soft: #3a1f1f;
    --focus: #4a9eff;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.4);
  }
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
a:hover { text-decoration-thickness: 2px; }
:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}
.skip-link {
  position: absolute;
  left: -9999px;
  top: 4px;
  background: var(--bg);
  color: var(--text);
  padding: 8px 14px;
  border: 2px solid var(--accent);
  border-radius: var(--radius-sm);
  z-index: 1000;
}
.skip-link:focus { left: 8px; }

.app {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 16px 20px 80px;
}

.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 14px;
  margin-bottom: 16px;
}
.storage-name-label {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin: 0 0 4px;
  font-weight: 600;
}
.header .desc {
  margin: 0 0 10px;
  color: var(--text-muted);
  font-size: 0.95rem;
}
.header .desc:empty { display: none; }

#page-heading {
  font-size: 1.6rem;
  margin: 0 0 12px;
  font-weight: 600;
  letter-spacing: -0.01em;
  word-break: break-word;
}
#page-heading .heading-icon {
  margin-right: 8px;
  display: inline-block;
}

.breadcrumb {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  list-style: none;
  margin: 0;
  padding: 0;
  font-size: 0.9rem;
  gap: 4px;
}
.breadcrumb li {
  display: flex;
  align-items: center;
  gap: 4px;
}
.breadcrumb li:not(:last-child)::after {
  content: "›";
  color: var(--text-faint);
  margin: 0 4px;
  font-weight: 400;
}
.crumb-icon {
  display: inline-block;
  margin-right: 2px;
}
.breadcrumb a {
  color: var(--accent);
  text-decoration: none;
  padding: 2px 4px;
  border-radius: var(--radius-sm);
}
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb [aria-current="page"] {
  color: var(--text);
  font-weight: 500;
}

.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 14px;
}
.toolbar .spacer { flex: 1; }
.search-box {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 200px;
}
.search-box input { flex: 1; }

button, .btn {
  font: inherit;
  font-size: 0.92rem;
  padding: 7px 14px;
  background: var(--bg-elevated);
  color: var(--text);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  line-height: 1.3;
}
button:hover:not(:disabled), .btn:hover { background: var(--bg-soft); border-color: var(--text-muted); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.primary, .btn.primary {
  background: var(--accent);
  color: var(--accent-text);
  border-color: var(--accent);
}
button.primary:hover:not(:disabled) { filter: brightness(1.08); }
button.danger {
  background: var(--bg-elevated);
  color: var(--danger);
  border-color: var(--border-strong);
}
button.danger:hover:not(:disabled) { background: var(--danger-soft); border-color: var(--danger); }
button.subtle {
  background: transparent;
  border-color: transparent;
  padding: 4px 8px;
  color: var(--text-muted);
}
button.subtle:hover:not(:disabled) { color: var(--text); background: var(--bg-soft); }
button.small {
  font-size: 0.85rem;
  padding: 4px 10px;
}

input[type="text"], input[type="url"], input[type="password"], input[type="search"], textarea, select {
  font: inherit;
  font-size: 0.95rem;
  padding: 7px 10px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  width: 100%;
}
textarea { resize: vertical; min-height: 60px; font-family: var(--font-body); }
input[type="file"] { font-size: 0.92rem; }
input[readonly] {
  background: var(--bg-soft);
  color: var(--text-muted);
  cursor: not-allowed;
}
label { font-size: 0.93rem; color: var(--text); }
.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
}
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 600px) {
  .field-row { grid-template-columns: 1fr; }
}
.field label { font-weight: 500; }
.field .hint { font-size: 0.82rem; color: var(--text-muted); }

/* List items (folders, files, links) */
.item-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color 0.1s, background 0.1s;
}
.item:hover { border-color: var(--border-strong); background: var(--bg-soft); }
.item-icon {
  flex-shrink: 0;
  display: inline-block;
  font-size: 1.05em;
  line-height: 1;
}
.item-body { flex: 1; min-width: 0; }
.item-title {
  margin: 0;
  font-size: 1rem;
  font-weight: 500;
  word-break: break-word;
}
.item-title a.item-link {
  color: var(--text);
  text-decoration: none;
  display: inline;
}
.item-title a.item-link .item-name { text-decoration: none; }
.item-title a.item-link:hover .item-name { text-decoration: underline; }
.item-title a.item-link:focus-visible { outline-offset: 4px; }
.item-meta {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-top: 2px;
  word-break: break-word;
}
.item-desc {
  font-size: 0.88rem;
  color: var(--text-muted);
  margin-top: 4px;
  word-break: break-word;
}
.item-actions {
  flex-shrink: 0;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: flex-start;
}
@media (max-width: 600px) {
  .item { flex-wrap: wrap; }
  .item-actions { width: 100%; margin-left: 0; }
}

/* Detail views */
.detail-section {
  margin-bottom: 18px;
}
.detail-section h2 {
  font-size: 1.2rem;
  margin: 0 0 6px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.detail-section .desc {
  color: var(--text-muted);
  margin: 0 0 8px;
  font-size: 0.95rem;
  white-space: pre-wrap;
}
.detail-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.detail-meta dt { font-weight: 500; color: var(--text); display: inline; }
.detail-meta dd { display: inline; margin: 0; }
.detail-meta .meta-item { display: inline-flex; gap: 4px; }
.fileid-badge {
  display: inline-block;
  padding: 2px 8px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text);
}

/* Versions */
.versions {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.version {
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.version-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
}
.version-time {
  font-weight: 500;
  font-size: 0.95rem;
}
a.version-time {
  font-weight: 600;
}
.version-status-note {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-left: 4px;
}
.version-meta {
  font-size: 0.82rem;
  color: var(--text-muted);
}
.version-desc {
  font-size: 0.9rem;
  margin-top: 4px;
  white-space: pre-wrap;
  word-break: break-word;
}
.version-actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* Edit-mode panel */
.edit-bar {
  position: sticky;
  bottom: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  margin-top: 24px;
  padding: 10px 0;
  z-index: 50;
}
.edit-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 500;
  cursor: pointer;
  user-select: none;
}
.edit-toggle input { width: 1.05rem; height: 1.05rem; cursor: pointer; }
.edit-mode-active { color: var(--accent); }

.edit-panel {
  margin-top: 14px;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-soft);
}
.edit-panel h3 {
  font-size: 1rem;
  margin: 0 0 10px;
  font-weight: 600;
}
.edit-panel details { margin-top: 8px; }
.edit-panel summary {
  cursor: pointer;
  padding: 6px 0;
  font-weight: 500;
  font-size: 0.95rem;
}
.edit-panel summary:hover { color: var(--accent); }

/* Upload area */
.upload-block {
  margin-top: 16px;
  padding: 14px;
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  background: var(--bg-soft);
}
.upload-block.dragging {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.upload-block h3 {
  font-size: 1rem;
  margin: 0 0 10px;
}

/* Status / messages */
.status-region {
  position: fixed;
  top: 12px;
  right: 12px;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 200;
}
.status-msg {
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 10px 14px;
  box-shadow: var(--shadow);
  font-size: 0.92rem;
  color: var(--text);
  border-left: 3px solid var(--accent);
}
.status-msg.error { border-left-color: var(--danger); }
.status-msg.success { border-left-color: var(--success); }
.status-msg.warning { border-left-color: var(--warning); }

.empty-state {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-muted);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

/* Dialog */
dialog {
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 0;
  background: var(--bg-elevated);
  color: var(--text);
  box-shadow: var(--shadow);
  max-width: min(560px, 92vw);
  width: 100%;
}
dialog::backdrop { background: rgba(0,0,0,.45); }
.dialog-content {
  padding: 18px 20px;
}
.dialog-content h2 {
  font-size: 1.1rem;
  margin: 0 0 10px;
  font-weight: 600;
}
.dialog-content p { margin: 0 0 12px; }
.dialog-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 14px;
}

/* Folder picker tree */
.folder-tree {
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 320px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px;
  background: var(--bg);
}
.folder-tree ul {
  list-style: none;
  padding-left: 18px;
  margin: 0;
}
.folder-tree li { margin: 1px 0; }
.folder-tree button {
  width: 100%;
  text-align: left;
  background: transparent;
  border: 1px solid transparent;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  font-size: 0.92rem;
}
.folder-tree button:hover { background: var(--bg-soft); }
.folder-tree button[aria-pressed="true"] {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--text);
  font-weight: 500;
}

/* Markdown content */
.markdown-body {
  padding: 14px 0;
  line-height: 1.65;
}
.markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
  margin-top: 1.4em;
  margin-bottom: 0.5em;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.markdown-body h1 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.markdown-body h2 { font-size: 1.25rem; }
.markdown-body h3 { font-size: 1.1rem; }
.markdown-body p { margin: 0.7em 0; }
.markdown-body ul, .markdown-body ol { padding-left: 1.6em; }
.markdown-body code {
  font-family: var(--font-mono);
  font-size: 0.9em;
  background: var(--bg-soft);
  padding: 1px 5px;
  border-radius: 3px;
}
.markdown-body pre {
  background: var(--bg-soft);
  padding: 12px 14px;
  border-radius: var(--radius);
  overflow-x: auto;
  border: 1px solid var(--border);
}
.markdown-body pre code {
  background: transparent;
  padding: 0;
  font-size: 0.88rem;
}
.markdown-body blockquote {
  border-left: 3px solid var(--border-strong);
  padding-left: 12px;
  margin: 0.8em 0;
  color: var(--text-muted);
}
.markdown-body table {
  border-collapse: collapse;
  margin: 0.8em 0;
}
.markdown-body th, .markdown-body td {
  border: 1px solid var(--border);
  padding: 5px 10px;
}
.markdown-body th { background: var(--bg-soft); font-weight: 600; }
.markdown-body img { max-width: 100%; height: auto; }
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 1.4em 0; }

/* CriticMarkup */
.markdown-body ins, .markdown-body .crit-ins {
  background: rgba(46, 160, 67, 0.18);
  text-decoration: none;
  border-bottom: 1px solid rgba(46, 160, 67, 0.6);
  padding: 0 2px;
}
.markdown-body del, .markdown-body .crit-del {
  background: rgba(220, 76, 70, 0.18);
  text-decoration: line-through;
  text-decoration-color: rgba(220, 76, 70, 0.7);
  padding: 0 2px;
}
.markdown-body mark, .markdown-body .crit-mark {
  background: rgba(255, 215, 0, 0.32);
  color: inherit;
  padding: 0 2px;
}
.markdown-body .crit-comment {
  display: inline-block;
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 1px 6px;
  font-size: 0.85em;
  color: var(--text);
  margin: 0 1px;
  font-style: italic;
}

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Debug area */
.debug-output {
  margin-top: 16px;
  padding: 10px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  max-height: 200px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.debug-line { padding: 1px 0; border-bottom: 1px solid var(--border); }
.debug-line:last-child { border-bottom: none; }
.debug-line.err { color: var(--danger); }
.debug-line.ok { color: var(--success); }

/* Stats */
.stats {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 0.88rem;
  color: var(--text-muted);
  padding: 8px 0;
  margin-bottom: 8px;
}
.stats strong { color: var(--text); margin-right: 4px; }

.unsaved-badge {
  background: var(--warning);
  color: white;
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  margin-left: 8px;
}

.version-edit-form {
  margin-top: 8px;
  padding: 8px;
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
}
.version-edit-form .field { margin-bottom: 8px; }

/* hide visually but keep for screen reader */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0);
  white-space: nowrap; border: 0;
}

/* iframe-friendly: tighter outer padding when in iframe */
@media (max-width: 720px) {
  .app { padding: 12px 14px 70px; }
  #page-heading { font-size: 1.3rem; }
}

/* Operation log */
.op-log-section {
  margin-top: 14px;
  padding: 10px 12px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.op-log-title {
  font-size: 0.95rem;
  margin: 0 0 6px;
  font-weight: 600;
  color: var(--text);
}
.op-log-summary {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.op-log-summary .has-fail { color: var(--danger); font-weight: 600; }
.op-log-summary .has-run { color: var(--accent); font-weight: 600; }
.op-log {
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 260px;
  overflow-y: auto;
  border-top: 1px solid var(--border);
}
.op-log-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 4px;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}
.op-log-item:last-child { border-bottom: 0; }
.op-status-icon {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  width: 1.4em;
  flex-shrink: 0;
  text-align: center;
  font-weight: 700;
}
.op-log-item.running .op-status-icon { color: var(--accent); }
.op-log-item.ok .op-status-icon { color: var(--success); }
.op-log-item.err .op-status-icon { color: var(--danger); }
.op-log-body { flex: 1; min-width: 0; }
.op-log-label {
  word-break: break-word;
  color: var(--text);
}
.op-log-item.err .op-log-label { color: var(--danger); }
.op-log-time {
  font-size: 0.75rem;
  color: var(--text-faint);
  font-family: var(--font-mono);
  margin-right: 8px;
}
.op-log-error {
  margin-top: 2px;
  font-size: 0.8rem;
  color: var(--danger);
  word-break: break-word;
  font-family: var(--font-mono);
}
.op-log-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}
.op-log-item-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.spinner-inline {
  display: inline-block;
  width: 0.8em; height: 0.8em;
  border: 2px solid var(--accent);
  border-top-color: transparent;
  border-radius: 50%;
  vertical-align: -2px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.stats-display {

</style>

<body>

  <main id="main" tabindex="-1">

  <div class="edit-bar">
    <label class="edit-toggle">
      <input type="checkbox" id="edit-mode-toggle" />
