function addComment(file) {
  const ta = $("new-comment-text");
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) {
    showStatus("Komentář je prázdný.", "warning");
    ta.focus();
    return;
  }
  if (!Array.isArray(file.comments)) file.comments = [];
  const c = {
    id: uuid(),
    author: state.config.deviceName || "(bez jména)",
    text,
    created: nowIso(),
  };
  file.comments.push(c);
  file.modified = nowIso();
  state.storage.modified = nowIso();
  markModified();
  showStatus("Komentář přidán.", "success");
  render();
}

function beginCommentEdit(comment) {
  state.editingCommentId = comment.id;
  render();
  setTimeout(() => {
    const ta = $("edit-comment-text-" + comment.id);
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }, 30);
}

function cancelCommentEdit() {
  state.editingCommentId = null;
  render();
}

function saveCommentEdit(file, comment) {
  const ta = $("edit-comment-text-" + comment.id);
  if (!ta) return;
  const newText = ta.value.trim();
  if (!newText) {
    showStatus("Komentář nemůže být prázdný.", "warning");
    return;
  }
  if (newText !== comment.text) {
    comment.text = newText;
    comment.modified = nowIso();
    file.modified = nowIso();
    state.storage.modified = nowIso();
    markModified();
    showStatus("Komentář upraven.", "success");
  }
  state.editingCommentId = null;
  render();
}

async function deleteComment(file, comment) {
  const ok = await confirmDialog("Opravdu smazat tento komentář?", {
    title: "Smazat komentář", danger: true, okLabel: "Smazat",
  });
  if (!ok) return;
  const idx = (file.comments || []).indexOf(comment);
  if (idx < 0) return;
  file.comments.splice(idx, 1);
  file.modified = nowIso();
  state.storage.modified = nowIso();
  markModified();
  showStatus("Komentář smazán.", "success");
  render();
}

async function deleteVersion(file, version) {
  const ok = await confirmDialog("Opravdu smazat verzi z " + fmtDate(version.timestamp) + "? Soubor bude smazán i z githubu.", {
    title: "Smazat verzi", danger: true, okLabel: "Smazat verzi",
  });
  if (!ok) return;
  // Remove from versions array
  const idx = file.versions.indexOf(version);
  if (idx < 0) return;
  file.versions.splice(idx, 1);
  file.modified = nowIso();
  markModified();
  const fname = version.filename;
  // Push delete + JSON immediately
  if (state.config.apiKey) {
    const handle = beginOp("Mažu verzi: " + fname, "delete-version");
    try {
      await pushDeleteAndJson([fullRepoPath(fname)], "DMS: smazat verzi " + fname);
      handle.succeed("Verze smazána: " + fname);
      showStatus("Verze smazána.", "success");
    } catch (e) {
      handle.fail(e, async () => {
        const h2 = beginOp("Opakuji mazání verze: " + fname, "delete-version");
        try {
          await pushDeleteAndJson([fullRepoPath(fname)], "DMS: smazat verzi " + fname + " (retry)");
          h2.succeed("Verze smazána: " + fname);
        } catch (e2) { h2.fail(e2, () => h2.op.retry()); }
      });
      showStatus("Smazání selhalo: " + e.message + " — opakujte z panelu operací.", "error", 8000);
    }
  } else {
    showStatus("Verze smazána z dat (push se neprovede bez API klíče).", "warning");
  }
  render();
}


//=============================================================================
// FILE UPLOAD & DOWNLOAD
//=============================================================================
async function doUploadVersion(file) {
  const fileInput = $("up-file");
  const descInput = $("up-desc");
  const partSel = $("up-part"); // select pro výběr části (může chybět pokud soubor nemá části)
  const f = fileInput.files && fileInput.files[0];
  if (!f) { showStatus("Vyberte soubor.", "warning"); return; }
  if (!state.config.apiKey) { showStatus("Pro nahrávání je nutný API klíč v nastavení.", "warning"); return; }
  if (!state.config.repoPath) { showStatus("Nejprve nastavte cestu k úložišti.", "warning"); return; }
  if (f.size > 100 * 1024 * 1024) {
    const ok = await confirmDialog("Soubor je větší než 100 MB. GitHub může odmítnout. Pokračovat?");
    if (!ok) return;
  }
  // Read & encode to base64 (we keep b64 in memory for potential retry)
  const ext = getExt(f.name);
  // Část (volitelně) — prázdný řetězec / "(žádná)" znamená bez části
  const partId = (partSel && partSel.value) || "";
  // Validace: pokud uživatel vybral partId který už neexistuje, zahodíme
  const validPartId = partId && findPart(file, partId) ? partId : "";
  const newFilename = genVersionFilename(state.storage.id, file.id, validPartId, ext);
  const description = descInput.value || "";
  let b64;
  try {
    const buf = await f.arrayBuffer();
    b64 = arrayBufferToBase64(buf);
  } catch (e) {
    showStatus("Nepodařilo se přečíst soubor: " + e.message, "error", 8000);
    return;
  }
  // Append speculative version into local data (so user sees immediate feedback)
  const newVersion = {
    timestamp: nowIso(),
    description,
    size: f.size,
    device: state.config.deviceName || "",
    filename: newFilename,
    sha: null,
    pendingUpload: true, // marker -- removed on success
  };
  if (validPartId) newVersion.partId = validPartId;
  if (!file.versions) file.versions = [];
  file.versions.push(newVersion);
  file.modified = nowIso();
  state.storage.modified = nowIso();
  // Reset form fields immediately
  fileInput.value = "";
  descInput.value = "";
  // U partSel ponecháme aktuální výběr — uživatel asi nahrává více verzí stejné části
  render();
  showStatus("Nahrávám novou verzi „" + newFilename + "\"…");
  await uploadVersionAttempt(file, newVersion, b64);
}

// Separate attempt fn so retry can call it again with the same context
async function uploadVersionAttempt(file, version, b64) {
  const handle = beginOp("Upload verze + storage.json (atomický commit): " + version.filename + " (" + fmtSize(version.size) + ")", "upload");
  // pendingUpload je čistě UI marker — smažeme HO PŘED serializací JSONu pro push.
  // Pokud push selže, vrátíme ho zpátky aby UI dál ukazovalo přesýpací hodiny a šel retry.
  delete version.pendingUpload;
  try {
    const result = await pushFileVersionAndJson(
      fullRepoPath(version.filename), b64,
      "DMS: nová verze " + version.filename + " + storage.json"
    );
    if (result.pathToSha[fullRepoPath(version.filename)]) {
      version.sha = result.pathToSha[fullRepoPath(version.filename)];
    }
    handle.succeed("Verze + storage.json uloženy v jednom commitu: " + version.filename);
    showStatus("Nová verze nahrána (včetně storage.json).", "success");
    render();
  } catch (e) {
    // Push selhal — vrátíme marker, aby UI dál ukazovalo „čeká na upload" a retry mohl proběhnout.
    version.pendingUpload = true;
    handle.fail(e, () => uploadVersionAttempt(file, version, b64));
    showStatus("Nahrání selhalo: " + e.message + " — můžete opakovat z panelu operací.", "error", 8000);
    render();
  }
}

async function downloadVersion(version) {
  const handle = beginOp("Stahuji: " + version.filename, "download");
  showStatus("Stahuji „" + version.filename + "\"…");
  try {
    const r = await ghReadFile(version.filename);
    const blob = base64ToBlob(r.contentBase64, mimeFromExt(getExt(version.filename)));
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = version.filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 30000);
    handle.succeed("Staženo: " + version.filename);
    showStatus("Staženo.", "success");
  } catch (e) {
    handle.fail(e, () => downloadVersion(version));
    showStatus("Stažení selhalo: " + e.message, "error", 8000);
  }
}
function mimeFromExt(ext) {
  const m = {
    pdf: "application/pdf", txt: "text/plain", md: "text/markdown",
    json: "application/json", html: "text/html", csv: "text/csv",
    png: "image/png", jpg: "image/jpeg", jpeg: "image/jpeg", gif: "image/gif",
    svg: "image/svg+xml", webp: "image/webp",
    docx: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    xlsx: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
    pptx: "application/vnd.openxmlformats-officedocument.presentationml.presentation",
    zip: "application/zip",
    mp3: "audio/mpeg", mp4: "video/mp4", wav: "audio/wav",
  };
  return m[ext] || "application/octet-stream";
}

    fTheme.appendChild(el("label", { for: "set-storage-theme" }, "Motiv (vzhled úložiště)"));
    const themeSel = el("select", {
      id: "set-storage-theme",
      onchange: (e) => {
        // Live preview — aplikuj okamžitě, ale ulož se až přes "Uložit vlastnosti"
        applyTheme(e.target.value);
      },
    });
    // Group options podle group field
    const groups = {};
    for (const t of THEMES) {
      if (!groups[t.group]) groups[t.group] = [];
      groups[t.group].push(t);
    }
    const currentTheme = state.storage.theme || THEME_DEFAULT;
    for (const groupName of Object.keys(groups)) {
      const og = el("optgroup", { label: groupName });
      for (const t of groups[groupName]) {
        const opt = el("option", { value: t.id }, t.name);
        if (t.id === currentTheme) opt.selected = true;
        og.appendChild(opt);
      }
      themeSel.appendChild(og);
    }
    fTheme.appendChild(themeSel);
    fTheme.appendChild(el("div", { class: "hint" }, "Motiv je vlastnost úložiště, ne zařízení — všichni uživatelé tohoto úložiště uvidí stejný vzhled. Změna se projeví okamžitě jako náhled, uloží se po stisku „Uložit vlastnosti\"."));
    sectInner.appendChild(fTheme);

    sectInner.appendChild(el("button", { class: "primary small", onclick: () => saveStorageProps() }, "Uložit vlastnosti"));
    detProps.appendChild(sectInner);
    panel.appendChild(detProps);
  }

  // Section: známá úložiště (multi-storage navigace)
  const known = listKnownRepos();
  // ukaž sekci, jen pokud je víc než jeden repo NEBO uživatel má jeden, který není ten současný
  const interestingKnown = known.filter(k => k.repoPath !== state.config.repoPath);
  if (known.length >= 1) {
    const det4 = el("details", { open: !state.storage && known.length > 0 });
    det4.appendChild(el("summary", null, "Známá úložiště (" + known.length + ")"));
    const list = el("ul", { class: "known-repos" });
    for (const k of known) {
      const li = el("li", { class: "known-repo-item" + (k.repoPath === state.config.repoPath ? " current" : "") });
      const head = el("div", { class: "known-repo-head" });
      const titleText = (k.storageName || "(bez názvu)") + (k.storageId ? " [" + k.storageId + "]" : "");
      if (k.repoPath === state.config.repoPath) {
        head.appendChild(el("strong", null, titleText));
        head.appendChild(el("span", { class: "known-repo-current" }, " — právě zobrazeno"));
      } else {
        head.appendChild(el("a", {
          href: "#",
          onclick: (e) => { e.preventDefault(); openStorage(k.repoPath); },
          "aria-label": "Otevřít úložiště " + titleText,
        }, titleText));
      }
      li.appendChild(head);
      li.appendChild(el("div", { class: "known-repo-meta" }, k.repoPath));
      if (k.lastVisited) {
        li.appendChild(el("div", { class: "known-repo-meta" }, "Naposledy: " + fmtDate(k.lastVisited)));
      }
      const acts = el("div", { class: "known-repo-actions" });
      acts.appendChild(el("a", {
        href: "?detail=" + encodeDetailParam(k.repoPath, "root"),
        target: "_blank",
        rel: "noopener",
      }, "Otevřít v novém tabu"));
      acts.appendChild(document.createTextNode(" · "));
      acts.appendChild(el("a", {
        href: "#",
        onclick: (e) => { e.preventDefault(); forgetRepoConfirm(k.repoPath); },
      }, "Zapomenout"));
      li.appendChild(acts);
      list.appendChild(li);
    }
    det4.appendChild(list);
    panel.appendChild(det4);
  }

  // Section: search (global)
  if (state.storage) {
    const det2 = el("details");
    det2.appendChild(el("summary", null, "Globální vyhledávání"));
    const sq = el("div", { class: "field" });
    sq.appendChild(el("label", { for: "global-search" }, "Hledat napříč úložištěm"));
    sq.appendChild(el("input", { type: "search", id: "global-search", placeholder: "název, popis, ID...", oninput: (e) => doGlobalSearch(e.target.value) }));
    det2.appendChild(sq);
    det2.appendChild(el("div", { id: "global-search-results", "aria-live": "polite" }));
    panel.appendChild(det2);
  }

  // Section: stats (toggle)
  if (state.storage) {
    const det3 = el("details", { open: state.showStats });
    det3.addEventListener("toggle", (e) => {
      state.showStats = e.target.open;
    });
    det3.appendChild(el("summary", null, "Statistiky úložiště"));
    const st = computeStats();
    det3.appendChild(el("div", { class: "stats-display" },
      el("span", null, el("strong", null, "Složek:"), String(st.folders)),
      el("span", null, el("strong", null, "Souborů:"), String(st.files)),
      el("span", null, el("strong", null, "Verzí:"), String(st.versions)),
      el("span", null, el("strong", null, "Odkazů:"), String(st.links)),
      el("span", null, el("strong", null, "Velikost:"), fmtSize(st.totalSize)),
    ));
    panel.appendChild(det3);
  }
}

async function saveStorageProps() {
  if (!state.storage) return;
  // ID úložiště je neměnné — ignorujeme případnou hodnotu z formu (input je readonly,
  // ale pro jistotu nikdy nepřepisujeme state.storage.id).
  const name = $("set-storage-name").value.trim();
  const desc = $("set-storage-desc").value;
  const themeSel = $("set-storage-theme");
  const themeId = themeSel ? themeSel.value : null;
  // Tagy: parsuj z textarea, zjisti které mizí oproti aktuálnímu seznamu
  const tagsField = $("set-storage-tags");
  const newTags = tagsField ? parseTagList(tagsField.value) : getStorageTags();
  const oldTags = getStorageTags();
  const removed = oldTags.filter(t => !newTags.includes(t));
  if (removed.length) {
    // Spočítej dopad — kolik položek používá tagy které mají zmizet
    const affected = removed.map(t => ({ tag: t, count: countItemsWithTag(t) })).filter(x => x.count > 0);
    if (affected.length) {
      const list = affected.map(x => `„${x.tag}" (${x.count} ${x.count === 1 ? "položka" : x.count >= 2 && x.count <= 4 ? "položky" : "položek"})`).join(", ");
      const ok = await confirmDialog(
        "Mažete tagy: " + list + ". Tag bude odstraněn ze všech položek. Pokračovat?",
        { title: "Smazání tagů", okLabel: "Smazat tagy", danger: true }
      );
      if (!ok) return;
    }
  }
  state.storage.name = name || "Úložiště";
  state.storage.description = desc;
  if (themeId && isValidThemeId(themeId)) {
    state.storage.theme = themeId;
  }
  // Aplikuj nové tagy úložiště
  setStorageTags(newTags);
  // Cleanup: odeber smazané tagy ze všech položek
  for (const t of removed) {
    removeTagFromAllItems(t);
  }
  // Také vyčistit aktuální filtr od neplatných tagů
  state.filterTags = (state.filterTags || []).filter(t => newTags.includes(t));
  state.storage.modified = nowIso();
  rememberStorageInfo(state.storage.id, state.storage.name);
  markModified();
  showStatus("Vlastnosti uloženy. Změny se odešlou při ukončení režimu úprav.", "success");
  render();
}

async function saveSettingsAndLoad() {
  state.config.repoPath = $("set-repo-path").value.trim();
  state.config.branch = $("set-branch").value.trim() || COMMIT_BRANCH_DEFAULT;
  state.config.deviceName = $("set-device").value.trim();
  state.config.apiKey = $("set-api-key").value.trim();
  saveConfig();
  if (!parseRepoPath(state.config.repoPath)) {
    showStatus("Cesta k repu musí být ve tvaru owner/repo[/složka].", "warning");
    return;
  }
  // Try to load storage.json
  await loadStorageFromGithub();
  updateUrl();
  render();
}

async function openStorage(repoPath) {
  // Otevře jiné úložiště v aktuálním tabu. API klíč zůstává globální (per-device).
  // Aktualizuje se jen repoPath a (pokud má per-repo override) branch.
  if (!repoPath) return;
  if (state.unsaved) {
    const ok = await confirmDialog("Máte neuložené změny v aktuálním úložišti. Opravdu přepnout?", { okLabel: "Přepnout" });
    if (!ok) return;
  }
  // Vyčisti aktuální stav
  state.storage = null;
  state.currentDetailId = "root";
  state.viewingVersionId = null;
  state.unsaved = false;
  $("unsaved-indicator").hidden = true;
  // Nastav nový repoPath; loadConfig pro něj dohledá per-repo branch override (apiKey je globální)
  state.config.repoPath = repoPath;
  loadConfig();
  updateUrl();
  render();
  await loadStorageFromGithub();
  render();
}

async function forgetRepoConfirm(repoPath) {
  const ok = await confirmDialog("Odebrat tohle úložiště ze seznamu známých? (Pouze lokální záznam o návštěvě — globální API klíč zůstává, data na githubu zůstávají.)", {
    title: "Zapomenout úložiště", danger: true, okLabel: "Zapomenout",
  });
  if (!ok) return;
  forgetRepo(repoPath);
  showStatus("Úložiště odebráno ze seznamu známých.", "success");
  render();
}

async function createNewStorage() {
  if (state.unsaved) {
    const ok = await confirmDialog("Máte neuložené změny ve stávajícím úložišti. Opravdu vytvořit nové?", { okLabel: "Vytvořit nové" });
    if (!ok) return;
  }
  const r = await promptDialog("Vytvořit nové úložiště", [
    { name: "id", label: "ID úložiště", required: true, hint: "Jen a-z, 0-9, _, -" },
    { name: "name", label: "Název", required: true },
    { name: "description", label: "Popis", type: "textarea" },
  ]);
  if (!r) return;
  if (!/^[a-zA-Z0-9_\-]+$/.test(r.id)) { showStatus("Chybný formát ID.", "warning"); return; }
  state.storage = emptyStorage(r.id, r.name, r.description);
  state.currentDetailId = "root";
  rememberStorageInfo(state.storage.id, state.storage.name);
  markModified();
  // Push immediately if config is ready
  if (state.config.apiKey && parseRepoPath(state.config.repoPath)) {
    await pushStorageJsonWithLog("DMS: vytvořit nové úložiště", "Vytvořit nové úložiště „" + r.name + "\"");
  } else {
    showStatus("Úložiště vytvořeno lokálně. Doplňte cestu a API klíč pro uložení na github.", "warning", 6000);
  }
  updateUrl();
  render();
}

async function doManualPush() {
  if (!state.storage) return;
  if (!state.config.apiKey) { showStatus("Pro push je nutný API klíč.", "warning"); return; }
  await pushStorageJsonWithLog("DMS: manuální push", "Manuální push storage.json");
}

async function pushStorageJsonWithLog(commitMsg, opLabel) {
  const handle = beginOp(opLabel || "Push storage.json", "push-json");
  try {
    await pushStorageJson(commitMsg);
    handle.succeed("storage.json uložen na github");
    showStatus("Uloženo.", "success");
    return true;
  } catch (e) {
    handle.fail(e, () => pushStorageJsonWithLog(commitMsg, opLabel));
    showStatus("Push selhal: " + e.message + " — opakujte z panelu operací.", "error", 8000);
    return false;
  }
}

function exportStorageJson() {
  if (!state.storage) return;
  const json = serializeStorage(state.storage);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = (state.storage.id || "storage") + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function doGlobalSearch(query) {
  const out = $("global-search-results");
  if (!out) return;
  const q = (query || "").toLowerCase().trim();
  if (!q) { out.innerHTML = ""; return; }
  const all = flattenItems();
  const matches = all.filter(({ item }) => {
    return (item.name || "").toLowerCase().includes(q)
        || (item.description || "").toLowerCase().includes(q)
        || (item.id || "").toLowerCase().includes(q)
        || (item.url || "").toLowerCase().includes(q);
  }).slice(0, 30);
  out.innerHTML = "";
  if (!matches.length) {
    out.appendChild(el("p", { class: "hint" }, "Žádné výsledky."));
    return;
  }
  const ul = el("ul", { class: "item-list", style: { marginTop: "8px" } });
  for (const m of matches) {
    const it = m.item;
    const path = m.pathNames.join(" / ") || "(kořen)";
    const li = el("li", { class: "item" });
    const body = el("div", { class: "item-body" });
    body.appendChild(el("h3", { class: "item-title" },
      el("a", { href: "#", class: "item-link", onclick: (e) => { e.preventDefault(); navigateTo(it.id); } },
        el("span", { class: "item-icon" }, iconFor(it)),
        " ",
        el("span", { class: "item-name" }, it.name || "(bez názvu)"),
      )));
    body.appendChild(el("div", { class: "item-meta" }, "v: " + path));
    if (it.description) body.appendChild(el("div", { class: "item-desc" }, it.description));
    li.appendChild(body);
    ul.appendChild(li);
  }
  out.appendChild(ul);
}

// Globální klávesové zkratky — holá písmena, Shift jen u B.
//
// x — toggle režim úprav
// f — přidat 📁 (jen v editmódu, ve složce)
// l — přidat ⛓️ (jen v editmódu, ve složce)
// n — přidat 📃 (jen v editmódu, ve složce)
// m — přidat 📝 poznámku (jen v editmódu, ve složce)
// e — přejmenovat / popis (jen v editmódu, na položce ne v rootu)
// d — stáhnout nejnovější verzi (jen na detailu souboru)
// o — otevřít file picker pro novou verzi (jen na detailu souboru, ne v náhledu verze)
// c — vyčistit dokončené z op-logu
// r — opakovat všechny chybné z op-logu
// b — o úroveň výš v navigaci (do parent složky)
// Shift+B — na kořen úložiště
//
// Poznámka pro screen reader uživatele: NVDA/JAWS/VoiceOver v default browse modu
// si některá písmena rezervují pro vlastní quick-navigation (X = další checkbox,
// F = další form field, atd.). Aplikace přidává `keydown` handler v CAPTURE fázi
// a u rozpoznaných kláves volá stopPropagation, aby zkratky aplikace měly přednost
// před quick-nav screen readeru. Pokud by to v některém prostředí stále nefungovalo,
// stiskněte v NVDA NVDA+Mezera pro přepnutí do focus modu.
function handleGlobalKey(e) {
  // V embed režimu jsou všechny shortcuty vypnuté — embed je čistě read-only.
  if (state.embedMode) return;
  // Nereagovat když uživatel píše v inputu/textarea/selectu nebo je dialog otevřený.
  const t = e.target;
  const tag = t && t.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (t && t.isContentEditable)) return;
  if (document.querySelector("dialog[open]")) return;
  // Ctrl/Cmd/Alt nikdy. Shift jen pro speciální navigační klávesy (B = root vs. parent).
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  // Klávesa musí být jediný znak.
  if (!e.key || e.key.length !== 1) return;
  const key = e.key.toLowerCase();
  // Pro většinu zkratek nesmí být Shift. Výjimka: B s Shiftem znamená navigaci na root.
  if (e.shiftKey && key !== "b") return;
  const shift = e.shiftKey;
  const isOnFile = (() => {
    if (!state.storage || state.currentDetailId === "root") return null;
    const found = findItem(state.currentDetailId);
    return (found && found.item && found.item.type === T.FILE) ? found.item : null;
  })();
  const currentFolder = (() => {
    if (!state.storage) return null;
    if (state.currentDetailId === "root") {
      // Vrať pseudo-rootem, který createFolder/createLink/createFile umí zpracovat
      return { id: "root", type: T.FOLDER, items: state.storage.rootItems };
    }
    const found = findItem(state.currentDetailId);
    return (found && found.item && found.item.type === T.FOLDER) ? found.item : null;
  })();

  let consumed = false;
  switch (key) {
    case "x": {
      const cb = $("edit-mode-toggle");
      if (cb) {
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event("change"));
        consumed = true;
      }
      break;
    }
    case "b": {
      // B = o úroveň výš (parent složka), Shift+B = na root úložiště
      if (!state.storage) break;
      if (state.currentDetailId === "root") break; // už jsme na rootu
      if (shift) {
        navigateTo("root");
        consumed = true;
      } else {
        // o úroveň výš — najdi parent aktuální položky
        const found = findItem(state.currentDetailId);
        if (found) {
          // root level item: parent === null → vrátíme se na root
          // hlubší level: parent je předposlední v path (nebo null pokud rootItem)
          const parentItem = found.parent;
          navigateTo(parentItem ? parentItem.id : "root");
          consumed = true;
        }
      }
      break;
    }
    case "f": {
      if (state.editMode && currentFolder) { createFolder(currentFolder); consumed = true; }
      break;
    }
    case "l": {
      if (state.editMode && currentFolder) { createLink(currentFolder); consumed = true; }
      break;
    }
    case "n": {
      if (state.editMode && currentFolder) { createFile(currentFolder); consumed = true; }
      break;
    }
    case "m": {
      if (state.editMode && currentFolder) { createNote(currentFolder); consumed = true; }
      break;
    }
    case "e": {
      if (state.editMode && state.currentDetailId !== "root") {
        const found = findItem(state.currentDetailId);
        if (found && found.item) { editItemProps(found.item); consumed = true; }
      }
      break;
    }
    case "d": {
      if (isOnFile) {
        const versions = isOnFile.versions || [];
        for (let i = versions.length - 1; i >= 0; i--) {
          if (!versions[i].pendingUpload) {
            downloadVersion(versions[i]);
            consumed = true;
            break;
          }
        }
      }
      break;
    }
    case "o": {
      if (isOnFile) {
        const fileInput = $("up-file");
        if (fileInput) {
          fileInput.click(); // otevře OS dialog pro výběr souboru
          consumed = true;
        }
      } else if (state.editMode && state.currentDetailId !== "root") {
        const found = findItem(state.currentDetailId);
        if (found && found.item && found.item.type === T.NOTE && state.editingNoteId !== found.item.id) {
          beginNoteEdit(found.item);
          consumed = true;
        }
      }
      break;
    }
    case "c": {
      const sect = $("op-log-section");
      const btn = $("op-log-clear");
      if (sect && !sect.hidden && btn) { btn.click(); consumed = true; }
      break;
    }
    case "r": {
      const btn = $("op-log-retry-all");
      if (btn && !btn.hidden) { btn.click(); consumed = true; }
      break;
    }
  }
  if (consumed) {
    // PreventDefault i stopPropagation — kombinace, která zabrání jak browser default,
    // tak quick-navigation screen readerů (NVDA/JAWS/VoiceOver).
    e.preventDefault();
    e.stopPropagation();
    if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();
  }
}
function wireGlobalKeys() {
  // Capture fáze — handler dostane event PŘED tím, než ho zpracuje NVDA quick-nav.
  // U rozpoznaných kláves voláme stopPropagation, takže se ke screen readeru
  // ten event už nedostane.
  document.addEventListener("keydown", handleGlobalKey, true);
}

async function init() {
  // Pořadí důležité: URL musí proběhnout PŘED loadConfig, aby loadConfig
  // dohledal apiKey/branch pro repo z URL (ne z lastRepoPath).
  const urlInfo = readUrlOnLoad();
  loadConfig();
  wireEditModeToggle();
  wireDebugToggle();
  wireBeforeUnload();
  wireOpLogButtons();
  wireGlobalKeys();

  // Initial paint of empty shell so user sees the page even if load takes time
  render();

  // If URL has detail or we have a configured repo, load storage.json BEFORE allowing further interaction
  const shouldLoad = !!(urlInfo && urlInfo.repoPath) || !!state.config.repoPath;
  if (shouldLoad) {
    const ok = await loadStorageFromGithub();
    if (ok) {
      // After successful load, re-resolve currentDetailId and viewingVersionId from URL
      // (the IDs in URL may not have existed before load)
      if (urlInfo && urlInfo.itemId) {
        const found = findItem(urlInfo.itemId);
        if (!found) {
          showStatus("Položka z URL nebyla v úložišti nalezena, zobrazuji kořen.", "warning", 6000);
          state.currentDetailId = "root";
          state.viewingVersionId = null;
          updateUrl();
        }
      }
    } else {
      // Load failed; storage stays null. User will see a hint with retry available in op log.
      state.storage = null;
    }
    render();
  }
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}
</script>
</body>
</html>
