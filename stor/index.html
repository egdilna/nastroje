<script>
"use strict";
//=============================================================================
// CONSTANTS & STATE
//=============================================================================
const APP_VERSION = "1.0";
const STORAGE_FILENAME = "storage.json";
const LS_KEY = "dms-config-v3";
const LS_KEY_V2 = "dms-config-v2";
const LS_KEY_V1 = "dms-config-v1";
const COMMIT_BRANCH_DEFAULT = "main";

const state = {
  storage: null,        // The full storage.json object, or null
  config: {
    apiKey: "",
    deviceName: "",
    repoPath: "",       // owner/repo/path/to/folder
    branch: COMMIT_BRANCH_DEFAULT,
  },
  currentDetailId: "root",
  viewingVersionId: null, // filename of version being viewed inline (markdown)
  editMode: false,
  unsaved: false,       // Storage JSON modified but not pushed
  loading: false,
  busy: false,          // Prevents concurrent operations
  versionDownloadCache: new Map(), // sha -> blob URL
  ops: [],              // operation log (running/ok/err)
  opIdSeq: 0,
  showStats: false,     // user toggled stats display in edit panel
  sortMode: "name",     // řazení v aktuálním pohledu složky
  filterQuery: "",      // filtr ve složce
};

// Item type constants
const T = { FOLDER: "folder", FILE: "file", LINK: "link" };
// Emoji ikona pro každý typ. Když přibude nový typ (např. video/notebook/...),
// stačí ho přidat tady a do T — UI se zařídí samo.
const T_ICON = {
  [T.FOLDER]: "📁",
  [T.FILE]: "📃",
  [T.LINK]: "⛓️",
};
// Pomocná funkce: emoji pro danou položku, fallback "•".
function iconFor(item) {
  if (!item || !item.type) return "•";
  return T_ICON[item.type] || "•";
}

// Audio feedback
let audioCtx = null;
function beep(freq, dur, vol) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = freq;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(vol || 0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (dur || 0.08));
    o.start(); o.stop(audioCtx.currentTime + (dur || 0.08));
  } catch(e) {}
}
const sfx = {
  ok:    () => { beep(660, 0.06); setTimeout(() => beep(880, 0.07), 60); },
  err:   () => { beep(220, 0.18, 0.07); },
  click: () => { beep(440, 0.04, 0.04); },
};

//=============================================================================
// UTILITIES
//=============================================================================
function $(id) { return document.getElementById(id); }
function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === "class") node.className = attrs[k];
    else if (k === "html") node.innerHTML = attrs[k];
    else if (k === "text") node.textContent = attrs[k];
    else if (k === "style" && typeof attrs[k] === "object") Object.assign(node.style, attrs[k]);
    else if (k.startsWith("on") && typeof attrs[k] === "function") node.addEventListener(k.slice(2), attrs[k]);
    else if (k === "dataset") for (const dk in attrs[k]) node.dataset[dk] = attrs[k][dk];
    else if (attrs[k] === true) node.setAttribute(k, "");
    else if (attrs[k] === false || attrs[k] == null) {/* skip */}
    else node.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (Array.isArray(c)) c.forEach(cc => cc != null && node.appendChild(typeof cc === "string" ? document.createTextNode(cc) : cc));
    else node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return node;
}
function uuid() {
  return "x" + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
}
function nowIso() { return new Date().toISOString(); }
function fmtDate(iso) {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    return d.toLocaleString("cs-CZ", { dateStyle: "medium", timeStyle: "short" });
  } catch { return iso; }
}
function fmtSize(bytes) {
  if (bytes == null) return "—";
  if (bytes === 0) return "0 B";
  const u = ["B","kB","MB","GB"];
  let i = 0, n = bytes;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return n.toFixed(n < 10 && i > 0 ? 1 : 0) + " " + u[i];
}
function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function getExt(filename) {
  if (!filename) return "";
  const m = /\.([a-zA-Z0-9]+)$/.exec(filename);
  return m ? m[1].toLowerCase() : "";
}
function genVersionFilename(storageId, fileId, ext) {
  // storageid_souborid_2026-04-25_16-23.ext
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  const ts = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}`;
  const safeStorage = (storageId || "storage").replace(/[^a-zA-Z0-9_\-]/g,"_");
  const safeFile = (fileId || "file").replace(/[^a-zA-Z0-9_\-]/g,"_");
  return `${safeStorage}_${safeFile}_${ts}${ext ? "." + ext : ""}`;
}

// Base64 helpers (URL-safe, no padding) for the ?detail= parameter
function b64urlEncode(s) {
  const bytes = new TextEncoder().encode(s);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/=+$/,"").replace(/\+/g,"-").replace(/\//g,"_");
}
function b64urlDecode(s) {
  let p = s.replace(/-/g,"+").replace(/_/g,"/");
  while (p.length % 4) p += "=";
  const bin = atob(p);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}
// Plain base64 for binary content (file uploads)
function arrayBufferToBase64(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(bin);
}
function base64ToBlob(b64, mime) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new Blob([bytes], { type: mime || "application/octet-stream" });
}

//=============================================================================
// CONFIG (localStorage) — device-global credentials, multi-storage navigation
//=============================================================================
// Struktura v localStorage (v3):
// {
//   apiKey: "ghp_...",                    // GLOBÁLNÍ — jeden GitHub PAT pro celé zařízení
//   deviceName: "...",                    // GLOBÁLNÍ — jméno tohoto zařízení (zobrazuje se u verzí)
//   branch: "main",                       // GLOBÁLNÍ default větev
//   knownRepos: [                         // historie navštívených úložišť (jen pro UX nawigaci)
//     {
//       repoPath: "owner/repo/path",
//       storageId: "...",                 // pamatováno po loadu (zobrazuje se v seznamu)
//       storageName: "...",
//       lastVisited: "ISO datum",
//       branch: "..."                     // OPTIONAL override globální větve
//     },
//     ...
//   ],
//   lastRepoPath: "owner/repo/path"       // co bylo naposled aktivní (kam se vrátit při dalším otevření)
// }
//
// Klíčový princip: API klíč je vlastnost ZAŘÍZENÍ, ne úložiště. Když dostanu URL na nové
// úložiště (i v iframe), přirozeně se použije globální klíč — funguje to okamžitě
// bez nutnosti znovu zadávat credentials.
//
// state.config v paměti je zploštělý ({apiKey, deviceName, repoPath, branch}) — load/save převádí.

function loadFullConfig() {
  // Vrátí celý config v3. Provádí migraci z v2 a v1, pokud jsou k dispozici.
  let cfg = { apiKey: "", deviceName: "", branch: COMMIT_BRANCH_DEFAULT, knownRepos: [], lastRepoPath: "" };
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === "object") {
        cfg.apiKey = parsed.apiKey || "";
        cfg.deviceName = parsed.deviceName || "";
        cfg.branch = parsed.branch || COMMIT_BRANCH_DEFAULT;
        cfg.knownRepos = Array.isArray(parsed.knownRepos) ? parsed.knownRepos : [];
        cfg.lastRepoPath = parsed.lastRepoPath || "";
      }
      return cfg;
    }
    // Migrace v2 → v3: vezmi nejnovější apiKey a branch jako globální, repos[] zploštit do knownRepos[].
    const rawV2 = localStorage.getItem(LS_KEY_V2);
    if (rawV2) {
      const v2 = JSON.parse(rawV2) || {};
      cfg.deviceName = v2.deviceName || "";
      cfg.lastRepoPath = v2.lastRepoPath || "";
      let bestApiKey = "";
      let bestBranch = COMMIT_BRANCH_DEFAULT;
      let bestVisited = "";
      const repos = v2.repos || {};
      for (const rp in repos) {
        const e = repos[rp];
        cfg.knownRepos.push({
          repoPath: rp,
          storageId: e.storageId || "",
          storageName: e.storageName || "",
          lastVisited: e.lastVisited || "",
          branch: e.branch && e.branch !== COMMIT_BRANCH_DEFAULT ? e.branch : undefined,
        });
        // Vezmi globální apiKey z entry s nejnovějším lastVisited (nebo první nenulový)
        if (e.apiKey && (!bestApiKey || (e.lastVisited && e.lastVisited > bestVisited))) {
          bestApiKey = e.apiKey;
          bestBranch = e.branch || COMMIT_BRANCH_DEFAULT;
          bestVisited = e.lastVisited || "";
        }
      }
      cfg.apiKey = bestApiKey;
      cfg.branch = bestBranch;
      // Vyčisti undefined branch (kvůli JSON.stringify)
      cfg.knownRepos = cfg.knownRepos.map(r => {
        const c = Object.assign({}, r);
        if (c.branch === undefined) delete c.branch;
        return c;
      });
      saveFullConfig(cfg);
      try { localStorage.removeItem(LS_KEY_V2); } catch {}
      debug("Migrace konfigurace v2 → v3: API klíč povýšen na globální (per-device).", "ok");
      return cfg;
    }
    // Migrace v1 → v3 (přímá): jeden repo, jeden apiKey, povýšit na globální.
    const rawV1 = localStorage.getItem(LS_KEY_V1);
    if (rawV1) {
      const v1 = JSON.parse(rawV1) || {};
      cfg.apiKey = v1.apiKey || "";
      cfg.deviceName = v1.deviceName || "";
      cfg.branch = v1.branch || COMMIT_BRANCH_DEFAULT;
      if (v1.repoPath) {
        cfg.knownRepos.push({
          repoPath: v1.repoPath, storageId: "", storageName: "", lastVisited: nowIso()
        });
        cfg.lastRepoPath = v1.repoPath;
      }
      saveFullConfig(cfg);
      try { localStorage.removeItem(LS_KEY_V1); } catch {}
      debug("Migrace konfigurace v1 → v3 proběhla.", "ok");
      return cfg;
    }
  } catch(e) {
    debug("Chyba načtení konfigurace: " + e.message, "err");
  }
  return cfg;
}

function saveFullConfig(cfg) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(cfg));
  } catch(e) {
    debug("Chyba uložení konfigurace: " + e.message, "err");
  }
}

function loadConfig() {
  // Naplní state.config. API klíč a deviceName jsou globální per-device.
  // repoPath přijde z URL (priorita) nebo z lastRepoPath (fallback).
  // branch: pokud má aktuální repo per-repo override v knownRepos, použije se ten;
  //   jinak globální default.
  const full = loadFullConfig();
  state.config.apiKey = full.apiKey || "";
  state.config.deviceName = full.deviceName || "";
  // repoPath: pokud už je nastaven (z URL přečtené dřív), drž se ho; jinak last-used.
  const targetRepo = state.config.repoPath || full.lastRepoPath || "";
  state.config.repoPath = targetRepo;
  // Branch: per-repo override > globální default
  const entry = (full.knownRepos || []).find(r => r.repoPath === targetRepo);
  state.config.branch = (entry && entry.branch) || full.branch || COMMIT_BRANCH_DEFAULT;
}

function saveConfig() {
  // Uloží globální fields (apiKey, deviceName, branch jako default) + aktualizuje
  // knownRepos[] entry pro aktuální repoPath (lastVisited).
  const full = loadFullConfig();
  full.apiKey = state.config.apiKey || "";
  full.deviceName = state.config.deviceName || "";
  // Globální branch updatujeme jen pokud aktuální config nepoužívá per-repo override.
  // Jednoduššeji: nechej globální branch netknutou; per-repo branch se ukládá zvlášť přes
  // mechanismus knownRepos. Tady jen ukládáme jako default pokud je config.branch jiný než
  // globální + nejde o per-repo override.
  const rp = state.config.repoPath;
  if (rp) {
    if (!Array.isArray(full.knownRepos)) full.knownRepos = [];
    const idx = full.knownRepos.findIndex(r => r.repoPath === rp);
    const existing = idx >= 0 ? full.knownRepos[idx] : null;
    const branchVal = state.config.branch || COMMIT_BRANCH_DEFAULT;
    const entry = {
      repoPath: rp,
      storageId: existing ? (existing.storageId || "") : "",
      storageName: existing ? (existing.storageName || "") : "",
      lastVisited: nowIso(),
    };
    // Pokud branch v configu je jiný než globální default, uložíme per-repo override
    if (branchVal !== (full.branch || COMMIT_BRANCH_DEFAULT)) entry.branch = branchVal;
    if (idx >= 0) full.knownRepos[idx] = entry;
    else full.knownRepos.push(entry);
    full.lastRepoPath = rp;
  }
  saveFullConfig(full);
}

function rememberStorageInfo(storageId, storageName) {
  // Aktualizuje storageId + storageName pro aktuální repoPath (volá se po úspěšném loadu / vytvoření).
  const rp = state.config.repoPath;
  if (!rp) return;
  const full = loadFullConfig();
  if (!Array.isArray(full.knownRepos)) full.knownRepos = [];
  const idx = full.knownRepos.findIndex(r => r.repoPath === rp);
  const branchVal = state.config.branch || COMMIT_BRANCH_DEFAULT;
  const entry = {
    repoPath: rp,
    storageId: storageId || "",
    storageName: storageName || "",
    lastVisited: nowIso(),
  };
  if (branchVal !== (full.branch || COMMIT_BRANCH_DEFAULT)) entry.branch = branchVal;
  if (idx >= 0) full.knownRepos[idx] = entry;
  else full.knownRepos.push(entry);
  full.lastRepoPath = rp;
  saveFullConfig(full);
}

function listKnownRepos() {
  // Vrátí pole známých úložišť, řazené od nejnověji navštívených.
  const full = loadFullConfig();
  const out = (full.knownRepos || []).slice();
  out.sort((a, b) => {
    const ta = a.lastVisited || "", tb = b.lastVisited || "";
    return tb.localeCompare(ta);
  });
  return out;
}

function forgetRepo(repoPath) {
  // Odstraní repo ze seznamu známých úložišť. Globální API klíč zůstává.
  const full = loadFullConfig();
  if (Array.isArray(full.knownRepos)) {
    full.knownRepos = full.knownRepos.filter(r => r.repoPath !== repoPath);
  }
  if (full.lastRepoPath === repoPath) full.lastRepoPath = "";
  saveFullConfig(full);
}

//=============================================================================
// STATUS / DEBUG
//=============================================================================
function showStatus(msg, kind, durationMs) {
  const region = $("status-region");
  const node = el("div", { class: "status-msg" + (kind ? " " + kind : ""), role: kind === "error" ? "alert" : "status" }, msg);
  region.appendChild(node);
  setTimeout(() => {
    node.style.transition = "opacity .25s";
    node.style.opacity = "0";
    setTimeout(() => node.remove(), 260);
  }, durationMs || (kind === "error" ? 6000 : 3500));
  if (kind === "error") sfx.err(); else if (kind === "success") sfx.ok();
}
function debug(msg, kind) {
  const out = $("debug-output");
  const line = el("div", { class: "debug-line" + (kind ? " " + kind : "") }, `[${new Date().toLocaleTimeString("cs-CZ")}] ${msg}`);
  out.appendChild(line);
  out.scrollTop = out.scrollHeight;
  // keep last 200 lines
  while (out.children.length > 200) out.removeChild(out.firstChild);
}

//=============================================================================
// OPERATION LOG (running / ok / err with retry)
//=============================================================================
function beginOp(label, type) {
  const op = {
    id: ++state.opIdSeq,
    ts: Date.now(),
    type: type || "generic",
    label: label || "Operace",
    status: "running",
    error: null,
    retry: null,
    canDismiss: false,
  };
  state.ops.push(op);
  // keep last 80
  while (state.ops.length > 80) state.ops.shift();
  renderOpLog();
  debug("[OP " + op.id + "] start: " + op.label);
  return {
    op,
    update: (newLabel) => {
      op.label = newLabel;
      renderOpLog();
    },
    succeed: (msg) => {
      op.status = "ok";
      op.canDismiss = true;
      if (msg) op.label = msg;
      renderOpLog();
      debug("[OP " + op.id + "] ok: " + op.label, "ok");
      sfx.ok();
    },
    fail: (err, retryFn) => {
      op.status = "err";
      op.error = (err && err.message) ? err.message : String(err);
      op.retry = retryFn || null;
      op.canDismiss = true;
      renderOpLog();
      debug("[OP " + op.id + "] err: " + op.error, "err");
      sfx.err();
    },
  };
}

function dismissOp(opId) {
  const idx = state.ops.findIndex(o => o.id === opId);
  if (idx >= 0) state.ops.splice(idx, 1);
  renderOpLog();
}

function clearDoneOps() {
  state.ops = state.ops.filter(o => o.status === "running");
  renderOpLog();
}

async function retryAllFailed() {
  const fails = state.ops.filter(o => o.status === "err" && typeof o.retry === "function" && !o.manualRetryOnly);
  for (const o of fails) {
    try {
      await o.retry();
    } catch (e) {
      // each retry handler is responsible for updating the op via beginOp pattern
      debug("Retry-all: chyba u op " + o.id + ": " + (e && e.message ? e.message : e), "err");
    }
  }
}

function renderOpLog() {
  const sect = $("op-log-section");
  const list = $("op-log");
  const summary = $("op-log-summary");
  const retryAllBtn = $("op-log-retry-all");
  if (!sect || !list || !summary) return;
  if (!state.ops.length) {
    sect.hidden = true;
    list.innerHTML = "";
    summary.innerHTML = "";
    return;
  }
  sect.hidden = false;
  list.innerHTML = "";
  let nRun = 0, nOk = 0, nErr = 0;
  for (const op of state.ops.slice().reverse()) {
    if (op.status === "running") nRun++;
    else if (op.status === "ok") nOk++;
    else if (op.status === "err") nErr++;
    const li = el("li", { class: "op-log-item " + op.status });
    const icon = el("span", { class: "op-status-icon", "aria-hidden": "true" });
    if (op.status === "running") {
      icon.appendChild(el("span", { class: "spinner-inline" }));
    } else if (op.status === "ok") {
      icon.textContent = "✓";
    } else {
      icon.textContent = "✗";
    }
    li.appendChild(icon);
    const body = el("div", { class: "op-log-body" });
    const labelLine = el("div", { class: "op-log-label" });
    labelLine.appendChild(el("span", { class: "op-log-time" }, new Date(op.ts).toLocaleTimeString("cs-CZ")));
    labelLine.appendChild(document.createTextNode(op.label));
    // sr-only status word for assistive tech
    const srStatus = op.status === "running" ? "probíhá" : op.status === "ok" ? "úspěch" : "chyba";
    labelLine.appendChild(el("span", { class: "sr-only" }, " (" + srStatus + ")"));
    body.appendChild(labelLine);
    if (op.status === "err" && op.error) {
      body.appendChild(el("div", { class: "op-log-error" }, op.error));
    }
    li.appendChild(body);
    const acts = el("div", { class: "op-log-item-actions" });
    if (op.status === "err" && typeof op.retry === "function") {
      acts.appendChild(el("button", { class: "small primary", onclick: () => { op.retry(); } }, op.retryLabel || "Opakovat"));
    }
    if (op.canDismiss) {
      acts.appendChild(el("button", { class: "small subtle", onclick: () => dismissOp(op.id), "aria-label": "Skrýt z logu" }, "✕"));
    }
    li.appendChild(acts);
    list.appendChild(li);
  }
  // Summary
  summary.innerHTML = "";
  const parts = [];
  if (nRun) parts.push(`<span class="has-run">${nRun} probíhá</span>`);
  if (nErr) parts.push(`<span class="has-fail">${nErr} chyb</span>`);
  if (nOk) parts.push(`${nOk} hotovo`);
  summary.innerHTML = parts.join(" · ") || "&nbsp;";
  // retry-all visible only if there is at least one auto-retryable error
  const autoRetryable = state.ops.some(o => o.status === "err" && typeof o.retry === "function" && !o.manualRetryOnly);
  if (retryAllBtn) retryAllBtn.hidden = !autoRetryable;
}

//=============================================================================
// CONFIRM / PROMPT DIALOGS
//=============================================================================
function confirmDialog(message, opts) {
  return new Promise(resolve => {
    const dlg = $("confirm-dialog");
    $("confirm-message").textContent = message;
    $("confirm-title").textContent = (opts && opts.title) || "Potvrzení";
    const ok = $("confirm-ok");
    const cancel = $("confirm-cancel");
    ok.textContent = (opts && opts.okLabel) || "Potvrdit";
    cancel.textContent = (opts && opts.cancelLabel) || "Zrušit";
    ok.className = "primary " + ((opts && opts.danger) ? "danger" : "");
    function close(val) {
      ok.removeEventListener("click", onOk);
      cancel.removeEventListener("click", onCancel);
      dlg.close();
      resolve(val);
    }
    function onOk() { close(true); }
    function onCancel() { close(false); }
    ok.addEventListener("click", onOk);
    cancel.addEventListener("click", onCancel);
    dlg.showModal();
    setTimeout(() => cancel.focus(), 30);
  });
}
function promptDialog(title, fields) {
  // fields: [{name, label, type, value, required, hint}, ...]
  return new Promise(resolve => {
    const dlg = $("prompt-dialog");
    $("prompt-title").textContent = title;
    const c = $("prompt-fields");
    c.innerHTML = "";
    const inputs = {};
    fields.forEach((f, idx) => {
      const fieldId = "prm-" + f.name;
      const wrap = el("div", { class: "field" });
      wrap.appendChild(el("label", { for: fieldId }, f.label + (f.required ? " *" : "")));
      let input;
      if (f.type === "textarea") input = el("textarea", { id: fieldId, rows: 3 });
      else input = el("input", { id: fieldId, type: f.type || "text" });
      if (f.value != null) input.value = f.value;
      if (f.required) input.required = true;
      if (f.readonly) input.readOnly = true;
      wrap.appendChild(input);
      if (f.hint) wrap.appendChild(el("div", { class: "hint" }, f.hint));
      c.appendChild(wrap);
      inputs[f.name] = input;
    });
    const ok = $("prompt-ok");
    const cancel = $("prompt-cancel");
    function close(val) {
      ok.removeEventListener("click", onOk);
      cancel.removeEventListener("click", onCancel);
      c.removeEventListener("keydown", onKey);
      dlg.close();
      resolve(val);
    }
    function onOk() {
      const result = {};
      for (const k in inputs) {
        const v = inputs[k].value.trim();
        const def = fields.find(f => f.name === k);
        if (def.required && !v) {
          inputs[k].focus();
          showStatus(`Vyplňte pole „${def.label}".`, "warning");
          return;
        }
        result[k] = v;
      }
      close(result);
    }
    function onCancel() { close(null); }
    function onKey(e) {
      if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") { e.preventDefault(); onOk(); }
    }
    ok.addEventListener("click", onOk);
    cancel.addEventListener("click", onCancel);
    c.addEventListener("keydown", onKey);
    dlg.showModal();
    setTimeout(() => {
      const first = Object.values(inputs)[0];
      if (first && !first.readOnly) first.focus();
    }, 30);
  });
}

//=============================================================================
// STORAGE TREE OPERATIONS
//=============================================================================
function emptyStorage(id, name, description) {
  return {
    schema: "dms-storage-v1",
    id: id || "",
    name: name || "Nové úložiště",
    description: description || "",
    modified: nowIso(),
    rootItems: [],
  };
}

// Find item by ID anywhere in tree. Returns { item, path: [parents..., item], parent }
// id = "root" means root.
function findItem(id, root) {
  root = root || state.storage;
  if (!root) return null;
  if (id === "root" || id == null) {
    return { item: { id: "root", type: T.FOLDER, name: root.name, description: root.description, items: root.rootItems }, path: [], parent: null, isRoot: true };
  }
  function walk(items, parentChain, parentNode) {
    for (const it of items) {
      if (it.id === id) {
        return { item: it, path: parentChain.concat([it]), parent: parentNode, isRoot: false };
      }
      if (it.type === T.FOLDER && it.items && it.items.length) {
        const r = walk(it.items, parentChain.concat([it]), it);
        if (r) return r;
      }
    }
    return null;
  }
  return walk(root.rootItems, [], null);
}

// Find parent folder of an item. Returns parent's items array + index.
function findParent(id, root) {
  root = root || state.storage;
  if (!root || id === "root") return null;
  function walk(items, parentNode) {
    for (let i = 0; i < items.length; i++) {
      if (items[i].id === id) return { items: items, index: i, parent: parentNode };
      if (items[i].type === T.FOLDER && items[i].items) {
        const r = walk(items[i].items, items[i]);
        if (r) return r;
      }
    }
    return null;
  }
  return walk(root.rootItems, null);
}

// Get items array for a folder ID ("root" returns rootItems)
function getFolderItems(folderId) {
  if (!state.storage) return null;
  if (folderId === "root") return state.storage.rootItems;
  const f = findItem(folderId);
  if (!f || f.item.type !== T.FOLDER) return null;
  return f.item.items;
}

// All items flattened (for search)
function flattenItems() {
  const out = [];
  if (!state.storage) return out;
  function walk(items, pathNames) {
    for (const it of items) {
      out.push({ item: it, pathNames: pathNames.slice() });
      if (it.type === T.FOLDER && it.items) walk(it.items, pathNames.concat([it.name]));
    }
  }
  walk(state.storage.rootItems, []);
  return out;
}

// Compute statistics
function computeStats() {
  let folders = 0, files = 0, links = 0, versions = 0, totalSize = 0;
  if (!state.storage) return { folders, files, links, versions, totalSize };
  function walk(items) {
    for (const it of items) {
      if (it.type === T.FOLDER) {
        folders++;
        if (it.items) walk(it.items);
      } else if (it.type === T.FILE) {
        files++;
        if (it.versions) {
          versions += it.versions.length;
          for (const v of it.versions) totalSize += v.size || 0;
        }
      } else if (it.type === T.LINK) {
        links++;
      }
    }
  }
  walk(state.storage.rootItems);
  return { folders, files, links, versions, totalSize };
}

function isFileIdUnique(fileId, excludeItemId) {
  if (!state.storage) return true;
  let unique = true;
  function walk(items) {
    for (const it of items) {
      if (!unique) return;
      if (it.type === T.FILE && it.id === fileId && it.id !== excludeItemId) { unique = false; return; }
      if (it.type === T.FOLDER && it.items) walk(it.items);
    }
  }
  walk(state.storage.rootItems);
  return unique;
}

function markModified() {
  if (state.storage) state.storage.modified = nowIso();
  state.unsaved = true;
  $("unsaved-indicator").hidden = false;
}
function markSaved() {
  state.unsaved = false;
  $("unsaved-indicator").hidden = true;
}

//=============================================================================
// GITHUB API
//=============================================================================
// repoPath format: "owner/repo/optional/path/to/folder"
// returns { owner, repo, dir }
function parseRepoPath(p) {
  if (!p) return null;
  const parts = p.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean);
  if (parts.length < 2) return null;
  return {
    owner: parts[0],
    repo: parts[1],
    dir: parts.slice(2).join("/"), // may be ""
  };
}

function ghHeaders(extra) {
  const h = { "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28" };
  if (state.config.apiKey) h["Authorization"] = "Bearer " + state.config.apiKey;
  if (extra) Object.assign(h, extra);
  return h;
}

async function ghFetch(url, opts) {
  opts = opts || {};
  opts.headers = ghHeaders(opts.headers || {});
  const r = await fetch(url, opts);
  if (!r.ok) {
    const text = await r.text().catch(() => "");
    let msg = `HTTP ${r.status}`;
    try { const j = JSON.parse(text); if (j.message) msg += ": " + j.message; } catch {}
    if (text && !msg.includes(":")) msg += ": " + text.slice(0, 200);
    throw new Error(msg);
  }
  // 204 no content
  if (r.status === 204) return null;
  return await r.json();
}

// Get the current head commit and tree SHAs
async function ghGetHead() {
  const rp = parseRepoPath(state.config.repoPath);
  if (!rp) throw new Error("Není nastavena cesta k úložišti.");
  const branch = state.config.branch || COMMIT_BRANCH_DEFAULT;
  const ref = await ghFetch(`https://api.github.com/repos/${rp.owner}/${rp.repo}/git/refs/heads/${encodeURIComponent(branch)}`);
  return { commitSha: ref.object.sha, owner: rp.owner, repo: rp.repo, dir: rp.dir, branch };
}

// Read file contents from GitHub. Returns { contentBase64, sha, size }
async function ghReadFile(filename) {
  const rp = parseRepoPath(state.config.repoPath);
  if (!rp) throw new Error("Není nastavena cesta k úložišti.");
  const branch = state.config.branch || COMMIT_BRANCH_DEFAULT;
  const path = (rp.dir ? rp.dir + "/" : "") + filename;
  // Use contents API; if file > 1MB, content field is empty -> use blob API
  const url = `https://api.github.com/repos/${rp.owner}/${rp.repo}/contents/${encodeURI(path)}?ref=${encodeURIComponent(branch)}`;
  const res = await ghFetch(url);
  if (res.content && res.content.length > 0) {
    return { contentBase64: res.content.replace(/\n/g, ""), sha: res.sha, size: res.size };
  }
  // Large file: use blob API
  const blobUrl = `https://api.github.com/repos/${rp.owner}/${rp.repo}/git/blobs/${res.sha}`;
  const blob = await ghFetch(blobUrl);
  return { contentBase64: (blob.content || "").replace(/\n/g, ""), sha: res.sha, size: res.size };
}

// Read JSON file
async function ghReadJson(filename) {
  const r = await ghReadFile(filename);
  const text = new TextDecoder().decode(base64ToBlobBytes(r.contentBase64));
  return { data: JSON.parse(text), sha: r.sha };
}
function base64ToBlobBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

// Check if file exists (returns sha or null)
async function ghFileSha(filename) {
  const rp = parseRepoPath(state.config.repoPath);
  if (!rp) throw new Error("Není nastavena cesta k úložišti.");
  const branch = state.config.branch || COMMIT_BRANCH_DEFAULT;
  const path = (rp.dir ? rp.dir + "/" : "") + filename;
  try {
    const res = await ghFetch(`https://api.github.com/repos/${rp.owner}/${rp.repo}/contents/${encodeURI(path)}?ref=${encodeURIComponent(branch)}`);
    return res.sha;
  } catch (e) {
    if (/404/.test(e.message)) return null;
    throw e;
  }
}

// Commit one or more file changes via Git Data API.
// changes: array of { path, contentBase64?, delete? }  (path is relative to repo root, full path)
// Returns the new commit SHA. Also returns map of path -> blob SHA for created/updated blobs.
async function ghCommitChanges(changes, message) {
  if (!state.config.apiKey) throw new Error("Pro zápis je nutný API klíč.");
  const head = await ghGetHead();
  const treeEntries = [];
  const pathToSha = {};
  // 1) Create blobs for additions/updates
  for (const ch of changes) {
    if (ch.delete) {
      treeEntries.push({ path: ch.path, mode: "100644", type: "blob", sha: null });
    } else {
      const blob = await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/blobs`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: ch.contentBase64, encoding: "base64" }),
      });
      treeEntries.push({ path: ch.path, mode: "100644", type: "blob", sha: blob.sha });
      pathToSha[ch.path] = blob.sha;
    }
  }
  // 2) Get current tree (need base_tree for atomic updates)
  const headCommit = await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/commits/${head.commitSha}`);
  // 3) Create new tree
  const newTree = await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/trees`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ base_tree: headCommit.tree.sha, tree: treeEntries }),
  });
  // 4) Create new commit
  const newCommit = await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/commits`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: message || "DMS update", tree: newTree.sha, parents: [head.commitSha] }),
  });
  // 5) Update ref
  await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/refs/heads/${encodeURIComponent(head.branch)}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sha: newCommit.sha, force: false }),
  });
  return { commitSha: newCommit.sha, pathToSha };
}

function fullRepoPath(filename) {
  const rp = parseRepoPath(state.config.repoPath);
  if (!rp) throw new Error("Není nastavena cesta k úložišti.");
  return (rp.dir ? rp.dir + "/" : "") + filename;
}

//=============================================================================
// HIGH-LEVEL ACTIONS
//=============================================================================
// Serializace state.storage pro push na github.
// Vyhazuje:
//   - verze, které ještě nebyly uploadovány (`pendingUpload: true`)
//     — nemá smysl referencovat v JSONu blob, který na githubu zatím není
//   - flag `pendingUpload` z jakékoliv verze (defenzivně, kdyby zbyl po loadu z dříve poškozeného JSONu)
// `pendingUpload` je čistě runtime UI marker, nesmí přežít serializaci.
function serializeStorage(storage) {
  return JSON.stringify(storage, (key, value) => {
    if (key === "versions" && Array.isArray(value)) {
      return value.filter(v => !v.pendingUpload);
    }
    if (key === "pendingUpload") return undefined;
    return value;
  }, 2);
}

// Defenzivní cleanup po načtení z githubu — v paměti odstraní zbytky
// `pendingUpload` flagu z verzí, které ve skutečnosti existují na githubu
// (atomický commit blob+JSON zaručuje, že verze v JSONu má i blob).
function stripPendingUploadMarkersFromLoadedStorage(storage) {
  if (!storage) return;
  let stripped = 0;
  function walk(items) {
    for (const it of items || []) {
      if (it.type === T.FILE && Array.isArray(it.versions)) {
        for (const v of it.versions) {
          if (v.pendingUpload) { delete v.pendingUpload; stripped++; }
        }
      } else if (it.type === T.FOLDER && it.items) {
        walk(it.items);
      }
    }
  }
  walk(storage.rootItems || []);
  if (stripped > 0) {
    debug("Cleanup: smazáno " + stripped + " zbytečných pendingUpload flagů z načteného JSONu.", "ok");
  }
}

async function pushStorageJson(message) {
  if (!state.storage) return;
  const json = serializeStorage(state.storage);
  const b64 = arrayBufferToBase64(new TextEncoder().encode(json).buffer);
  await ghCommitChanges([{ path: fullRepoPath(STORAGE_FILENAME), contentBase64: b64 }], message || "DMS: update storage.json");
  markSaved();
}

async function pushFileVersionAndJson(versionPath, versionBase64, commitMsg) {
  const json = serializeStorage(state.storage);
  const jsonB64 = arrayBufferToBase64(new TextEncoder().encode(json).buffer);
  const result = await ghCommitChanges([
    { path: versionPath, contentBase64: versionBase64 },
    { path: fullRepoPath(STORAGE_FILENAME), contentBase64: jsonB64 },
  ], commitMsg || "DMS: new version");
  markSaved();
  return result;
}

async function pushDeleteAndJson(pathsToDelete, commitMsg) {
  const json = serializeStorage(state.storage);
  const jsonB64 = arrayBufferToBase64(new TextEncoder().encode(json).buffer);
  const changes = pathsToDelete.map(p => ({ path: p, delete: true }));
  changes.push({ path: fullRepoPath(STORAGE_FILENAME), contentBase64: jsonB64 });
  const result = await ghCommitChanges(changes, commitMsg || "DMS: delete");
  markSaved();
  return result;
}

async function loadStorageFromGithub() {
  const repoLabel = state.config.repoPath || "(bez cesty)";
  const handle = beginOp("Načítám storage.json z " + repoLabel, "load");
  state.loading = true;
  render();
  try {
    const r = await ghReadJson(STORAGE_FILENAME);
    state.storage = r.data;
    if (!state.storage.rootItems) state.storage.rootItems = [];
    // Defenzivní cleanup — pokud staré buggy verze aplikace pushly JSON s `pendingUpload: true`,
    // odstraníme to teď. Atomický commit blob+JSON zaručuje, že verze v loadnutém JSONu má i blob na githubu.
    stripPendingUploadMarkersFromLoadedStorage(state.storage);
    rememberStorageInfo(state.storage.id, state.storage.name);
    const st = computeStats();
    handle.succeed(`Načteno: ${st.folders} složek, ${st.files} souborů, ${st.versions} verzí (${fmtSize(st.totalSize)})`);
    showStatus("Úložiště načteno.", "success");
    markSaved();
    return true;
  } catch (e) {
    if (/404/.test(e.message)) {
      // Soubor (nebo složka) neexistuje. Tohle není „chyba", ale výzva k vytvoření.
      handle.fail(
        new Error("storage.json v této cestě zatím není. Lze založit nové úložiště — složka se v repu vytvoří automaticky při prvním uložení."),
        () => createNewStorage()
      );
      // Přepiš text retry tlačítka v op-logu a vyloč z hromadného retry
      handle.op.retryLabel = "Vytvořit nové úložiště";
      handle.op.manualRetryOnly = true;
      renderOpLog();
      showStatus("Cesta zatím neobsahuje storage.json — můžete v nastavení založit nové úložiště.", "warning", 8000);
      return false;
    }
    handle.fail(e, () => loadStorageFromGithub());
    showStatus("Chyba načtení: " + e.message, "error", 8000);
    return false;
  } finally {
    state.loading = false;
  }
}


//=============================================================================
// MARKDOWN PARSER WITH CRITICMARKUP SUPPORT
//=============================================================================
// Lightweight Markdown -> HTML. Not full CommonMark, but covers common cases:
// headings, bold/italic, links, images, code (block & inline), lists, quotes,
// tables (simple), hr, paragraphs. Plus CriticMarkup.
function renderMarkdown(src) {
  src = String(src || "").replace(/\r\n/g, "\n");

  // 1) Process CriticMarkup first (works across multi-line for some cases, but we keep it simple/inline)
  src = processCritic(src);

  // 2) Extract code blocks (fenced ```), replace with placeholders so we don't process inside them
  const codeBlocks = [];
  src = src.replace(/```([a-zA-Z0-9_+\-]*)\n([\s\S]*?)```/g, (m, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang, code });
    return `\u0000CB${idx}\u0000`;
  });

  // 3) Parse line by line into blocks
  const lines = src.split("\n");
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    // Code block placeholder
    const cb = /^\u0000CB(\d+)\u0000$/.exec(line);
    if (cb) {
      const b = codeBlocks[+cb[1]];
      out.push(`<pre><code class="language-${escapeHtml(b.lang)}">${escapeHtml(b.code)}</code></pre>`);
      i++; continue;
    }
    // Heading
    const h = /^(#{1,6})\s+(.+?)\s*#*\s*$/.exec(line);
    if (h) {
      const level = h[1].length;
      out.push(`<h${level}>${parseInline(h[2])}</h${level}>`);
      i++; continue;
    }
    // Horizontal rule
    if (/^\s*([-*_])\s*\1\s*\1[-*_\s]*$/.test(line)) {
      out.push("<hr />"); i++; continue;
    }
    // Blockquote
    if (/^>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        buf.push(lines[i].replace(/^>\s?/, ""));
        i++;
      }
      out.push(`<blockquote>${renderMarkdownInner(buf.join("\n"))}</blockquote>`);
      continue;
    }
    // Table (simple): header | header \n --- | --- \n row | row
    if (/\|/.test(line) && i + 1 < lines.length && /^[\s|:\-]+$/.test(lines[i+1]) && /-/.test(lines[i+1])) {
      const headerCells = parseTableRow(line);
      i += 2;
      const rows = [];
      while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim() !== "") {
        rows.push(parseTableRow(lines[i]));
        i++;
      }
      let html = "<table><thead><tr>";
      for (const c of headerCells) html += `<th>${parseInline(c)}</th>`;
      html += "</tr></thead><tbody>";
      for (const r of rows) {
        html += "<tr>";
        for (const c of r) html += `<td>${parseInline(c)}</td>`;
        html += "</tr>";
      }
      html += "</tbody></table>";
      out.push(html);
      continue;
    }
    // Lists (unordered or ordered)
    if (/^\s*([-*+]|\d+\.)\s+/.test(line)) {
      const isOrdered = /^\s*\d+\.\s+/.test(line);
      const buf = [];
      while (i < lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || /^\s+\S/.test(lines[i]) || lines[i].trim() === "")) {
        if (lines[i].trim() === "" && (i + 1 >= lines.length || !/^\s+\S/.test(lines[i+1]) && !/^\s*([-*+]|\d+\.)\s+/.test(lines[i+1]))) break;
        buf.push(lines[i]);
        i++;
      }
      out.push(renderList(buf, isOrdered));
      continue;
    }
    // Empty line
    if (line.trim() === "") { i++; continue; }
    // Paragraph (collect consecutive non-empty lines)
    const pBuf = [line];
    i++;
    while (i < lines.length && lines[i].trim() !== "" && !/^(#{1,6}\s|>\s|\u0000CB|\s*([-*+]|\d+\.)\s|\s*([-*_])\s*\3)/.test(lines[i])) {
      pBuf.push(lines[i]); i++;
    }
    out.push(`<p>${parseInline(pBuf.join(" "))}</p>`);
  }
  return out.join("\n");
}

function renderMarkdownInner(s) {
  // Inner block (e.g. inside blockquote) - just call full renderer
  return renderMarkdown(s);
}

function parseTableRow(line) {
  let s = line.trim();
  if (s.startsWith("|")) s = s.slice(1);
  if (s.endsWith("|")) s = s.slice(0, -1);
  return s.split("|").map(c => c.trim());
}

function renderList(lines, isOrdered) {
  const tag = isOrdered ? "ol" : "ul";
  const items = [];
  let curr = null;
  for (const l of lines) {
    const m = /^(\s*)([-*+]|\d+\.)\s+(.*)$/.exec(l);
    if (m && m[1].length === 0) {
      if (curr) items.push(curr);
      curr = m[3];
    } else if (m) {
      // nested - just append for simplicity
      curr += "\n" + l;
    } else if (curr != null) {
      curr += " " + l.trim();
    }
  }
  if (curr) items.push(curr);
  let html = `<${tag}>`;
  for (const it of items) html += `<li>${parseInline(it)}</li>`;
  html += `</${tag}>`;
  return html;
}

function parseInline(s) {
  s = String(s);
  // Escape special HTML first, but preserve our placeholders for critic markup which we already processed
  // Critic markup output already has HTML tags - we need to not escape those.
  // Strategy: replace our critic HTML with placeholders, escape, then restore.
  const placeholders = [];
  s = s.replace(/<(\/?)(ins|del|mark|span)([^>]*)>/g, (m) => {
    placeholders.push(m);
    return `\u0001${placeholders.length - 1}\u0001`;
  });
  // Code spans: protect them
  const codeSpans = [];
  s = s.replace(/`([^`\n]+)`/g, (m, c) => {
    codeSpans.push(escapeHtml(c));
    return `\u0002${codeSpans.length - 1}\u0002`;
  });
  // Image: ![alt](src)
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (m, alt, src) => `<img alt="${escapeHtml(alt)}" src="${escapeHtml(src)}" />`);
  // Link: [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, t, u) => `<a href="${escapeHtml(u)}" target="_blank" rel="noopener noreferrer">${escapeHtml(t)}</a>`);
  // Bold: **text** or __text__
  s = s.replace(/\*\*([^*\n]+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/__([^_\n]+?)__/g, "<strong>$1</strong>");
  // Italic: *text* or _text_
  s = s.replace(/(^|[\s(>])\*([^*\n]+?)\*(?=[\s).,;:!?]|$)/g, "$1<em>$2</em>");
  s = s.replace(/(^|[\s(>])_([^_\n]+?)_(?=[\s).,;:!?]|$)/g, "$1<em>$2</em>");
  // Line breaks (two spaces at end of line)
  s = s.replace(/  \n/g, "<br/>");
  // Restore placeholders
  s = s.replace(/\u0001(\d+)\u0001/g, (m, idx) => placeholders[+idx]);
  s = s.replace(/\u0002(\d+)\u0002/g, (m, idx) => `<code>${codeSpans[+idx]}</code>`);
  return s;
}

function processCritic(src) {
  // {++addition++}
  src = src.replace(/\{\+\+([\s\S]+?)\+\+\}/g, (m, c) => `<ins class="crit-ins">${c}</ins>`);
  // {--deletion--}
  src = src.replace(/\{--([\s\S]+?)--\}/g, (m, c) => `<del class="crit-del">${c}</del>`);
  // {~~old~>new~~}
  src = src.replace(/\{~~([\s\S]+?)~>([\s\S]+?)~~\}/g, (m, oldT, newT) => `<del class="crit-del">${oldT}</del><ins class="crit-ins">${newT}</ins>`);
  // {==highlight==}{>>comment<<}  (highlight followed by comment is one combined unit)
  // Process the comment-attached pattern first, then standalone marks/comments.
  src = src.replace(/\{==([\s\S]+?)==\}\{>>([\s\S]+?)<<\}/g, (m, h, c) => `<mark class="crit-mark">${h}</mark><span class="crit-comment" title="${escapeHtml(c).replace(/"/g,'&quot;')}">${c}</span>`);
  // {==highlight==}
  src = src.replace(/\{==([\s\S]+?)==\}/g, (m, c) => `<mark class="crit-mark">${c}</mark>`);
  // {>>comment<<}
  src = src.replace(/\{>>([\s\S]+?)<<\}/g, (m, c) => `<span class="crit-comment">${c}</span>`);
  return src;
}

//=============================================================================
// URL HANDLING
//=============================================================================
function encodeDetailParam(repoPath, itemId) {
  return b64urlEncode((repoPath || "") + "|" + (itemId || "root"));
}
function decodeDetailParam(s) {
  try {
    const txt = b64urlDecode(s);
    const idx = txt.lastIndexOf("|");
    if (idx < 0) return null;
    return { repoPath: txt.slice(0, idx), itemId: txt.slice(idx + 1) };
  } catch { return null; }
}
function updateUrl() {
  const param = encodeDetailParam(state.config.repoPath, state.currentDetailId);
  let url = window.location.pathname + "?detail=" + param;
  if (state.viewingVersionId) {
    url += "&v=" + encodeURIComponent(state.viewingVersionId);
  }
  url += window.location.hash;
  window.history.replaceState({}, "", url);
}
function readUrlOnLoad() {
  const params = new URLSearchParams(window.location.search);
  const d = params.get("detail");
  const v = params.get("v");
  let result = null;
  if (d) {
    const dec = decodeDetailParam(d);
    if (dec) {
      if (dec.repoPath) {
        // Always honor URL-specified repo path; override config for this session
        // (but DON'T saveConfig — the user might be intentionally browsing a different repo via shared link)
        state.config.repoPath = dec.repoPath;
      }
      state.currentDetailId = dec.itemId || "root";
      result = { repoPath: dec.repoPath, itemId: dec.itemId };
    }
  }
  if (v) {
    state.viewingVersionId = v;
    if (result) result.versionId = v;
  }
  return result;
}

//=============================================================================
// NAVIGATION
//=============================================================================
function navigateTo(itemId) {
  // Cancel any in-flight focus moves; then change current and render
  state.currentDetailId = itemId || "root";
  state.viewingVersionId = null; // navigating to an item resets any version view
  state.filterQuery = "";        // a taky filter ve složce — neexportujeme ho mezi view
  // Reset scroll
  try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch { window.scrollTo(0, 0); }
  updateUrl();
  render();
  // Move focus to main heading for screen readers
  setTimeout(() => {
    const m = $("main");
    if (m) m.focus();
  }, 30);
}

function navigateToVersion(file, version) {
  // Switch to viewing-this-version mode for the same file
  state.currentDetailId = file.id;
  state.viewingVersionId = version.filename;
  try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch { window.scrollTo(0, 0); }
  updateUrl();
  render();
  setTimeout(() => {
    const m = $("main");
    if (m) m.focus();
  }, 30);
}

function clearVersionView() {
  state.viewingVersionId = null;
  updateUrl();
  render();
  setTimeout(() => {
    const m = $("main");
    if (m) m.focus();
  }, 30);
}

//=============================================================================
// RENDERING
//=============================================================================
function render() {
  renderHeader();
  renderBreadcrumb();
  renderView();
  renderEditPanel();
  // Edit-mode label color
  $("edit-mode-label").classList.toggle("edit-mode-active", state.editMode);
}

function renderHeader() {
  const s = state.storage;
  // Storage name jako malý popisek nahoře
  $("storage-name").textContent = s ? (s.name || "Úložiště") : "DMS úložiště";
  const desc = s ? (s.description || "") : "";
  $("storage-desc").textContent = desc;
  $("storage-desc").style.display = desc ? "" : "none";

  // H1 = aktuální položka (nebo název úložiště pro root). Vždy s emoji.
  const h1 = $("page-heading");
  h1.innerHTML = "";
  if (!s) {
    h1.appendChild(document.createTextNode("DMS úložiště"));
  } else if (state.currentDetailId === "root" || !state.currentDetailId) {
    h1.appendChild(el("span", { class: "heading-icon" }, T_ICON[T.FOLDER]));
    h1.appendChild(document.createTextNode(s.name || "Úložiště"));
  } else {
    const found = findItem(state.currentDetailId);
    if (found && found.item) {
      h1.appendChild(el("span", { class: "heading-icon" }, iconFor(found.item)));
      h1.appendChild(document.createTextNode(found.item.name || "(bez názvu)"));
    } else {
      h1.appendChild(el("span", { class: "heading-icon" }, T_ICON[T.FOLDER]));
      h1.appendChild(document.createTextNode(s.name || "Úložiště"));
    }
  }

  // Aktualizace document.title — formát: „<název položky> · <název úložiště> – DMS"
  let title = "DMS úložiště";
  if (s) {
    const storageName = s.name || s.id || "Úložiště";
    if (state.currentDetailId && state.currentDetailId !== "root") {
      const found = findItem(state.currentDetailId);
      const itemName = (found && found.item && found.item.name) ? found.item.name : "";
      title = (itemName ? itemName + " · " : "") + storageName + " – DMS";
    } else {
      title = storageName + " – DMS";
    }
  }
  if (document.title !== title) document.title = title;
}

function renderBreadcrumb() {
  const ol = $("breadcrumb");
  ol.innerHTML = "";
  if (!state.storage) {
    ol.appendChild(el("li", null, el("span", { "aria-current": "page" }, "Žádné úložiště")));
    return;
  }
  // Path: root → ... → current
  const found = findItem(state.currentDetailId);
  if (!found) { state.currentDetailId = "root"; return renderBreadcrumb(); }
  const isRoot = state.currentDetailId === "root";
  // Root crumb (úložiště reprezentováno jako složka)
  const liRoot = el("li");
  const rootLabel = state.storage.name || "Úložiště";
  if (isRoot) {
    liRoot.appendChild(el("span", { "aria-current": "page" },
      el("span", { class: "crumb-icon" }, T_ICON[T.FOLDER]),
      " ",
      rootLabel,
    ));
  } else {
    liRoot.appendChild(el("a", { href: "#", onclick: (e) => { e.preventDefault(); navigateTo("root"); } },
      el("span", { class: "crumb-icon" }, T_ICON[T.FOLDER]),
      " ",
      rootLabel,
    ));
  }
  ol.appendChild(liRoot);
  // Mezilehlé položky + aktuální položka — každá s vlastní ikonou
  for (let i = 0; i < found.path.length; i++) {
    const it = found.path[i];
    const isLast = (i === found.path.length - 1);
    const li = el("li");
    if (isLast) {
      li.appendChild(el("span", { "aria-current": "page" },
        el("span", { class: "crumb-icon" }, iconFor(it)),
        " ",
        it.name,
      ));
    } else {
      li.appendChild(el("a", { href: "#", onclick: (e) => { e.preventDefault(); navigateTo(it.id); } },
        el("span", { class: "crumb-icon" }, iconFor(it)),
        " ",
        it.name,
      ));
    }
    ol.appendChild(li);
  }
}

function renderView() {
  const view = $("view");
  view.innerHTML = "";

  if (!state.storage) {
    renderEmptyApp(view);
    return;
  }
  const found = findItem(state.currentDetailId);
  if (!found) {
    state.currentDetailId = "root";
    return renderView();
  }
  if (found.item.type === T.FOLDER) renderFolderView(view, found);
  else if (found.item.type === T.FILE) renderFileView(view, found);
  else if (found.item.type === T.LINK) renderLinkView(view, found);
}

function renderEmptyApp(view) {
  const wrap = el("div", { class: "empty-state" },
    el("p", null, "Žádné úložiště není načteno."),
    el("p", null, "Otevřete režim úprav a v Nastavení zadejte cestu ke github složce, případně vytvořte nové úložiště."),
  );
  view.appendChild(wrap);
}

// ---------- FOLDER VIEW ----------
function renderFolderView(view, found) {
  const folder = found.item;
  const isRoot = state.currentDetailId === "root";
  // Title section — H1 už je v hlavičce stránky, takže zde jen popis (pokud existuje).
  if (!isRoot && folder.description) {
    const sect = el("section", { class: "detail-section", "aria-label": "Popis složky" });
    sect.appendChild(el("p", { class: "desc" }, folder.description));
    view.appendChild(sect);
  }

  // Toolbar with search
  const toolbar = el("div", { class: "toolbar" });
  const searchBox = el("div", { class: "search-box" });
  const searchInput = el("input", {
    type: "search", placeholder: "Hledat ve složce...", "aria-label": "Hledat",
    value: state.filterQuery || "",
    oninput: (e) => filterItems(e.target.value),
    id: "folder-search",
  });
  searchBox.appendChild(searchInput);
  toolbar.appendChild(searchBox);
  toolbar.appendChild(el("div", { class: "spacer" }));
  // Sort dropdown — hodnota odráží state.sortMode
  const sortSel = el("select", { "aria-label": "Řazení", onchange: (e) => sortAndRender(e.target.value) },
    el("option", { value: "name" }, "A–Z"),
    el("option", { value: "name-desc" }, "Z–A"),
    el("option", { value: "modified-desc" }, "Naposledy upraveno"),
    el("option", { value: "type" }, "Podle typu"),
  );
  sortSel.value = state.sortMode || "name";
  toolbar.appendChild(sortSel);
  if (state.editMode) {
    toolbar.appendChild(el("button", { class: "primary small", onclick: () => createFolder(folder), title: "Přidat složku (klávesa F)", "aria-label": "Přidat složku" }, "+ " + T_ICON[T.FOLDER]));
    toolbar.appendChild(el("button", { class: "primary small", onclick: () => createLink(folder), title: "Přidat odkaz (klávesa L)", "aria-label": "Přidat odkaz" }, "+ " + T_ICON[T.LINK]));
    toolbar.appendChild(el("button", { class: "primary small", onclick: () => createFile(folder), title: "Přidat soubor (klávesa N)", "aria-label": "Přidat soubor" }, "+ " + T_ICON[T.FILE]));
  }
  view.appendChild(toolbar);

  // List — applySort honoruje state.sortMode
  const rawItems = isRoot ? state.storage.rootItems : (folder.items || []);
  const items = applySort(rawItems);
  if (!items.length) {
    view.appendChild(el("div", { class: "empty-state" }, "Tato složka je prázdná."));
    return;
  }
  const list = el("ul", { class: "item-list", id: "items-list" });
  view.appendChild(list);
  renderItemList(list, items);
  // Pokud je v state filterQuery, aplikuj ho i hned po renderu (skryje nematching položky)
  if (state.filterQuery) filterItems(state.filterQuery);

  // Edit-mode actions for the folder itself (rename/edit description)
  if (state.editMode && !isRoot) {
    const editBox = el("section", { class: "edit-panel" });
    editBox.appendChild(el("h3", null, "Vlastnosti " + T_ICON[T.FOLDER]));
    editBox.appendChild(el("button", { class: "small", onclick: () => editFolderProps(folder), title: "Přejmenovat / popis (klávesa E)" }, "Přejmenovat / popis"));
    editBox.appendChild(document.createTextNode(" "));
    if (found.path.length > 0) {
      editBox.appendChild(el("button", { class: "small", onclick: () => moveItem(folder.id) }, "Přesunout"));
      editBox.appendChild(document.createTextNode(" "));
    }
    editBox.appendChild(el("button", { class: "small danger", onclick: () => deleteItem(folder.id), "aria-label": "Smazat složku" }, "Smazat " + T_ICON[T.FOLDER]));
    view.appendChild(editBox);
  }
}

function renderItemList(list, items) {
  list.innerHTML = "";
  for (const it of items) {
    list.appendChild(renderItemRow(it));
  }
}
function renderItemRow(it) {
  const li = el("li", { class: "item", dataset: { type: it.type, name: (it.name || "").toLowerCase() } });
  const body = el("div", { class: "item-body" });
  const titleEl = el("h3", { class: "item-title" });
  const linkEl = el("a", { href: "#", class: "item-link", onclick: (e) => { e.preventDefault(); navigateTo(it.id); } },
    el("span", { class: "item-icon" }, iconFor(it)),
    " ",
    el("span", { class: "item-name" }, it.name || "(bez názvu)"),
  );
  titleEl.appendChild(linkEl);
  body.appendChild(titleEl);

  // Meta line
  let metaParts = [];
  if (it.type === T.FOLDER) {
    const ic = (it.items || []).length;
    metaParts.push(`${ic} ${ic === 1 ? "položka" : ic >= 2 && ic <= 4 ? "položky" : "položek"}`);
    // Datum úpravy se počítá rekurzivně z nejnovější změny obsahu (souborů, verzí, odkazů, podsložek).
    const last = lastTimeOf(it);
    if (last) metaParts.push("upraveno: " + fmtDate(last));
  } else if (it.type === T.FILE) {
    const verCount = (it.versions || []).length;
    metaParts.push(`${verCount} ${verCount === 1 ? "verze" : verCount >= 2 && verCount <= 4 ? "verze" : "verzí"}`);
    const lastV = it.versions && it.versions[it.versions.length - 1];
    if (lastV) {
      metaParts.push("poslední: " + fmtDate(lastV.timestamp));
      metaParts.push(fmtSize(lastV.size));
    }
  } else if (it.type === T.LINK) {
    if (it.url) {
      const m = el("span");
      m.textContent = "URL: ";
      const a = el("a", { href: it.url, target: "_blank", rel: "noopener noreferrer" }, it.url.length > 60 ? it.url.slice(0, 57) + "..." : it.url);
      m.appendChild(a);
      body.appendChild(el("div", { class: "item-meta" }, m));
    }
    if (it.modified) metaParts.push("aktualizováno: " + fmtDate(it.modified));
  }
  if (metaParts.length) body.appendChild(el("div", { class: "item-meta" }, metaParts.join(" · ")));
  if (it.description) body.appendChild(el("div", { class: "item-desc" }, it.description));
  li.appendChild(body);

  // Actions in edit mode
  if (state.editMode) {
    const acts = el("div", { class: "item-actions" });
    acts.appendChild(el("button", { class: "small", title: "Upravit", "aria-label": "Upravit " + it.name, onclick: () => editItemProps(it) }, "Upravit"));
    acts.appendChild(el("button", { class: "small", title: "Přesunout", "aria-label": "Přesunout " + it.name, onclick: () => moveItem(it.id) }, "Přesunout"));
    acts.appendChild(el("button", { class: "small danger", title: "Smazat", "aria-label": "Smazat " + it.name, onclick: () => deleteItem(it.id) }, "Smazat"));
    li.appendChild(acts);
  }
  return li;
}

function filterItems(query) {
  // Uloží do state a překreslí celý folder view (ne jen DOM seznamu, aby se to nesneslo s render()em).
  state.filterQuery = query || "";
  // Lazy update jen samotného seznamu (rychlejší než render(), zachová focus v inputu)
  const list = $("items-list");
  if (!list) return;
  const q = state.filterQuery.toLowerCase().trim();
  for (const li of list.children) {
    const name = (li.dataset.name || "").toLowerCase();
    const match = !q || name.includes(q);
    li.style.display = match ? "" : "none";
  }
}
function sortAndRender(mode) {
  // Uloží zvolený režim a překreslí, aby zůstal i po dalších rerenderech.
  state.sortMode = mode || "name";
  render();
}
// Vrátí ISO timestamp poslední úpravy obsahu položky.
// Pro složku se hledá rekurzivně přes všechny potomky (soubory, odkazy, podsložky).
// Pro soubor se bere maximum z modified/created a všech timestampů verzí.
// Pro odkaz se bere modified/created.
function lastTimeOf(it) {
  if (!it) return "";
  let latest = it.modified || it.created || "";
  if (it.type === T.FILE) {
    for (const v of (it.versions || [])) {
      if (v && v.timestamp && v.timestamp > latest) latest = v.timestamp;
    }
  } else if (it.type === T.FOLDER) {
    for (const sub of (it.items || [])) {
      const t = lastTimeOf(sub);
      if (t && t > latest) latest = t;
    }
  }
  return latest;
}
// Aplikuje aktuální sortMode na zadané pole a vrátí novou setříděnou kopii.
// Složky jsou VŽDY nahoře, bez ohledu na zvolený režim řazení.
// Zvolený režim se uplatní pouze v rámci každé skupiny (složky zvlášť, ne-složky zvlášť).
function applySort(items) {
  const mode = state.sortMode || "name";
  const out = items.slice();
  out.sort((a, b) => {
    // Hlavní třídění: složky před vším ostatním
    const aIsFolder = a.type === T.FOLDER;
    const bIsFolder = b.type === T.FOLDER;
    if (aIsFolder !== bIsFolder) return aIsFolder ? -1 : 1;
    // V rámci stejné skupiny použij zvolený režim
    if (mode === "name") return (a.name || "").localeCompare(b.name || "", "cs");
    if (mode === "name-desc") return (b.name || "").localeCompare(a.name || "", "cs");
    if (mode === "modified-desc") {
      const at = lastTimeOf(a), bt = lastTimeOf(b);
      return (bt || "").localeCompare(at || "");
    }
    if (mode === "type") {
      // V rámci ne-složek: nejdřív soubory, pak odkazy; v rámci typu A–Z
      const order = { folder: 0, file: 1, link: 2 };
      const d = (order[a.type] - order[b.type]);
      if (d !== 0) return d;
      return (a.name || "").localeCompare(b.name || "", "cs");
    }
    return 0;
  });
  return out;
}


// ---------- FILE VIEW ----------
function renderFileView(view, found) {
  const file = found.item;
  // ---- VERSION-VIEWING MODE ----
  // If state.viewingVersionId is set and matches a version on this file, render that version's MD inline
  // (full re-render of the page, NOT a modal).
  let activeVersion = null;
  if (state.viewingVersionId && file.versions) {
    activeVersion = file.versions.find(v => v.filename === state.viewingVersionId) || null;
    if (!activeVersion) {
      // Version no longer exists (e.g. deleted) — silently fall back to standard view
      state.viewingVersionId = null;
      updateUrl();
    }
  }

  // 1) File header (always)
  view.appendChild(renderFileHeaderSection(found));

  // 2) ID badge (always)
  view.appendChild(el("section", { class: "detail-section", "aria-label": "Identifikátor souboru" },
    el("p", null,
      el("span", null, "ID souboru: "),
      el("span", { class: "fileid-badge" }, file.id),
    ),
  ));

  if (activeVersion) {
    // ---- VERSION DETAIL VIEW ----
    // 3) Version info banner (above MD)
    const banner = el("section", { class: "viewing-version-banner", "aria-label": "Zobrazená verze" });
    banner.appendChild(el("strong", null, "Zobrazená verze: " + fmtDate(activeVersion.timestamp)));
    if (activeVersion.description) {
      banner.appendChild(el("div", { style: { marginTop: "4px" } }, activeVersion.description));
    }
    const metaParts = [fmtSize(activeVersion.size)];
    if (activeVersion.device) metaParts.push("zařízení: " + activeVersion.device);
    banner.appendChild(el("span", { class: "version-meta-line" }, metaParts.join(" · ") + " · " + activeVersion.filename));
    const actionRow = el("div", { style: { marginTop: "8px", display: "flex", gap: "16px", flexWrap: "wrap" } });
    actionRow.appendChild(el("a", {
      href: "#",
      onclick: (e) => { e.preventDefault(); clearVersionView(); },
    }, "← Zpět na detail souboru"));
    actionRow.appendChild(el("a", {
      href: "#",
      onclick: (e) => { e.preventDefault(); downloadVersion(activeVersion); },
      "aria-label": "Stáhnout " + activeVersion.filename,
    }, "Stáhnout " + activeVersion.filename));
    banner.appendChild(actionRow);
    view.appendChild(banner);

    // 4) Markdown content (or fallback for non-md)
    if (isMarkdownFilename(activeVersion.filename)) {
      const mdSect = el("section", { class: "detail-section", "aria-label": "Obsah verze" });
      const mdContainer = el("div", { class: "markdown-body", id: "md-render", "aria-live": "polite" }, "Načítám…");
      mdSect.appendChild(mdContainer);
      view.appendChild(mdSect);
      loadAndRenderMarkdown(activeVersion, mdContainer);
    } else {
      view.appendChild(el("section", { class: "detail-section" },
        el("p", null, "Tato verze není markdown soubor — můžete ji ",
          el("a", {
            href: "#",
            onclick: (e) => { e.preventDefault(); downloadVersion(activeVersion); },
          }, "stáhnout (" + activeVersion.filename + ")"),
          "."
        ),
      ));
    }
  }

  // 5) Versions list (always shown — useful even in version-viewing mode to switch versions)
  const versSect = el("section", { class: "detail-section", "aria-labelledby": "versions-h" });
  versSect.appendChild(el("h2", { id: "versions-h" }, "Verze (" + (file.versions || []).length + ")"));
  if (!file.versions || !file.versions.length) {
    versSect.appendChild(el("div", { class: "empty-state" }, "Soubor zatím nemá žádnou verzi. Nahrajte první níže."));
  } else {
    const list = el("ul", { class: "versions" });
    // newest first
    file.versions.slice().reverse().forEach((v) => {
      list.appendChild(renderVersionItem(file, v, activeVersion === v));
    });
    versSect.appendChild(list);
  }
  view.appendChild(versSect);

  // 6) Upload new version (only if NOT in version-viewing mode, to keep that view focused)
  if (!activeVersion) {
    const uploadSect = el("section", { class: "upload-block", "aria-labelledby": "upload-h", id: "upload-block" });
    uploadSect.appendChild(el("h3", { id: "upload-h" }, "Nahrát novou verzi"));
    const upForm = el("div");
    const fld1 = el("div", { class: "field" });
    fld1.appendChild(el("label", { for: "up-file" }, "Soubor"));
    fld1.appendChild(el("input", { type: "file", id: "up-file", title: "Klávesa: O (otevřít dialog pro výběr souboru)" }));
    fld1.appendChild(el("div", { class: "hint" }, "Tip: klávesa O otevře dialog pro výběr souboru."));
    upForm.appendChild(fld1);
    const fld2 = el("div", { class: "field" });
    fld2.appendChild(el("label", { for: "up-desc" }, "Popis verze (volitelně)"));
    fld2.appendChild(el("textarea", { id: "up-desc", rows: 2 }));
    upForm.appendChild(fld2);
    upForm.appendChild(el("button", { class: "primary", onclick: () => doUploadVersion(file) }, "Nahrát verzi"));
    uploadSect.appendChild(upForm);
    // drag & drop
    uploadSect.addEventListener("dragover", (e) => { e.preventDefault(); uploadSect.classList.add("dragging"); });
    uploadSect.addEventListener("dragleave", () => uploadSect.classList.remove("dragging"));
    uploadSect.addEventListener("drop", (e) => {
      e.preventDefault(); uploadSect.classList.remove("dragging");
      if (e.dataTransfer.files && e.dataTransfer.files[0]) {
        $("up-file").files = e.dataTransfer.files;
      }
    });
    view.appendChild(uploadSect);
  }

  // 7) File-level edit actions (always available)
  if (state.editMode) {
    const editBox = el("section", { class: "edit-panel" });
    editBox.appendChild(el("h3", null, "Akce " + T_ICON[T.FILE]));
    editBox.appendChild(el("button", { class: "small", onclick: () => editItemProps(file), title: "Přejmenovat / popis (klávesa E)" }, "Přejmenovat / popis"));
    editBox.appendChild(document.createTextNode(" "));
    editBox.appendChild(el("button", { class: "small", onclick: () => moveItem(file.id) }, "Přesunout"));
    editBox.appendChild(document.createTextNode(" "));
    editBox.appendChild(el("button", { class: "small danger", onclick: () => deleteItem(file.id), "aria-label": "Smazat soubor" }, "Smazat " + T_ICON[T.FILE]));
    view.appendChild(editBox);
  }
}

function renderFileHeaderSection(found) {
  const file = found.item;
  const sect = el("section", { class: "detail-section" });
  // H1 s názvem už je nahoře (v page-heading); tady jen popis a meta.
  if (file.description) sect.appendChild(el("p", { class: "desc" }, file.description));
  // Quick meta
  const meta = el("dl", { class: "detail-meta" });
  // Najdi nejnovější verzi která NENÍ pendingUpload (stažení té má smysl jen pro pushnuté)
  const versions = file.versions || [];
  const lastV = versions[versions.length - 1] || null;
  const lastDownloadable = (() => {
    for (let i = versions.length - 1; i >= 0; i--) {
      if (!versions[i].pendingUpload) return versions[i];
    }
    return null;
  })();
  if (lastV) {
    meta.appendChild(el("div", { class: "meta-item" }, el("dt", null, "Poslední verze:"), " ", el("dd", null, fmtDate(lastV.timestamp))));
    meta.appendChild(el("div", { class: "meta-item" }, el("dt", null, "Velikost:"), " ", el("dd", null, fmtSize(lastV.size))));
  }
  if (file.created) {
    meta.appendChild(el("div", { class: "meta-item" }, el("dt", null, "Vytvořeno:"), " ", el("dd", null, fmtDate(file.created))));
  }
  sect.appendChild(meta);
  if (lastDownloadable) {
    sect.appendChild(el("div", { style: { marginTop: "8px" } },
      el("a", {
        href: "#",
        title: "Stáhnout nejnovější verzi (klávesa D)",
        onclick: (e) => { e.preventDefault(); downloadVersion(lastDownloadable); },
      }, "Stáhnout nejnovější verzi"),
    ));
  }
  return sect;
}

function isMarkdownFilename(fn) {
  return /\.md$/i.test(fn || "");
}

async function loadAndRenderMarkdown(version, container) {
  try {
    const r = await ghReadFile(version.filename);
    const text = new TextDecoder().decode(base64ToBlobBytes(r.contentBase64));
    container.innerHTML = renderMarkdown(text);
    // Make external links open in new tab
    container.querySelectorAll("a[href^='http']").forEach(a => {
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener noreferrer");
    });
  } catch (e) {
    container.innerHTML = "";
    container.appendChild(el("div", { class: "empty-state" }, "Nepodařilo se načíst markdown: " + e.message));
    debug("MD load chyba: " + e.message, "err");
  }
}

function renderVersionItem(file, version, isActive) {
  const li = el("li", { class: "version" + (isActive ? " active" : "") + (version.pendingUpload ? " pending" : "") });
  const head = el("div", { class: "version-head" });

  // Datum a čas verze JE primární odkaz / akce.
  // - markdown (a není pending, není aktivní) -> odkaz "Zobrazit náhled"
  // - markdown (aktivní -> právě zobrazena) -> text + odkaz "skrýt náhled"
  // - ostatní (a není pending) -> odkaz "Stáhnout"
  // - pending upload -> jen text
  const dateText = fmtDate(version.timestamp);
  if (version.pendingUpload) {
    head.appendChild(el("span", { class: "version-time" }, dateText));
  } else if (isMarkdownFilename(version.filename)) {
    if (isActive) {
      // už zobrazeno — datum jako text, odkaz "skrýt náhled"
      const wrap = el("span", { class: "version-time" }, dateText);
      head.appendChild(wrap);
      head.appendChild(el("span", { class: "version-status-note" },
        " (👁 právě zobrazeno — ",
        el("a", {
          href: "#",
          onclick: (e) => { e.preventDefault(); clearVersionView(); },
          "aria-label": "Skrýt náhled verze z " + dateText,
        }, "skrýt náhled"),
        ")"
      ));
    } else {
      const link = el("a", {
        href: "#",
        class: "version-time",
        onclick: (e) => { e.preventDefault(); navigateToVersion(file, version); },
        "aria-label": "Zobrazit náhled verze z " + dateText,
      }, dateText);
      head.appendChild(link);
    }
  } else {
    const link = el("a", {
      href: "#",
      class: "version-time",
      onclick: (e) => { e.preventDefault(); downloadVersion(version); },
      "aria-label": "Stáhnout verzi z " + dateText,
    }, dateText);
    head.appendChild(link);
  }

  const m = [];
  m.push(fmtSize(version.size));
  if (version.device) m.push("zařízení: " + version.device);
  if (version.pendingUpload) m.push("⏳ čeká na upload");
  head.appendChild(el("span", { class: "version-meta" }, m.join(" · ")));
  li.appendChild(head);

  if (version.description) li.appendChild(el("div", { class: "version-desc" }, version.description));

  // Akce v editmódu (a smazat i u pendingUpload, aby šla rozdělaná verze zrušit)
  if (state.editMode) {
    const acts = el("div", { class: "version-actions" });
    if (!version.pendingUpload) {
      acts.appendChild(el("button", { class: "small", onclick: () => editVersionDescription(file, version, li) }, "Upravit popis"));
    }
    acts.appendChild(el("button", { class: "small danger", onclick: () => deleteVersion(file, version) }, "Smazat verzi"));
    li.appendChild(acts);
  }
  return li;
}

      { name: "id", label: "ID souboru (souborid, neměnné)", required: true, hint: "Použito v názvech souborů na githubu. Pouze písmena, číslice, _ nebo -." },

      continue;

    const newFile = {
      type: T.FILE,
      id: r.id,
      name: r.name,

      created: nowIso(),
      modified: nowIso(),
    };
    if (parentFolder.id === "root" || state.currentDetailId === "root") {

    }
    markModified();
    showStatus("Soubor vytvořen. Můžete nahrát první verzi.", "success");
