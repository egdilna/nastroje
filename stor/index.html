<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DMS úložiště</title>
<style>
/* === MOTIVY (témata) ===
   Motiv se aplikuje přes <html data-theme="..."> nastavený dynamicky z JS.
   Pokud žádné `data-theme` není, použije se "light-auto" — světlý motiv,
   který automaticky překlopí do tmavého podle systémového prefers-color-scheme.
   Motiv "light" zůstává trvale světlý, "dark" trvale tmavý.
   Všechna ostatní témata jsou "single-mode" (nereagují na prefers-color-scheme).

   Definice tokenů: --bg, --bg-soft, --bg-elevated (3 vrstvy pozadí),
   --text, --text-muted, --text-faint, --border, --border-strong,
   --accent, --accent-text, --accent-soft, --success, --warning, --danger,
   --danger-soft, --focus, --shadow, --radius, --radius-sm,
   --font-body, --font-mono, --font-heading (může se lišit od --font-body)
*/

/* Default token sady = výchozí Light */
:root {
  --bg: #ffffff;
  --bg-soft: #f7f7f7;
  --bg-elevated: #ffffff;
  --text: #1a1a1a;
  --text-muted: #5a5a5a;
  --text-faint: #888;
  --border: #e2e2e2;
  --border-strong: #c8c8c8;
  --accent: #0c63d4;
  --accent-text: #ffffff;
  --accent-soft: #e7f0fb;
  --success: #1e7a3a;
  --warning: #a85c00;
  --danger: #b3261e;
  --danger-soft: #fbe9e9;
  --focus: #0c63d4;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.06);
  --radius: 8px;
  --radius-sm: 4px;
  --gap: 12px;
  --gap-lg: 20px;
  --maxw: 980px;
  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  --font-heading: var(--font-body);
}

/* "light-auto" — světlý motiv který se přepne na tmavý podle systémové preference.
   Když data-theme atribut chybí (úložiště bez nastavené hodnoty), tohle je default. */
html[data-theme="light-auto"]:not([data-theme-resolved]),
html:not([data-theme]) {
  /* Stejné jako :root výchozí, žádné override potřeba — :root výše. */
}
@media (prefers-color-scheme: dark) {
  html[data-theme="light-auto"],
  html:not([data-theme]) {
    --bg: #131517;
    --bg-soft: #1a1d20;
    --bg-elevated: #1d2024;
    --text: #ececec;
    --text-muted: #b5b5b5;
    --text-faint: #888;
    --border: #2c3036;
    --border-strong: #3a3f46;
    --accent: #4a9eff;
    --accent-text: #0a0a0a;
    --accent-soft: #1a2c44;
    --success: #4caf6a;
    --warning: #d9933a;
    --danger: #e57373;
    --danger-soft: #3a1f1f;
    --focus: #4a9eff;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.4);
  }
}

/* "light" — trvale světlý */
html[data-theme="light"] {
  --bg: #ffffff; --bg-soft: #f7f7f7; --bg-elevated: #ffffff;
  --text: #1a1a1a; --text-muted: #5a5a5a; --text-faint: #888;
  --border: #e2e2e2; --border-strong: #c8c8c8;
  --accent: #0c63d4; --accent-text: #ffffff; --accent-soft: #e7f0fb;
  --success: #1e7a3a; --warning: #a85c00; --danger: #b3261e; --danger-soft: #fbe9e9;
  --focus: #0c63d4;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.06);
}

/* "dark" — trvale tmavý */
html[data-theme="dark"] {
  --bg: #131517; --bg-soft: #1a1d20; --bg-elevated: #1d2024;
  --text: #ececec; --text-muted: #b5b5b5; --text-faint: #888;
  --border: #2c3036; --border-strong: #3a3f46;
  --accent: #4a9eff; --accent-text: #0a0a0a; --accent-soft: #1a2c44;
  --success: #4caf6a; --warning: #d9933a; --danger: #e57373; --danger-soft: #3a1f1f;
  --focus: #4a9eff;
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.4);
}

/* "sepia" — krémové pozadí, hnědý text — pro dlouhé čtení */
html[data-theme="sepia"] {
  --bg: #f5efdc; --bg-soft: #efe6cd; --bg-elevated: #faf3df;
  --text: #3b2e1e; --text-muted: #6e5a3e; --text-faint: #8c7c5a;
  --border: #d9c8a1; --border-strong: #b9a47a;
  --accent: #8b3a1f; --accent-text: #f5efdc; --accent-soft: #ecd9c4;
  --success: #5a6f1a; --warning: #a05c00; --danger: #94251a; --danger-soft: #f0d9d3;
  --focus: #8b3a1f;
  --shadow: 0 1px 2px rgba(80,50,20,.08), 0 4px 12px rgba(80,50,20,.10);
  --font-body: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
  --font-heading: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
}

/* "high-contrast" — čistá černá/bílá s ostrými hranicemi */
html[data-theme="high-contrast"] {
  --bg: #ffffff; --bg-soft: #ffffff; --bg-elevated: #ffffff;
  --text: #000000; --text-muted: #000000; --text-faint: #333333;
  --border: #000000; --border-strong: #000000;
  --accent: #0000d0; --accent-text: #ffffff; --accent-soft: #d0d8ff;
  --success: #006400; --warning: #8b4500; --danger: #b00000; --danger-soft: #ffd0d0;
  --focus: #0000d0;
  --shadow: none;
  --radius: 0px; --radius-sm: 0px;
}
html[data-theme="high-contrast"] a { text-decoration-thickness: 2px; }
html[data-theme="high-contrast"] :focus-visible { outline-width: 4px; }

/* "high-contrast-dark" — čistě bílý text na černém */
html[data-theme="high-contrast-dark"] {
  --bg: #000000; --bg-soft: #000000; --bg-elevated: #000000;
  --text: #ffffff; --text-muted: #ffffff; --text-faint: #cccccc;
  --border: #ffffff; --border-strong: #ffffff;
  --accent: #ffff00; --accent-text: #000000; --accent-soft: #444400;
  --success: #66ff66; --warning: #ffaa00; --danger: #ff6666; --danger-soft: #440000;
  --focus: #ffff00;
  --shadow: none;
  --radius: 0px; --radius-sm: 0px;
}
html[data-theme="high-contrast-dark"] a { text-decoration-thickness: 2px; }
html[data-theme="high-contrast-dark"] :focus-visible { outline-width: 4px; }

/* "solarized-light" — paleta od Ethana Schoonovera, teplé barvy */
html[data-theme="solarized-light"] {
  --bg: #fdf6e3; --bg-soft: #eee8d5; --bg-elevated: #fdf6e3;
  --text: #586e75; --text-muted: #657b83; --text-faint: #93a1a1;
  --border: #eee8d5; --border-strong: #93a1a1;
  --accent: #268bd2; --accent-text: #fdf6e3; --accent-soft: #d6e9f5;
  --success: #859900; --warning: #cb4b16; --danger: #dc322f; --danger-soft: #f5d6d3;
  --focus: #268bd2;
  --shadow: 0 1px 2px rgba(101,123,131,.08), 0 4px 12px rgba(101,123,131,.10);
}

/* "solarized-dark" */
html[data-theme="solarized-dark"] {
  --bg: #002b36; --bg-soft: #073642; --bg-elevated: #073642;
  --text: #eee8d5; --text-muted: #93a1a1; --text-faint: #657b83;
  --border: #073642; --border-strong: #586e75;
  --accent: #2aa198; --accent-text: #002b36; --accent-soft: #114448;
  --success: #859900; --warning: #cb4b16; --danger: #dc322f; --danger-soft: #4a1f1d;
  --focus: #2aa198;
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.5);
}

/* "serif-reading" — světlý motiv s patkovým fontem, vzdušnější */
html[data-theme="serif-reading"] {
  --bg: #ffffff; --bg-soft: #f7f5f0; --bg-elevated: #ffffff;
  --text: #1a1614; --text-muted: #4d423a; --text-faint: #87796b;
  --border: #e0d8cc; --border-strong: #b9aa97;
  --accent: #6e3d1f; --accent-text: #ffffff; --accent-soft: #efe2d2;
  --success: #2d6638; --warning: #a05c00; --danger: #a02118; --danger-soft: #f4dedb;
  --focus: #6e3d1f;
  --shadow: 0 1px 2px rgba(60,40,20,.04), 0 4px 12px rgba(60,40,20,.06);
  --font-body: Charter, "Iowan Old Style", "Iowan Old Style BT", "Palatino Linotype", "Palatino", "Georgia", serif;
  --font-heading: var(--font-body);
}
html[data-theme="serif-reading"] body { font-size: 17px; }

/* "compact" — hustší layout, menší padding, víc info na obrazovku */
html[data-theme="compact"] {
  --bg: #ffffff; --bg-soft: #f7f7f7; --bg-elevated: #ffffff;
  --text: #1a1a1a; --text-muted: #5a5a5a; --text-faint: #888;
  --border: #e2e2e2; --border-strong: #c8c8c8;
  --accent: #0c63d4; --accent-text: #ffffff; --accent-soft: #e7f0fb;
  --success: #1e7a3a; --warning: #a85c00; --danger: #b3261e; --danger-soft: #fbe9e9;
  --focus: #0c63d4;
  --shadow: 0 1px 2px rgba(0,0,0,.04);
  --gap: 8px; --gap-lg: 12px;
  --radius: 4px; --radius-sm: 2px;
}
html[data-theme="compact"] body { font-size: 14px; }
html[data-theme="compact"] .item { padding: 6px 8px; }
html[data-theme="compact"] .detail-section { margin-bottom: 10px; }

/* "comfortable" — vzdušnější, větší fonty */
html[data-theme="comfortable"] {
  --bg: #ffffff; --bg-soft: #f7f7f7; --bg-elevated: #ffffff;
  --text: #1a1a1a; --text-muted: #5a5a5a; --text-faint: #888;
  --border: #e2e2e2; --border-strong: #c8c8c8;
  --accent: #0c63d4; --accent-text: #ffffff; --accent-soft: #e7f0fb;
  --success: #1e7a3a; --warning: #a85c00; --danger: #b3261e; --danger-soft: #fbe9e9;
  --focus: #0c63d4;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.06);
  --gap: 16px; --gap-lg: 28px;
  --radius: 12px; --radius-sm: 6px;
}
html[data-theme="comfortable"] body { font-size: 17px; line-height: 1.65; }
html[data-theme="comfortable"] .item { padding: 14px 16px; }

/* "nostalgia-90s" — fun, beige pozadí, modré linkové odkazy, Times New Roman */
html[data-theme="nostalgia-90s"] {
  --bg: #c0c0c0; --bg-soft: #c8c8c8; --bg-elevated: #d8d8d8;
  --text: #000000; --text-muted: #333333; --text-faint: #555;
  --border: #808080; --border-strong: #404040;
  --accent: #0000ee; --accent-text: #ffffff; --accent-soft: #e0e0ff;
  --success: #008000; --warning: #b35f00; --danger: #cc0000; --danger-soft: #ffd0d0;
  --focus: #0000ee;
  --shadow: 1px 1px 0 #000;
  --radius: 0px; --radius-sm: 0px;
  --font-body: "Times New Roman", Times, serif;
  --font-heading: "Times New Roman", Times, serif;
}
html[data-theme="nostalgia-90s"] a { color: #0000ee; }
html[data-theme="nostalgia-90s"] a:visited { color: #551a8b; }
html[data-theme="nostalgia-90s"] button {
  border: 2px outset #c0c0c0;
  background: #c0c0c0;
  border-radius: 0;
  font-family: var(--font-body);
}
html[data-theme="nostalgia-90s"] button:active { border-style: inset; }
html[data-theme="nostalgia-90s"] .item,
html[data-theme="nostalgia-90s"] .detail-section,
html[data-theme="nostalgia-90s"] .edit-panel,
html[data-theme="nostalgia-90s"] .op-log-section,
html[data-theme="nostalgia-90s"] .comment-item,
html[data-theme="nostalgia-90s"] .part-item,
html[data-theme="nostalgia-90s"] .known-repo-item,
html[data-theme="nostalgia-90s"] .upload-block {
  border: 2px inset #c0c0c0;
  border-radius: 0;
}

/* "terminal" — VT220-like, monospace všude, černé pozadí, zelený text */
html[data-theme="terminal"] {
  --bg: #0a0e08; --bg-soft: #0e120c; --bg-elevated: #121610;
  --text: #4af04a; --text-muted: #2da02d; --text-faint: #1a701a;
  --border: #1a4a1a; --border-strong: #2da02d;
  --accent: #4af04a; --accent-text: #0a0e08; --accent-soft: #1a3a1a;
  --success: #4af04a; --warning: #f0c040; --danger: #ff5050; --danger-soft: #3a1010;
  --focus: #4af04a;
  --shadow: none;
  --radius: 0px; --radius-sm: 0px;
  --font-body: var(--font-mono);
  --font-heading: var(--font-mono);
}
html[data-theme="terminal"] body { font-family: var(--font-mono); }
html[data-theme="terminal"] a { text-decoration: underline; }

/* "terminal-amber" — jako Terminal, ale s amber/oranžovým textem (IBM PC monitor) */
html[data-theme="terminal-amber"] {
  --bg: #1a0e02; --bg-soft: #1f1206; --bg-elevated: #25160a;
  --text: #ffb000; --text-muted: #c08800; --text-faint: #806000;
  --border: #4a3000; --border-strong: #c08800;
  --accent: #ffb000; --accent-text: #1a0e02; --accent-soft: #3a2400;
  --success: #c0ff00; --warning: #ffcc40; --danger: #ff6020; --danger-soft: #3a1810;
  --focus: #ffb000;
  --shadow: none;
  --radius: 0px; --radius-sm: 0px;
  --font-body: var(--font-mono);
  --font-heading: var(--font-mono);
}
html[data-theme="terminal-amber"] body { font-family: var(--font-mono); }
html[data-theme="terminal-amber"] a { text-decoration: underline; }

/* "github-light" — inspirováno GitHub.com light tématem */
html[data-theme="github-light"] {
  --bg: #ffffff; --bg-soft: #f6f8fa; --bg-elevated: #ffffff;
  --text: #1f2328; --text-muted: #59636e; --text-faint: #818b98;
  --border: #d1d9e0; --border-strong: #b0bac4;
  --accent: #0969da; --accent-text: #ffffff; --accent-soft: #ddf4ff;
  --success: #1a7f37; --warning: #9a6700; --danger: #cf222e; --danger-soft: #ffebe9;
  --focus: #0969da;
  --shadow: 0 1px 0 rgba(31,35,40,.04), 0 1px 4px rgba(31,35,40,.04);
  --radius: 6px; --radius-sm: 3px;
  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
}

/* "github-dark" — inspirováno GitHub.com dark tématem */
html[data-theme="github-dark"] {
  --bg: #0d1117; --bg-soft: #161b22; --bg-elevated: #161b22;
  --text: #e6edf3; --text-muted: #8d96a0; --text-faint: #6e7681;
  --border: #30363d; --border-strong: #484f58;
  --accent: #2f81f7; --accent-text: #ffffff; --accent-soft: #0c2d6b;
  --success: #3fb950; --warning: #d29922; --danger: #f85149; --danger-soft: #3a1414;
  --focus: #2f81f7;
  --shadow: 0 1px 0 rgba(0,0,0,.3), 0 1px 4px rgba(0,0,0,.4);
  --radius: 6px; --radius-sm: 3px;
  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
}

/* "notion-light" — inspirováno Notion: bílé pozadí, výrazné nadpisy, šedé kódové bloky */
html[data-theme="notion-light"] {
  --bg: #ffffff; --bg-soft: #f7f7f5; --bg-elevated: #ffffff;
  --text: #37352f; --text-muted: #787774; --text-faint: #9b9a97;
  --border: #e9e9e7; --border-strong: #d3d2cf;
  --accent: #2383e2; --accent-text: #ffffff; --accent-soft: #e7f3fb;
  --success: #4d7e3e; --warning: #b9892e; --danger: #cb4956; --danger-soft: #fde8ea;
  --focus: #2383e2;
  --shadow: 0 1px 2px rgba(15,15,15,.06), 0 3px 8px rgba(15,15,15,.04);
  --radius: 4px; --radius-sm: 3px;
  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif;
  --font-heading: var(--font-body);
}
html[data-theme="notion-light"] h1, html[data-theme="notion-light"] h2, html[data-theme="notion-light"] h3 {
  font-weight: 700;
}

/* "notion-dark" */
html[data-theme="notion-dark"] {
  --bg: #191919; --bg-soft: #202020; --bg-elevated: #2f2f2f;
  --text: #e6e6e6; --text-muted: #9b9a97; --text-faint: #6e6e6e;
  --border: #2f2f2f; --border-strong: #4d4d4d;
  --accent: #5a9eff; --accent-text: #ffffff; --accent-soft: #1c3552;
  --success: #6cb46a; --warning: #d4a14a; --danger: #e07178; --danger-soft: #3d1e22;
  --focus: #5a9eff;
  --shadow: 0 1px 2px rgba(0,0,0,.5), 0 3px 8px rgba(0,0,0,.5);
  --radius: 4px; --radius-sm: 3px;
  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif;
  --font-heading: var(--font-body);
}
html[data-theme="notion-dark"] h1, html[data-theme="notion-dark"] h2, html[data-theme="notion-dark"] h3 {
  font-weight: 700;
}

/* "macos-light" — inspirováno macOS Big Sur+: jemnější barvy, více roundeds */
html[data-theme="macos-light"] {
  --bg: #f5f5f7; --bg-soft: #ebebed; --bg-elevated: #ffffff;
  --text: #1d1d1f; --text-muted: #6e6e73; --text-faint: #86868b;
  --border: #d2d2d7; --border-strong: #b0b0b5;
  --accent: #0071e3; --accent-text: #ffffff; --accent-soft: #d6e7fb;
  --success: #248a3d; --warning: #b25000; --danger: #d70015; --danger-soft: #fde0e2;
  --focus: #0071e3;
  --shadow: 0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
  --radius: 12px; --radius-sm: 6px;
  --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-heading: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

/* "macos-dark" — inspirováno macOS dark */
html[data-theme="macos-dark"] {
  --bg: #1c1c1e; --bg-soft: #2c2c2e; --bg-elevated: #2c2c2e;
  --text: #f5f5f7; --text-muted: #98989d; --text-faint: #6e6e73;
  --border: #38383a; --border-strong: #545458;
  --accent: #0a84ff; --accent-text: #ffffff; --accent-soft: #0a3d80;
  --success: #30d158; --warning: #ff9f0a; --danger: #ff453a; --danger-soft: #4a1a18;
  --focus: #0a84ff;
  --shadow: 0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.4);
  --radius: 12px; --radius-sm: 6px;
  --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-heading: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

/* "material-light" — inspirováno Material Design 3 */
html[data-theme="material-light"] {
  --bg: #fef7ff; --bg-soft: #f7f2fa; --bg-elevated: #ffffff;
  --text: #1d1b20; --text-muted: #49454f; --text-faint: #79747e;
  --border: #cac4d0; --border-strong: #79747e;
  --accent: #6750a4; --accent-text: #ffffff; --accent-soft: #eaddff;
  --success: #146c2e; --warning: #855300; --danger: #ba1a1a; --danger-soft: #ffdad6;
  --focus: #6750a4;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.06);
  --radius: 12px; --radius-sm: 8px;
  --font-body: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-heading: var(--font-body);
}

/* "material-dark" */
html[data-theme="material-dark"] {
  --bg: #141218; --bg-soft: #1d1b20; --bg-elevated: #211f26;
  --text: #e6e0e9; --text-muted: #cac4d0; --text-faint: #938f99;
  --border: #49454f; --border-strong: #79747e;
  --accent: #d0bcff; --accent-text: #381e72; --accent-soft: #4f378b;
  --success: #6dd58c; --warning: #f5c977; --danger: #ffb4ab; --danger-soft: #5a2120;
  --focus: #d0bcff;
  --shadow: 0 1px 2px rgba(0,0,0,.5), 0 1px 3px rgba(0,0,0,.5);
  --radius: 12px; --radius-sm: 8px;
  --font-body: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-heading: var(--font-body);
}

/* "swiss" — Bauhaus / Swiss design — Helvetica, ostré, červené akcenty */
html[data-theme="swiss"] {
  --bg: #ffffff; --bg-soft: #f5f5f5; --bg-elevated: #ffffff;
  --text: #000000; --text-muted: #444444; --text-faint: #777777;
  --border: #000000; --border-strong: #000000;
  --accent: #d20a11; --accent-text: #ffffff; --accent-soft: #ffe4e5;
  --success: #006633; --warning: #cc8800; --danger: #d20a11; --danger-soft: #ffe4e5;
  --focus: #d20a11;
  --shadow: none;
  --radius: 0px; --radius-sm: 0px;
  --font-body: "Helvetica Neue", Helvetica, "Arial", sans-serif;
  --font-heading: "Helvetica Neue", Helvetica, "Arial", sans-serif;
}
html[data-theme="swiss"] h1, html[data-theme="swiss"] h2 { font-weight: 700; letter-spacing: -0.02em; }
html[data-theme="swiss"] .item { border-width: 1px; }

/* "paper-notebook" — žluté linkované pozadí, ručně psaný feel pro nadpisy */
html[data-theme="paper-notebook"] {
  --bg: #fffbe6; --bg-soft: #fff5cc; --bg-elevated: #fffeff;
  --text: #2a2a2a; --text-muted: #555044; --text-faint: #888370;
  --border: #d4c97a; --border-strong: #ad9c40;
  --accent: #1a3d8f; --accent-text: #fffbe6; --accent-soft: #d8e0f0;
  --success: #2e6d33; --warning: #aa6e00; --danger: #b02020; --danger-soft: #f9d8d8;
  --focus: #1a3d8f;
  --shadow: 0 1px 0 rgba(150,130,40,.10);
  --radius: 4px; --radius-sm: 2px;
  --font-body: "Iowan Old Style", Georgia, "Palatino Linotype", serif;
  --font-heading: "Caveat", "Bradley Hand", "Comic Sans MS", cursive;
}
html[data-theme="paper-notebook"] body {
  background-image: linear-gradient(to bottom, transparent 31px, rgba(180,160,80,.18) 32px);
  background-size: 100% 32px;
  line-height: 32px;
}
html[data-theme="paper-notebook"] h1,
html[data-theme="paper-notebook"] h2,
html[data-theme="paper-notebook"] h3 {
  font-family: var(--font-heading);
  font-weight: normal;
}

/* "manila-folder" — papírový desky vzhled */
html[data-theme="manila-folder"] {
  --bg: #e9d8a6; --bg-soft: #d9c281; --bg-elevated: #f3e7c1;
  --text: #2a1f0e; --text-muted: #5a4a2a; --text-faint: #88775a;
  --border: #b09454; --border-strong: #826832;
  --accent: #4a3220; --accent-text: #f3e7c1; --accent-soft: #d4be8c;
  --success: #4a6620; --warning: #a06800; --danger: #882000; --danger-soft: #e7c5b8;
  --focus: #4a3220;
  --shadow: 0 1px 0 rgba(80,50,20,.20), 0 2px 6px rgba(80,50,20,.15);
  --radius: 6px; --radius-sm: 3px;
  --font-body: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
  --font-heading: var(--font-body);
}
html[data-theme="manila-folder"] .item,
html[data-theme="manila-folder"] .detail-section,
html[data-theme="manila-folder"] .comment-item,
html[data-theme="manila-folder"] .part-item {
  border-color: var(--border);
  background: var(--bg-elevated);
}

* { box-sizing: border-box; }
h1, h2, h3, h4, h5, h6 { font-family: var(--font-heading); }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
a:hover { text-decoration-thickness: 2px; }
:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}
.skip-link {
  position: absolute;
  left: -9999px;
  top: 4px;
  background: var(--bg);
  color: var(--text);
  padding: 8px 14px;
  border: 2px solid var(--accent);
  border-radius: var(--radius-sm);
  z-index: 1000;
}
.skip-link:focus { left: 8px; }

.app {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 16px 20px 80px;
}

.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 14px;
  margin-bottom: 16px;
}
.storage-name-label {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin: 0 0 4px;
  font-weight: 600;
}
.header .desc {
  margin: 0 0 10px;
  color: var(--text-muted);
  font-size: 0.95rem;
}
.header .desc:empty { display: none; }

#page-heading {
  font-size: 1.6rem;
  margin: 0 0 12px;
  font-weight: 600;
  letter-spacing: -0.01em;
  word-break: break-word;
}
#page-heading .heading-icon {
  margin-right: 8px;
  display: inline-block;
}

.breadcrumb {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  list-style: none;
  margin: 0;
  padding: 0;
  font-size: 0.9rem;
  gap: 4px;
}
.breadcrumb li {
  display: flex;
  align-items: center;
  gap: 4px;
}
.breadcrumb li:not(:last-child)::after {
  content: "›";
  color: var(--text-faint);
  margin: 0 4px;
  font-weight: 400;
}
.crumb-icon {
  display: inline-block;
  margin-right: 2px;
}
.breadcrumb a {
  color: var(--accent);
  text-decoration: none;
  padding: 2px 4px;
  border-radius: var(--radius-sm);
}
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb [aria-current="page"] {
  color: var(--text);
  font-weight: 500;
}

.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 14px;
}
.toolbar .spacer { flex: 1; }
.search-box {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 200px;
}
.search-box input { flex: 1; }

button, .btn {
  font: inherit;
  font-size: 0.92rem;
  padding: 7px 14px;
  background: var(--bg-elevated);
  color: var(--text);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  line-height: 1.3;
}
button:hover:not(:disabled), .btn:hover { background: var(--bg-soft); border-color: var(--text-muted); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.primary, .btn.primary {
  background: var(--accent);
  color: var(--accent-text);
  border-color: var(--accent);
}
button.primary:hover:not(:disabled) { filter: brightness(1.08); }
button.danger {
  background: var(--bg-elevated);
  color: var(--danger);
  border-color: var(--border-strong);
}
button.danger:hover:not(:disabled) { background: var(--danger-soft); border-color: var(--danger); }
button.subtle {
  background: transparent;
  border-color: transparent;
  padding: 4px 8px;
  color: var(--text-muted);
}
button.subtle:hover:not(:disabled) { color: var(--text); background: var(--bg-soft); }
button.small {
  font-size: 0.85rem;
  padding: 4px 10px;
}

input[type="text"], input[type="url"], input[type="password"], input[type="search"], textarea, select {
  font: inherit;
  font-size: 0.95rem;
  padding: 7px 10px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  width: 100%;
}
textarea { resize: vertical; min-height: 60px; font-family: var(--font-body); }
input[type="file"] { font-size: 0.92rem; }
input[readonly] {
  background: var(--bg-soft);
  color: var(--text-muted);
  cursor: not-allowed;
}
label { font-size: 0.93rem; color: var(--text); }
.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
}
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 600px) {
  .field-row { grid-template-columns: 1fr; }
}
.field label { font-weight: 500; }
.field .hint { font-size: 0.82rem; color: var(--text-muted); }

/* List items (folders, files, links) */
.item-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color 0.1s, background 0.1s;
}
.item:hover { border-color: var(--border-strong); background: var(--bg-soft); }
.item-icon {
  flex-shrink: 0;
  display: inline-block;
  font-size: 1.05em;
  line-height: 1;
}
.item-body { flex: 1; min-width: 0; }
.item-title {
  margin: 0;
  font-size: 1rem;
  font-weight: 500;
  word-break: break-word;
}
.item-title a.item-link {
  color: var(--text);
  text-decoration: none;
  display: inline;
}
.item-title a.item-link .item-name { text-decoration: none; }
.item-title a.item-link:hover .item-name { text-decoration: underline; }
.item-title a.item-link:focus-visible { outline-offset: 4px; }
.item-meta {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-top: 2px;
  word-break: break-word;
}
.item-desc {
  font-size: 0.88rem;
  color: var(--text-muted);
  margin-top: 4px;
  word-break: break-word;
}
.item-actions {
  flex-shrink: 0;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: flex-start;
}
@media (max-width: 600px) {
  .item { flex-wrap: wrap; }
  .item-actions { width: 100%; margin-left: 0; }
}

/* Detail views */
.detail-section {
  margin-bottom: 18px;
}
.detail-section h2 {
  font-size: 1.2rem;
  margin: 0 0 6px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.detail-section .desc {
  color: var(--text-muted);
  margin: 0 0 8px;
  font-size: 0.95rem;
  white-space: pre-wrap;
}
.detail-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.detail-meta dt { font-weight: 500; color: var(--text); display: inline; }
.detail-meta dd { display: inline; margin: 0; }
.detail-meta .meta-item { display: inline-flex; gap: 4px; }
.fileid-badge {
  display: inline-block;
  padding: 2px 8px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text);
}

/* Versions */
.versions {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.version {
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.version-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
}
.version-time {
  font-weight: 500;
  font-size: 0.95rem;
}
a.version-time {
  font-weight: 600;
}
.version-status-note {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-left: 4px;
}
.version-meta {
  font-size: 0.82rem;
  color: var(--text-muted);
}
.version-desc {
  font-size: 0.9rem;
  margin-top: 4px;
  white-space: pre-wrap;
  word-break: break-word;
}
.version-actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* Parts list (v editmódu detailu souboru) */
.parts-list {
  list-style: none;
  margin: 8px 0;
  padding: 0;
}
.part-item {
  padding: 8px 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
}
.part-meta {
  font-size: 0.85rem;
  color: var(--text-muted);
}
.part-actions {
  margin-top: 6px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* Version filter row */
.version-filter-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin: 6px 0 12px;
  flex-wrap: wrap;
}
.version-filter-row label {
  font-size: 0.9rem;
  color: var(--text-muted);
}
.version-filter-row select {
  width: auto;
  min-width: 200px;
}

/* Note view */
.note-actions {
  font-size: 0.9rem;
}
.note-textarea {
  width: 100%;
  font-family: var(--font-mono);
  font-size: 0.92rem;
  min-height: 360px;
}

/* Tags */
.item-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}
.item-tag {
  display: inline-block;
  padding: 1px 8px;
  background: var(--accent-soft);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 500;
}
.tag-checkbox-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  padding: 6px 0;
}
.tag-checkbox-label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  user-select: none;
  font-size: 0.92rem;
}
.tag-checkbox-label input[type="checkbox"] {
  width: 1rem; height: 1rem; cursor: pointer;
}
.tag-filter-details {
  margin: 0 0 12px;
  padding: 8px 10px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.tag-filter-details > summary {
  cursor: pointer;
  font-weight: 500;
  font-size: 0.92rem;
  list-style: none;
}
.tag-filter-details > summary::-webkit-details-marker { display: none; }
.tag-filter-details > summary::before {
  content: "▸";
  display: inline-block;
  margin-right: 4px;
  color: var(--text-muted);
  font-weight: 400;
}
.tag-filter-details[open] > summary::before { content: "▾"; }
.tag-filter-active {
  color: var(--accent);
  font-weight: 600;
}
.tag-filter-group {
  margin-top: 6px;
}
.tag-filter-clear {
  margin-top: 6px;
}

/* Comments */
.comments-section {
  margin-top: 16px;
}
.comments-list {
  list-style: none;
  margin: 8px 0;
  padding: 0;
}
.comment-item {
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.comment-item.editing {
  border-color: var(--accent);
}
.comment-head {
  font-size: 0.9rem;
  margin-bottom: 4px;
}
.comment-meta {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-weight: 400;
}
.comment-text {
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.95rem;
}
.comment-actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.comment-form {
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.comment-form h3 {
  margin: 0 0 8px;
  font-size: 0.95rem;
  font-weight: 600;
}

/* Edit-mode panel */
.edit-bar {
  background: var(--bg);
  border-top: 1px solid var(--border);
  margin-top: 24px;
  padding: 14px 0;
}
.edit-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 500;
  cursor: pointer;
  user-select: none;
}
.edit-toggle input { width: 1.05rem; height: 1.05rem; cursor: pointer; }
.edit-mode-active { color: var(--accent); }

.edit-panel {
  margin-top: 14px;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-soft);
}
.edit-panel h3 {
  font-size: 1rem;
  margin: 0 0 10px;
  font-weight: 600;
}
.edit-panel details { margin-top: 8px; }
.edit-panel summary {
  cursor: pointer;
  padding: 6px 0;
  font-weight: 500;
  font-size: 0.95rem;
}
.edit-panel summary:hover { color: var(--accent); }

/* Upload area */
.upload-block {
  margin-top: 16px;
  padding: 14px;
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  background: var(--bg-soft);
}
.upload-block.dragging {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.upload-block h3 {
  font-size: 1rem;
  margin: 0 0 10px;
}

/* Status / messages */
.status-region {
  position: fixed;
  top: 12px;
  right: 12px;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 200;
}
.status-msg {
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 10px 14px;
  box-shadow: var(--shadow);
  font-size: 0.92rem;
  color: var(--text);
  border-left: 3px solid var(--accent);
}
.status-msg.error { border-left-color: var(--danger); }
.status-msg.success { border-left-color: var(--success); }
.status-msg.warning { border-left-color: var(--warning); }

.empty-state {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-muted);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

/* Dialog */
dialog {
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 0;
  background: var(--bg-elevated);
  color: var(--text);
  box-shadow: var(--shadow);
  max-width: min(560px, 92vw);
  width: 100%;
}
dialog::backdrop { background: rgba(0,0,0,.45); }
.dialog-content {
  padding: 18px 20px;
}
.dialog-content h2 {
  font-size: 1.1rem;
  margin: 0 0 10px;
  font-weight: 600;
}
.dialog-content p { margin: 0 0 12px; }
.dialog-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 14px;
}

/* Folder picker tree */
.folder-tree {
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 320px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px;
  background: var(--bg);
}
.folder-tree ul {
  list-style: none;
  padding-left: 18px;
  margin: 0;
}
.folder-tree li { margin: 1px 0; }
.folder-tree button {
  width: 100%;
  text-align: left;
  background: transparent;
  border: 1px solid transparent;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  font-size: 0.92rem;
}
.folder-tree button:hover { background: var(--bg-soft); }
.folder-tree button[aria-pressed="true"] {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--text);
  font-weight: 500;
}

/* Markdown content */
.markdown-body {
  padding: 14px 0;
  line-height: 1.65;
}
.markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
  margin-top: 1.4em;
  margin-bottom: 0.5em;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.markdown-body h1 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.markdown-body h2 { font-size: 1.25rem; }
.markdown-body h3 { font-size: 1.1rem; }
.markdown-body p { margin: 0.7em 0; }
.markdown-body ul, .markdown-body ol { padding-left: 1.6em; }
.markdown-body code {
  font-family: var(--font-mono);
  font-size: 0.9em;
  background: var(--bg-soft);
  padding: 1px 5px;
  border-radius: 3px;
}
.markdown-body pre {
  background: var(--bg-soft);
  padding: 12px 14px;
  border-radius: var(--radius);
  overflow-x: auto;
  border: 1px solid var(--border);
}
.markdown-body pre code {
  background: transparent;
  padding: 0;
  font-size: 0.88rem;
}
.markdown-body blockquote {
  border-left: 3px solid var(--border-strong);
  padding-left: 12px;
  margin: 0.8em 0;
  color: var(--text-muted);
}
.markdown-body table {
  border-collapse: collapse;
  margin: 0.8em 0;
}
.markdown-body th, .markdown-body td {
  border: 1px solid var(--border);
  padding: 5px 10px;
}
.markdown-body th { background: var(--bg-soft); font-weight: 600; }
.markdown-body img { max-width: 100%; height: auto; }
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 1.4em 0; }

/* CriticMarkup */
.markdown-body ins, .markdown-body .crit-ins {
  background: rgba(46, 160, 67, 0.18);
  text-decoration: none;
  border-bottom: 1px solid rgba(46, 160, 67, 0.6);
  padding: 0 2px;
}
.markdown-body del, .markdown-body .crit-del {
  background: rgba(220, 76, 70, 0.18);
  text-decoration: line-through;
  text-decoration-color: rgba(220, 76, 70, 0.7);
  padding: 0 2px;
}
.markdown-body mark, .markdown-body .crit-mark {
  background: rgba(255, 215, 0, 0.32);
  color: inherit;
  padding: 0 2px;
}
.markdown-body .crit-comment {
  display: inline-block;
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 1px 6px;
  font-size: 0.85em;
  color: var(--text);
  margin: 0 1px;
  font-style: italic;
}

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Debug area */
.debug-output {
  margin-top: 16px;
  padding: 10px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  max-height: 200px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.debug-line { padding: 1px 0; border-bottom: 1px solid var(--border); }
.debug-line:last-child { border-bottom: none; }
.debug-line.err { color: var(--danger); }
.debug-line.ok { color: var(--success); }

/* Stats */
.stats {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 0.88rem;
  color: var(--text-muted);
  padding: 8px 0;
  margin-bottom: 8px;
}
.stats strong { color: var(--text); margin-right: 4px; }

.unsaved-badge {
  background: var(--warning);
  color: white;
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  margin-left: 8px;
}

.version-edit-form {
  margin-top: 8px;
  padding: 8px;
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
}
.version-edit-form .field { margin-bottom: 8px; }

/* hide visually but keep for screen reader */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0);
  white-space: nowrap; border: 0;
}

/* Embed mode — čistý read-only pohled bez editačních prvků */
body.embed-mode #app-header,
body.embed-mode .edit-bar,
body.embed-mode .toolbar .search-box,
body.embed-mode #unsaved-indicator,
body.embed-mode #debug-toggle-wrap,
body.embed-mode #debug-output {
  display: none !important;
}
body.embed-mode .app {
  padding-bottom: 16px;
}
body.embed-mode #main {
  margin-top: 0;
}

/* iframe-friendly: tighter outer padding when in iframe */
@media (max-width: 720px) {
  .app { padding: 12px 14px 70px; }
  #page-heading { font-size: 1.3rem; }
}

/* Operation log */
.op-log-section {
  margin-top: 14px;
  padding: 10px 12px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.op-log-section[hidden] { display: none; }
.op-log-summary-line {
  cursor: pointer;
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 10px;
  list-style: none;
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text);
}
.op-log-summary-line::-webkit-details-marker { display: none; }
.op-log-summary-line::before {
  content: "▸";
  display: inline-block;
  margin-right: 4px;
  color: var(--text-muted);
  font-weight: 400;
}
.op-log-section[open] .op-log-summary-line::before { content: "▾"; }
.op-log-title-text {
  font-weight: 600;
}
.op-log-summary {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 400;
}
.op-log-summary .has-fail { color: var(--danger); font-weight: 600; }
.op-log-summary .has-run { color: var(--accent); font-weight: 600; }
.op-log {
  list-style: none;
  margin: 8px 0 0;
  padding: 0;
  max-height: 260px;
  overflow-y: auto;
}
.op-log-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 4px;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}
.op-log-item:last-child { border-bottom: 0; }
.op-status-icon {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  width: 1.4em;
  flex-shrink: 0;
  text-align: center;
  font-weight: 700;
}
.op-log-item.running .op-status-icon { color: var(--accent); }
.op-log-item.ok .op-status-icon { color: var(--success); }
.op-log-item.err .op-status-icon { color: var(--danger); }
.op-log-body { flex: 1; min-width: 0; }
.op-log-label {
  word-break: break-word;
  color: var(--text);
}
.op-log-item.err .op-log-label { color: var(--danger); }
.op-log-time {
  font-size: 0.75rem;
  color: var(--text-faint);
  font-family: var(--font-mono);
  margin-right: 8px;
}
.op-log-error {
  margin-top: 2px;
  font-size: 0.8rem;
  color: var(--danger);
  word-break: break-word;
  font-family: var(--font-mono);
}
.op-log-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}
.op-log-item-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.spinner-inline {
  display: inline-block;
  width: 0.8em; height: 0.8em;
  border: 2px solid var(--accent);
  border-top-color: transparent;
  border-radius: 50%;
  vertical-align: -2px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.stats-display {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 8px 10px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-top: 8px;
  font-size: 0.9rem;
}
.stats-display strong { margin-right: 4px; }
.viewing-version-banner {
  padding: 8px 12px;
  background: var(--accent-soft);
  border-left: 4px solid var(--accent);

/* Náhledy obsahu verze (obrázky / audio / video / pdf) */
.version-preview-container {
  display: flex;

.version-preview-image {

.known-repos {

}
.known-repo-item {

  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 2px;
  word-break: break-all;
}
.known-repo-actions {
  margin-top: 4px;
  font-size: 0.85rem;
}
</style>

<script>
"use strict";
//=============================================================================
// CONSTANTS & STATE
//=============================================================================
const APP_VERSION = "1.0";
const STORAGE_FILENAME = "storage.json";
const LS_KEY = "dms-config-v3";
const LS_KEY_V2 = "dms-config-v2";
const LS_KEY_V1 = "dms-config-v1";
const COMMIT_BRANCH_DEFAULT = "main";

const state = {
  storage: null,        // The full storage.json object, or null
  config: {
    apiKey: "",
    deviceName: "",
    repoPath: "",       // owner/repo/path/to/folder
    branch: COMMIT_BRANCH_DEFAULT,
  },
  currentDetailId: "root",
  viewingVersionId: null, // filename of version being viewed inline (markdown)
  editMode: false,
  unsaved: false,       // Storage JSON modified but not pushed
  loading: false,
  busy: false,          // Prevents concurrent operations
  versionDownloadCache: new Map(), // sha -> blob URL
  ops: [],              // operation log (running/ok/err)
  opIdSeq: 0,
  showStats: false,     // user toggled stats display in edit panel
  sortMode: "name",     // řazení v aktuálním pohledu složky
  filterQuery: "",      // textový filtr ve složce
  filterTags: [],       // tagy filtr ve složce (AND logika — položka musí mít všechny)
  versionFilterPartId: null, // filtr verzí v detailu souboru: null = vše, "" = bez části, "<id>" = konkrétní část
  editingNoteId: null,  // ID poznámky, jejíž obsah je právě editován
  editingCommentId: null, // ID komentáře u souboru, který je právě editován
  embedMode: false,     // pokud true, zobrazí se jen čistý read-only detail bez header, breadcrumbu, edit-baru atd.
};

// Item type constants
const T = { FOLDER: "folder", FILE: "file", LINK: "link", NOTE: "note" };
// Emoji ikona pro každý typ. Když přibude nový typ (např. video/notebook/...),
// stačí ho přidat tady a do T — UI se zařídí samo.
const T_ICON = {
  [T.FOLDER]: "📁",
  [T.FILE]: "📃",
  [T.LINK]: "⛓️",
  [T.NOTE]: "📝",
};
// Pomocná funkce: emoji pro danou položku, fallback "•".
function iconFor(item) {
  if (!item || !item.type) return "•";
  return T_ICON[item.type] || "•";
}

// Audio feedback
let audioCtx = null;
function beep(freq, dur, vol) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = freq;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(vol || 0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (dur || 0.08));
    o.start(); o.stop(audioCtx.currentTime + (dur || 0.08));
  } catch(e) {}
}
const sfx = {
  ok:    () => { beep(660, 0.06); setTimeout(() => beep(880, 0.07), 60); },
  err:   () => { beep(220, 0.18, 0.07); },
  click: () => { beep(440, 0.04, 0.04); },
};

//=============================================================================
// UTILITIES
//=============================================================================
function $(id) { return document.getElementById(id); }
function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === "class") node.className = attrs[k];
    else if (k === "html") node.innerHTML = attrs[k];
    else if (k === "text") node.textContent = attrs[k];
    else if (k === "style" && typeof attrs[k] === "object") Object.assign(node.style, attrs[k]);
    else if (k.startsWith("on") && typeof attrs[k] === "function") node.addEventListener(k.slice(2), attrs[k]);
    else if (k === "dataset") for (const dk in attrs[k]) node.dataset[dk] = attrs[k][dk];
    else if (attrs[k] === true) node.setAttribute(k, "");
    else if (attrs[k] === false || attrs[k] == null) {/* skip */}
    else node.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (Array.isArray(c)) c.forEach(cc => cc != null && node.appendChild(typeof cc === "string" ? document.createTextNode(cc) : cc));
    else node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return node;
}
function uuid() {
  return "x" + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
}
function nowIso() { return new Date().toISOString(); }
function fmtDate(iso) {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    return d.toLocaleString("cs-CZ", { dateStyle: "medium", timeStyle: "short" });
  } catch { return iso; }
}
function fmtSize(bytes) {
  if (bytes == null) return "—";
  if (bytes === 0) return "0 B";
  const u = ["B","kB","MB","GB"];
  let i = 0, n = bytes;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return n.toFixed(n < 10 && i > 0 ? 1 : 0) + " " + u[i];
}
function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function getExt(filename) {
  if (!filename) return "";
  const m = /\.([a-zA-Z0-9]+)$/.exec(filename);
  return m ? m[1].toLowerCase() : "";
}
function genVersionFilename(storageId, fileId, partId, ext) {
  // Bez části:  storageid_souborid_2026-04-25_16-23.ext
  // S částí:    storageid_souborid_castid_2026-04-25_16-23.ext
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  const ts = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}`;
  const safeStorage = (storageId || "storage").replace(/[^a-zA-Z0-9_\-]/g,"_");
  const safeFile = (fileId || "file").replace(/[^a-zA-Z0-9_\-]/g,"_");
  const safePart = partId ? (partId.replace(/[^a-zA-Z0-9_\-]/g,"_")) : "";
  const middle = safePart ? `${safeFile}_${safePart}` : safeFile;
  return `${safeStorage}_${middle}_${ts}${ext ? "." + ext : ""}`;
}

// Base64 helpers (URL-safe, no padding) for the ?detail= parameter
function b64urlEncode(s) {
  const bytes = new TextEncoder().encode(s);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/=+$/,"").replace(/\+/g,"-").replace(/\//g,"_");
}
function b64urlDecode(s) {
  let p = s.replace(/-/g,"+").replace(/_/g,"/");
  while (p.length % 4) p += "=";
  const bin = atob(p);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}
// Plain base64 for binary content (file uploads)
function arrayBufferToBase64(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(bin);
}
function base64ToBlob(b64, mime) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new Blob([bytes], { type: mime || "application/octet-stream" });
}

//=============================================================================
// CONFIG (localStorage) — device-global credentials, multi-storage navigation
//=============================================================================
// Struktura v localStorage (v3):
// {
//   apiKey: "ghp_...",                    // GLOBÁLNÍ — jeden GitHub PAT pro celé zařízení
//   deviceName: "...",                    // GLOBÁLNÍ — jméno tohoto zařízení (zobrazuje se u verzí)
//   branch: "main",                       // GLOBÁLNÍ default větev
//   knownRepos: [                         // historie navštívených úložišť (jen pro UX nawigaci)
//     {
//       repoPath: "owner/repo/path",
//       storageId: "...",                 // pamatováno po loadu (zobrazuje se v seznamu)
//       storageName: "...",
//       lastVisited: "ISO datum",
//       branch: "..."                     // OPTIONAL override globální větve
//     },
//     ...
//   ],
//   lastRepoPath: "owner/repo/path"       // co bylo naposled aktivní (kam se vrátit při dalším otevření)
// }
//
// Klíčový princip: API klíč je vlastnost ZAŘÍZENÍ, ne úložiště. Když dostanu URL na nové
// úložiště (i v iframe), přirozeně se použije globální klíč — funguje to okamžitě
// bez nutnosti znovu zadávat credentials.
//
// state.config v paměti je zploštělý ({apiKey, deviceName, repoPath, branch}) — load/save převádí.

function loadFullConfig() {
  // Vrátí celý config v3. Provádí migraci z v2 a v1, pokud jsou k dispozici.
  let cfg = { apiKey: "", deviceName: "", branch: COMMIT_BRANCH_DEFAULT, knownRepos: [], lastRepoPath: "" };
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === "object") {
        cfg.apiKey = parsed.apiKey || "";
        cfg.deviceName = parsed.deviceName || "";
        cfg.branch = parsed.branch || COMMIT_BRANCH_DEFAULT;
        cfg.knownRepos = Array.isArray(parsed.knownRepos) ? parsed.knownRepos : [];
        cfg.lastRepoPath = parsed.lastRepoPath || "";
      }
      return cfg;
    }
    // Migrace v2 → v3: vezmi nejnovější apiKey a branch jako globální, repos[] zploštit do knownRepos[].
    const rawV2 = localStorage.getItem(LS_KEY_V2);
    if (rawV2) {
      const v2 = JSON.parse(rawV2) || {};
      cfg.deviceName = v2.deviceName || "";
      cfg.lastRepoPath = v2.lastRepoPath || "";
      let bestApiKey = "";
      let bestBranch = COMMIT_BRANCH_DEFAULT;
      let bestVisited = "";
      const repos = v2.repos || {};
      for (const rp in repos) {
        const e = repos[rp];
        cfg.knownRepos.push({
          repoPath: rp,
          storageId: e.storageId || "",
          storageName: e.storageName || "",
          lastVisited: e.lastVisited || "",
          branch: e.branch && e.branch !== COMMIT_BRANCH_DEFAULT ? e.branch : undefined,
        });
        // Vezmi globální apiKey z entry s nejnovějším lastVisited (nebo první nenulový)
        if (e.apiKey && (!bestApiKey || (e.lastVisited && e.lastVisited > bestVisited))) {
          bestApiKey = e.apiKey;
          bestBranch = e.branch || COMMIT_BRANCH_DEFAULT;
          bestVisited = e.lastVisited || "";
        }
      }
      cfg.apiKey = bestApiKey;
      cfg.branch = bestBranch;
      // Vyčisti undefined branch (kvůli JSON.stringify)
      cfg.knownRepos = cfg.knownRepos.map(r => {
        const c = Object.assign({}, r);
        if (c.branch === undefined) delete c.branch;
        return c;
      });
      saveFullConfig(cfg);
      try { localStorage.removeItem(LS_KEY_V2); } catch {}
      debug("Migrace konfigurace v2 → v3: API klíč povýšen na globální (per-device).", "ok");
      return cfg;
    }
    // Migrace v1 → v3 (přímá): jeden repo, jeden apiKey, povýšit na globální.
    const rawV1 = localStorage.getItem(LS_KEY_V1);
    if (rawV1) {
      const v1 = JSON.parse(rawV1) || {};
      cfg.apiKey = v1.apiKey || "";
      cfg.deviceName = v1.deviceName || "";
      cfg.branch = v1.branch || COMMIT_BRANCH_DEFAULT;
      if (v1.repoPath) {
        cfg.knownRepos.push({
          repoPath: v1.repoPath, storageId: "", storageName: "", lastVisited: nowIso()
        });
        cfg.lastRepoPath = v1.repoPath;
      }
      saveFullConfig(cfg);
      try { localStorage.removeItem(LS_KEY_V1); } catch {}
      debug("Migrace konfigurace v1 → v3 proběhla.", "ok");
      return cfg;
    }
  } catch(e) {
    debug("Chyba načtení konfigurace: " + e.message, "err");
  }
  return cfg;
}

function saveFullConfig(cfg) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(cfg));
  } catch(e) {
    debug("Chyba uložení konfigurace: " + e.message, "err");
  }
}

  { id: "github-dark", name: "Inspirováno GitHub (tmavé)", group: "Inspirace produkty" },
  { id: "notion-light", name: "Inspirováno Notion (světlé)", group: "Inspirace produkty" },
  { id: "notion-dark", name: "Inspirováno Notion (tmavé)", group: "Inspirace produkty" },

  { id: "swiss", name: "Swiss / Bauhaus", group: "Inspirace produkty" },
];

const THEME_DEFAULT = "light-auto";

function isValidThemeId(id) {
  return !!id && THEMES.some(t => t.id === id);
}

function applyTheme(themeId) {
  // Aplikuje motiv jako data-theme atribut na <html>. Pokud je themeId neplatný,
  // použije se default. Volá se po každém loadu úložiště, vytvoření, a změně v Nastavení.
  const id = isValidThemeId(themeId) ? themeId : THEME_DEFAULT;
  document.documentElement.setAttribute("data-theme", id);
}

function getCurrentThemeId() {
  if (state.storage && isValidThemeId(state.storage.theme)) return state.storage.theme;
  return THEME_DEFAULT;
}

function loadConfig() {
  // Naplní state.config. API klíč a deviceName jsou globální per-device.
  // repoPath přijde z URL (priorita) nebo z lastRepoPath (fallback).
  // branch: pokud má aktuální repo per-repo override v knownRepos, použije se ten;
  //   jinak globální default.
  const full = loadFullConfig();
  state.config.apiKey = full.apiKey || "";
  state.config.deviceName = full.deviceName || "";
  // repoPath: pokud už je nastaven (z URL přečtené dřív), drž se ho; jinak last-used.
  const targetRepo = state.config.repoPath || full.lastRepoPath || "";
  state.config.repoPath = targetRepo;
  // Branch: per-repo override > globální default
  const entry = (full.knownRepos || []).find(r => r.repoPath === targetRepo);
  state.config.branch = (entry && entry.branch) || full.branch || COMMIT_BRANCH_DEFAULT;
  // Diagnostika
  const inIframe = (function() { try { return window.self !== window.top; } catch { return true; } })();
  debug("loadConfig: origin=" + window.location.origin + (inIframe ? " (V IFRAMU)" : "")
    + ", apiKey=" + (state.config.apiKey ? "(je " + state.config.apiKey.length + " znaků)" : "PRÁZDNÝ")
    + ", deviceName=" + (state.config.deviceName || "(není)")
    + ", knownRepos=" + (full.knownRepos || []).length
    + ", repoPath=" + (state.config.repoPath || "(není)"),
    state.config.apiKey ? "ok" : "err"
  );
  // Pokud v iframe a apiKey není, zobraz nápadnou nápovědu
  if (inIframe && !state.config.apiKey) {
    showStatus("V iframe není dostupný globální API klíč. Otevřete aplikaci přímo (mimo iframe), zadejte klíč, a iframe pak načte tu samou storage. Více v debug panelu.", "warning", 12000);
  }
}

function saveConfig() {
  // Uloží globální fields (apiKey, deviceName, branch jako default) + aktualizuje
  // knownRepos[] entry pro aktuální repoPath (lastVisited).
  const full = loadFullConfig();
  full.apiKey = state.config.apiKey || "";
  full.deviceName = state.config.deviceName || "";
  // Globální branch updatujeme jen pokud aktuální config nepoužívá per-repo override.
  // Jednoduššeji: nechej globální branch netknutou; per-repo branch se ukládá zvlášť přes
  // mechanismus knownRepos. Tady jen ukládáme jako default pokud je config.branch jiný než
  // globální + nejde o per-repo override.
  const rp = state.config.repoPath;
  if (rp) {
    if (!Array.isArray(full.knownRepos)) full.knownRepos = [];
    const idx = full.knownRepos.findIndex(r => r.repoPath === rp);
    const existing = idx >= 0 ? full.knownRepos[idx] : null;
    const branchVal = state.config.branch || COMMIT_BRANCH_DEFAULT;
    const entry = {
      repoPath: rp,
      storageId: existing ? (existing.storageId || "") : "",
      storageName: existing ? (existing.storageName || "") : "",
      lastVisited: nowIso(),
    };
    // Pokud branch v configu je jiný než globální default, uložíme per-repo override
    if (branchVal !== (full.branch || COMMIT_BRANCH_DEFAULT)) entry.branch = branchVal;
    if (idx >= 0) full.knownRepos[idx] = entry;
    else full.knownRepos.push(entry);
    full.lastRepoPath = rp;
  }
  saveFullConfig(full);
}

function rememberStorageInfo(storageId, storageName) {
  // Aktualizuje storageId + storageName pro aktuální repoPath (volá se po úspěšném loadu / vytvoření).
  const rp = state.config.repoPath;
  if (!rp) return;
  const full = loadFullConfig();
  if (!Array.isArray(full.knownRepos)) full.knownRepos = [];
  const idx = full.knownRepos.findIndex(r => r.repoPath === rp);
  const branchVal = state.config.branch || COMMIT_BRANCH_DEFAULT;
  const entry = {
    repoPath: rp,
    storageId: storageId || "",
    storageName: storageName || "",
    lastVisited: nowIso(),
  };
  if (branchVal !== (full.branch || COMMIT_BRANCH_DEFAULT)) entry.branch = branchVal;
  if (idx >= 0) full.knownRepos[idx] = entry;
  else full.knownRepos.push(entry);
  full.lastRepoPath = rp;
  saveFullConfig(full);
}

function listKnownRepos() {
  // Vrátí pole známých úložišť, řazené od nejnověji navštívených.
  const full = loadFullConfig();
  const out = (full.knownRepos || []).slice();
  out.sort((a, b) => {
    const ta = a.lastVisited || "", tb = b.lastVisited || "";
    return tb.localeCompare(ta);
  });
  return out;
}

function forgetRepo(repoPath) {
  // Odstraní repo ze seznamu známých úložišť. Globální API klíč zůstává.
  const full = loadFullConfig();
  if (Array.isArray(full.knownRepos)) {
    full.knownRepos = full.knownRepos.filter(r => r.repoPath !== repoPath);
  }
  if (full.lastRepoPath === repoPath) full.lastRepoPath = "";
  saveFullConfig(full);
}

//=============================================================================
// STATUS / DEBUG
//=============================================================================
function showStatus(msg, kind, durationMs) {
  const region = $("status-region");
  const node = el("div", { class: "status-msg" + (kind ? " " + kind : ""), role: kind === "error" ? "alert" : "status" }, msg);
  region.appendChild(node);
  setTimeout(() => {
    node.style.transition = "opacity .25s";
    node.style.opacity = "0";
    setTimeout(() => node.remove(), 260);
  }, durationMs || (kind === "error" ? 6000 : 3500));
  if (kind === "error") sfx.err(); else if (kind === "success") sfx.ok();
}
function debug(msg, kind) {
  const out = $("debug-output");
  const line = el("div", { class: "debug-line" + (kind ? " " + kind : "") }, `[${new Date().toLocaleTimeString("cs-CZ")}] ${msg}`);
  out.appendChild(line);
  out.scrollTop = out.scrollHeight;
  // keep last 200 lines
  while (out.children.length > 200) out.removeChild(out.firstChild);
}

//=============================================================================
// OPERATION LOG (running / ok / err with retry)
//=============================================================================
function beginOp(label, type) {
  const op = {
    id: ++state.opIdSeq,
    ts: Date.now(),
    type: type || "generic",
    label: label || "Operace",
    status: "running",
    error: null,
    retry: null,
    canDismiss: false,
  };
  state.ops.push(op);
  // keep last 80
  while (state.ops.length > 80) state.ops.shift();
  renderOpLog();
  debug("[OP " + op.id + "] start: " + op.label);
  return {
    op,
    update: (newLabel) => {
      op.label = newLabel;
      renderOpLog();
    },
    succeed: (msg) => {
      op.status = "ok";
      op.canDismiss = true;
      if (msg) op.label = msg;
      renderOpLog();
      debug("[OP " + op.id + "] ok: " + op.label, "ok");
      sfx.ok();
    },
    fail: (err, retryFn) => {
      op.status = "err";
      op.error = (err && err.message) ? err.message : String(err);
      op.retry = retryFn || null;
      op.canDismiss = true;
      renderOpLog();
      debug("[OP " + op.id + "] err: " + op.error, "err");
      sfx.err();
    },
  };
}

function dismissOp(opId) {
  const idx = state.ops.findIndex(o => o.id === opId);
  if (idx >= 0) state.ops.splice(idx, 1);
  renderOpLog();
}

function clearDoneOps() {
  state.ops = state.ops.filter(o => o.status === "running");
  // Resetuj user-toggled flag — když user vyčistil log, považujeme to za "fresh state",
  // takže další případná chyba zase auto-rozbalí details.
  const sect = document.getElementById("op-log-section");
  if (sect) delete sect.dataset.userToggled;
  renderOpLog();
}

async function retryAllFailed() {
  const fails = state.ops.filter(o => o.status === "err" && typeof o.retry === "function" && !o.manualRetryOnly);
  for (const o of fails) {
    try {
      await o.retry();
    } catch (e) {
      // each retry handler is responsible for updating the op via beginOp pattern
      debug("Retry-all: chyba u op " + o.id + ": " + (e && e.message ? e.message : e), "err");
    }
  }
}

function renderOpLog() {
  const sect = $("op-log-section");
  const list = $("op-log");
  const summary = $("op-log-summary");
  const retryAllBtn = $("op-log-retry-all");
  if (!sect || !list || !summary) return;
  if (!state.ops.length) {
    sect.hidden = true;
    sect.open = false;
    list.innerHTML = "";
    summary.innerHTML = "";
    return;
  }
  sect.hidden = false;
  list.innerHTML = "";
  let nRun = 0, nOk = 0, nErr = 0;
  for (const op of state.ops.slice().reverse()) {
    if (op.status === "running") nRun++;
    else if (op.status === "ok") nOk++;
    else if (op.status === "err") nErr++;
    const li = el("li", { class: "op-log-item " + op.status });
    const icon = el("span", { class: "op-status-icon", "aria-hidden": "true" });
    if (op.status === "running") {
      icon.appendChild(el("span", { class: "spinner-inline" }));
    } else if (op.status === "ok") {
      icon.textContent = "✓";
    } else {
      icon.textContent = "✗";
    }
    li.appendChild(icon);
    const body = el("div", { class: "op-log-body" });
    const labelLine = el("div", { class: "op-log-label" });
    labelLine.appendChild(el("span", { class: "op-log-time" }, new Date(op.ts).toLocaleTimeString("cs-CZ")));
    labelLine.appendChild(document.createTextNode(op.label));
    // sr-only status word for assistive tech
    const srStatus = op.status === "running" ? "probíhá" : op.status === "ok" ? "úspěch" : "chyba";
    labelLine.appendChild(el("span", { class: "sr-only" }, " (" + srStatus + ")"));
    body.appendChild(labelLine);
    if (op.status === "err" && op.error) {
      body.appendChild(el("div", { class: "op-log-error" }, op.error));
    }
    li.appendChild(body);
    const acts = el("div", { class: "op-log-item-actions" });
    if (op.status === "err" && typeof op.retry === "function") {
      acts.appendChild(el("button", { class: "small primary", onclick: () => { op.retry(); } }, op.retryLabel || "Opakovat"));
    }
    if (op.canDismiss) {
      acts.appendChild(el("button", { class: "small subtle", onclick: () => dismissOp(op.id), "aria-label": "Skrýt z logu" }, "✕"));
    }
    li.appendChild(acts);
    list.appendChild(li);
  }
  // Summary
  summary.innerHTML = "";
  const parts = [];
  if (nRun) parts.push(`<span class="has-run">${nRun} probíhá</span>`);
  if (nErr) parts.push(`<span class="has-fail">${nErr} chyb</span>`);
  if (nOk) parts.push(`${nOk} hotovo`);
  summary.innerHTML = parts.join(" · ") || "&nbsp;";
  // retry-all visible only if there is at least one auto-retryable error
  const autoRetryable = state.ops.some(o => o.status === "err" && typeof o.retry === "function" && !o.manualRetryOnly);
  if (retryAllBtn) retryAllBtn.hidden = !autoRetryable;
  // Auto-rozbalení details při chybě, jinak zůstane podle toho co user zvolil.
  // Pravidlo: pokud uživatel ještě details ručně neotevřel/nezavřel a je tam chyba → otevřít.
  // Po vyřešení chyby (žádné nErr) zavřeme zpět, pokud user nepřepsal.
  if (!sect.dataset.userToggled) {
    const wantOpen = nErr > 0;
    if (sect.open !== wantOpen) {
      sect.dataset.programmatic = "1";
      sect.open = wantOpen;
    }
  }
}

//=============================================================================
// CONFIRM / PROMPT DIALOGS
//=============================================================================
function confirmDialog(message, opts) {
  return new Promise(resolve => {
    const dlg = $("confirm-dialog");
    $("confirm-message").textContent = message;
    $("confirm-title").textContent = (opts && opts.title) || "Potvrzení";
    const ok = $("confirm-ok");
    const cancel = $("confirm-cancel");
    ok.textContent = (opts && opts.okLabel) || "Potvrdit";
    cancel.textContent = (opts && opts.cancelLabel) || "Zrušit";
    ok.className = "primary " + ((opts && opts.danger) ? "danger" : "");
    function close(val) {
      ok.removeEventListener("click", onOk);
      cancel.removeEventListener("click", onCancel);
      dlg.close();
      resolve(val);
    }
    function onOk() { close(true); }
    function onCancel() { close(false); }
    ok.addEventListener("click", onOk);
    cancel.addEventListener("click", onCancel);
    dlg.showModal();
    setTimeout(() => cancel.focus(), 30);
  });
}
function promptDialog(title, fields) {
  // fields: [{name, label, type, value, required, hint}, ...]
  // Special types:
  //   - "textarea": multi-line input
  //   - "tags": checkbox group; value is array of pre-checked tag IDs.
  //     Vrací pole vybraných tagů.
  return new Promise(resolve => {
    const dlg = $("prompt-dialog");
    $("prompt-title").textContent = title;
    const c = $("prompt-fields");
    c.innerHTML = "";
    const inputs = {};
    fields.forEach((f, idx) => {
      const fieldId = "prm-" + f.name;
      const wrap = el("div", { class: "field" });
      wrap.appendChild(el("label", f.type === "tags" ? null : { for: fieldId }, f.label + (f.required ? " *" : "")));
      let input;
      if (f.type === "textarea") {
        input = el("textarea", { id: fieldId, rows: 3 });
        if (f.value != null) input.value = f.value;
        if (f.required) input.required = true;
        if (f.readonly) input.readOnly = true;
        wrap.appendChild(input);
      } else if (f.type === "tags") {
        // Skupina checkboxů. Vstupní hodnota je pole tagů (předem zaškrtnutých).
        const tagsAvailable = getStorageTags();
        const preChecked = new Set((f.value || []).map(normalizeTag));
        if (!tagsAvailable.length) {
          wrap.appendChild(el("div", { class: "hint" }, "V úložišti zatím nejsou žádné tagy. Přidejte je v Nastavení → Vlastnosti úložiště."));
        } else {
          const grp = el("div", { class: "tag-checkbox-group", role: "group", "aria-label": f.label });
          tagsAvailable.forEach((t, i) => {
            const cbId = fieldId + "-" + i;
            const lbl = el("label", { class: "tag-checkbox-label" });
            const cb = el("input", { type: "checkbox", id: cbId, value: t });
            if (preChecked.has(t)) cb.checked = true;
            lbl.appendChild(cb);
            lbl.appendChild(document.createTextNode(" " + t));
            grp.appendChild(lbl);
          });
          wrap.appendChild(grp);
        }
        // Speciální "input" objekt — vrací pole zaškrtnutých
        input = {
          isTagInput: true,
          getValue: () => {
            const result = [];
            wrap.querySelectorAll("input[type=checkbox]:checked").forEach(cb => result.push(cb.value));
            return result.sort((a, b) => a.localeCompare(b, "cs"));
          },
          focus: () => {
            const first = wrap.querySelector("input[type=checkbox]");
            if (first) first.focus();
          },
        };
      } else {
        input = el("input", { id: fieldId, type: f.type || "text" });
        if (f.value != null) input.value = f.value;
        if (f.required) input.required = true;
        if (f.readonly) input.readOnly = true;
        wrap.appendChild(input);
      }
      if (f.hint) wrap.appendChild(el("div", { class: "hint" }, f.hint));
      c.appendChild(wrap);
      inputs[f.name] = input;
    });
    const ok = $("prompt-ok");
    const cancel = $("prompt-cancel");
    function close(val) {
      ok.removeEventListener("click", onOk);
      cancel.removeEventListener("click", onCancel);
      c.removeEventListener("keydown", onKey);
      dlg.close();
      resolve(val);
    }
    function onOk() {
      const result = {};
      for (const k in inputs) {
        const inp = inputs[k];
        const def = fields.find(f => f.name === k);
        if (inp.isTagInput) {
          result[k] = inp.getValue();
        } else {
          const v = inp.value.trim();
          if (def.required && !v) {
            inp.focus();
            showStatus(`Vyplňte pole „${def.label}".`, "warning");
            return;
          }
          result[k] = v;
        }
      }
      close(result);
    }
    function onCancel() { close(null); }
    function onKey(e) {
      if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") { e.preventDefault(); onOk(); }
    }
    ok.addEventListener("click", onOk);
    cancel.addEventListener("click", onCancel);
    c.addEventListener("keydown", onKey);
    dlg.showModal();
    setTimeout(() => {
      // Focus na první ne-readonly ne-tag input. Pokud jen tagy, pak na první checkbox.
      for (const k in inputs) {
        const inp = inputs[k];
        if (inp.isTagInput) continue;
        if (!inp.readOnly) { inp.focus(); return; }
      }
      const firstTag = Object.values(inputs).find(i => i.isTagInput);
      if (firstTag) firstTag.focus();
    }, 30);
  });
}

//=============================================================================
// STORAGE TREE OPERATIONS
//=============================================================================
function emptyStorage(id, name, description) {
  return {
    schema: "dms-storage-v1",
    id: id || "",
    name: name || "Nové úložiště",
    description: description || "",
    theme: THEME_DEFAULT,
    modified: nowIso(),
    rootItems: [],
  };
}

// Find item by ID anywhere in tree. Returns { item, path: [parents..., item], parent }
// id = "root" means root.
function findItem(id, root) {
  root = root || state.storage;
  if (!root) return null;
  if (id === "root" || id == null) {
    return { item: { id: "root", type: T.FOLDER, name: root.name, description: root.description, items: root.rootItems }, path: [], parent: null, isRoot: true };
  }
  function walk(items, parentChain, parentNode) {
    for (const it of items) {
      if (it.id === id) {
        return { item: it, path: parentChain.concat([it]), parent: parentNode, isRoot: false };
      }
      if (it.type === T.FOLDER && it.items && it.items.length) {
        const r = walk(it.items, parentChain.concat([it]), it);
        if (r) return r;
      }
    }
    return null;
  }
  return walk(root.rootItems, [], null);
}

// Find parent folder of an item. Returns parent's items array + index.
function findParent(id, root) {
  root = root || state.storage;
  if (!root || id === "root") return null;
  function walk(items, parentNode) {
    for (let i = 0; i < items.length; i++) {
      if (items[i].id === id) return { items: items, index: i, parent: parentNode };
      if (items[i].type === T.FOLDER && items[i].items) {
        const r = walk(items[i].items, items[i]);
        if (r) return r;
      }
    }
    return null;
  }
  return walk(root.rootItems, null);
}

// Get items array for a folder ID ("root" returns rootItems)
function getFolderItems(folderId) {
  if (!state.storage) return null;
  if (folderId === "root") return state.storage.rootItems;
  const f = findItem(folderId);
  if (!f || f.item.type !== T.FOLDER) return null;
  return f.item.items;
}

// All items flattened (for search)
function flattenItems() {
  const out = [];
  if (!state.storage) return out;
  function walk(items, pathNames) {
    for (const it of items) {
      out.push({ item: it, pathNames: pathNames.slice() });
      if (it.type === T.FOLDER && it.items) walk(it.items, pathNames.concat([it.name]));
    }
  }
  walk(state.storage.rootItems, []);
  return out;
}

// Compute statistics
function computeStats() {
  let folders = 0, files = 0, links = 0, versions = 0, totalSize = 0;
  if (!state.storage) return { folders, files, links, versions, totalSize };
  function walk(items) {
    for (const it of items) {
      if (it.type === T.FOLDER) {
        folders++;
        if (it.items) walk(it.items);
      } else if (it.type === T.FILE) {
        files++;
        if (it.versions) {
          versions += it.versions.length;
          for (const v of it.versions) totalSize += v.size || 0;
        }
      } else if (it.type === T.LINK) {
        links++;
      }
    }
  }
  walk(state.storage.rootItems);
  return { folders, files, links, versions, totalSize };
}

function isFileIdUnique(fileId, excludeItemId) {
  if (!state.storage) return true;
  let unique = true;
  function walk(items) {
    for (const it of items) {
      if (!unique) return;
      if (it.type === T.FILE && it.id === fileId && it.id !== excludeItemId) { unique = false; return; }
      if (it.type === T.FOLDER && it.items) walk(it.items);
    }
  }
  walk(state.storage.rootItems);
  return unique;
}

function markModified() {
  if (state.storage) state.storage.modified = nowIso();
  state.unsaved = true;
  $("unsaved-indicator").hidden = false;
}
function markSaved() {
  state.unsaved = false;
  $("unsaved-indicator").hidden = true;
}

//=============================================================================
// GITHUB API
//=============================================================================
// repoPath format: "owner/repo/optional/path/to/folder"
// returns { owner, repo, dir }
function parseRepoPath(p) {
  if (!p) return null;
  const parts = p.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean);
  if (parts.length < 2) return null;
  return {
    owner: parts[0],
    repo: parts[1],
    dir: parts.slice(2).join("/"), // may be ""
  };
}

function ghHeaders(extra) {
  const h = { "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28" };
  if (state.config.apiKey) h["Authorization"] = "Bearer " + state.config.apiKey;
  if (extra) Object.assign(h, extra);
  return h;
}

async function ghFetch(url, opts) {
  opts = opts || {};
  opts.headers = ghHeaders(opts.headers || {});
  const r = await fetch(url, opts);
  if (!r.ok) {
    const text = await r.text().catch(() => "");
    let msg = `HTTP ${r.status}`;
    try { const j = JSON.parse(text); if (j.message) msg += ": " + j.message; } catch {}
    if (text && !msg.includes(":")) msg += ": " + text.slice(0, 200);
    throw new Error(msg);
  }
  // 204 no content
  if (r.status === 204) return null;
  return await r.json();
}

// Get the current head commit and tree SHAs
async function ghGetHead() {
  const rp = parseRepoPath(state.config.repoPath);
  if (!rp) throw new Error("Není nastavena cesta k úložišti.");
  const branch = state.config.branch || COMMIT_BRANCH_DEFAULT;
  const ref = await ghFetch(`https://api.github.com/repos/${rp.owner}/${rp.repo}/git/refs/heads/${encodeURIComponent(branch)}`);
  return { commitSha: ref.object.sha, owner: rp.owner, repo: rp.repo, dir: rp.dir, branch };
}

// Read file contents from GitHub. Returns { contentBase64, sha, size }
async function ghReadFile(filename) {
  const rp = parseRepoPath(state.config.repoPath);
  if (!rp) throw new Error("Není nastavena cesta k úložišti.");
  const branch = state.config.branch || COMMIT_BRANCH_DEFAULT;
  const path = (rp.dir ? rp.dir + "/" : "") + filename;
  // Use contents API; if file > 1MB, content field is empty -> use blob API
  const url = `https://api.github.com/repos/${rp.owner}/${rp.repo}/contents/${encodeURI(path)}?ref=${encodeURIComponent(branch)}`;
  const res = await ghFetch(url);
  if (res.content && res.content.length > 0) {
    return { contentBase64: res.content.replace(/\n/g, ""), sha: res.sha, size: res.size };
  }
  // Large file: use blob API
  const blobUrl = `https://api.github.com/repos/${rp.owner}/${rp.repo}/git/blobs/${res.sha}`;
  const blob = await ghFetch(blobUrl);
  return { contentBase64: (blob.content || "").replace(/\n/g, ""), sha: res.sha, size: res.size };
}

// Read JSON file
async function ghReadJson(filename) {
  const r = await ghReadFile(filename);
  const text = new TextDecoder().decode(base64ToBlobBytes(r.contentBase64));
  return { data: JSON.parse(text), sha: r.sha };
}
function base64ToBlobBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

// Check if file exists (returns sha or null)
async function ghFileSha(filename) {
  const rp = parseRepoPath(state.config.repoPath);
  if (!rp) throw new Error("Není nastavena cesta k úložišti.");
  const branch = state.config.branch || COMMIT_BRANCH_DEFAULT;
  const path = (rp.dir ? rp.dir + "/" : "") + filename;
  try {
    const res = await ghFetch(`https://api.github.com/repos/${rp.owner}/${rp.repo}/contents/${encodeURI(path)}?ref=${encodeURIComponent(branch)}`);
    return res.sha;
  } catch (e) {
    if (/404/.test(e.message)) return null;
    throw e;
  }
}

// Commit one or more file changes via Git Data API.
// changes: array of { path, contentBase64?, delete? }  (path is relative to repo root, full path)
// Returns the new commit SHA. Also returns map of path -> blob SHA for created/updated blobs.
async function ghCommitChanges(changes, message) {
  if (!state.config.apiKey) throw new Error("Pro zápis je nutný API klíč.");
  const head = await ghGetHead();
  const treeEntries = [];
  const pathToSha = {};
  // 1) Create blobs for additions/updates
  for (const ch of changes) {
    if (ch.delete) {
      treeEntries.push({ path: ch.path, mode: "100644", type: "blob", sha: null });
    } else {
      const blob = await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/blobs`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: ch.contentBase64, encoding: "base64" }),
      });
      treeEntries.push({ path: ch.path, mode: "100644", type: "blob", sha: blob.sha });
      pathToSha[ch.path] = blob.sha;
    }
  }
  // 2) Get current tree (need base_tree for atomic updates)
  const headCommit = await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/commits/${head.commitSha}`);
  // 3) Create new tree
  const newTree = await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/trees`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ base_tree: headCommit.tree.sha, tree: treeEntries }),
  });
