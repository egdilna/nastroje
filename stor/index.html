  // 4) Create new commit
  const newCommit = await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/commits`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: message || "DMS update", tree: newTree.sha, parents: [head.commitSha] }),
  });
  // 5) Update ref
  await ghFetch(`https://api.github.com/repos/${head.owner}/${head.repo}/git/refs/heads/${encodeURIComponent(head.branch)}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sha: newCommit.sha, force: false }),
  });
  return { commitSha: newCommit.sha, pathToSha };
}

function fullRepoPath(filename) {
  const rp = parseRepoPath(state.config.repoPath);
  if (!rp) throw new Error("Není nastavena cesta k úložišti.");
  return (rp.dir ? rp.dir + "/" : "") + filename;
}

//=============================================================================
// HIGH-LEVEL ACTIONS
//=============================================================================
// Serializace state.storage pro push na github.
// Vyhazuje:
//   - verze, které ještě nebyly uploadovány (`pendingUpload: true`)
//     — nemá smysl referencovat v JSONu blob, který na githubu zatím není
//   - flag `pendingUpload` z jakékoliv verze (defenzivně, kdyby zbyl po loadu z dříve poškozeného JSONu)
// `pendingUpload` je čistě runtime UI marker, nesmí přežít serializaci.
function serializeStorage(storage) {
  return JSON.stringify(storage, (key, value) => {
    if (key === "versions" && Array.isArray(value)) {
      return value.filter(v => !v.pendingUpload);
    }
    if (key === "pendingUpload") return undefined;
    return value;
  }, 2);
}

// Defenzivní cleanup po načtení z githubu — v paměti odstraní zbytky
// `pendingUpload` flagu z verzí, které ve skutečnosti existují na githubu
// (atomický commit blob+JSON zaručuje, že verze v JSONu má i blob).
function stripPendingUploadMarkersFromLoadedStorage(storage) {
  if (!storage) return;
  let stripped = 0;
  function walk(items) {
    for (const it of items || []) {
      if (it.type === T.FILE && Array.isArray(it.versions)) {
        for (const v of it.versions) {
          if (v.pendingUpload) { delete v.pendingUpload; stripped++; }
        }
      } else if (it.type === T.FOLDER && it.items) {
        walk(it.items);
      }
    }
  }
  walk(storage.rootItems || []);
  if (stripped > 0) {
    debug("Cleanup: smazáno " + stripped + " zbytečných pendingUpload flagů z načteného JSONu.", "ok");
  }
}

async function pushStorageJson(message) {
  if (!state.storage) return;
  const json = serializeStorage(state.storage);
  const b64 = arrayBufferToBase64(new TextEncoder().encode(json).buffer);
  await ghCommitChanges([{ path: fullRepoPath(STORAGE_FILENAME), contentBase64: b64 }], message || "DMS: update storage.json");
  markSaved();
}

async function pushFileVersionAndJson(versionPath, versionBase64, commitMsg) {
  const json = serializeStorage(state.storage);
  const jsonB64 = arrayBufferToBase64(new TextEncoder().encode(json).buffer);
  const result = await ghCommitChanges([
    { path: versionPath, contentBase64: versionBase64 },
    { path: fullRepoPath(STORAGE_FILENAME), contentBase64: jsonB64 },
  ], commitMsg || "DMS: new version");
  markSaved();
  return result;
}

async function pushDeleteAndJson(pathsToDelete, commitMsg) {
  const json = serializeStorage(state.storage);
  const jsonB64 = arrayBufferToBase64(new TextEncoder().encode(json).buffer);
  const changes = pathsToDelete.map(p => ({ path: p, delete: true }));
  changes.push({ path: fullRepoPath(STORAGE_FILENAME), contentBase64: jsonB64 });
  const result = await ghCommitChanges(changes, commitMsg || "DMS: delete");
  markSaved();
  return result;
}

async function loadStorageFromGithub() {
  const repoLabel = state.config.repoPath || "(bez cesty)";
  const handle = beginOp("Načítám storage.json z " + repoLabel, "load");
  state.loading = true;
  render();
  try {
    const r = await ghReadJson(STORAGE_FILENAME);
    state.storage = r.data;
    if (!state.storage.rootItems) state.storage.rootItems = [];
    // Defenzivní cleanup — pokud staré buggy verze aplikace pushly JSON s `pendingUpload: true`,
    // odstraníme to teď. Atomický commit blob+JSON zaručuje, že verze v loadnutém JSONu má i blob na githubu.
    stripPendingUploadMarkersFromLoadedStorage(state.storage);
    rememberStorageInfo(state.storage.id, state.storage.name);
    const st = computeStats();
    handle.succeed(`Načteno: ${st.folders} složek, ${st.files} souborů, ${st.versions} verzí (${fmtSize(st.totalSize)})`);
    showStatus("Úložiště načteno.", "success");
    markSaved();
    // Aktualizuj title hned po načtení (init by render zavolal taky, ale tohle pokrývá
    // další případy kdy se loadStorageFromGithub volá ručně, např. z openStorage).
    render();
    return true;
  } catch (e) {
    if (/404/.test(e.message)) {
      // Soubor (nebo složka) neexistuje. Tohle není „chyba", ale výzva k vytvoření.
      handle.fail(
        new Error("storage.json v této cestě zatím není. Lze založit nové úložiště — složka se v repu vytvoří automaticky při prvním uložení."),
        () => createNewStorage()
      );
      // Přepiš text retry tlačítka v op-logu a vyloč z hromadného retry
      handle.op.retryLabel = "Vytvořit nové úložiště";
      handle.op.manualRetryOnly = true;
      renderOpLog();
      showStatus("Cesta zatím neobsahuje storage.json — můžete v nastavení založit nové úložiště.", "warning", 8000);
      return false;
    }
    handle.fail(e, () => loadStorageFromGithub());
    showStatus("Chyba načtení: " + e.message, "error", 8000);
    return false;
  } finally {
    state.loading = false;
  }
}


//=============================================================================
// MARKDOWN PARSER WITH CRITICMARKUP SUPPORT
//=============================================================================
// Lightweight Markdown -> HTML. Not full CommonMark, but covers common cases:
// headings, bold/italic, links, images, code (block & inline), lists, quotes,
// tables (simple), hr, paragraphs. Plus CriticMarkup.
function renderMarkdown(src) {
  src = String(src || "").replace(/\r\n/g, "\n");

  // 1) Process CriticMarkup first (works across multi-line for some cases, but we keep it simple/inline)
  src = processCritic(src);

  // 2) Extract code blocks (fenced ```), replace with placeholders so we don't process inside them
  const codeBlocks = [];
  src = src.replace(/```([a-zA-Z0-9_+\-]*)\n([\s\S]*?)```/g, (m, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang, code });
    return `\u0000CB${idx}\u0000`;
  });

  // 3) Parse line by line into blocks
  const lines = src.split("\n");
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    // Code block placeholder
    const cb = /^\u0000CB(\d+)\u0000$/.exec(line);
    if (cb) {
      const b = codeBlocks[+cb[1]];
      out.push(`<pre><code class="language-${escapeHtml(b.lang)}">${escapeHtml(b.code)}</code></pre>`);
      i++; continue;
    }
    // Heading
    const h = /^(#{1,6})\s+(.+?)\s*#*\s*$/.exec(line);
    if (h) {
      const level = h[1].length;
      out.push(`<h${level}>${parseInline(h[2])}</h${level}>`);
      i++; continue;
    }
    // Horizontal rule
    if (/^\s*([-*_])\s*\1\s*\1[-*_\s]*$/.test(line)) {
      out.push("<hr />"); i++; continue;
    }
    // Blockquote
    if (/^>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        buf.push(lines[i].replace(/^>\s?/, ""));
        i++;
      }
      out.push(`<blockquote>${renderMarkdownInner(buf.join("\n"))}</blockquote>`);
      continue;
    }
    // Table (simple): header | header \n --- | --- \n row | row
    if (/\|/.test(line) && i + 1 < lines.length && /^[\s|:\-]+$/.test(lines[i+1]) && /-/.test(lines[i+1])) {
      const headerCells = parseTableRow(line);
      i += 2;
      const rows = [];
      while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim() !== "") {
        rows.push(parseTableRow(lines[i]));
        i++;
      }
      let html = "<table><thead><tr>";
      for (const c of headerCells) html += `<th>${parseInline(c)}</th>`;
      html += "</tr></thead><tbody>";
      for (const r of rows) {
        html += "<tr>";
        for (const c of r) html += `<td>${parseInline(c)}</td>`;
        html += "</tr>";
      }
      html += "</tbody></table>";
      out.push(html);
      continue;
    }
    // Lists (unordered or ordered)
    if (/^\s*([-*+]|\d+\.)\s+/.test(line)) {
      const isOrdered = /^\s*\d+\.\s+/.test(line);
      const buf = [];
      while (i < lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || /^\s+\S/.test(lines[i]) || lines[i].trim() === "")) {
        if (lines[i].trim() === "" && (i + 1 >= lines.length || !/^\s+\S/.test(lines[i+1]) && !/^\s*([-*+]|\d+\.)\s+/.test(lines[i+1]))) break;
        buf.push(lines[i]);
        i++;
      }
      out.push(renderList(buf, isOrdered));
      continue;
    }
    // Empty line
    if (line.trim() === "") { i++; continue; }
    // Paragraph (collect consecutive non-empty lines)
    const pBuf = [line];
    i++;
    while (i < lines.length && lines[i].trim() !== "" && !/^(#{1,6}\s|>\s|\u0000CB|\s*([-*+]|\d+\.)\s|\s*([-*_])\s*\3)/.test(lines[i])) {
      pBuf.push(lines[i]); i++;
    }
    out.push(`<p>${parseInline(pBuf.join(" "))}</p>`);
  }
  return out.join("\n");
}

function renderMarkdownInner(s) {
  // Inner block (e.g. inside blockquote) - just call full renderer
  return renderMarkdown(s);
}

function parseTableRow(line) {
  let s = line.trim();
  if (s.startsWith("|")) s = s.slice(1);
  if (s.endsWith("|")) s = s.slice(0, -1);
  return s.split("|").map(c => c.trim());
}

function renderList(lines, isOrdered) {
  const tag = isOrdered ? "ol" : "ul";
  const items = [];
  let curr = null;
  for (const l of lines) {
    const m = /^(\s*)([-*+]|\d+\.)\s+(.*)$/.exec(l);
    if (m && m[1].length === 0) {
      if (curr) items.push(curr);
      curr = m[3];
    } else if (m) {
      // nested - just append for simplicity
      curr += "\n" + l;
    } else if (curr != null) {
      curr += " " + l.trim();
    }
  }
  if (curr) items.push(curr);
  let html = `<${tag}>`;
  for (const it of items) html += `<li>${parseInline(it)}</li>`;
  html += `</${tag}>`;
  return html;
}

function parseInline(s) {
  s = String(s);
  // Escape special HTML first, but preserve our placeholders for critic markup which we already processed
  // Critic markup output already has HTML tags - we need to not escape those.
  // Strategy: replace our critic HTML with placeholders, escape, then restore.
  const placeholders = [];
  s = s.replace(/<(\/?)(ins|del|mark|span)([^>]*)>/g, (m) => {
    placeholders.push(m);
    return `\u0001${placeholders.length - 1}\u0001`;
  });
  // Code spans: protect them
  const codeSpans = [];
  s = s.replace(/`([^`\n]+)`/g, (m, c) => {
    codeSpans.push(escapeHtml(c));
    return `\u0002${codeSpans.length - 1}\u0002`;
  });
  // Image: ![alt](src)
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (m, alt, src) => `<img alt="${escapeHtml(alt)}" src="${escapeHtml(src)}" />`);
  // Link: [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, t, u) => `<a href="${escapeHtml(u)}" target="_blank" rel="noopener noreferrer">${escapeHtml(t)}</a>`);
  // Bold: **text** or __text__
  s = s.replace(/\*\*([^*\n]+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/__([^_\n]+?)__/g, "<strong>$1</strong>");
  // Italic: *text* or _text_
  s = s.replace(/(^|[\s(>])\*([^*\n]+?)\*(?=[\s).,;:!?]|$)/g, "$1<em>$2</em>");
  s = s.replace(/(^|[\s(>])_([^_\n]+?)_(?=[\s).,;:!?]|$)/g, "$1<em>$2</em>");
  // Line breaks (two spaces at end of line)
  s = s.replace(/  \n/g, "<br/>");
  // Restore placeholders
  s = s.replace(/\u0001(\d+)\u0001/g, (m, idx) => placeholders[+idx]);
  s = s.replace(/\u0002(\d+)\u0002/g, (m, idx) => `<code>${codeSpans[+idx]}</code>`);
  return s;
}

function processCritic(src) {
  // {++addition++}
  src = src.replace(/\{\+\+([\s\S]+?)\+\+\}/g, (m, c) => `<ins class="crit-ins">${c}</ins>`);
  // {--deletion--}
  src = src.replace(/\{--([\s\S]+?)--\}/g, (m, c) => `<del class="crit-del">${c}</del>`);
  // {~~old~>new~~}
  src = src.replace(/\{~~([\s\S]+?)~>([\s\S]+?)~~\}/g, (m, oldT, newT) => `<del class="crit-del">${oldT}</del><ins class="crit-ins">${newT}</ins>`);
  // {==highlight==}{>>comment<<}  (highlight followed by comment is one combined unit)
  // Process the comment-attached pattern first, then standalone marks/comments.
  src = src.replace(/\{==([\s\S]+?)==\}\{>>([\s\S]+?)<<\}/g, (m, h, c) => `<mark class="crit-mark">${h}</mark><span class="crit-comment" title="${escapeHtml(c).replace(/"/g,'&quot;')}">${c}</span>`);
  // {==highlight==}
  src = src.replace(/\{==([\s\S]+?)==\}/g, (m, c) => `<mark class="crit-mark">${c}</mark>`);
  // {>>comment<<}
  src = src.replace(/\{>>([\s\S]+?)<<\}/g, (m, c) => `<span class="crit-comment">${c}</span>`);
  return src;
}

//=============================================================================
// URL HANDLING
//=============================================================================
function encodeDetailParam(repoPath, itemId) {
  return b64urlEncode((repoPath || "") + "|" + (itemId || "root"));
}
function decodeDetailParam(s) {
  try {
    const txt = b64urlDecode(s);
    const idx = txt.lastIndexOf("|");
    if (idx < 0) return null;
    return { repoPath: txt.slice(0, idx), itemId: txt.slice(idx + 1) };
  } catch { return null; }
}
function updateUrl() {
  const param = encodeDetailParam(state.config.repoPath, state.currentDetailId);
  let url = window.location.pathname + "?detail=" + param;
  if (state.viewingVersionId) {
    url += "&v=" + encodeURIComponent(state.viewingVersionId);
  }
  if (state.embedMode) {
    url += "&embed";
  }
  url += window.location.hash;
  window.history.replaceState({}, "", url);
}
function readUrlOnLoad() {
  const params = new URLSearchParams(window.location.search);
  const d = params.get("detail");
  const v = params.get("v");
  // embed je flag bez hodnoty — stačí že parametr existuje (i prázdný, i s hodnotou)
  state.embedMode = params.has("embed");
  // V embed režimu vynutíme read-only — nikdy nepřepneme do edit režimu, ani když by to user
  // chtěl přes klávesovou zkratku (handleGlobalKey to navíc kontroluje).
  if (state.embedMode) state.editMode = false;
  let result = null;
  if (d) {
    const dec = decodeDetailParam(d);
    if (dec) {
      if (dec.repoPath) {
        state.config.repoPath = dec.repoPath;
      }
      state.currentDetailId = dec.itemId || "root";
      result = { repoPath: dec.repoPath, itemId: dec.itemId };
    }
  }
  if (v) {
    state.viewingVersionId = v;
    if (result) result.versionId = v;
  }
  return result;
}

//=============================================================================
// NAVIGATION
//=============================================================================
function navigateTo(itemId) {
  // Cancel any in-flight focus moves; then change current and render
  state.currentDetailId = itemId || "root";
  state.viewingVersionId = null; // navigating to an item resets any version view
  state.filterQuery = "";        // a taky filter ve složce — neexportujeme ho mezi view
  state.filterTags = [];         // a taky tag filtr — každá složka má vlastní
  state.versionFilterPartId = null; // a filter verzí — také reset
  state.editingNoteId = null;       // a editace obsahu poznámky — také reset
  state.editingCommentId = null;    // a editace komentáře — také reset
  // Reset scroll
  try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch { window.scrollTo(0, 0); }
  updateUrl();
  render();
  // Move focus to main heading for screen readers
  setTimeout(() => {
    const m = $("main");
    if (m) m.focus();
  }, 30);
}

function navigateToVersion(file, version) {
  // Switch to viewing-this-version mode for the same file
  state.currentDetailId = file.id;
  state.viewingVersionId = version.filename;
  try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch { window.scrollTo(0, 0); }
  updateUrl();
  render();
  setTimeout(() => {
    const m = $("main");
    if (m) m.focus();
  }, 30);
}

function clearVersionView() {
  state.viewingVersionId = null;
  updateUrl();
  render();
  setTimeout(() => {
    const m = $("main");
    if (m) m.focus();
  }, 30);
}

//=============================================================================
// RENDERING
//=============================================================================
function render() {
  // Aplikuj motiv úložiště na každý render (cheap — jen set atribut).
  applyTheme(getCurrentThemeId());
  // Body class pro embed režim — CSS skrývá hlavičku, breadcrumb, edit-bar, search box, atd.
  document.body.classList.toggle("embed-mode", !!state.embedMode);
  renderHeader();
  renderBreadcrumb();
  renderView();
  renderEditPanel();
  // Edit-mode label color
  $("edit-mode-label").classList.toggle("edit-mode-active", state.editMode);
}

function renderHeader() {
  const s = state.storage;
  // Storage name jako malý popisek nahoře
  $("storage-name").textContent = s ? (s.name || "Úložiště") : "DMS úložiště";
  const desc = s ? (s.description || "") : "";
  $("storage-desc").textContent = desc;
  $("storage-desc").style.display = desc ? "" : "none";

  // H1 = aktuální položka (nebo název úložiště pro root). Vždy s emoji.
  const h1 = $("page-heading");
  h1.innerHTML = "";
  if (!s) {
    h1.appendChild(document.createTextNode("DMS úložiště"));
  } else if (state.currentDetailId === "root" || !state.currentDetailId) {
    h1.appendChild(el("span", { class: "heading-icon" }, T_ICON[T.FOLDER]));
    h1.appendChild(document.createTextNode(s.name || "Úložiště"));
  } else {
    const found = findItem(state.currentDetailId);
    if (found && found.item) {
      h1.appendChild(el("span", { class: "heading-icon" }, iconFor(found.item)));
      h1.appendChild(document.createTextNode(found.item.name || "(bez názvu)"));
    } else {
      h1.appendChild(el("span", { class: "heading-icon" }, T_ICON[T.FOLDER]));
      h1.appendChild(document.createTextNode(s.name || "Úložiště"));
    }
  }

  // Aktualizace document.title — formát: „<název položky> · <název úložiště> – DMS".
  // Pokud aktivní úložiště ještě není načtené, použijeme cachovaný název z knownRepos
  // (aby se v záložce hned zobrazil správný název úložiště, ne výchozí „DMS úložiště").
  let title = "DMS úložiště";
  let storageNameForTitle = "";
  if (s) {
    storageNameForTitle = s.name || s.id || "";
  } else if (state.config.repoPath) {
    // Fallback z lokální historie navštívených úložišť
    try {
      const known = listKnownRepos().find(r => r.repoPath === state.config.repoPath);
      if (known) storageNameForTitle = known.storageName || known.storageId || "";
    } catch {}
  }
  if (storageNameForTitle) {
    if (s && state.currentDetailId && state.currentDetailId !== "root") {
      const found = findItem(state.currentDetailId);
      const itemName = (found && found.item && found.item.name) ? found.item.name : "";
      title = (itemName ? itemName + " · " : "") + storageNameForTitle + " – DMS";
    } else {
      title = storageNameForTitle + " – DMS";
    }
  }
  if (document.title !== title) document.title = title;
}

function renderBreadcrumb() {
  const ol = $("breadcrumb");
  ol.innerHTML = "";
  if (!state.storage) {
    ol.appendChild(el("li", null, el("span", { "aria-current": "page" }, "Žádné úložiště")));
    return;
  }
  // Path: root → ... → current
  const found = findItem(state.currentDetailId);
  if (!found) { state.currentDetailId = "root"; return renderBreadcrumb(); }
  const isRoot = state.currentDetailId === "root";
  // Root crumb (úložiště reprezentováno jako složka)
  const liRoot = el("li");
  const rootLabel = state.storage.name || "Úložiště";
  if (isRoot) {
    liRoot.appendChild(el("span", { "aria-current": "page" },
      el("span", { class: "crumb-icon" }, T_ICON[T.FOLDER]),
      " ",
      rootLabel,
    ));
  } else {
    liRoot.appendChild(el("a", { href: "#", onclick: (e) => { e.preventDefault(); navigateTo("root"); } },
      el("span", { class: "crumb-icon" }, T_ICON[T.FOLDER]),
      " ",
      rootLabel,
    ));
  }
  ol.appendChild(liRoot);
  // Mezilehlé položky + aktuální položka — každá s vlastní ikonou
  for (let i = 0; i < found.path.length; i++) {
    const it = found.path[i];
    const isLast = (i === found.path.length - 1);
    const li = el("li");
    if (isLast) {
      li.appendChild(el("span", { "aria-current": "page" },
        el("span", { class: "crumb-icon" }, iconFor(it)),
        " ",
        it.name,
      ));
    } else {
      li.appendChild(el("a", { href: "#", onclick: (e) => { e.preventDefault(); navigateTo(it.id); } },
        el("span", { class: "crumb-icon" }, iconFor(it)),
        " ",
        it.name,
      ));
    }
    ol.appendChild(li);
  }
}

function renderView() {
  const view = $("view");
  view.innerHTML = "";

  if (!state.storage) {
    renderEmptyApp(view);
    return;
  }
  const found = findItem(state.currentDetailId);
  if (!found) {
    state.currentDetailId = "root";
    return renderView();
  }
  if (found.item.type === T.FOLDER) renderFolderView(view, found);
  else if (found.item.type === T.FILE) renderFileView(view, found);
  else if (found.item.type === T.LINK) renderLinkView(view, found);
  else if (found.item.type === T.NOTE) renderNoteView(view, found);
}

function renderEmptyApp(view) {
  const wrap = el("div", { class: "empty-state" },
    el("p", null, "Žádné úložiště není načteno."),
    el("p", null, "Otevřete režim úprav a v Nastavení zadejte cestu ke github složce, případně vytvořte nové úložiště."),
  );
  view.appendChild(wrap);
}

// ---------- FOLDER VIEW ----------
function renderFolderView(view, found) {
  const folder = found.item;
  const isRoot = state.currentDetailId === "root";
  // Title section — H1 už je v hlavičce stránky, takže zde jen popis (pokud existuje).
  if (!isRoot && (folder.description || getItemTags(folder).length)) {
    const sect = el("section", { class: "detail-section", "aria-label": "Popis složky" });
    if (folder.description) sect.appendChild(el("p", { class: "desc" }, folder.description));
    const tags = getItemTags(folder);
    if (tags.length) {
      const tagsRow = el("div", { class: "item-tags" });
      for (const t of tags) tagsRow.appendChild(el("span", { class: "item-tag" }, t));
      sect.appendChild(tagsRow);
    }
    view.appendChild(sect);
  }

  // Toolbar with search (search se v embed režimu nezobrazuje, sort select ano)
  const toolbar = el("div", { class: "toolbar" });
  if (!state.embedMode) {
    const searchBox = el("div", { class: "search-box" });
    const searchInput = el("input", {
      type: "search", placeholder: "Hledat ve složce...", "aria-label": "Hledat",
      value: state.filterQuery || "",
      oninput: (e) => filterItems(e.target.value),
      id: "folder-search",
    });
    searchBox.appendChild(searchInput);
    toolbar.appendChild(searchBox);
  }
  toolbar.appendChild(el("div", { class: "spacer" }));
  // Sort dropdown — hodnota odráží state.sortMode
  const sortSel = el("select", { "aria-label": "Řazení", onchange: (e) => sortAndRender(e.target.value) },
    el("option", { value: "name" }, "A–Z"),
    el("option", { value: "name-desc" }, "Z–A"),
    el("option", { value: "modified-desc" }, "Naposledy upraveno"),
    el("option", { value: "type" }, "Podle typu"),
  );
  sortSel.value = state.sortMode || "name";
  toolbar.appendChild(sortSel);
  if (state.editMode) {
    toolbar.appendChild(el("button", { class: "primary small", onclick: () => createFolder(folder), title: "Přidat složku (klávesa F)", "aria-label": "Přidat složku" }, "+ " + T_ICON[T.FOLDER]));
    toolbar.appendChild(el("button", { class: "primary small", onclick: () => createLink(folder), title: "Přidat odkaz (klávesa L)", "aria-label": "Přidat odkaz" }, "+ " + T_ICON[T.LINK]));
    toolbar.appendChild(el("button", { class: "primary small", onclick: () => createFile(folder), title: "Přidat soubor (klávesa N)", "aria-label": "Přidat soubor" }, "+ " + T_ICON[T.FILE]));
    toolbar.appendChild(el("button", { class: "primary small", onclick: () => createNote(folder), title: "Přidat poznámku (klávesa M)", "aria-label": "Přidat poznámku" }, "+ " + T_ICON[T.NOTE]));
  }
  view.appendChild(toolbar);

  // Tag filter — sklápěcí details, jen pokud má úložiště nějaké tagy.
  // Auto-rozbalený pokud je aktivní filtr.
  const allTags = getStorageTags();
  if (allTags.length) {
    const det = el("details", { class: "tag-filter-details" });
    if ((state.filterTags || []).length) det.open = true;
    const sum = el("summary");
    sum.appendChild(document.createTextNode("Filtr podle tagů"));
    if ((state.filterTags || []).length) {
      sum.appendChild(el("span", { class: "tag-filter-active" }, " (" + state.filterTags.length + " aktivní)"));
    }
    det.appendChild(sum);
    const grp = el("div", { class: "tag-filter-group", role: "group", "aria-label": "Filtrovat podle tagů" });
    allTags.forEach((t, i) => {
      const cbId = "fld-tag-" + i;
      const lbl = el("label", { class: "tag-checkbox-label" });
      const cb = el("input", { type: "checkbox", id: cbId, value: t });
      if ((state.filterTags || []).includes(t)) cb.checked = true;
      cb.addEventListener("change", (e) => {
        const set = new Set(state.filterTags || []);
        if (e.target.checked) set.add(t); else set.delete(t);
        state.filterTags = Array.from(set).sort((a, b) => a.localeCompare(b, "cs"));
        render();
        // Drž details rozbalený po překreslení (změnili jsme filtr)
      });
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(" " + t));
      grp.appendChild(lbl);
    });
    det.appendChild(grp);
    if ((state.filterTags || []).length) {
      const clearBtn = el("button", {
        class: "small subtle tag-filter-clear",
        onclick: () => { state.filterTags = []; render(); },
      }, "Vymazat filtr");
      det.appendChild(clearBtn);
      det.appendChild(el("div", { class: "hint" }, "Zobrazují se jen položky se VŠEMI vybranými tagy."));
    }
    view.appendChild(det);
  }

  // List — applySort honoruje state.sortMode, plus tag filter
  const rawItems = isRoot ? state.storage.rootItems : (folder.items || []);
  const tagFiltered = filterItemsByTags(rawItems, state.filterTags);
  const items = applySort(tagFiltered);
  if (!items.length) {
    if (rawItems.length && !tagFiltered.length) {
      view.appendChild(el("div", { class: "empty-state" }, "Žádná položka neodpovídá vybraným tagům."));
    } else {
      view.appendChild(el("div", { class: "empty-state" }, "Tato složka je prázdná."));
    }
    return;
  }
  const list = el("ul", { class: "item-list", id: "items-list" });
  view.appendChild(list);
  renderItemList(list, items);
  // Pokud je v state filterQuery, aplikuj ho i hned po renderu (skryje nematching položky)
  if (state.filterQuery) filterItems(state.filterQuery);

  // Edit-mode actions for the folder itself (rename/edit description)
  if (state.editMode && !isRoot) {
    const editBox = el("section", { class: "edit-panel" });
    editBox.appendChild(el("h3", null, "Vlastnosti " + T_ICON[T.FOLDER]));
    editBox.appendChild(el("button", { class: "small", onclick: () => editFolderProps(folder), title: "Přejmenovat / popis (klávesa E)" }, "Přejmenovat / popis"));
    editBox.appendChild(document.createTextNode(" "));
    if (found.path.length > 0) {
      editBox.appendChild(el("button", { class: "small", onclick: () => moveItem(folder.id) }, "Přesunout"));
      editBox.appendChild(document.createTextNode(" "));
    }
    editBox.appendChild(el("button", { class: "small danger", onclick: () => deleteItem(folder.id), "aria-label": "Smazat složku" }, "Smazat " + T_ICON[T.FOLDER]));
    view.appendChild(editBox);
  }
}

function renderItemList(list, items) {
  list.innerHTML = "";
  for (const it of items) {
    list.appendChild(renderItemRow(it));
  }
}
function renderItemRow(it) {
  const li = el("li", { class: "item", dataset: { type: it.type, name: (it.name || "").toLowerCase() } });
  const body = el("div", { class: "item-body" });
  const titleEl = el("h3", { class: "item-title" });
  const linkEl = el("a", { href: "#", class: "item-link", onclick: (e) => { e.preventDefault(); navigateTo(it.id); } },
    el("span", { class: "item-icon" }, iconFor(it)),
    " ",
    el("span", { class: "item-name" }, it.name || "(bez názvu)"),
  );
  titleEl.appendChild(linkEl);
  body.appendChild(titleEl);

  // Meta line
  let metaParts = [];
  if (it.type === T.FOLDER) {
    const ic = (it.items || []).length;
    metaParts.push(`${ic} ${ic === 1 ? "položka" : ic >= 2 && ic <= 4 ? "položky" : "položek"}`);
    // Datum úpravy se počítá rekurzivně z nejnovější změny obsahu (souborů, verzí, odkazů, podsložek).
    const last = lastTimeOf(it);
    if (last) metaParts.push("upraveno: " + fmtDate(last));
  } else if (it.type === T.FILE) {
    const verCount = (it.versions || []).length;
    metaParts.push(`${verCount} ${verCount === 1 ? "verze" : verCount >= 2 && verCount <= 4 ? "verze" : "verzí"}`);
    const lastV = it.versions && it.versions[it.versions.length - 1];
    if (lastV) {
      metaParts.push("poslední: " + fmtDate(lastV.timestamp));
      metaParts.push(fmtSize(lastV.size));
    }
  } else if (it.type === T.LINK) {
    if (it.url) {
      const m = el("span");
      m.textContent = "URL: ";
      const a = el("a", { href: it.url, target: "_blank", rel: "noopener noreferrer" }, it.url.length > 60 ? it.url.slice(0, 57) + "..." : it.url);
      m.appendChild(a);
      body.appendChild(el("div", { class: "item-meta" }, m));
    }
    if (it.modified) metaParts.push("aktualizováno: " + fmtDate(it.modified));
  } else if (it.type === T.NOTE) {
    const last = it.modified || it.created;
    if (last) metaParts.push("upraveno: " + fmtDate(last));
    const len = (it.content || "").length;
    if (len) metaParts.push(len + " znaků");
  }
  if (metaParts.length) body.appendChild(el("div", { class: "item-meta" }, metaParts.join(" · ")));
  if (it.description) body.appendChild(el("div", { class: "item-desc" }, it.description));
  // Tagy — řazené abecedně (getItemTags se postará)
  const itemTags = getItemTags(it);
  if (itemTags.length) {
    const tagsRow = el("div", { class: "item-tags" });
    for (const t of itemTags) {
      tagsRow.appendChild(el("span", { class: "item-tag" }, t));
    }
    body.appendChild(tagsRow);
  }
  li.appendChild(body);

  // Actions in edit mode
  if (state.editMode) {
    const acts = el("div", { class: "item-actions" });
    acts.appendChild(el("button", { class: "small", title: "Upravit", "aria-label": "Upravit " + it.name, onclick: () => editItemProps(it) }, "Upravit"));
    acts.appendChild(el("button", { class: "small", title: "Přesunout", "aria-label": "Přesunout " + it.name, onclick: () => moveItem(it.id) }, "Přesunout"));
    acts.appendChild(el("button", { class: "small danger", title: "Smazat", "aria-label": "Smazat " + it.name, onclick: () => deleteItem(it.id) }, "Smazat"));
    li.appendChild(acts);
  }
  return li;
}

function filterItems(query) {
  // Uloží do state a překreslí celý folder view (ne jen DOM seznamu, aby se to nesneslo s render()em).
  state.filterQuery = query || "";
  // Lazy update jen samotného seznamu (rychlejší než render(), zachová focus v inputu)
  const list = $("items-list");
  if (!list) return;
  const q = state.filterQuery.toLowerCase().trim();
  for (const li of list.children) {
    const name = (li.dataset.name || "").toLowerCase();
    const match = !q || name.includes(q);
    li.style.display = match ? "" : "none";
  }
}
function sortAndRender(mode) {
  // Uloží zvolený režim a překreslí, aby zůstal i po dalších rerenderech.
  state.sortMode = mode || "name";
  render();
}
// Vrátí ISO timestamp poslední úpravy obsahu položky.
// Pro složku se hledá rekurzivně přes všechny potomky (soubory, odkazy, podsložky).
// Pro soubor se bere maximum z modified/created a všech timestampů verzí.
// Pro odkaz se bere modified/created.
function lastTimeOf(it) {
  if (!it) return "";
  let latest = it.modified || it.created || "";
  if (it.type === T.FILE) {
    for (const v of (it.versions || [])) {
      if (v && v.timestamp && v.timestamp > latest) latest = v.timestamp;
    }
  } else if (it.type === T.FOLDER) {
    for (const sub of (it.items || [])) {
      const t = lastTimeOf(sub);
      if (t && t > latest) latest = t;
    }
  }
  return latest;
}
// Aplikuje aktuální sortMode na zadané pole a vrátí novou setříděnou kopii.
// Složky jsou VŽDY nahoře, bez ohledu na zvolený režim řazení.
// Zvolený režim se uplatní pouze v rámci každé skupiny (složky zvlášť, ne-složky zvlášť).
function applySort(items) {
  const mode = state.sortMode || "name";
  const out = items.slice();
  out.sort((a, b) => {
    // Hlavní třídění: složky před vším ostatním
    const aIsFolder = a.type === T.FOLDER;
    const bIsFolder = b.type === T.FOLDER;
    if (aIsFolder !== bIsFolder) return aIsFolder ? -1 : 1;
    // V rámci stejné skupiny použij zvolený režim
    if (mode === "name") return (a.name || "").localeCompare(b.name || "", "cs");
    if (mode === "name-desc") return (b.name || "").localeCompare(a.name || "", "cs");
    if (mode === "modified-desc") {
      const at = lastTimeOf(a), bt = lastTimeOf(b);
      return (bt || "").localeCompare(at || "");
    }
    if (mode === "type") {
      // V rámci ne-složek: nejdřív soubory, pak poznámky, pak odkazy; v rámci typu A–Z
      const order = { folder: 0, file: 1, note: 2, link: 3 };
      const d = (order[a.type] - order[b.type]);
      if (d !== 0) return d;
      return (a.name || "").localeCompare(b.name || "", "cs");
    }
    return 0;
  });
  return out;
}


// ---------- FILE VIEW ----------
function renderFileView(view, found) {
  const file = found.item;
  // ---- VERSION-VIEWING MODE ----
  // If state.viewingVersionId is set and matches a version on this file, render that version's MD inline
  // (full re-render of the page, NOT a modal).
  let activeVersion = null;
  if (state.viewingVersionId && file.versions) {
    activeVersion = file.versions.find(v => v.filename === state.viewingVersionId) || null;
    if (!activeVersion) {
      // Version no longer exists (e.g. deleted) — silently fall back to standard view
      state.viewingVersionId = null;
      updateUrl();
    }
  }

  // 1) File header (always)
  view.appendChild(renderFileHeaderSection(found));

  // 2) ID badge (always)
  view.appendChild(el("section", { class: "detail-section", "aria-label": "Identifikátor souboru" },
    el("p", null,
      el("span", null, "ID souboru: "),
      el("span", { class: "fileid-badge" }, file.id),
    ),
  ));

  // 2b) Parts management section (jen v editmódu)
  if (state.editMode && !activeVersion) {
    const partsSect = el("section", { class: "detail-section", "aria-labelledby": "parts-h" });
    partsSect.appendChild(el("h2", { id: "parts-h" }, "Části (" + getParts(file).length + ")"));
    partsSect.appendChild(el("p", { class: "hint" }, "Část je volitelná podstruktura souboru. Verze může (ale nemusí) patřit k některé části. Pomáhá organizovat verze, když k jednomu souboru patří víc paralelních linek (např. různé subjekty smluv)."));
    const partsList = getParts(file);
    if (partsList.length) {
      const ul = el("ul", { class: "parts-list" });
      for (const p of partsList) {
        const cnt = countVersionsInPart(file, p.id);
        const li = el("li", { class: "part-item" });
        li.appendChild(el("strong", null, p.name));
        li.appendChild(el("span", { class: "part-meta" }, " · ID: " + p.id + " · " + cnt + " " + (cnt === 1 ? "verze" : (cnt >= 2 && cnt <= 4) ? "verze" : "verzí")));
        const acts = el("div", { class: "part-actions" });
        acts.appendChild(el("button", { class: "small", onclick: () => editPart(file, p) }, "Přejmenovat"));
        acts.appendChild(el("button", { class: "small danger", onclick: () => deletePart(file, p) }, "Smazat"));
        li.appendChild(acts);
        ul.appendChild(li);
      }
      partsSect.appendChild(ul);
    }
    partsSect.appendChild(el("button", { class: "primary small", onclick: () => createPart(file) }, "+ Část"));
    view.appendChild(partsSect);
  }

  if (activeVersion) {
    // ---- VERSION DETAIL VIEW ----
    // 3) Version info banner (above MD)
    const banner = el("section", { class: "viewing-version-banner", "aria-label": "Zobrazená verze" });
    // Pokud verze patří k části, ukaž to v banneru
    const part = activeVersion.partId ? findPart(file, activeVersion.partId) : null;
    const versionTitle = part ? (part.name + " — " + fmtDate(activeVersion.timestamp)) : fmtDate(activeVersion.timestamp);
    banner.appendChild(el("strong", null, "Zobrazená verze: " + versionTitle));
    if (activeVersion.description) {
      banner.appendChild(el("div", { style: { marginTop: "4px" } }, activeVersion.description));
    }
    const metaParts = [fmtSize(activeVersion.size)];
    if (activeVersion.device) metaParts.push("zařízení: " + activeVersion.device);
    banner.appendChild(el("span", { class: "version-meta-line" }, metaParts.join(" · ") + " · " + activeVersion.filename));
    const actionRow = el("div", { style: { marginTop: "8px", display: "flex", gap: "16px", flexWrap: "wrap" } });
    actionRow.appendChild(el("a", {
      href: "#",
      onclick: (e) => { e.preventDefault(); clearVersionView(); },
    }, "← Zpět na detail souboru"));
    actionRow.appendChild(el("a", {
      href: "#",
      onclick: (e) => { e.preventDefault(); downloadVersion(activeVersion); },
      "aria-label": "Stáhnout " + activeVersion.filename,
    }, "Stáhnout " + activeVersion.filename));
    banner.appendChild(actionRow);
    view.appendChild(banner);

    // 4) Obsah aktivní verze — náhled podle typu
    const activeKind = getVersionPreviewKind(activeVersion.filename);
    if (activeKind === "markdown" || activeKind === "image" || activeKind === "audio" || activeKind === "video" || activeKind === "pdf") {
      const cls = activeKind === "markdown" ? "markdown-body" : "version-preview-container preview-" + activeKind;
      const previewSect = el("section", { class: "detail-section", "aria-label": "Obsah verze" });
      const previewContainer = el("div", { class: cls, id: "version-preview", "aria-live": "polite" }, "Načítám…");
      previewSect.appendChild(previewContainer);
      view.appendChild(previewSect);
      loadAndRenderVersion(activeVersion, previewContainer);
    } else {
      view.appendChild(el("section", { class: "detail-section" },
        el("p", null, "Tento typ souboru nemá náhled v aplikaci. Můžete ho ",
          el("a", {
            href: "#",
            onclick: (e) => { e.preventDefault(); downloadVersion(activeVersion); },
          }, "stáhnout (" + activeVersion.filename + ")"),
          (activeKind === "html" ? " nebo " : ""),
          (activeKind === "html"
            ? el("a", {
                href: "#",
                onclick: (e) => { e.preventDefault(); openVersionInNewTab(activeVersion); },
              }, "zobrazit v novém okně")
            : ""),
          "."
        ),
      ));
    }
  }

  // 5) Versions list — s volitelným filtrem podle části
  const versSect = el("section", { class: "detail-section", "aria-labelledby": "versions-h" });
  const allVersions = file.versions || [];
  // Aplikuj filter
  const partsAvailable = getParts(file);
  const filterPartId = state.versionFilterPartId; // null = vše, "" = bez části, "<id>" = konkrétní část
  let visibleVersions;
  if (filterPartId === null) {
    visibleVersions = allVersions;
  } else if (filterPartId === "") {
    visibleVersions = allVersions.filter(v => !v.partId);
  } else {
    visibleVersions = allVersions.filter(v => v.partId === filterPartId);
  }
  // Heading dynamický podle aktivního filtru
  let headingText;
  if (filterPartId === null) headingText = "Verze (" + visibleVersions.length + " z " + allVersions.length + ")";
  else if (filterPartId === "") headingText = "Verze bez části (" + visibleVersions.length + ")";
  else {
    const fp = findPart(file, filterPartId);
    headingText = "Verze části " + (fp ? "„" + fp.name + "\"" : filterPartId) + " (" + visibleVersions.length + ")";
  }
  versSect.appendChild(el("h2", { id: "versions-h" }, headingText));

  // Filter UI — zobraz, jen pokud existují části
  if (partsAvailable.length > 0) {
    const filterRow = el("div", { class: "version-filter-row" });
    filterRow.appendChild(el("label", { for: "ver-filter" }, "Zobrazit:"));
    const sel = el("select", {
      id: "ver-filter",
      onchange: (e) => {
        const v = e.target.value;
        if (v === "__all__") state.versionFilterPartId = null;
        else if (v === "__none__") state.versionFilterPartId = "";
        else state.versionFilterPartId = v;
        render();
      }
    });
    sel.appendChild(el("option", { value: "__all__" }, "Všechny verze"));
    sel.appendChild(el("option", { value: "__none__" }, "Bez části"));
    for (const p of partsAvailable) {
      sel.appendChild(el("option", { value: p.id }, p.name));
    }
    sel.value = filterPartId === null ? "__all__" : filterPartId === "" ? "__none__" : filterPartId;
    filterRow.appendChild(sel);
    versSect.appendChild(filterRow);
  }

  if (!visibleVersions.length) {
    if (allVersions.length === 0) {
      versSect.appendChild(el("div", { class: "empty-state" }, "Soubor zatím nemá žádnou verzi. Nahrajte první níže."));
    } else {
      versSect.appendChild(el("div", { class: "empty-state" }, "V této kategorii není žádná verze. Změňte filtr výše."));
    }
  } else {
    const list = el("ul", { class: "versions" });
    visibleVersions.slice().reverse().forEach((v) => {
      list.appendChild(renderVersionItem(file, v, activeVersion === v));
    });
    versSect.appendChild(list);
  }
  view.appendChild(versSect);

  // 5b) Komentáře k souboru (vždy zobrazené, CRUD jen v editmódu)
  view.appendChild(renderFileCommentsSection(file));

  // 6) Upload new version (only if NOT in version-viewing mode, to keep that view focused)
  if (!activeVersion) {
    const uploadSect = el("section", { class: "upload-block", "aria-labelledby": "upload-h", id: "upload-block" });
    uploadSect.appendChild(el("h3", { id: "upload-h" }, "Nahrát novou verzi"));
    const upForm = el("div");
    const fld1 = el("div", { class: "field" });
    fld1.appendChild(el("label", { for: "up-file" }, "Soubor"));
    fld1.appendChild(el("input", { type: "file", id: "up-file", title: "Klávesa: O (otevřít dialog pro výběr souboru)" }));
    fld1.appendChild(el("div", { class: "hint" }, "Tip: klávesa O otevře dialog pro výběr souboru."));
    upForm.appendChild(fld1);
    // Část (jen pokud existují)
    if (partsAvailable.length > 0) {
      const fldP = el("div", { class: "field" });
      fldP.appendChild(el("label", { for: "up-part" }, "Část (volitelně)"));
      const partSel = el("select", { id: "up-part" });
      partSel.appendChild(el("option", { value: "" }, "(žádná část)"));
      for (const p of partsAvailable) {
        partSel.appendChild(el("option", { value: p.id }, p.name));
      }
      // Předvyplníme podle aktuálního filtru, pokud filtruje na konkrétní část
      if (filterPartId && filterPartId !== "") partSel.value = filterPartId;
      fldP.appendChild(partSel);
      upForm.appendChild(fldP);
    }
    const fld2 = el("div", { class: "field" });
    fld2.appendChild(el("label", { for: "up-desc" }, "Popis verze (volitelně)"));
    fld2.appendChild(el("textarea", { id: "up-desc", rows: 2 }));
    upForm.appendChild(fld2);
    upForm.appendChild(el("button", { class: "primary", onclick: () => doUploadVersion(file) }, "Nahrát verzi"));
    uploadSect.appendChild(upForm);
    // drag & drop
    uploadSect.addEventListener("dragover", (e) => { e.preventDefault(); uploadSect.classList.add("dragging"); });
    uploadSect.addEventListener("dragleave", () => uploadSect.classList.remove("dragging"));
    uploadSect.addEventListener("drop", (e) => {
      e.preventDefault(); uploadSect.classList.remove("dragging");
      if (e.dataTransfer.files && e.dataTransfer.files[0]) {
        $("up-file").files = e.dataTransfer.files;
      }
    });
    view.appendChild(uploadSect);
  }

  // 7) File-level edit actions (always available)
  if (state.editMode) {
    const editBox = el("section", { class: "edit-panel" });
    editBox.appendChild(el("h3", null, "Akce " + T_ICON[T.FILE]));
    editBox.appendChild(el("button", { class: "small", onclick: () => editItemProps(file), title: "Přejmenovat / popis (klávesa E)" }, "Přejmenovat / popis"));
    editBox.appendChild(document.createTextNode(" "));
    editBox.appendChild(el("button", { class: "small", onclick: () => moveItem(file.id) }, "Přesunout"));
    editBox.appendChild(document.createTextNode(" "));
    editBox.appendChild(el("button", { class: "small danger", onclick: () => deleteItem(file.id), "aria-label": "Smazat soubor" }, "Smazat " + T_ICON[T.FILE]));
    view.appendChild(editBox);
  }
}

function renderFileHeaderSection(found) {
  const file = found.item;
  const sect = el("section", { class: "detail-section" });
  // H1 s názvem už je nahoře (v page-heading); tady jen popis a meta.
  if (file.description) sect.appendChild(el("p", { class: "desc" }, file.description));
  // Tagy
  const fileTags = getItemTags(file);
  if (fileTags.length) {
    const tagsRow = el("div", { class: "item-tags" });
    for (const t of fileTags) tagsRow.appendChild(el("span", { class: "item-tag" }, t));
    sect.appendChild(tagsRow);
  }
  // Quick meta
  const meta = el("dl", { class: "detail-meta" });
  // Najdi nejnovější verzi která NENÍ pendingUpload (stažení té má smysl jen pro pushnuté)
  const versions = file.versions || [];
  const lastV = versions[versions.length - 1] || null;
  const lastDownloadable = (() => {
    for (let i = versions.length - 1; i >= 0; i--) {
      if (!versions[i].pendingUpload) return versions[i];
    }
    return null;
  })();
  if (lastV) {
    meta.appendChild(el("div", { class: "meta-item" }, el("dt", null, "Poslední verze:"), " ", el("dd", null, fmtDate(lastV.timestamp))));
    meta.appendChild(el("div", { class: "meta-item" }, el("dt", null, "Velikost:"), " ", el("dd", null, fmtSize(lastV.size))));
  }
  if (file.created) {
    meta.appendChild(el("div", { class: "meta-item" }, el("dt", null, "Vytvořeno:"), " ", el("dd", null, fmtDate(file.created))));
  }
  sect.appendChild(meta);
  if (lastDownloadable) {
    sect.appendChild(el("div", { style: { marginTop: "8px" } },
      el("a", {
        href: "#",
        title: "Stáhnout nejnovější verzi (klávesa D)",
        onclick: (e) => { e.preventDefault(); downloadVersion(lastDownloadable); },
      }, "Stáhnout nejnovější verzi"),
    ));
  }
  return sect;
}

function isMarkdownFilename(fn) {
  return /\.md$/i.test(fn || "");
}

// Klasifikace typu souboru podle přípony — určuje, jak se má verze v aplikaci chovat.
// Princip: aplikace nedělá rozhodnutí "spustit cizí HTML jako stránku v naší origin"
// (to GitHub taky nedělá, RAW URL vrací text/plain). Místo toho otevírá náhledy
// v izolovaném prostředí: blob URL v novém tabu (HTML), <img>/<audio>/<video>
// v naší aplikaci přes blob URL (vlastní origin, nemá přístup k naší storage).
function getVersionPreviewKind(filename) {
  const ext = (getExt(filename || "") || "").toLowerCase();
  if (!ext) return "download";
  if (ext === "md" || ext === "markdown") return "markdown";
  if (["png","jpg","jpeg","gif","webp","svg","bmp","ico","avif"].includes(ext)) return "image";
  if (["mp3","wav","ogg","oga","m4a","flac","aac","opus"].includes(ext)) return "audio";
  if (["mp4","webm","ogv","mov","m4v"].includes(ext)) return "video";
  if (ext === "html" || ext === "htm") return "html";
  if (ext === "pdf") return "pdf";
  return "download";
}

// Otevře blob URL v novém tabu se správným Content-Type. Pro HTML to znamená
// renderování stránky v izolovaném `blob:` originu (žádný přístup k naší storage,
// cookies ani API klíči — blob origin je vlastní opaque origin).
async function openVersionInNewTab(version) {
  const handle = beginOp("Připravuji k zobrazení: " + version.filename, "download");
  try {
    const r = await ghReadFile(version.filename);
    const blob = base64ToBlob(r.contentBase64, mimeFromExt(getExt(version.filename)));
    const url = URL.createObjectURL(blob);
    const win = window.open(url, "_blank", "noopener,noreferrer");
    // Browser by se měl o blob URL postarat sám — ale po pár minutách release
    setTimeout(() => URL.revokeObjectURL(url), 5 * 60 * 1000);
    if (!win) {
      // popup blocker
      handle.fail(new Error("Prohlížeč zablokoval otevření nového okna. Povolte popups pro tento web."), () => openVersionInNewTab(version));
      showStatus("Otevření okna zablokováno prohlížečem. Povolte popup pro tento web.", "error", 8000);
    } else {
      handle.succeed("Otevřeno: " + version.filename);
    }
  } catch (e) {
    handle.fail(e, () => openVersionInNewTab(version));
    showStatus("Načtení selhalo: " + e.message, "error", 8000);
  }
}

// Stáhne verzi do paměti a vyrenderuje její obsah do containeru podle typu.
// Funguje pro markdown, obrázky, audio, video, html (přes iframe), pdf (přes embed).
async function loadAndRenderVersion(version, container) {
  const kind = getVersionPreviewKind(version.filename);
  try {
    const r = await ghReadFile(version.filename);
    const mime = mimeFromExt(getExt(version.filename));
    const blob = base64ToBlob(r.contentBase64, mime);
    const url = URL.createObjectURL(blob);
    container.innerHTML = "";
    if (kind === "markdown") {
      const text = new TextDecoder().decode(base64ToBlobBytes(r.contentBase64));
      container.innerHTML = renderMarkdown(text);
      container.querySelectorAll("a[href^='http']").forEach(a => {
        a.setAttribute("target", "_blank");
        a.setAttribute("rel", "noopener noreferrer");
      });
      // markdown nemá blob URL k revoke
      URL.revokeObjectURL(url);
    } else if (kind === "image") {
      const img = el("img", {
        src: url,
        alt: version.filename,
        class: "version-preview-image",
      });
      container.appendChild(img);
      // Po revoke obrázek přestane fungovat, takže URL držíme dlouho
      setTimeout(() => URL.revokeObjectURL(url), 30 * 60 * 1000);
    } else if (kind === "audio") {
      const audio = el("audio", { src: url, controls: true, class: "version-preview-audio" });
      container.appendChild(audio);
      setTimeout(() => URL.revokeObjectURL(url), 30 * 60 * 1000);
    } else if (kind === "video") {
      const video = el("video", { src: url, controls: true, class: "version-preview-video" });
      container.appendChild(video);
      setTimeout(() => URL.revokeObjectURL(url), 30 * 60 * 1000);
    } else if (kind === "pdf") {
      // <embed> je nejspolehlivější napříč browsery
      const emb = el("embed", { src: url, type: "application/pdf", class: "version-preview-pdf" });
      container.appendChild(emb);
      setTimeout(() => URL.revokeObjectURL(url), 30 * 60 * 1000);
    } else {
      // fallback — neumíme zobrazit
      container.appendChild(el("div", { class: "empty-state" },
        "Náhled tohoto typu souboru není k dispozici. Použijte odkaz pro stažení."
      ));
      URL.revokeObjectURL(url);
    }
  } catch (e) {
    container.innerHTML = "";
    container.appendChild(el("div", { class: "empty-state" }, "Nepodařilo se načíst soubor: " + e.message));
    debug("Náhled chyba: " + e.message, "err");
  }
}

async function loadAndRenderMarkdown(version, container) {
  // Zachováno pro zpětnou kompatibilitu — interně volá loadAndRenderVersion.
  return loadAndRenderVersion(version, container);
}

function renderVersionItem(file, version, isActive) {
  const li = el("li", { class: "version" + (isActive ? " active" : "") + (version.pendingUpload ? " pending" : "") });
  const head = el("div", { class: "version-head" });

  // Text odkazu obsahuje všechny informace — screen reader ho přečte přirozeně.
  // Záměrně NEDÁVÁM aria-label, protože by override-oval vizuální text a screen reader
  // by četl verbose duplikát místo čistého textu.
  // - bez části:  "25. 4. 2026 16:30 (pdf)"
  // - s částí:    "Smlouva s Novákem — 25. 4. 2026 16:30 (pdf)"
  const dateText = fmtDate(version.timestamp);
  const ext = getExt(version.filename);
  const extText = ext ? " (" + ext + ")" : "";
  const part = version.partId ? findPart(file, version.partId) : null;
  const linkText = (part ? part.name + " — " : "") + dateText + extText;

  // Datum/část/extension JE primární odkaz. Chování závisí na typu:
  // - markdown / image / audio / video / pdf -> kliknutí zobrazí inline náhled
  // - html -> dva odkazy: "Zobrazit" (otevře v novém tabu jako blob) a "Stáhnout"
  // - ostatní -> kliknutí stáhne
  // - pending upload -> jen text, žádný odkaz
  const kind = getVersionPreviewKind(version.filename);
  const isInlinePreview = (kind === "markdown" || kind === "image" || kind === "audio" || kind === "video" || kind === "pdf");

  if (version.pendingUpload) {
    head.appendChild(el("span", { class: "version-time" }, linkText));
  } else if (isInlinePreview) {
    if (isActive) {
      // už zobrazeno — text bez odkazu, vedle "skrýt náhled"
      head.appendChild(el("span", { class: "version-time" }, linkText));
      head.appendChild(el("span", { class: "version-status-note" },
        " (👁 právě zobrazeno — ",
        el("a", {
          href: "#",
          onclick: (e) => { e.preventDefault(); clearVersionView(); },
        }, "skrýt náhled"),
        ")"
      ));
    } else {
      head.appendChild(el("a", {
        href: "#",
        class: "version-time",
        onclick: (e) => { e.preventDefault(); navigateToVersion(file, version); },
      }, linkText));
    }
  } else if (kind === "html") {
    // HTML: kliknutí na datum stáhne (default = bezpečný), vedle „Zobrazit" otevře v novém tabu
    head.appendChild(el("a", {
      href: "#",
      class: "version-time",
      onclick: (e) => { e.preventDefault(); downloadVersion(version); },
    }, linkText));
    head.appendChild(el("span", { class: "version-status-note" },
      " — ",
      el("a", {
        href: "#",
        onclick: (e) => { e.preventDefault(); openVersionInNewTab(version); },
      }, "Zobrazit"),
    ));
  } else {
    head.appendChild(el("a", {
      href: "#",
      class: "version-time",
      onclick: (e) => { e.preventDefault(); downloadVersion(version); },
    }, linkText));
  }

  const m = [];
  m.push(fmtSize(version.size));
  if (version.device) m.push("zařízení: " + version.device);
  if (version.pendingUpload) m.push("⏳ čeká na upload");
  head.appendChild(el("span", { class: "version-meta" }, m.join(" · ")));
  li.appendChild(head);

  if (version.description) li.appendChild(el("div", { class: "version-desc" }, version.description));

  // Akce v editmódu (a smazat i u pendingUpload, aby šla rozdělaná verze zrušit)
  if (state.editMode) {
    const acts = el("div", { class: "version-actions" });
    if (!version.pendingUpload) {
      acts.appendChild(el("button", { class: "small", onclick: () => editVersionDescription(file, version, li) }, "Upravit popis"));
    }
    acts.appendChild(el("button", { class: "small danger", onclick: () => deleteVersion(file, version) }, "Smazat verzi"));
    li.appendChild(acts);
  }
  return li;
}

// previewMdVersion bylo nahrazeno funkcí navigateToVersion (inline render místo modálu).
// Stub ponechán kvůli zpětné kompatibilitě, kdyby ho někde volal starší kód.
async function previewMdVersion(version) {
  // Najdi aktuální soubor v aktuálním stavu (musí to být stejný soubor jako currentDetailId)
  const found = findItem(state.currentDetailId);
  if (found && found.item && found.item.type === T.FILE) {
    navigateToVersion(found.item, version);
  }
}

function renderLinkView(view, found) {
  const link = found.item;
  const sect = el("section", { class: "detail-section" });
  // H1 s názvem je už v hlavičce stránky
  if (link.description) sect.appendChild(el("p", { class: "desc" }, link.description));
  if (link.url) {
    sect.appendChild(el("p", null,
      el("strong", null, "URL: "),
      el("a", { href: link.url, target: "_blank", rel: "noopener noreferrer" }, link.url),
    ));
  }
  if (link.modified) sect.appendChild(el("p", { class: "item-meta" }, "Aktualizováno: " + fmtDate(link.modified)));
  // Tagy
  const linkTags = getItemTags(link);
  if (linkTags.length) {
    const tagsRow = el("div", { class: "item-tags" });
    for (const t of linkTags) tagsRow.appendChild(el("span", { class: "item-tag" }, t));
    sect.appendChild(tagsRow);
  }
  view.appendChild(sect);
  if (state.editMode) {
    const editBox = el("section", { class: "edit-panel" });
    editBox.appendChild(el("h3", null, "Akce " + T_ICON[T.LINK]));
    editBox.appendChild(el("button", { class: "small", onclick: () => editItemProps(link), title: "Upravit (klávesa E)" }, "Upravit"));

function renderNoteView(view, found) {
  const note = found.item;
  // Header (popis + meta)
  const header = el("section", { class: "detail-section" });
  if (note.description) header.appendChild(el("p", { class: "desc" }, note.description));
  const metaParts = [];
  if (note.modified) metaParts.push("Upraveno: " + fmtDate(note.modified));
  else if (note.created) metaParts.push("Vytvořeno: " + fmtDate(note.created));
  if (metaParts.length) header.appendChild(el("p", { class: "item-meta" }, metaParts.join(" · ")));

  const noteTags = getItemTags(note);
  if (noteTags.length) {
    const tagsRow = el("div", { class: "item-tags" });

  // Akce nad obsahem: kopírovat / stáhnout

  actions.appendChild(el("a", {

  }, "Kopírovat do schránky"));

    href: "#",
    onclick: (e) => { e.preventDefault(); downloadNoteAsMd(note); },
  }, "Stáhnout jako .md"));

    editSect.appendChild(el("h2", { id: "note-edit-h" }, "Úprava poznámky"));

      id: "note-content",
      rows: 20,
      class: "note-textarea",
      placeholder: "Markdown obsah poznámky...",
    });
    ta.value = note.content || "";
    editSect.appendChild(ta);
    const btnRow = el("div", { style: { display: "flex", gap: "8px", marginTop: "8px", flexWrap: "wrap" } });
    btnRow.appendChild(el("button", { class: "primary", onclick: () => saveNoteContent(note) }, "Uložit"));
    btnRow.appendChild(el("button", { class: "small", onclick: () => cancelNoteEdit() }, "Zrušit"));
    editSect.appendChild(btnRow);
    view.appendChild(editSect);
  } else {
    // Render markdownu
    const mdSect = el("section", { class: "detail-section", "aria-label": "Obsah poznámky" });
    if (note.content && note.content.trim()) {
      const mdContainer = el("div", { class: "markdown-body" });
      mdContainer.innerHTML = renderMarkdown(note.content);
      mdSect.appendChild(mdContainer);
    } else {
      mdSect.appendChild(el("div", { class: "empty-state" }, "Poznámka je prázdná." + (state.editMode ? " Klikněte na Upravit obsah níže." : "")));
    }
    view.appendChild(mdSect);
  }

  // Edit panel pro úpravu obsahu / vlastností / akce
  if (state.editMode) {
    const editBox = el("section", { class: "edit-panel" });
    editBox.appendChild(el("h3", null, "Akce " + T_ICON[T.NOTE]));
    if (state.editingNoteId !== note.id) {
      editBox.appendChild(el("button", { class: "primary small", onclick: () => beginNoteEdit(note), title: "Upravit obsah (klávesa O)" }, "Upravit obsah"));
      editBox.appendChild(document.createTextNode(" "));
    }
    editBox.appendChild(el("button", { class: "small", onclick: () => editItemProps(note), title: "Přejmenovat / popis (klávesa E)" }, "Přejmenovat / popis"));
    editBox.appendChild(document.createTextNode(" "));
    editBox.appendChild(el("button", { class: "small", onclick: () => moveItem(note.id) }, "Přesunout"));

    editBox.appendChild(el("button", { class: "small danger", onclick: () => deleteItem(note.id), "aria-label": "Smazat poznámku" }, "Smazat " + T_ICON[T.NOTE]));
    view.appendChild(editBox);

function beginNoteEdit(note) {
  state.editingNoteId = note.id;
  render();
  // Focus na textarea
  setTimeout(() => {
    const ta = $("note-content");
    if (ta) { ta.focus(); }
  }, 30);
}

function cancelNoteEdit() {
  state.editingNoteId = null;
  render();
}

function saveNoteContent(note) {
  const ta = $("note-content");
  if (!ta) return;
  const newContent = ta.value;
  if (newContent !== (note.content || "")) {
    note.content = newContent;
    note.modified = nowIso();
    state.storage.modified = nowIso();
    markModified();
    showStatus("Obsah poznámky uložen.", "success");
  }
  state.editingNoteId = null;
  render();
}

async function copyNoteToClipboard(note) {
  const text = note.content || "";
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      showStatus("Zkopírováno do schránky (" + text.length + " znaků).", "success");
      return;
    }
  } catch (e) {
    debug("Clipboard API selhalo: " + (e.message || e), "err");
  }
  // Fallback: dočasná textarea + execCommand
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    showStatus("Zkopírováno do schránky.", "success");
  } catch (e) {
    showStatus("Kopírování selhalo: " + e.message, "error", 8000);
  }
}

function downloadNoteAsMd(note) {
  const text = note.content || "";
  // Bezpečný název souboru
  const safeName = (note.name || "poznamka").replace(/[^a-zA-Z0-9\u00C0-\u017F_\- ]/g, "_").trim() || "poznamka";
  const filename = safeName + ".md";
  const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 30000);
  showStatus("Staženo: " + filename, "success");
}

function copyDetailUrl() {
  // Funkce odstraněna na žádost uživatele. Ponecháme stub kvůli kompatibilitě, kdyby ji někde volal starý kód.
  const url = window.location.href;
  showStatus("URL: " + url, undefined, 6000);
}

async function moveItem(itemId) {
  if (itemId === "root") return;
  // Build folder tree picker
  const dlg = $("picker-dialog");
  $("picker-title").textContent = "Přesunout";
  $("picker-message").textContent = "Vyberte cílovou složku:";
  const tree = $("picker-tree");
  tree.innerHTML = "";

  // Identify forbidden target (the item itself if it's a folder, or its descendants)
  const sourceFound = findItem(itemId);
  if (!sourceFound) return;
  const forbidden = new Set();
  if (sourceFound.item.type === T.FOLDER) {
    function collect(items) {
      for (const it of items) {
        if (it.type === T.FOLDER) {
          forbidden.add(it.id);
          if (it.items) collect(it.items);
        }
      }
    }
    forbidden.add(sourceFound.item.id);
    if (sourceFound.item.items) collect(sourceFound.item.items);
  }

  let selected = null;
  function buildNode(name, id, items, depth) {
    const li = el("li", { role: "treeitem" });
    const isForbidden = forbidden.has(id);
    const btn = el("button", {
      type: "button",
      "aria-pressed": "false",
      disabled: isForbidden ? true : false,
      onclick: () => {
        if (isForbidden) return;
        for (const b of tree.querySelectorAll("button")) b.setAttribute("aria-pressed", "false");
        btn.setAttribute("aria-pressed", "true");
        selected = id;
      }
    }, "📁 " + name + (isForbidden ? " (nelze)" : ""));
    li.appendChild(btn);
    const folders = (items || []).filter(it => it.type === T.FOLDER);
    if (folders.length) {
      const ul = el("ul", { role: "group" });
      folders.forEach(f => ul.appendChild(buildNode(f.name, f.id, f.items, depth + 1)));
      li.appendChild(ul);
    }
    return li;
  }
  // Root entry
  tree.appendChild(buildNode("(kořen)", "root", state.storage.rootItems, 0));

  return new Promise(resolve => {
    function close(ok) {
      $("picker-ok").removeEventListener("click", onOk);
      $("picker-cancel").removeEventListener("click", onCancel);
      dlg.close();
      resolve(ok);
    }
    async function onOk() {
      if (!selected) { showStatus("Vyberte cílovou složku.", "warning"); return; }
      const par = findParent(itemId);
      if (!par) { showStatus("Položku nelze najít.", "error"); close(false); return; }
      const item = par.items.splice(par.index, 1)[0];
      if (selected === "root") state.storage.rootItems.push(item);
      else {
        const dst = findItem(selected);
        if (!dst.item.items) dst.item.items = [];
        dst.item.items.push(item);
      }
      markModified();
      showStatus("Přesunuto.", "success");
      render();
      close(true);
    }
    function onCancel() { close(false); }
    $("picker-ok").addEventListener("click", onOk);
    $("picker-cancel").addEventListener("click", onCancel);
    dlg.showModal();
  });
}

async function deleteItem(itemId) {
  const found = findItem(itemId);
  if (!found || itemId === "root") return;
  const it = found.item;
  let msg = "Opravdu chcete smazat ";
  let warn = "";
  if (it.type === T.FOLDER) {
    const desc = countDescendants(it);
    msg += `${T_ICON[T.FOLDER]} „${it.name}"`;
    if (desc.files || desc.links || desc.folders) {
      warn = ` Tím smažete i ${desc.folders}× ${T_ICON[T.FOLDER]}, ${desc.files}× ${T_ICON[T.FILE]} (${desc.versions} verzí), ${desc.links}× ${T_ICON[T.LINK]}.`;
    }
  } else if (it.type === T.FILE) {
    const vc = (it.versions || []).length;
    msg += `${T_ICON[T.FILE]} „${it.name}"`;
    if (vc) warn = ` Tím smažete i všech ${vc} verzí.`;
  } else if (it.type === T.LINK) {
    msg += `${T_ICON[T.LINK]} „${it.name}"`;
  } else {
    msg += `„${it.name}"`;
  }
  msg += "?" + warn;
  const ok = await confirmDialog(msg, { title: "Potvrdit smazání", danger: true, okLabel: "Smazat" });
  if (!ok) return;

  // Collect file paths to delete from GitHub
  const pathsToDelete = collectVersionPaths(it);

  // Remove from tree
  const par = findParent(itemId);
  if (par) par.items.splice(par.index, 1);

  // Update modified
  if (par && par.parent) par.parent.modified = nowIso();
  markModified();

  // Push immediately if we have files to delete from github
  if (pathsToDelete.length && state.config.apiKey) {
    const itName = it.name;
    const fullPaths = pathsToDelete.map(fn => fullRepoPath(fn));
    const handle = beginOp("Mažu na githubu: „" + itName + "\" (" + fullPaths.length + " souborů)", "delete");
    try {
      await pushDeleteAndJson(fullPaths, "DMS: smazat položku „" + itName + "\"");
      handle.succeed("Smazáno: „" + itName + "\"");
      showStatus("Smazáno (včetně souborů na githubu).", "success");
    } catch (e) {
      // Note: at this point local tree is already modified. Retry just retries the push.
      handle.fail(e, async () => {
        const h2 = beginOp("Opakuji mazání: „" + itName + "\"", "delete");
        try {
          await pushDeleteAndJson(fullPaths, "DMS: smazat položku „" + itName + "\" (retry)");
          h2.succeed("Smazáno: „" + itName + "\"");
        } catch (e2) { h2.fail(e2, () => h2.op.retry()); }
      });
      showStatus("Smazání selhalo: " + e.message + " — můžete opakovat z panelu operací.", "error", 8000);
    }
  } else if (pathsToDelete.length && !state.config.apiKey) {
    showStatus("Smazáno lokálně. Pro odstranění z githubu doplňte API klíč.", "warning", 6000);
  } else {
    showStatus("Smazáno (uloží se při ukončení režimu úprav).", "success");
  }
  // Navigate to parent
  if (state.currentDetailId === itemId) {
    const parentItem = par && par.parent;
    navigateTo(parentItem ? parentItem.id : "root");
  } else {
    render();
  }
}
function countDescendants(folder) {
  let folders = 0, files = 0, links = 0, versions = 0;
  function walk(items) {
    for (const it of items) {
      if (it.type === T.FOLDER) { folders++; if (it.items) walk(it.items); }
      else if (it.type === T.FILE) { files++; versions += (it.versions || []).length; }
      else if (it.type === T.LINK) { links++; }
    }
  }
  if (folder.items) walk(folder.items);
  return { folders, files, links, versions };
}
function collectVersionPaths(item) {
  const out = [];
  function walk(it) {
    if (it.type === T.FILE && it.versions) {
      for (const v of it.versions) if (v.filename) out.push(v.filename);
    } else if (it.type === T.FOLDER && it.items) {
      for (const sub of it.items) walk(sub);
    }
  }
  walk(item);
  return out;
}

//=============================================================================
// TAGS — seznam povolených tagů na úrovni úložiště
//=============================================================================
// Datový model: state.storage.tags = ["alfa", "beta", "gama"] (lowercase, řazené abecedně).
// Položka: item.tags = ["alfa", "beta"] (lowercase, řazené abecedně).
// Case-insensitive: vstupy se normalizují přes normalizeTag().

function normalizeTag(t) {
  return (t || "").toString().trim().toLowerCase();
}

function getStorageTags() {
  if (!state.storage) return [];
  if (!Array.isArray(state.storage.tags)) return [];
  // Vrať kopii řazenou abecedně (česky)
  return state.storage.tags.slice().sort((a, b) => a.localeCompare(b, "cs"));
}

function setStorageTags(arr) {
  // Normalizuj, deduplikuj, seřaď
  const set = new Set();
  for (const t of (arr || [])) {
    const n = normalizeTag(t);
    if (n) set.add(n);
  }
  const sorted = Array.from(set).sort((a, b) => a.localeCompare(b, "cs"));
  if (!state.storage) return;
  state.storage.tags = sorted;
}

// Parse "alfa, Beta, GAMA" -> ["alfa", "beta", "gama"]
function parseTagList(str) {
  if (!str) return [];
  return str.split(/[,;\n]+/).map(s => normalizeTag(s)).filter(Boolean);
}

function getItemTags(item) {
  if (!item || !Array.isArray(item.tags)) return [];
  // Filtruj jen ty které ještě existují v storage tags (cleanup po smazání tagu)
  const valid = new Set(getStorageTags());
  return item.tags.filter(t => valid.has(t)).slice().sort((a, b) => a.localeCompare(b, "cs"));
}

function setItemTags(item, arr) {
  // Normalizuj, deduplikuj, seřaď, omez na povolené tagy úložiště
  const valid = new Set(getStorageTags());
  const set = new Set();
  for (const t of (arr || [])) {
    const n = normalizeTag(t);
    if (n && valid.has(n)) set.add(n);
  }
  const sorted = Array.from(set).sort((a, b) => a.localeCompare(b, "cs"));
  if (sorted.length) {
    item.tags = sorted;
  } else {
    delete item.tags;
  }
}

// Cleanup: odebrat zadané tagy ze všech položek úložiště.
// Volá se po smazání tagu z definice úložiště.
function removeTagFromAllItems(tagId) {
  if (!state.storage) return 0;
  let count = 0;
  function walk(items) {
    for (const it of (items || [])) {
      if (Array.isArray(it.tags) && it.tags.includes(tagId)) {
        it.tags = it.tags.filter(t => t !== tagId);
        if (!it.tags.length) delete it.tags;
        count++;
      }
      if (it.type === T.FOLDER && it.items) walk(it.items);
    }
  }
  walk(state.storage.rootItems);
  return count;
}

function countItemsWithTag(tagId) {
  if (!state.storage) return 0;
  let count = 0;
  function walk(items) {
    for (const it of (items || [])) {
      if (Array.isArray(it.tags) && it.tags.includes(tagId)) count++;
      if (it.type === T.FOLDER && it.items) walk(it.items);
    }
  }
  walk(state.storage.rootItems);
  return count;
}

// Filter položek podle vybraných tagů (AND logika).
// Pokud filterTags je prázdné, vrátí items beze změny.
function filterItemsByTags(items, filterTags) {
  if (!filterTags || !filterTags.length) return items;
  const need = filterTags.map(normalizeTag).filter(Boolean);
  if (!need.length) return items;
  return items.filter(it => {
    const itemTags = Array.isArray(it.tags) ? it.tags : [];
    return need.every(t => itemTags.includes(t));
  });
}

//=============================================================================
// PARTS — správa "částí" souboru
//=============================================================================
// Část (part) je volitelná podstruktura souboru. Verze může patřit k jedné části
// nebo k žádné. Filename zahrnuje partId mezi fileId a timestampem.
// Datový model: file.parts = [{ id, name }, ...] — volitelný, default neexistující/[]

function getParts(file) {
  return Array.isArray(file.parts) ? file.parts : [];
}

function findPart(file, partId) {
  if (!partId) return null;
  return getParts(file).find(p => p.id === partId) || null;
}

function isPartIdUnique(file, partId, ignorePart) {
  return !getParts(file).some(p => p.id === partId && p !== ignorePart);
}

function countVersionsInPart(file, partId) {
  return (file.versions || []).filter(v => (v.partId || "") === (partId || "")).length;
}

async function createPart(file) {
  const r = await promptDialog("Vytvořit část souboru", [
    { name: "id", label: "ID části", required: true, hint: "Jen a-z, 0-9, _, -. Použito v názvech souborů." },
    { name: "name", label: "Název části", required: true, hint: "Co se zobrazí v odkazu verze." },
  ]);
  if (!r) return;
  if (!/^[a-zA-Z0-9_\-]+$/.test(r.id)) {
    showStatus("Chybný formát ID části. Jen a-z, 0-9, _, -.", "warning");
    return;
  }
  if (!isPartIdUnique(file, r.id)) {
    showStatus("Část s tímto ID už existuje.", "warning");
    return;
  }
  if (!Array.isArray(file.parts)) file.parts = [];
  file.parts.push({ id: r.id, name: r.name });
  file.modified = nowIso();
  state.storage.modified = nowIso();
  markModified();
  showStatus("Část vytvořena.", "success");
  render();
}

async function editPart(file, part) {
  const r = await promptDialog("Upravit část souboru", [
    { name: "id", label: "ID části (neměnné)", required: true, value: part.id, readonly: true },
    { name: "name", label: "Název části", required: true, value: part.name },
  ]);
  if (!r) return;
  // ID je neměnné, ignorujeme
  if (r.name && r.name !== part.name) {
    part.name = r.name;
    file.modified = nowIso();
    state.storage.modified = nowIso();
    markModified();
    showStatus("Část upravena.", "success");
    render();
  }
}

async function deletePart(file, part) {
  const cnt = countVersionsInPart(file, part.id);
  if (cnt > 0) {
    showStatus(`Nelze smazat část „${part.name}" — patří k ní ${cnt} verzí. Nejdřív smažte verze.`, "warning", 8000);
    return;
  }
  const ok = await confirmDialog(`Opravdu smazat část „${part.name}"? (Verze k ní nepatří, takže žádné soubory se nemažou.)`, {
    title: "Smazat část", danger: true, okLabel: "Smazat",
  });
  if (!ok) return;
  const idx = file.parts.indexOf(part);
  if (idx >= 0) file.parts.splice(idx, 1);
  file.modified = nowIso();
  state.storage.modified = nowIso();
  markModified();
  showStatus("Část smazána.", "success");
  render();
}
