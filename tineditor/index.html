<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIN Editor — Target Instruction Notation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        .instruction-do { border-left: 4px solid #10b981; }
        .instruction-dont { border-left: 4px solid #ef4444; }
        .instruction-note { border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900" x-data="tinEditor()">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 text-white p-1.5 rounded-lg">
                    <i data-lucide="target" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">TIN Editor <span class="text-gray-400 font-normal text-sm">v1.0</span></h1>
            </div>
            <div class="flex gap-2">
                <button @click="importJSON" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                    <i data-lucide="upload" class="w-4 h-4"></i> Import
                </button>
                <button @click="exportJSON" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 shadow-sm">
                    <i data-lucide="download" class="w-4 h-4"></i> Export JSON
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 pb-32">
        
        <section class="bg-white p-6 rounded-xl shadow-sm border mb-8">
            <div class="flex items-center gap-2 mb-6 text-indigo-600">
                <i data-lucide="info" class="w-5 h-5"></i>
                <h2 class="text-lg font-bold text-gray-800">Metadata</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ID (Reverse-DNS or UUID) *</label>
                    <input type="text" x-model="tin.metadata.id" placeholder="cz.example.role-name" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Human Name *</label>
                    <input type="text" x-model="tin.metadata.name" placeholder="Assistant Role" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Language (ISO 639-1) *</label>
                    <input type="text" x-model="tin.metadata.lang" placeholder="en-US" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Version (Semver) *</label>
                    <input type="text" x-model="tin.metadata.version" placeholder="1.0.0" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm border p-2">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Purpose</label>
                    <textarea x-model="tin.metadata.purpose" rows="2" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm border p-2"></textarea>
                </div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm border mb-8">
            <div class="flex items-center gap-2 mb-6 text-indigo-600">
                <i data-lucide="map" class="w-5 h-5"></i>
                <h2 class="text-lg font-bold text-gray-800">Context</h2>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Scope</label>
                    <input type="text" x-model="tin.context.scope" class="w-full border-gray-300 rounded-md shadow-sm border p-2 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Out of Scope</label>
                    <input type="text" x-model="tin.context.out_of_scope" class="w-full border-gray-300 rounded-md shadow-sm border p-2 sm:text-sm">
                </div>
            </div>
        </section>

        <section class="mb-8">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2 text-indigo-600">
                    <i data-lucide="list-checks" class="w-5 h-5"></i>
                    <h2 class="text-lg font-bold text-gray-800">Instruction Sections</h2>
                </div>
                <button @click="addSection(tin.sections)" class="text-sm bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-md hover:bg-indigo-100 font-medium">
                    + Add Top-Level Section
                </button>
            </div>

            <template x-for="(section, index) in tin.sections" :key="section.id">
                <div class="bg-white border rounded-xl mb-4 overflow-hidden shadow-sm">
                    <div class="bg-gray-50 px-4 py-3 border-b flex justify-between items-center">
                        <div class="flex items-center gap-4 flex-1">
                            <input type="text" x-model="section.title" placeholder="Section Title" class="font-bold bg-transparent border-none focus:ring-0 p-0 text-gray-800 w-1/3">
                            <input type="text" x-model="section.id" placeholder="section-id" class="text-xs font-mono text-gray-400 bg-transparent border-none focus:ring-0 p-0">
                        </div>
                        <button @click="removeSection(tin.sections, index)" class="text-red-400 hover:text-red-600">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    
                    <div class="p-4">
                        <div class="space-y-3 mb-4">
                            <template x-for="(inst, iIdx) in section.instructions" :key="iIdx">
                                <div :class="'flex gap-3 p-3 rounded-lg border ' + 'instruction-' + inst.type">
                                    <select x-model="inst.type" class="text-xs font-bold uppercase border-none bg-gray-100 rounded focus:ring-0">
                                        <option value="do">DO</option>
                                        <option value="dont">DON'T</option>
                                        <option value="note">NOTE</option>
                                    </select>
                                    <textarea x-model="inst.text" rows="1" class="flex-1 border-none focus:ring-0 text-sm p-0 bg-transparent" placeholder="Type instruction here (Markdown supported)..."></textarea>
                                    <button @click="section.instructions.splice(iIdx, 1)" class="text-gray-300 hover:text-red-500">
                                        <i data-lucide="x" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </template>
                        </div>
                        
                        <div class="flex gap-2">
                            <button @click="addInstruction(section)" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded hover:bg-gray-200">+ Instruction</button>
                            <button @click="addArea(section)" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded hover:bg-gray-200">+ Sub-area</button>
                        </div>

                        <div x-show="section.areas && section.areas.length > 0" class="mt-4 ml-6 border-l-2 border-dashed pl-4 space-y-4">
                             <template x-for="(area, aIdx) in section.areas" :key="area.id">
                                <div class="bg-gray-50 border rounded-lg p-3">
                                    <div class="flex justify-between items-center mb-2">
                                        <input type="text" x-model="area.title" class="font-semibold text-sm bg-transparent border-none p-0 focus:ring-0" placeholder="Sub-section title">
                                        <button @click="section.areas.splice(aIdx, 1)" class="text-red-300 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                                    </div>
                                    <template x-for="(ai, aiIdx) in area.instructions" :key="aiIdx">
                                        <div class="flex gap-2 mb-1">
                                            <div :class="'w-1 rounded ' + (ai.type=='do'?'bg-emerald-500':ai.type=='dont'?'bg-red-500':'bg-blue-500')"></div>
                                            <input type="text" x-model="ai.text" class="text-xs flex-1 border-none bg-white rounded px-1" placeholder="...">
                                        </div>
                                    </template>
                                    <button @click="addInstruction(area)" class="text-[10px] text-indigo-500 mt-1 uppercase font-bold">+ Add Step</button>
                                </div>
                             </template>
                        </div>
                    </div>
                </div>
            </template>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm border mb-8">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2 text-indigo-600">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    <h2 class="text-lg font-bold text-gray-800">Referenced Files</h2>
                </div>
                <button @click="addFile()" class="text-sm bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-md hover:bg-indigo-100 font-medium">+ Add File</button>
            </div>
            <div class="space-y-4">
                <template x-for="(file, fIdx) in tin.files" :key="fIdx">
                    <div class="p-4 border rounded-lg relative bg-gray-50/50">
                        <button @click="tin.files.splice(fIdx, 1)" class="absolute top-4 right-4 text-gray-400 hover:text-red-500">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] uppercase font-bold text-gray-400">File ID</label>
                                <input type="text" x-model="file.id" class="w-full border-gray-200 rounded text-sm p-1">
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase font-bold text-gray-400">URI / Path</label>
                                <input type="text" x-model="file.uri" class="w-full border-gray-200 rounded text-sm p-1">
                            </div>
                            <div class="col-span-2">
                                <label class="block text-[10px] uppercase font-bold text-gray-400">Understand (Authority)</label>
                                <input type="text" x-model="file.understand" placeholder="e.g. This is the primary legal regulation..." class="w-full border-gray-200 rounded text-sm p-1">
                            </div>
                            <div class="col-span-2">
                                <label class="block text-[10px] uppercase font-bold text-gray-400">Usage Instructions</label>
                                <input type="text" x-model="file.use" placeholder="e.g. Follow the naming conventions defined in Section 2." class="w-full border-gray-200 rounded text-sm p-1">
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm border mb-8">
            <div class="flex items-center gap-2 mb-6 text-indigo-600">
                <i data-lucide="terminal" class="w-5 h-5"></i>
                <h2 class="text-lg font-bold text-gray-800">Expected Output</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea x-model="tin.output.description" rows="2" placeholder="Describe the format, tone, and length..." class="w-full border-gray-300 rounded-md shadow-sm border p-2 sm:text-sm"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">MIME Language</label>
                    <input type="text" x-model="tin.output.language" placeholder="text/markdown" class="w-full border-gray-300 rounded-md shadow-sm border p-2 sm:text-sm">
                </div>
            </div>
        </section>

    </main>

    <input type="file" id="importFile" class="hidden" @change="handleFileImport" accept=".json">

    <script>
        function tinEditor() {
            return {
                tin: {
                    tin: "1.0",
                    metadata: {
                        id: "",
                        name: "",
                        lang: "en",
                        version: "1.0.0",
                        purpose: "",
                        type: "role"
                    },
                    context: {
                        scope: "",
                        out_of_scope: ""
                    },
                    sections: [],
                    files: [],
                    output: {
                        description: "",
                        language: "text/markdown"
                    }
                },

                init() {
                    // Start with one empty section
                    this.addSection(this.tin.sections);
                    lucide.createIcons();
                    
                    // Refresh icons after Alpine renders
                    this.$watch('tin', () => {
                        this.$nextTick(() => lucide.createIcons());
                    });
                },

                addSection(targetArray) {
                    const id = 'sec-' + Math.random().toString(36).substr(2, 5);
                    targetArray.push({
                        id: id,
                        title: '',
                        instructions: [],
                        areas: []
                    });
                },

                removeSection(targetArray, index) {
                    if (confirm('Delete this section and all its contents?')) {
                        targetArray.splice(index, 1);
                    }
                },

                addInstruction(section) {
                    if (!section.instructions) section.instructions = [];
                    section.instructions.push({ type: 'do', text: '' });
                },

                addArea(section) {
                    if (!section.areas) section.areas = [];
                    this.addSection(section.areas);
                },

                addFile() {
                    this.tin.files.push({
                        id: 'file-' + (this.tin.files.length + 1),
                        uri: '',
                        understand: '',
                        use: ''
                    });
                },

                exportJSON() {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.tin, null, 2));
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute("href", dataStr);
                    downloadAnchorNode.setAttribute("download", (this.tin.metadata.id || "instruction") + ".tin.json");
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                },

                importJSON() {
                    document.getElementById('importFile').click();
                },

                handleFileImport(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const imported = JSON.parse(e.target.result);
                            // Basic merge to ensure reactivity and required structure
                            this.tin = Object.assign({}, this.tin, imported);
                            alert('TIN loaded successfully!');
                        } catch (err) {
                            alert('Error parsing JSON file.');
                        }
                    };
                    reader.readAsText(file);
                }
            }
        }
    </script>
</body>
</html>
