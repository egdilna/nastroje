<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS Editor — ElevenLabs Proof Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --border-focus: #e0a020;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #e0a020;
    --accent-dim: #7a5800;
    --danger: #c0392b;
    --success: #27ae60;
    --playing: #1a6640;
    --generated: #1a3a5c;
    --chunk-gap: 0.75rem;
    --radius: 3px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 1rem;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Skip link */
  .skip-link {
    position: absolute;
    top: -999px;
    left: 0;
    background: var(--accent);
    color: #000;
    padding: 0.5rem 1rem;
    font-weight: 600;
    z-index: 9999;
    text-decoration: none;
  }
  .skip-link:focus { top: 0; }

  /* Layout */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
    letter-spacing: -0.02em;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    flex: 1;
  }

  /* Form controls */
  label {
    font-size: 0.85rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  input[type="password"], input[type="text"], select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.4rem 0.6rem;
    border-radius: var(--radius);
    transition: border-color 0.15s;
  }
  input[type="password"]:focus,
  input[type="text"]:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 2px rgba(224, 160, 32, 0.25);
  }

  select { cursor: pointer; min-width: 12rem; max-width: 22rem; }
  input[type="password"] { width: 14rem; font-family: 'IBM Plex Mono', monospace; }

  /* Buttons */
  button {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.4rem 0.85rem;
    border-radius: var(--radius);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) { background: #f0b030; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border-color: var(--danger);
  }
  .btn-danger:hover:not(:disabled) { background: var(--danger); color: #fff; }

  .btn-icon {
    background: transparent;
    color: var(--text-dim);
    border-color: transparent;
    padding: 0.3rem 0.5rem;
    font-size: 1rem;
  }
  .btn-icon:hover:not(:disabled) { color: var(--text); border-color: var(--border); }

  /* API key area */
  .api-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* Voice selector area */
  .voice-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* Status bar */
  #status-bar {
    padding: 0.4rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-dim);
    min-height: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  #status-bar .status-msg { flex: 1; }
  #status-bar .status-msg[data-type="error"] { color: #e74c3c; }
  #status-bar .status-msg[data-type="ok"] { color: var(--success); }
  #status-bar .status-msg[data-type="info"] { color: var(--accent); }

  /* Main content */
  main {
    flex: 1;
    padding: 1.5rem;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }

  /* Toolbar */
  #toolbar {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  /* Import area */
  #import-section {
    margin-bottom: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }
  #import-section h2 {
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
    font-weight: 500;
  }
  #import-textarea {
    width: 100%;
    min-height: 7rem;
    resize: vertical;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .import-actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.6rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .import-actions label { color: var(--text); font-size: 0.85rem; }
  .import-actions input[type="number"] {
    width: 4.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    padding: 0.35rem 0.5rem;
    border-radius: var(--radius);
  }

  /* Chunks list */
  #chunks-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: var(--chunk-gap);
  }

  /* Individual chunk */
  .chunk-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .chunk-item:focus-within { border-color: var(--border-focus); }
  .chunk-item.is-playing { border-color: var(--success); background: var(--playing); }
  .chunk-item.has-audio { border-left: 3px solid var(--accent-dim); }
  .chunk-item.is-playing { border-left-color: var(--success); }

  .chunk-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .chunk-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    min-width: 2.5rem;
    font-weight: 600;
  }

  .chunk-charcount {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    min-width: 4rem;
    flex-shrink: 0;
  }

  .chunk-duration {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--accent);
    min-width: 3.5rem;
    flex-shrink: 0;
  }

  .chunk-actions {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .chunk-status {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-left: auto;
    font-style: italic;
  }
  .chunk-status.ok { color: var(--success); }
  .chunk-status.playing { color: var(--success); font-weight: 600; }
  .chunk-status.generating { color: var(--accent); }
  .chunk-status.error { color: #e74c3c; }

  .chunk-body {
    padding: 0.5rem 0.75rem;
  }

  .chunk-textarea {
    width: 100%;
    min-height: 4rem;
    resize: vertical;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.95rem;
    line-height: 1.6;
    padding: 0.25rem 0;
  }
  .chunk-textarea:focus {
    outline: none;
  }

  .chunk-player {
    padding: 0.25rem 0.75rem 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .chunk-player audio {
    flex: 1;
    height: 2rem;
    min-width: 10rem;
  }

  .chunk-item.is-done { border-left: 3px solid var(--success); }
  .chunk-item.is-done .chunk-header { background: #1a2a1a; }

  .chunk-done-label {
    display: block;
    padding: 0.4rem 0;
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Output section */
  #output-section {
    margin-top: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }
  #output-section h2 {
    font-size: 0.9rem;
    color: var(--text-dim);
    font-weight: 500;
    margin-bottom: 0.6rem;
  }
  #output-textarea {
    width: 100%;
    min-height: 8rem;
    resize: vertical;
    font-size: 0.9rem;
    line-height: 1.5;
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--surface2);
  }
  .output-actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.6rem;
  }

  /* Separator */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  /* Live region for screen reader announcements */
  #sr-live {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }

  /* Settings dialog */
  dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 1.5rem;
    max-width: 30rem;
    width: 90vw;
  }
  dialog::backdrop { background: rgba(0,0,0,0.7); }
  dialog h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--accent); }
  .dialog-row { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.9rem; }
  .dialog-row label { font-size: 0.85rem; color: var(--text-dim); }
  .dialog-row input, .dialog-row select { width: 100%; }
  .dialog-actions { display: flex; gap: 0.6rem; margin-top: 1rem; justify-content: flex-end; }

  /* Responsive */
  @media (max-width: 600px) {
    header { padding: 0.6rem 1rem; }
    main { padding: 1rem; }
    .header-controls { gap: 0.5rem; }
    input[type="password"] { width: 11rem; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<a href="#chunks-list" class="skip-link">Přeskočit na seznam chunků</a>

<div id="app">
  <!-- LIVE REGION for screen reader announcements -->
  <div id="sr-live" aria-live="assertive" aria-atomic="true" role="status"></div>

  <header role="banner">
    <h1>TTS Editor</h1>
    <div class="header-controls">
      <button class="btn-secondary" id="btn-toggle-settings" type="button" aria-expanded="false" aria-controls="api-settings-panel">⚙ Nastavení</button>
      <div class="voice-row">
        <label for="voice-select">Hlas:</label>
        <select id="voice-select" aria-label="Výběr hlasu pro TTS">
          <option value="">— nejprve načtěte hlasy —</option>
        </select>
        <button class="btn-icon" id="btn-preview-voice" type="button"
          title="Přehrát ukázku hlasu" aria-label="Přehrát ukázku hlasu">▶</button>
      </div>
    </div>
  </header>

  <div id="api-settings-panel" hidden>
    <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:0.6rem 1.5rem;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
      <label for="api-key-input" style="font-size:0.85rem;color:var(--text-dim);white-space:nowrap;">API klíč ElevenLabs:</label>
      <input type="password" id="api-key-input" autocomplete="off" placeholder="sk-...">
      <button class="btn-secondary" id="btn-save-key" type="button">Uložit klíč</button>
      <button class="btn-secondary" id="btn-load-voices" type="button">Načíst hlasy</button>
    </div>
  </div>

  <div id="status-bar" role="status" aria-live="polite">
    <span class="status-msg" id="status-msg">Vítejte. Zadejte API klíč a načtěte hlasy.</span>
  </div>

  <main id="main-content">
    <!-- Toolbar -->
    <section aria-label="Ovládací panel" id="toolbar">
      <button class="btn-secondary" id="btn-add-chunk" type="button">+ Přidat chunk</button>
      <button class="btn-secondary" id="btn-generate-all" type="button">▶▶ Generovat vše</button>
      <button class="btn-secondary" id="btn-play-all" type="button">▶ Přehrát vše</button>
      <button class="btn-secondary" id="btn-stop-all" type="button" disabled>■ Zastavit</button>
      <button class="btn-secondary" id="btn-clear-audio" type="button">✕ Smazat všechno audio</button>
      <button class="btn-secondary" id="btn-export" type="button">↓ Exportovat projekt (JSON)</button>
      <button class="btn-secondary" id="btn-import-project" type="button">↑ Importovat projekt (JSON)</button>
      <button class="btn-secondary" id="btn-download-all-audio" type="button">↓ Stáhnout všechna MP3 (ZIP)</button>
      <input type="file" id="file-input" accept=".json" style="display:none" aria-hidden="true">
    </section>

    <!-- Import textu -->
    <section aria-labelledby="import-heading" id="import-section">
      <h2 id="import-heading">Vložit text ke zpracování</h2>
      <textarea id="import-textarea"
        aria-label="Vstupní text pro rozdělení na chunky"
        placeholder="Sem vložte text ze schránky nebo napište přímo. Pak klikněte na Rozdělit a přidat."></textarea>
      <div class="import-actions">
        <button class="btn-primary" id="btn-split-add" type="button">Rozdělit a přidat</button>
        <button class="btn-secondary" id="btn-paste-import" type="button">📋 Vložit ze schránky</button>
        <label for="chunk-size">Velikost chunku (slova):
          <input type="number" id="chunk-size" value="50" min="5" max="500" step="5"
            aria-describedby="chunk-size-hint">
        </label>
        <span id="chunk-size-hint" style="font-size:0.78rem;color:var(--text-dim)">přibližně</span>
        <button class="btn-secondary" id="btn-add-as-one" type="button">Přidat jako jeden chunk</button>
      </div>
    </section>

    <!-- Chunky -->
    <section aria-labelledby="chunks-heading">
      <h2 id="chunks-heading" style="font-size:0.9rem;color:var(--text-dim);font-weight:500;margin-bottom:0.75rem;">
        Chunky textu
        <span id="chunks-count" aria-live="polite" aria-atomic="true">(0 chunků)</span>
        <span id="chunks-total-chars" style="margin-left:1rem;font-family:'IBM Plex Mono',monospace;">0 znaků celkem</span>
        <span id="chunks-total-duration" style="margin-left:1rem;font-family:'IBM Plex Mono',monospace;color:var(--accent);"></span>
      </h2>
      <ul id="chunks-list" aria-label="Seznam textových chunků">
        <!-- Chunky se generují dynamicky -->
      </ul>
      <p id="chunks-empty" style="color:var(--text-dim);font-style:italic;font-size:0.9rem;">
        Zatím žádné chunky. Vložte text výše nebo přidejte prázdný chunk.
      </p>
    </section>

    <div class="divider" role="separator"></div>

    <!-- Výstup -->
    <section aria-labelledby="output-heading" id="output-section">
      <h2 id="output-heading">Výsledný text (spojené chunky)</h2>
      <textarea id="output-textarea" readonly
        aria-label="Výsledný spojený text"
        placeholder="Zde se zobrazí spojený text ze všech chunků."></textarea>
      <div class="output-actions">
        <button class="btn-primary" id="btn-combine" type="button">Spojit chunky</button>
        <button class="btn-secondary" id="btn-copy-output" type="button">📋 Kopírovat</button>
        <button class="btn-secondary" id="btn-clear-all" type="button">✕ Smazat vše</button>
      </div>
    </section>
  </main>
</div>

<script>
'use strict';

// ─── STATE ──────────────────────────────────────────────────────────────────
const state = {
  apiKey: '',
  voices: [],        // [{voice_id, name}]
  selectedVoiceId: '',
  chunks: [],        // [{id, text, audioBlob, audioUrl, status}]
  isGenerating: false,
  stopRequested: false,
  nextId: 1,
  currentAudio: null,  // HTMLAudioElement currently playing
};

const STORAGE_KEY_API   = 'tts_editor_api_key';
const STORAGE_KEY_VOICE = 'tts_editor_voice_id';
const STORAGE_KEY_PROJ  = 'tts_editor_project';

// ─── ELEMENTS ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const apiKeyInput    = $('api-key-input');
const btnSaveKey     = $('btn-save-key');
const btnLoadVoices  = $('btn-load-voices');
const btnToggleSettings = $('btn-toggle-settings');
const apiSettingsPanel  = $('api-settings-panel');
const voiceSelect    = $('voice-select');
const btnPreviewVoice= $('btn-preview-voice');
const statusMsg      = $('status-msg');
const srLive         = $('sr-live');
const btnAddChunk    = $('btn-add-chunk');
const btnGenerateAll = $('btn-generate-all');
const btnPlayAll     = $('btn-play-all');
const btnStopAll     = $('btn-stop-all');
const btnClearAudio  = $('btn-clear-audio');
const btnExport      = $('btn-export');
const btnImportProj  = $('btn-import-project');
const btnDownloadAllAudio = $('btn-download-all-audio');
const fileInput      = $('file-input');
const importTextarea = $('import-textarea');
const btnSplitAdd    = $('btn-split-add');
const btnPasteImport = $('btn-paste-import');
const chunkSizeInput = $('chunk-size');
const btnAddAsOne    = $('btn-add-as-one');
const chunksList     = $('chunks-list');
const chunksEmpty    = $('chunks-empty');
const chunksCount    = $('chunks-count');
const chunksTotalChars    = $('chunks-total-chars');
const chunksTotalDuration = $('chunks-total-duration');
const outputTextarea = $('output-textarea');
const btnCombine     = $('btn-combine');
const btnCopyOutput  = $('btn-copy-output');
const btnClearAll    = $('btn-clear-all');

// ─── SETTINGS PANEL TOGGLE ───────────────────────────────────────────────────
btnToggleSettings.addEventListener('click', () => {
  const hidden = apiSettingsPanel.hidden;
  apiSettingsPanel.hidden = !hidden;
  btnToggleSettings.setAttribute('aria-expanded', String(!hidden));
  if (!hidden === true) apiKeyInput.focus();
});

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function formatDuration(sec) {
  if (!sec || isNaN(sec)) return '';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m > 0 ? `${m}:${String(s).padStart(2,'0')} min` : `${s} s`;
}

function updateTotalDuration() {
  const total = state.chunks.reduce((s, c) => s + (c.audioDuration || 0), 0);
  chunksTotalDuration.textContent = total > 0 ? `/ ${formatDuration(total)} audio` : '';
}

// ─── STATUS / ANNOUNCE ───────────────────────────────────────────────────────
function setStatus(msg, type='') {
  statusMsg.textContent = msg;
  statusMsg.dataset.type = type;
}
function announce(msg) {
  srLive.textContent = '';
  requestAnimationFrame(() => { srLive.textContent = msg; });
}

// ─── LOCAL STORAGE ───────────────────────────────────────────────────────────
function loadFromStorage() {
  const key = localStorage.getItem(STORAGE_KEY_API) || '';
  if (key) {
    state.apiKey = key;
    apiKeyInput.value = key;
    setStatus('API klíč načten z úložiště.', 'ok');
  }
  state.selectedVoiceId = localStorage.getItem(STORAGE_KEY_VOICE) || '';
  // Load project
  try {
    const proj = JSON.parse(localStorage.getItem(STORAGE_KEY_PROJ) || 'null');
    if (proj && Array.isArray(proj.chunks)) {
      proj.chunks.forEach(c => {
        addChunkFromData(c.text || '', c.id, c.done);
      });
      state.nextId = (Math.max(0, ...state.chunks.map(c => c.id)) + 1);
      updateChunksUI();
    }
  } catch(e) { /* ignore */ }
}

function saveProjectToStorage() {
  const proj = {
    chunks: state.chunks.map(c => ({ id: c.id, text: c.text, done: c.done }))
  };
  localStorage.setItem(STORAGE_KEY_PROJ, JSON.stringify(proj));
}

// ─── API KEY ─────────────────────────────────────────────────────────────────
btnSaveKey.addEventListener('click', () => {
  const key = apiKeyInput.value.trim();
  if (!key) { setStatus('Zadejte API klíč.', 'error'); return; }
  state.apiKey = key;
  localStorage.setItem(STORAGE_KEY_API, key);
  setStatus('API klíč uložen.', 'ok');
  announce('API klíč byl uložen.');
});

// ─── LOAD VOICES ─────────────────────────────────────────────────────────────
btnLoadVoices.addEventListener('click', loadVoices);

async function loadVoices() {
  if (!state.apiKey) { setStatus('Nejprve uložte API klíč.', 'error'); return; }
  setStatus('Načítám hlasy z ElevenLabs…', 'info');
  btnLoadVoices.disabled = true;
  try {
    const resp = await fetch('https://api.elevenlabs.io/v1/voices', {
      headers: { 'xi-api-key': state.apiKey }
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    state.voices = (data.voices || []).sort((a,b) => a.name.localeCompare(b.name, 'cs'));
    populateVoiceSelect();
    setStatus(`Načteno ${state.voices.length} hlasů.`, 'ok');
    announce(`Načteno ${state.voices.length} hlasů.`);
  } catch(e) {
    setStatus(`Chyba načítání hlasů: ${e.message}`, 'error');
    announce(`Chyba: ${e.message}`);
  } finally {
    btnLoadVoices.disabled = false;
  }
}

function populateVoiceSelect() {
  voiceSelect.innerHTML = '';
  if (!state.voices.length) {
    voiceSelect.innerHTML = '<option value="">— žádné hlasy —</option>';
    return;
  }
  state.voices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.voice_id;
    opt.textContent = v.name;
    voiceSelect.appendChild(opt);
  });
  // Restore saved voice
  if (state.selectedVoiceId) {
    voiceSelect.value = state.selectedVoiceId;
    if (!voiceSelect.value && state.voices.length) voiceSelect.selectedIndex = 0;
  }
  state.selectedVoiceId = voiceSelect.value;
  localStorage.setItem(STORAGE_KEY_VOICE, state.selectedVoiceId);
}

voiceSelect.addEventListener('change', () => {
  state.selectedVoiceId = voiceSelect.value;
  localStorage.setItem(STORAGE_KEY_VOICE, state.selectedVoiceId);
});

btnPreviewVoice.addEventListener('click', async () => {
  if (!state.selectedVoiceId) { setStatus('Vyberte hlas.', 'error'); return; }
  const previewText = 'Toto je ukázka vybraného hlasu pro váš TTS editor.';
  await generateAndPlay(-1, previewText, false);
});

// ─── TTS GENERATION ──────────────────────────────────────────────────────────
async function generateTTS(text, voiceId) {
  const resp = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
    method: 'POST',
    headers: {
      'xi-api-key': state.apiKey,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      text: text,
      model_id: 'eleven_multilingual_v2',
      voice_settings: { stability: 0.5, similarity_boost: 0.75 }
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.detail?.message || `HTTP ${resp.status}`);
  }
  return await resp.blob();
}

// Stop currently playing audio
function stopCurrentAudio() {
  if (state.currentAudio) {
    state.currentAudio.pause();
    state.currentAudio.currentTime = 0;
    state.currentAudio = null;
  }
  // Remove playing state from all chunks
  document.querySelectorAll('.chunk-item.is-playing').forEach(el => {
    el.classList.remove('is-playing');
    const st = el.querySelector('.chunk-status');
    if (st && st.classList.contains('playing')) {
      st.classList.remove('playing');
      const chunkId = parseInt(el.dataset.chunkId);
      const chunk = state.chunks.find(c => c.id === chunkId);
      if (chunk) {
        st.textContent = chunk.audioUrl ? '✓ audio OK' : '';
        st.className = 'chunk-status' + (chunk.audioUrl ? ' ok' : '');
      }
    }
  });
}

async function generateAndPlay(chunkId, text, store) {
  if (!state.apiKey)  { setStatus('Chybí API klíč.', 'error'); return; }
  if (!state.selectedVoiceId) { setStatus('Vyberte hlas.', 'error'); return; }
  if (!text.trim())   { setStatus('Prázdný text.', 'error'); return; }

  stopCurrentAudio();

  let chunkEl = null, statusEl = null;
  if (chunkId >= 0) {
    chunkEl   = document.querySelector(`[data-chunk-id="${chunkId}"]`);
    statusEl  = chunkEl?.querySelector('.chunk-status');
    setChunkStatus(chunkId, 'generating', 'Generuji…');
  }
  setStatus(`Generuji TTS…`, 'info');

  try {
    const blob = await generateTTS(text, state.selectedVoiceId);
    const url  = URL.createObjectURL(blob);

    if (store && chunkId >= 0) {
      const chunk = state.chunks.find(c => c.id === chunkId);
      if (chunk) {
        if (chunk.audioUrl) URL.revokeObjectURL(chunk.audioUrl);
        chunk.audioBlob = blob;
        chunk.audioUrl  = url;
        chunk.status    = 'ok';
        // Update audio element in DOM
        const audioEl = chunkEl?.querySelector('audio');
        if (audioEl) {
          audioEl.src = url;
          chunkEl?.querySelector('.chunk-player')?.removeAttribute('hidden');
        }
        // Get duration once metadata loaded
        const tempAudio = new Audio(url);
        tempAudio.addEventListener('loadedmetadata', () => {
          chunk.audioDuration = tempAudio.duration;
          // Update duration display in chunk header
          const durEl = chunkEl?.querySelector('.chunk-duration');
          if (durEl) durEl.textContent = formatDuration(tempAudio.duration);
          updateTotalDuration();
        });
        setChunkStatus(chunkId, 'ok', '✓ audio OK');
      }
    }
    setStatus('TTS vygenerováno, přehrávám…', 'ok');
    announce('Audio vygenerováno, přehrávám.');

    // Play
    const audio = new Audio(url);
    state.currentAudio = audio;
    if (chunkEl) chunkEl.classList.add('is-playing');
    if (statusEl) { statusEl.textContent = '▶ přehrávám'; statusEl.className = 'chunk-status playing'; }

    audio.play().catch(e => { setStatus(`Přehrávání selhalo: ${e.message}`, 'error'); });
    audio.addEventListener('ended', () => {
      if (chunkEl) chunkEl.classList.remove('is-playing');
      if (store && chunkId >= 0) {
        setChunkStatus(chunkId, 'ok', '✓ audio OK');
      } else if (statusEl) {
        statusEl.textContent = '';
      }
      if (state.currentAudio === audio) state.currentAudio = null;
      setStatus('Přehrávání dokončeno.', 'ok');
    });
    audio.addEventListener('error', () => {
      setStatus('Chyba přehrávání.', 'error');
      if (chunkEl) chunkEl.classList.remove('is-playing');
      if (statusEl) statusEl.textContent = '';
    });

  } catch(e) {
    setStatus(`Chyba TTS: ${e.message}`, 'error');
    announce(`Chyba TTS: ${e.message}`);
    if (chunkId >= 0) setChunkStatus(chunkId, 'error', '✗ chyba');
  }
}

function setChunkStatus(chunkId, cls, text) {
  const chunkEl = document.querySelector(`[data-chunk-id="${chunkId}"]`);
  if (!chunkEl) return;
  const st = chunkEl.querySelector('.chunk-status');
  if (st) { st.textContent = text; st.className = 'chunk-status ' + cls; }
}

// ─── CHUNK MANAGEMENT ────────────────────────────────────────────────────────
function makeChunk(text='', id=null) {
  return {
    id: id ?? state.nextId++,
    text: text,
    audioBlob: null,
    audioUrl: null,
    audioDuration: null,
    status: 'none',
    done: false
  };
}

function addChunkFromData(text, id, done=false) {
  const c = makeChunk(text, id);
  c.done = !!done;
  state.chunks.push(c);
  return c;
}

function addChunk(text='', afterId=null) {
  const c = makeChunk(text);
  if (afterId !== null) {
    const idx = state.chunks.findIndex(x => x.id === afterId);
    if (idx >= 0) { state.chunks.splice(idx + 1, 0, c); }
    else state.chunks.push(c);
  } else {
    state.chunks.push(c);
  }
  saveProjectToStorage();
  renderChunks();
  // Focus the new chunk
  requestAnimationFrame(() => {
    const ta = document.querySelector(`[data-chunk-id="${c.id}"] textarea`);
    if (ta) ta.focus();
  });
  announce(`Přidán chunk ${c.id}.`);
  return c;
}

function removeChunk(id) {
  const idx = state.chunks.findIndex(c => c.id === id);
  if (idx < 0) return;
  const c = state.chunks[idx];
  if (c.audioUrl) URL.revokeObjectURL(c.audioUrl);
  state.chunks.splice(idx, 1);
  saveProjectToStorage();
  renderChunks();
  announce(`Chunk smazán.`);
}

function mergeWithPrevious(id) {
  const idx = state.chunks.findIndex(c => c.id === id);
  if (idx <= 0) { announce('Žádný předchozí chunk ke sloučení.'); return; }
  const prev = state.chunks[idx - 1];
  const curr = state.chunks[idx];
  const sep = prev.text.trimEnd() && curr.text.trimStart() ? ' ' : '';
  prev.text = prev.text.trimEnd() + sep + curr.text.trimStart();
  // Clear audio of merged chunk (now stale)
  if (prev.audioUrl) { URL.revokeObjectURL(prev.audioUrl); prev.audioUrl = null; prev.audioBlob = null; prev.status = 'none'; }
  if (curr.audioUrl) { URL.revokeObjectURL(curr.audioUrl); }
  state.chunks.splice(idx, 1);
  saveProjectToStorage();
  renderChunks();
  announce(`Chunky sloučeny.`);
  // Focus merged chunk
  requestAnimationFrame(() => {
    const ta = document.querySelector(`[data-chunk-id="${prev.id}"] textarea`);
    if (ta) ta.focus();
  });
}

function moveChunk(id, direction) {
  const idx = state.chunks.findIndex(c => c.id === id);
  if (idx < 0) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= state.chunks.length) return;
  const tmp = state.chunks[idx];
  state.chunks[idx] = state.chunks[newIdx];
  state.chunks[newIdx] = tmp;
  saveProjectToStorage();
  renderChunks();
  // Restore focus to moved chunk
  requestAnimationFrame(() => {
    const ta = document.querySelector(`[data-chunk-id="${id}"] textarea`);
    if (ta) ta.focus();
  });
  announce(`Chunk přesunut ${direction < 0 ? 'nahoru' : 'dolů'}.`);
}

function updateChunkText(id, text) {
  const c = state.chunks.find(x => x.id === id);
  if (c) {
    c.text = text;
    // Mark audio as stale if text changed
    if (c.audioUrl) {
      setChunkStatus(id, 'ok', '✓ audio (text změněn)');
    }
    saveProjectToStorage();
  }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderChunks() {
  chunksList.innerHTML = '';
  const empty = state.chunks.length === 0;
  chunksEmpty.style.display = empty ? '' : 'none';
  chunksCount.textContent = `(${state.chunks.length} ${pluralChunk(state.chunks.length)})`;
  const totalChars = state.chunks.reduce((s, c) => s + c.text.length, 0);
  chunksTotalChars.textContent = `${totalChars.toLocaleString('cs')} znaků celkem`;
  updateTotalDuration();

  state.chunks.forEach((chunk, idx) => {
    const li = document.createElement('li');
    li.className = 'chunk-item' + (chunk.audioUrl ? ' has-audio' : '') + (chunk.done ? ' is-done' : '');
    li.dataset.chunkId = chunk.id;
    li.setAttribute('aria-label', `Chunk ${idx + 1}`);

    // Header — jen číslo, počet znaků, Přehrát, Smazat, status
    const header = document.createElement('div');
    header.className = 'chunk-header';

    const num = document.createElement('span');
    num.className = 'chunk-number';
    num.textContent = `#${idx + 1}`;
    num.setAttribute('aria-hidden', 'true');

    const charCount = document.createElement('span');
    charCount.className = 'chunk-charcount';
    charCount.textContent = `${chunk.text.length} zn.`;
    charCount.setAttribute('aria-hidden', 'true');

    const durSpan = document.createElement('span');
    durSpan.className = 'chunk-duration';
    durSpan.textContent = chunk.audioDuration ? formatDuration(chunk.audioDuration) : '';
    durSpan.setAttribute('aria-hidden', 'true');

    const btnPlay = makeButton('▷ Přehrát', 'btn-secondary', () => {
      if (!chunk.audioUrl) { announce('Chunk nemá audio. Nejprve generujte.'); return; }
      stopCurrentAudio();
      const audio = new Audio(chunk.audioUrl);
      state.currentAudio = audio;
      li.classList.add('is-playing');
      setChunkStatus(chunk.id, 'playing', '▶ přehrávám');
      audio.play().catch(e => setStatus(`Přehrávání selhalo: ${e.message}`, 'error'));
      audio.addEventListener('ended', () => {
        li.classList.remove('is-playing');
        setChunkStatus(chunk.id, 'ok', '✓ audio OK');
        if (state.currentAudio === audio) state.currentAudio = null;
      });
    });
    btnPlay.setAttribute('aria-label', `Přehrát uložené audio pro chunk ${idx + 1}`);
    if (!chunk.audioUrl) btnPlay.disabled = true;

    const btnDel = makeButton('✕ Smazat', 'btn-danger', () => {
      if (confirm(`Smazat chunk ${idx + 1}?`)) removeChunk(chunk.id);
    });
    btnDel.setAttribute('aria-label', `Smazat chunk ${idx + 1}`);

    const st = document.createElement('span');
    st.className = 'chunk-status' + (chunk.audioUrl ? ' ok' : '');
    st.textContent = chunk.audioUrl ? '✓ audio OK' : '';
    st.setAttribute('aria-live', 'polite');

    header.append(num, charCount, durSpan, btnPlay, btnDel, st);

    // Body
    const body = document.createElement('div');
    body.className = 'chunk-body';

    // Done checkbox row
    const doneRow = document.createElement('div');
    doneRow.style.cssText = 'display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem;';
    const doneChk = document.createElement('input');
    doneChk.type = 'checkbox';
    doneChk.id = `done-${chunk.id}`;
    doneChk.checked = chunk.done;
    doneChk.setAttribute('aria-label', `Označit chunk ${idx + 1} jako hotový`);
    const doneLbl = document.createElement('label');
    doneLbl.htmlFor = `done-${chunk.id}`;
    doneLbl.textContent = 'Hotovo';
    doneLbl.style.cssText = 'font-size:0.85rem;color:var(--text-dim);cursor:pointer;';
    doneRow.append(doneChk, doneLbl);

    // Static text (done mode)
    const staticLabel = document.createElement('p');
    staticLabel.className = 'chunk-done-label';
    staticLabel.textContent = chunk.text;
    staticLabel.hidden = !chunk.done;

    // Textarea
    const ta = document.createElement('textarea');
    ta.className = 'chunk-textarea';
    ta.value = chunk.text;
    ta.setAttribute('aria-label', `Text chunku ${idx + 1}`);
    ta.setAttribute('rows', Math.max(3, Math.ceil(chunk.text.length / 80)));
    ta.hidden = chunk.done;
    ta.addEventListener('input', () => {
      updateChunkText(chunk.id, ta.value);
      charCount.textContent = `${ta.value.length} zn.`;
      const total = state.chunks.reduce((s, c) => s + c.text.length, 0);
      chunksTotalChars.textContent = `${total.toLocaleString('cs')} znaků celkem`;
    });
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        addChunk('', chunk.id);
      }
    });

    // Generovat
    const btnGen = makeButton('▶ Generovat a přehrát', 'btn-primary', async () => {
      await generateAndPlay(chunk.id, ta.value, true);
    });
    btnGen.setAttribute('aria-label', `Generovat a přehrát TTS pro chunk ${idx + 1}`);
    btnGen.style.cssText = 'margin-top:0.4rem;';
    btnGen.hidden = chunk.done;

    // Akce pod generováním
    const btnAddAfter = makeButton('+ Za', 'btn-secondary', () => addChunk('', chunk.id));
    btnAddAfter.setAttribute('aria-label', `Přidat chunk za chunk ${idx + 1}`);

    const btnMerge = makeButton('↑ Sloučit s předchozím', 'btn-secondary', () => mergeWithPrevious(chunk.id));
    btnMerge.setAttribute('aria-label', `Sloučit chunk ${idx + 1} s předchozím`);
    if (idx === 0 || chunk.done) btnMerge.disabled = true;

    const btnUp = makeButton('▲ Nahoru', 'btn-secondary', () => moveChunk(chunk.id, -1));
    btnUp.setAttribute('aria-label', `Přesunout chunk ${idx + 1} nahoru`);
    if (idx === 0) btnUp.disabled = true;

    const btnDown = makeButton('▼ Dolů', 'btn-secondary', () => moveChunk(chunk.id, 1));
    btnDown.setAttribute('aria-label', `Přesunout chunk ${idx + 1} dolů`);
    if (idx === state.chunks.length - 1) btnDown.disabled = true;

    const bodyActions = document.createElement('div');
    bodyActions.className = 'chunk-actions';
    bodyActions.style.marginTop = '0.4rem';
    bodyActions.append(btnAddAfter, btnMerge, btnUp, btnDown);

    // Done handler — po definici všech referencovaných prvků
    doneChk.addEventListener('change', () => {
      chunk.done = doneChk.checked;
      if (chunk.done) {
        li.classList.add('is-done');
        ta.hidden = true;
        btnGen.hidden = true;
        bodyActions.hidden = true;
        staticLabel.hidden = false;
        staticLabel.textContent = chunk.text;
        btnMerge.disabled = true;
      } else {
        li.classList.remove('is-done');
        ta.hidden = false;
        btnGen.hidden = false;
        bodyActions.hidden = false;
        staticLabel.hidden = true;
        btnMerge.disabled = (idx === 0);
      }
      saveProjectToStorage();
      announce(`Chunk ${idx + 1} ${chunk.done ? 'označen jako hotový' : 'znovu otevřen pro editaci'}.`);
    });

    if (chunk.done) bodyActions.hidden = true;

    body.append(doneRow, staticLabel, ta, btnGen, bodyActions);

    // Player
    const player = document.createElement('div');
    player.className = 'chunk-player';
    if (!chunk.audioUrl) player.hidden = true;
    const audioEl = document.createElement('audio');
    audioEl.controls = true;
    audioEl.setAttribute('aria-label', `Audio přehrávač pro chunk ${idx + 1}`);
    if (chunk.audioUrl) audioEl.src = chunk.audioUrl;

    const btnDownloadAudio = makeButton('↓ Stáhnout audio', 'btn-secondary', () => {
      if (!chunk.audioUrl) return;
      const a = document.createElement('a');
      a.href = chunk.audioUrl;
      a.download = `chunk-${String(idx + 1).padStart(3, '0')}.mp3`;
      a.click();
    });
    btnDownloadAudio.setAttribute('aria-label', `Stáhnout audio chunku ${idx + 1}`);

    player.append(audioEl, btnDownloadAudio);

    li.append(header, body, player);
    chunksList.appendChild(li);
  });
}

function makeButton(label, cls, handler) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = label;
  btn.className = cls;
  btn.addEventListener('click', handler);
  return btn;
}

function pluralChunk(n) {
  if (n === 1) return 'chunk';
  if (n >= 2 && n <= 4) return 'chunky';
  return 'chunků';
}

function updateChunksUI() {
  renderChunks();
}

// ─── IMPORT TEXT ─────────────────────────────────────────────────────────────
function splitTextToChunks(text, wordsPerChunk) {
  const words = text.trim().split(/\s+/);
  const result = [];
  for (let i = 0; i < words.length; i += wordsPerChunk) {
    result.push(words.slice(i, i + wordsPerChunk).join(' '));
  }
  return result;
}

btnSplitAdd.addEventListener('click', () => {
  const text = importTextarea.value.trim();
  if (!text) { setStatus('Žádný text k rozdělení.', 'error'); return; }
  const size = parseInt(chunkSizeInput.value) || 50;
  const parts = splitTextToChunks(text, size);
  parts.forEach(p => addChunk(p));
  importTextarea.value = '';
  setStatus(`Přidáno ${parts.length} chunků.`, 'ok');
  announce(`Přidáno ${parts.length} chunků.`);
});

btnAddAsOne.addEventListener('click', () => {
  const text = importTextarea.value.trim();
  if (!text) { setStatus('Žádný text.', 'error'); return; }
  addChunk(text);
  importTextarea.value = '';
});

btnPasteImport.addEventListener('click', async () => {

    importTextarea.value = text;
    importTextarea.focus();
    announce('Text vložen ze schránky.');

  }
});

btnAddChunk.addEventListener('click', () => addChunk(''));

// ─── PLAY ALL ────────────────────────────────────────────────────────────────
btnPlayAll.addEventListener('click', async () => {
  const withAudio = state.chunks.filter(c => c.audioUrl);
  if (!withAudio.length) {
    setStatus('Žádné chunky s audiem k přehrání.', 'error');
    announce('Žádné chunky s audiem k přehrání.');
    return;
  }
  state.stopRequested = false;
  btnStopAll.disabled = false;
  btnPlayAll.disabled = true;

  for (let i = 0; i < withAudio.length; i++) {
    if (state.stopRequested) break;
    const c = withAudio[i];
    const chunkEl = document.querySelector(`[data-chunk-id="${c.id}"]`);
    stopCurrentAudio();
    const audio = new Audio(c.audioUrl);
    state.currentAudio = audio;
    if (chunkEl) chunkEl.classList.add('is-playing');
    setChunkStatus(c.id, 'playing', '▶ přehrávám');
    setStatus(`Přehrávám chunk ${state.chunks.indexOf(c) + 1} / ${withAudio.length}…`, 'info');
    announce(`Chunk ${state.chunks.indexOf(c) + 1}.`);
    audio.play().catch(e => setStatus(`Přehrávání selhalo: ${e.message}`, 'error'));
    await new Promise(resolve => {
      const done = () => { audio.removeEventListener('ended', done); audio.removeEventListener('error', done); resolve(); };
      audio.addEventListener('ended', done);
      audio.addEventListener('error', done);
    });
    if (chunkEl) chunkEl.classList.remove('is-playing');
    setChunkStatus(c.id, 'ok', '✓ audio OK');
    if (state.currentAudio === audio) state.currentAudio = null;
  }

  btnStopAll.disabled = true;
  btnPlayAll.disabled = false;
  const msg = state.stopRequested ? 'Přehrávání zastaveno.' : 'Přehrávání dokončeno.';
  setStatus(msg, 'ok');
  announce(msg);
});

// ─── GENERATE ALL ─────────────────────────────────────────────────────────────
btnGenerateAll.addEventListener('click', async () => {
  if (!state.apiKey) { setStatus('Chybí API klíč.', 'error'); return; }
  if (!state.selectedVoiceId) { setStatus('Vyberte hlas.', 'error'); return; }
  if (state.isGenerating) return;
  state.isGenerating = true;
  state.stopRequested = false;
  btnGenerateAll.disabled = true;
  btnStopAll.disabled = false;
  setStatus('Generuji všechny chunky…', 'info');

  for (let i = 0; i < state.chunks.length; i++) {
    if (state.stopRequested) break;
    const c = state.chunks[i];
    if (!c.text.trim()) continue;
    setStatus(`Generuji chunk ${i + 1} / ${state.chunks.length}…`, 'info');
    await generateAndPlay(c.id, c.text, true);
    // Wait for audio to finish
    await new Promise(resolve => {
      if (!state.currentAudio) { resolve(); return; }
      const a = state.currentAudio;
      const onDone = () => { a.removeEventListener('ended', onDone); a.removeEventListener('error', onDone); resolve(); };
      a.addEventListener('ended', onDone);
      a.addEventListener('error', onDone);
      if (a.paused && a.ended) resolve();
    });
    if (state.stopRequested) break;
  }

  state.isGenerating = false;
  btnGenerateAll.disabled = false;
  btnStopAll.disabled = true;
  setStatus(state.stopRequested ? 'Generování zastaveno.' : 'Všechny chunky vygenerovány.', 'ok');
  announce(state.stopRequested ? 'Generování zastaveno.' : 'Všechny chunky vygenerovány.');
});

btnStopAll.addEventListener('click', () => {
  state.stopRequested = true;
  stopCurrentAudio();
  btnStopAll.disabled = true;
  setStatus('Zastavuji…', 'info');
});

// ─── CLEAR AUDIO ─────────────────────────────────────────────────────────────
btnClearAudio.addEventListener('click', () => {
  if (!confirm('Smazat všechno vygenerované audio?')) return;
  stopCurrentAudio();
  state.chunks.forEach(c => {
    if (c.audioUrl) URL.revokeObjectURL(c.audioUrl);
    c.audioUrl = null; c.audioBlob = null; c.status = 'none';
  });
  renderChunks();
  setStatus('Audio smazáno.', 'ok');
  announce('Všechno audio bylo smazáno.');
});

// ─── OUTPUT ──────────────────────────────────────────────────────────────────
btnCombine.addEventListener('click', () => {
  const combined = state.chunks.map(c => c.text.trim()).filter(Boolean).join('\n\n');
  outputTextarea.value = combined;
  setStatus('Chunky spojeny.', 'ok');
  announce('Chunky byly spojeny do výsledného textu.');
  outputTextarea.focus();
});

btnCopyOutput.addEventListener('click', async () => {
  const text = outputTextarea.value;
  if (!text) { setStatus('Žádný text ke kopírování.', 'error'); return; }
  try {
    await navigator.clipboard.writeText(text);
    setStatus('Zkopírováno do schránky.', 'ok');
    announce('Text zkopírován do schránky.');
  } catch(e) {
    setStatus('Kopírování selhalo.', 'error');
  }
});

btnClearAll.addEventListener('click', () => {
  if (!confirm('Smazat všechny chunky a výstup?')) return;
  stopCurrentAudio();
  state.chunks.forEach(c => { if (c.audioUrl) URL.revokeObjectURL(c.audioUrl); });
  state.chunks = [];
  state.nextId = 1;
  outputTextarea.value = '';
  saveProjectToStorage();
  renderChunks();
  setStatus('Vše smazáno.', 'ok');
  announce('Všechny chunky byly smazány.');
});

// ─── EXPORT / IMPORT PROJECT ─────────────────────────────────────────────────
btnExport.addEventListener('click', () => {
  const proj = {
    version: 1,
    exportedAt: new Date().toISOString(),
    chunks: state.chunks.map(c => ({ id: c.id, text: c.text, done: c.done }))
  };
  const blob = new Blob([JSON.stringify(proj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tts-projekt-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  announce('Projekt exportován.');
});

btnImportProj.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const proj = JSON.parse(text);
    if (!Array.isArray(proj.chunks)) throw new Error('Neplatný formát.');
    if (!confirm(`Importovat projekt s ${proj.chunks.length} chunky? Stávající chunky budou nahrazeny.`)) return;
    stopCurrentAudio();
    state.chunks.forEach(c => { if (c.audioUrl) URL.revokeObjectURL(c.audioUrl); });
    state.chunks = [];
    state.nextId = 1;
    proj.chunks.forEach(c => addChunkFromData(c.text || '', c.id));
    state.nextId = (Math.max(0, ...state.chunks.map(c => c.id)) + 1);
    saveProjectToStorage();
    renderChunks();
    setStatus(`Projekt importován: ${state.chunks.length} chunků.`, 'ok');
    announce(`Projekt importován: ${state.chunks.length} chunků.`);
  } catch(e) {
    setStatus(`Chyba importu: ${e.message}`, 'error');
  }
  fileInput.value = '';
});

// ─── DOWNLOAD ALL AUDIO (ZIP) ─────────────────────────────────────────────────
btnDownloadAllAudio.addEventListener('click', async () => {
  const withAudio = state.chunks.filter(c => c.audioBlob);
  if (!withAudio.length) {
    setStatus('Žádné vygenerované audio ke stažení.', 'error');
    announce('Žádné vygenerované audio ke stažení.');
    return;
  }
  setStatus(`Připravuji ZIP (${withAudio.length} souborů)…`, 'info');
  btnDownloadAllAudio.disabled = true;
  try {
    const JSZip = window.JSZip;
    if (!JSZip) throw new Error('JSZip není načteno.');
    const zip = new JSZip();
    withAudio.forEach((c, i) => {
      const globalIdx = state.chunks.indexOf(c) + 1;
      const name = `chunk-${String(globalIdx).padStart(3, '0')}.mp3`;
      zip.file(name, c.audioBlob);
    });
    const content = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tts-audio-${new Date().toISOString().slice(0,10)}.zip`;
    a.click();
    URL.revokeObjectURL(url);
    setStatus(`ZIP stažen: ${withAudio.length} souborů.`, 'ok');
    announce(`ZIP se ${withAudio.length} MP3 soubory byl stažen.`);
  } catch(e) {
    setStatus(`Chyba při vytváření ZIP: ${e.message}`, 'error');
  } finally {
    btnDownloadAllAudio.disabled = false;
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadFromStorage();
renderChunks();
</script>
</body>
</html>
